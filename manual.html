в соответствуют высоте 4,1m.\n\nФРАНЦИЯ (FR)\nАппарат PASSanGO для оплаты дорог, кредиты пополняются автоматически."}, {"title": "НЕПРЕВЫШАТЬ СКОРОСТЬ 85 КМ/Ч", "content": "-двигаясь по направлению к Италии, перед пересечением туннелей Frejus (А-43) и Mont Blanc (А-40), уточнить\nформы оплаты за проезд карточкой.\n-двигаясь по А-40 (по направлению к Италии) к туннелю Mont Blanc не проехать мимо специальной площадки для\nтягачей на последнем километре магистрали и забрать пропуск. Париж, рекомендуется выбрать дороги А86 или\nN104 -Router центре – специализированная стоянка для тягачей\n\n\n-движение запрещено с субботы 22.00 до воскресенья 22.00.\n-с 1-ого января до вторых выходных марта, движение запрещено в Альпийском регионе (А40, А41, А43, А48, А410)\nпо субботам с 7.00 до 18.00.\nВнимание: -водитель должен иметь французкий договор труда.\nРЕКОМЕНДАЦИЯ : лучше не подписывайте протоколы, если вы не понимаете его значения или вы не уверены что\nименно надо писать это ваша право (инспектор отметит это в протоколе и предоставит вам одну копию).\n\nВо время проверки, проведенной Инспекцией транспортных средств, позвоните своему представителю\nнапрямую: +33 9 50 53 44 65 (FR RU)\n\nТРЕБОВАНИЯ во Франции\nУ каждого водителя в кабине грузовика должен быть :\nДекларация-сертификат SIPSI о размещении водителя за границей;\nФорма А1 по социальному страхованию, выданная СОДРА(SODRA);\nПервоначальный трудовой договор, копия.\nСОВЕТ: Дополнительно для каботажа во Франции держать у себя последний CMR под которым вы прибыли во\nФранции.\nВ случае возникновения проблем с полицией по грузовым перевозкам позвоните непосредственно вашему\nпредставителю, +33 65148 2755.\nСвидетельство о минимальной почасовой оплате для водителя может быть запрошено у вашего представителя,\nпоэтому учетная запись перевозчика должна быть в состоянии предоставить такую информацию по электронной\nпочте в течение трех дней."}, {"title": "ЛИУКСЕМБУРГ(L), НИДЕРЛАНДЫ(NL), ДАНИЯ(DK), ШВЕДЦИЯ(SE)", "content": "в этих странах покупаетса одна и тажа винэта, её можно купить на заправках или через интернет на саите\n\nwww.eurovignette.eu\nБЕЛГИЯ (B)\nВ этой стране магистрали оплачиваются аппаратом „SATELLIC“ / DKV, перед заездом в стану,\nвключите в сеть, и убедитесь что он работает (в Бельгийской территории должен гореть зелёное индикатор).\n\n-ВНИМАНИЕМ БЕЛГИИ – НА ВЪЕЗДЕ ПРОВЕРИТЬ АПАРАТ\n-во время дождя, тумана, снега запрещается обгон"}, {"title": "БЕЗОПАСНОСТЬ ГРУЗА", "content": "Максимальное количество паллеты, которые укладываются в полуприцеп при погрузке одним\nэтажом:\n-33 евро паллеты (120x80)\n-26 нестандартные палеты (120x100)\n-22 нестандартные палеты (120x120)\n-66 DHP палеты (80х60)\n\n\nПримечание: Mерить температуру груза (эсли температура несовпадает надо каждые 2 часа понижать по два\nградуса). Перед загрузкой попытайтесь узнать вес груза, помните, что\nправильное распределение нагрузки влияет на расход топлива, а за\nперегруз по осям транспортная инспекция может назначать штраф!\nКомпания работает с тентовыми полуприцепами при перевозке грузов\nтакого типа ремни крепления не используются только в тех случаях, когда\nиз-за зажатия ремня может быть испорчен или поврежден груз, например,\nпри перевозке электротехники, легковесные продукты, расфасованные в\nкартонные коробки и т.п.\nПомните, что с того момента, когда товар загружается, за его безопасность\nответственность несете ВЫ!\nЧасто на месте погрузки не требуется применять ремни, но это не означает,\nчто они не нужны! Вы сами должны решать, сколько и как прикрепить груз. Обратите внимание на том, что в\nГермании, Австрии, Швейцарии особое внимание уделяется на фиксации груза. Часто водители слишком уверены,\nдумая перевести товар безопасно, не прикрепляя его и мотивируя тем, что территорию Германии будет преодолеть\nночью, будет ездить осторожно, избегая резкого торможения и резких поворотов. Не забывайте, что в нашей\nработе никто не застрахован от несчастных случаев, чрезвычайную ситуацию (или происшествие) может вызывать\n\n\nдругое транспортное средство и в результате возможное нарушение или повреждение вашего груза. Возможно,\nчто страховочная компания, установив нарушения крепления груза, предъявит претензии и вам !!!\nВ любом случае, ответственность за безопасное крепление груза несет водитель!\n\nВнимание\nПосле принятия груза и начиная рейс, оцените стоимость груза, подумайте о том имеет ли перевозимый вами груз\nвеличину на черном рынке (например, электрический товар, кофе, мотоциклы, велосипеды) и если так, за ранее\nобдумайте ночную остановку, выбирая только охраняемую стоянку"}, {"title": "МАКС НАГРУЗКИ В ЕВРО СТРАНАХ", "content": "-макс высота 4.02м\n-макс общая масса 40т\n-масса постового комплекта 15т(приблизительно)\n-макс вес погрузки 25т\n-макс нагрузка на ведущую ос 11.5т\n-если груз на Россию макс нагрузка, ведущая оси до 10 т (общая масса до 38т)\nЕсли один из этих критерии превышаются немедленно сообщите диспетчеру!\n\nЭлектронные весы\nЧтобы получить достоверное показание электро весов следуйте: -погрузка должна быть закончена полностью удостоверьтесь, что воздушная система воздуха полна -машина стоит на ровной местности -обязательно троитесь\nс место, хоть на один метр."}, {"title": "ОСНОВЫ ПРАВИЛ ВРЕМЕНИ ВОЖДЕНИЯ И ОТДЫХА ДЛЯ ВОДИТЕЛЕЙ", "content": "Максимальные пределы вождения:\n-максимальное вождение без пауз 4 ч. 30 мин.\n-максимальное время вождения в течение дня 9/10 ч.\n-два раза в неделю время вождения может быть увеличено до 10 ч.\n-максимальное время вождения в неделю 56 ч.\n-максимальное время вождения в течение двух недель 90 ч.\nМинимальные пределы отдыха:\n-минимальная пауза между вождениями 45 мин.\n-паузу можно осуществить в две остановки, когда первая остановка не короче, чем 15 минут, вторая остановка не\nкороче 30 минут.\n\n\n-нормальное время отдыха после рабочего дня 11 ч.\n-три раза в неделю можно использовать сокращенный отдых; не короче, чем 9 ч.\n- время отдыха может состоять из двух частей: когда, во время рабочего дня делается перерыв, который длится\nболее, чем 3 часа, делается перерыв 9 ч., засчитывается 11-ти часовый отдых.\nЕженедельный отдых:\n-еженедельный отдых должен начинаться не позже, чем после шести 24-х часового периода, после начала вашей\nрабочей недели -нормальный еженедельный отдых 45 ч.\n-любой еженедельный отдых короче, чем 45 ч., называется сокращённым, но он не может быть короче, чем 24 ч.\n-нельзя проводить подряд два сокращенных еженедельных отдыха\n\nэсли специально или от незнания, вы неотработаите своё время вождения или время оттдыха значително будет\nпревишать допустимого и из этого вы опoздайте на загрузку или выгрузку, это будет нарушение рабочего\nрежыма.\n\n\nСписок кодов неисправностей ошибок тахографа\n03 Внутренняя авария (только сервис)\n04 Внутренняя авария (только сервис)\n05 Внутренняя авария (только сервис)\n06 Авария времени (проверь время UTC)\n07 Авария дисплея (проверь действие кнопок-защемление)\n08 Внутренняя авария (вина тахографа, ошибка контрольной суммы, только сервис)\n09 Ошибка калибровки (только сервис)\n10 Внутренняя авария (нет сигнала на b7 z pb6)\n11 Внутренняя авария (проблемы принтера, головки)\n12 Авария трансмиссии (проблемы при наборе данных с карт или неисправность памяти тахографова)\n13 Внутренняя авария (не хватает питания, связка, связь)\n14 Внутренняя авария (неисправность шины данных j1932)\n15 Внутренняя авария (не хватает питания, связка, связь)\n16 Авария передатчика (проверь связку импульсатора и импульсатор)\n17 Прерывание предохранения (проверь связку импульсатора и импульсатор)\n18 Прерывание предохранения (проверь связку импульсатора и импульсатор)\n19 Не хватает питания (проверь связку импульсатора и импульсатор)\n20 Авария передатчика (проверь связку импульсатора и импульсатор)\n21 Авария передатчика (проверь связку импульсатора и импульсатор)\n22 Авария передатчика (проверь связку импульсатора и импульсатор)\n23 Прерывание предохранения (проверь связку импульсатора и импульсатор)\n24 Прерывание предохранения (авария тахографа, только сервис)\n25 Прерывание предохранения (авария тахографа, только сервис)\n26 Прерывание предохранения (авария тахографа, был открыт тахограф, только сервис)\n27 Прерывание предохранения (проблема программного обеспечения тахографа)\n28 Вождение без карты.\n29 Конфликт карт.\n30 Превышение скорости более 60 секунд.\n31 Не хватает питания.\n32 33 34 Удалить невозможно (ждать)\n35 Задержанный процесс (смена дня)\n36 Печатать невозможно.\n37 Распечатка опоздавшая.\n38 Ящик открыт.\n\n\n39 Не хватает бумаги.\n40 Внутренняя авария (проблема сканера тахографа)\n41 Авария карты.\n42 Прерывание предохранения (проблема с картой)\n43 Прерывание предохранения (проблема с картой)\n44 Карта не закрыта (проблема с картой)\n45 Превышение времени по сравнению с предыдущим автомобилем.\n46 Введите во время вождения (введите карту только во время стоянки)\n47 Прерывание предохранения (проблема с картой)\n48 Карта недействительна.\n49 Несовместимая запись.\n50 Карта повреждена.\n51 Неподходящая карта.\n52 Карта заблокирована.\n53 Внутренняя авария.\n56 Перерыв! 1.04h15 ||00h15 (необходимо сделать паузу)\n57 Перерыв! 1.04h30 ||00h30 (необходимо сделать паузу)\n\n\nИнструкция для дальнобойщиков по транспортировке лекарств:\nСодержание\n1. Термин – Надлежащая дистрибьюторская практика (GDP)\n2. История GDP\n3. Значение GDP для перевозчиков фармацевтической продукции\n4. Требования GDP к сотрудникам\n5. Документация (процессы и записи)\n6. Доставки\n7. Транспортные средства\n8. Отзывы продукции\n9. Внутренние аудиты качества\n10. Деятельность субподрядчиков\n11. Приложение A\n\n1. Термин – Надлежащая дистрибьюторская практика (GDP)\nНадлежащая дистрибьюторская практика (GDP) включает в себя руководящие принципы правильного\nраспределения фармацевтической продукции, предназначенной для использования человеком. GDP\nпредставляет собой систему обеспечения качества, которая определяет требования к транспортировке и\nхранению фармацевтической продукции. GDP регулирует распределение и транспортировку фармацевтических\nпродуктов от склада производителя к другому складу, конечному потребителю, временным или оптовым\nдилерам с использованием различных видов транспорта.\n\n2. История GDP\nВысокий уровень фармацевтической промышленности в области обеспечения качества гарантирует соблюдение\nтребований GDP при производстве фармацевтической продукции, которая затем может быть допущена к рынку.\nЭти руководства также обеспечивают, чтобы продукция, соответствующая необходимому качеству, была\nдопущена к продаже.\nВажно поддерживать высокий уровень качества на всех этапах транспортной цепи, чтобы одобренные препараты\nмогли быть доставлены в розничные сети или аптеки без изменения их свойств.\n\n3. Значение GDP для перевозчиков фармацевтической продукции\n\n\nThermotraffic и их субподрядчики играют ключевую роль в обеспечении сохранности фармацевтической\nпродукции в пределах зоны их ответственности. Это достигается за счет соблюдения принципов и руководящих\nуказаний GDP, изданных Европейской Комиссией.\nЭто реализуется следующим образом:\n•\n\nНаличие документированной системы обеспечения качества.\n\n•\n\nПостоянный мониторинг условий окружающей среды, включая транспортировку.\n\n•\n\nПредотвращение загрязнения другими продуктами.\n\n•\n\nИспользование технического оборудования и определение подходящих процессов для выявления\nдефектной продукции в случае отзыва.\n\n4. Требования GDP к сотрудникам\n•\n\nВ компании должен быть назначен заместитель руководства, который отвечает за внедрение и\nуправление системой обеспечения качества.\n\n•\n\nОтветственное лицо должно обладать соответствующим опытом и регулярно проходить обучение.\n\n•\n\nСотрудники, занимающиеся транспортировкой фармацевтической продукции, должны быть обучены\nнадлежащим образом для безопасной и правильной работы с продуктами.\n\n•\n\nМониторинг и контроль должны проходить без сбоев.\n\n5. Документация (процессы и записи)\n•\n\nПо запросу вся документация должна быть предоставлена ответственным органам.\n\n•\n\nПроцессы должны регулировать все действия в ходе транспортировки, которые могут повлиять на\nкачество продукции, и быть утверждены ответственным за качество с датой и подписью.\n\n•\n\nДокументы должны содержать важные действия или отклонения в понятной форме, чтобы их можно\nбыло понять позже.\n\n•\n\nДокументы должны быть легко доступны и понятны для всех вовлеченных сторон.\n\n•\n\nДокументация должна храниться в течение 10 лет.\n\n6. Доставки\nФармацевтическая продукция должна транспортироваться таким образом, чтобы:\na) этикетки не терялись;\nb) предотвращалось загрязнение другими продуктами или материалами;\nc) продукция не подвергалась повреждению или краже;\nd) она была защищена от жары, холода, света, влаги, других повреждающих факторов, а также микроорганизмов\nи вредителей.\n•\n\nПродукция, требующая хранения в температурно-контролируемой среде, должна также\nтранспортироваться в соответствии с требованиями.\n\n\n•\n\nВсе устройства для контроля температуры (например, датчики) проверяются и калибруются ежегодно.\n\n•\n\nДля фармацевтической продукции должны быть созданы документы, содержащие информацию о:\n\n•\n\no\n\nдатах (приемка и т. д.),\n\no\n\nназвании продукта,\n\no\n\nобъемах поставки,\n\no\n\nартикуле продукта,\n\no\n\nименах и адресах поставщика и получателя.\n\nПоставка должна быть подтверждена (POD, CMR).\n\n7. Транспортные средства\n•\n\nТранспортные средства должны быть подходящими, чтобы избежать воздействия условий, которые могут\nповредить упаковку. Любое загрязнение должно быть предотвращено.\n\n•\n\nТранспортные средства и оборудование должны регулярно чиститься и обслуживаться.\n\n•\n\nПри возможности должны использоваться квалифицированные транспортные средства.\n\n•\n\nЕсли привлекается субподрядчик, необходимо обеспечить сохранность качества продукции.\n\n•\n\nРегулярная очистка должна быть запланирована, проведена и задокументирована.\n\n8. Отзывы продукции\n•\n\nПроцессы отзыва продукции должны быть описаны и задокументированы.\n\n•\n\nОтзыв должен проводиться только после детального уведомления клиента и согласования с ним.\n\n•\n\nДля обеспечения контакта со всеми участниками отзыва документация по каждому перевозке должна\nбыть подготовлена должным образом.\n\n9. Внутренние аудиты качества\n•\n\nВнутренние аудиты проводятся для контроля соответствия и реализации этих руководств.\n\n10. Деятельность субподрядчиков\n•\n\nДеятельность, связанная с привлечением субподрядчиков, должна быть закреплена в письменном\nконтракте или соглашении об обеспечении качества.\n\n•\n\nКонтракт и соглашение регулируют ответственность и обязанности всех вовлеченных сторон, включая\nсоблюдение требований GDP.\n\n•\n\nВсе субподрядчики должны быть проверены и подвергаться регулярному аудиту.\n\n\nРуководство для водителей по парковке транспортных средств\nКражи транспортных средств и/или их загруженных товаров оказывают огромное влияние на\nводителей, автономных перевозчиков и малые и средние компании. Ежегодный ущерб от кражи грузов\nи транспортных средств в Европе составляет около 8 миллиардов евро. В среднем, каждая кража\nприносит ущерб на сумму около 80 000 евро. Украденное транспортное средство может быть\nразгружено и разобрано за считанные минуты.\n\nОрганизованные преступники и их сообщники нацелены на транспортные средства и/или их\nзагруженные товары, но есть меры, которые можно принять для предотвращения кражи или\nминимизации шансов стать жертвой преступления. Следующие рекомендации касаются каждого\nводителя Thermotraffic и водителей контрактных партнеров Thermotraffic, которые занимаются\nтранспортировкой товаров с высокой стоимостью.\n\nВсегда сразу же запирайте кабину водителя и грузовой отсек, когда уходите от них.\nВсегда держите грузовой отсек запертым, а также запирайте кабину водителя, когда спите или\nотдыхаете в кабине.\nВсегда оставайтесь в транспортном средстве. Исключения составляют короткие перерывы на прием\nпищи, поход в туалет и периоды отдыха в выходные дни. По возвращении к транспортному средству\nпроверяйте его со всех сторон, а также проверяйте замки, пломбы, таможенные веревки и т. д.\nВсегда паркуйте транспортное средство только в хорошо освещенных, оживленных местах, таких как\nзоны обслуживания на автомагистралях или автозаправочные станции.\nВсегда паркуйте транспортное средство в пределах видимости других водителей или транспортных\nсредств.\nКаждый раз, когда вы останавливаетесь, запланированно или незапланированно, останавливайтесь на\nдостаточно защищенных парковках, а не в уединенных местах.\nИзбегайте парковки в местах с высоким риском (центр криминальной активности).\n\n\nИзбегайте парковки на месте разгрузки, если у вас есть груз с высокой стоимостью. К товарам с высокой\nстоимостью относятся, среди прочего: высокоценные фармацевтические препараты; предметы\nроскоши, компьютеры и комплектующие (например, микрочипы, процессоры), телевизоры, мобильные\nтелефоны, цифровая техника, такая как аудио, видео, фотоаппараты, DVD аппараты, алкоголь, табачные\nизделия и другие товары.\n\nВАЖНО !!!\nИнструкция для дальнобойщиков по транспортировке лекарств:\nТранспортировка\n\nфармацевтических\n\nтоваров требует строгого соблюдения\nопределенных правил, чтобы обеспечить\nсохранность и безопасность продукции.\nВодитель, перевозящий лекарства, обязан\nпридерживаться\n\nследующих\n\nрекомендаций:\n1.Подготовка транспортного средства\noУбедитесь, что транспортное средство в\n\nхорошем\n\nтехническом\n\nсостоянии\n\nи\n\nсоответствует требованиям для перевозки\nфармацевтических продуктов.\noВсе\n\nгрузовые\n\nотсеки\n\nдолжны\n\nбыть\n\nчистыми, сухими и не иметь запахов,\nкоторые могут повлиять на продукцию.\no\n\nПроверьте наличие необходимого оборудования для контроля температуры, если лекарства\nтребуют таких условий (например, термоконтролируемые прицепы).\n\n2. Условия перевозки\no\n\nПри перевозке медикаментов, которые требуют хранения в определенной температуре\n(например, вакцины, биологические препараты), убедитесь, что транспортное средство\nоснащено температурным контролем и все датчики правильно настроены.\n\no\n\nРегулярно проверяйте температуру в грузовом отсеке и фиксируйте результаты.\n\no\n\nЗащищайте продукты от воздействия прямого солнечного света, влаги и других факторов,\nкоторые могут повлиять на их качество.\n\n3. Документация и маркировка\no\n\nУбедитесь, что у вас есть все необходимые документы, включая накладные, сертификаты\nкачества, разрешения на транспортировку и другие документы, требуемые для перевозки\nфармацевтических товаров.\n\n\no\n\nВсе товары должны быть правильно промаркированы с указанием на упаковке, что это\nлекарственные средства, и с информацией о температурных требованиях.\n\n4. Парковка и безопасность\no\n\nВсегда паркуйте транспортное средство в хорошо освещенных и защищенных местах,\nтаких как парковки на автозаправочных станциях, специально оборудованные стоянки для\nгрузовиков.\n\no\n\nНикогда не оставляйте транспортное средство с лекарствами без присмотра на долгое\nвремя, особенно в уединенных местах.\n\no\n\nВсегда запирайте кабину и грузовой отсек, даже если отходите на короткое время.\n\n5. Проверка товара\no\n\nПри загрузке и разгрузке медикаментов обязательно проверяйте упаковку на повреждения,\nубедитесь, что все товарные единицы находятся на месте и нет повреждений или утечек.\n\no\n\nЕсли в процессе перевозки вы обнаружите повреждения упаковки или несоответствие\nтовара, немедленно уведомите руководство компании и следуйте инструкциям для\nдальнейших действий.\n\n6. Инструкции по возврату и отзыву\no\n\nОзнакомьтесь с процедурами возврата и отзыва продукции. В случае отзыва медикаментов\nиз-за нарушения условий хранения или других проблем необходимо действовать по заранее\nподготовленному плану.\n\no\n\nУбедитесь, что все документы, связанные с перевозкой, правильно оформлены и могут\nбыть предоставлены по запросу.\n\n7. Обучение и соблюдение стандартов\no\n\nВодитель должен пройти обучение по транспортировке фармацевтических препаратов и\nрегулярно обновлять свои знания о новых требованиях в этой области.\n\no\n\nСледуйте всем стандартам и процедурам, установленным для транспортировки\nмедикаментов, чтобы обеспечить безопасность и качество продукции.\n\nЗаключение:\nПеревозка фармацевтической продукции требует особого внимания и тщательной подготовки.\nВодитель должен быть хорошо информирован о всех требованиях, а также следовать инструкциям\nкомпании и государственным стандартам для обеспечения безопасности и сохранности товаров в\nпроцессе транспортировки.\n\n\nКоды ошибок Thermo King:\n\n\nМинимальный словарь водителя\nRU\n\nGB\n\nPL\n\nD\n\nF\n\nI\n\nЕ\n\nПривет\n\nхелло\n\nдзен добры\n\nморген\n\nбонжур\n\nбон джорно\n\nолиа\n\nТягач\n\nтрак\n\nтир\n\nЛКВ\n\nкамион\n\nмерчи\n\nкамион\n\nНомер\nРегистрация\nГрузится\n\nнамба\nрецепшен\nлоудинг\n\nномер\nбюpо\nладовач\n\nкеицаихен\nамелдунг\nладен\n\nнюмеро\nаксюел\nшарже i\n\nтар га\nрецепшин\nкарикари\n\nкаргар\n\nРазгрузить\n\nанлоудинг\n\nразладовач\n\nапладен\n\nдешарже\n\nскарикари\n\nдескарга\n\nЛево\nПраво\nВыезд\n\nлефт\nраит\nexsit\n\nлиево\nправо\n\nлинкс\nрехт\nausfarht\n\nагош\nадуат\nsortie\n\nсинистра\nадестра\nuscita\n\nискиерда\nадерета\nsalida\n\nВесы\nРемень\nУлица\n\nскеилс\nдропс\nстрит\n\nвиесы\nпас\nулица\n\nваген\nгортел\nстраccе\n\nбаскуль;\nсангле :\nруе\n\nпйезо\nцинге\nвиа\n\nномер загрузки number\n\narba\nreference\nof loading\nномер загрузки\n\nприсутствовать на погрузке/выгрузке\n\nEN - number reference of loading\nPL -numer referencyjny załadunku\nDE- nummernreferenz der Beladung\nESP - número de referencia de carga\nF - numéro de référence du chargement\n\nEN - to participate in loading/unloading\nPL- być obecnym przy ładowaniu\nDE- beim Laden anwesend sein\nESP - estar presente en la carga\nF - être présent au chargement\n\nсчитать продукцию\n\nмерить температуру\n\nEN - to calculate goods\nP L- liczyć produkty\nDE - Produkte zählen\nESP - contar productos\nF- compter les produits\n\nEN- to measure temperature\nPL - zmierzyć temperaturę\nDE - Temperatur messen\nESP - medir temperatura\nF - mesurer la température\n\nменять палеты\n\nрампа\n\nEN - to change pallets\nPL - zmienić palety\nDE - Paletten wechseln\nESP - cambiar paletas\nF - changer de palette\n\nEN - ramp of loading\nPL - rampa załadunku\nDE – Laderampe\nESP - rampa de carga\nF - rampe de chargement\n\n\nдокументы груза\n\nвес груза\n\nEN - shipment documents\nPL - dokumenty wysyłki\nDE - Versanddokumente\nESP - documentos de envío\nF - documents d'expédition\n\nEN - weight of cargo\nPL - waga ładunku\nDE - Gewicht der Ladung\nESP - peso de la carga\nF - poids de la cargaison\n\nвес на ведущую ось\nEN -weight on main ( driving) axis\n\nтемперетура перевозки\nEN - transportation temperature\n\nPL - ciężar na głównej osi (napędowej)\nDE - Gewicht auf der Hauptachse (Fahrachse)\nESP - peso en el eje principal (conducción)\nF - poids sur l'axe principal (moteur)\n\nPL - temperatura transportu\nDE - Transporttemperatur\nESP - temperatura de transporte\nF - température de transport\n\nвзвеситься перед погрузкой\nEN - to weight before loading\n\nвзвеситься после погрузки\nEN - to weight after loading\n\nPL - do masy przed załadowaniem\nDE - vor dem Laden zu beschweren\nESP - al peso antes de cargar\nF - peser avant de charger\n\nPL - do masy po załadowaniu\nDE - nach dem Laden zu beschweren\nESP - al peso después de cargar\nF - peser après le chargement\n\nраспределение груза\nEN - cargo layout ( allotment)\n\nкрепление груза\nEN - fastening of cargo\n\nPL - układ ładunku\nDE - Ladungslayout\nESP - diseño de carga\nF - disposition de la cargaison\n\nPL - mocowanie ładunku\nDE - Befestigung der Ladung\nESP - fijación de carga\nF - fixation de la cargaison\n\n-Kein paletten tausch/каин палеттентауч-по германский/\n\nне меняются\n\n-No paletts change\n\n/но палеттс чеинч\n\n-по английский/ не меняются\n\n-Pas de changement de paletts\n\n/пас де шанжемент палет\n\n-по французики/ не меняются\n\n-to change pallet -\n\nпалеты меняются"}, {"title": "НАЧАЛО РАБОЧЕГО ДНЯ - КОНЕЦ РАБОТЫ С ЧИПОМ", "content": "В окне тахографа введите: ОК\n-ввод водитель 1- ok\n-начало страны -ok\n-код страны - ok\nПредусмотрите возможную максимальную продолжительность рабочего дня (общее время)\nКонец рабочего дня:\nВ тахографе вводим: ОК\n-ввод водитель 1- ok\n-конец страны -ok\n-выбираете код страны - ok\n(если работу оканчиваете в Испании, введя конец страны или начало, вводится регион страны)\n\nводители должны регистрировать каждое пересечение каждой границы-- вводить запись вручную на\nгранице или на первой возможной остановке сразу за границей. Отсутствие записи наказывается\nштрафом как для водителя, так и для перевозчика. Оно является очень серьезным нарушением,\nзарегистрированном в системе ERRU. Kод страны должен вводиться при пересечении границы как в\nслучае аналоговых, так и цифровых или умных тахографов.\n\nРучной ввод\n1. поменять значёк кровати на конветр, поменять дату на дату изятие чипа, добавить время от изятия\nчипа - OK\n2. значёк кровати (ничево делать ненадо), дата (ничево делать ненадо), отниать время от реальново – OK\n3. поменять значёк кровати на конветр, дата (ничево делать ненадо), время (ничево делать ненадо) – OK\n\nоткрываем страну, ставим на молотки (не меньше 13 мин). Перед началом работы молотки не\nставятся - молотки надо ставить только после еженедельного отдыха.\nЗа отсутствие ручного ввода (Или неправильный Ручной ввод) - ответственность несёт водитель"}, {"title": "ЕСЛИ СЛОМАЛЬСЯ ТАХОГРАФ И НАДО РАБОТАТЬ", "content": "У Bас есть право работать 7 дней строго на распечатке указывая\nдеиствия:\n\n1. Имя Фамиля\n2. Номер водительской карты\n3. Номер тягача\n4. Страна окончания смены\n5. Cтрана начала смены\n6. Дата и роспись\n7. Километраж закрытя смены\n8. Километраж начала смены\n9. Пробег за смену.\n\n1.\n2.\n3.\n\nВ жёлтом квадрате время от 00:00 до 12:00, В синем квадрате время\nот 12:00 до 24:00\n\nВ квадратах надо указивать пересечение границы (Страну)\n\n4.\n\n6.\n5.\n\n7.\n\n8.\n\n9.\n\n\nКраткая инструкция по работе с тахографом DTCO 1381 версии 1.3u.\n\nНачало смены: -\n\nважно – необходим ручной ввод данных.\n\nТахограф 1381 управляется джойстиком и кнопками 1 и 2, рядом с которыми\n\nрасположены кнопки извлечения карт. В нижней части тахографа находятся слоты для установки карт.\nРядом с джойстиком расположена кнопка открывания отсека принтера для установки бумаги. На\nджойстике есть кнопка подтверждения выбора – ОК, кнопки вверх – вниз для перемещения по меню и\nкнопка отмены – стрелка влево с точкой.\nВодитель вставляет свою карту в слот 1 до упора и легко подталкивает ее внутрь, карта\nзатягивается автоматически (а н а л о г и ч н ы м о б р а з о м у с т а н а в л и в а е т с я ка р т а вто р о г о во ди т е ля во в т\nо р о й с л о т ). Карта устанавливается чипом вверх и вперед.\n\nВо время установки карты водителя последовательность экранов будет выглядетьследующим образом:\n\n\nДалее появится запрос на ручной ввод данных по режимам занятости водителя (это запись\nтех режимов, которые водитель выполнял после последнего изъятия карты из тахографа и\nдо момента ее текущей установки в тахограф).\nЕсли водителю не требуется осуществлять ручной ввод данных,\nто нужно нажать ОК и отказаться от ручного ввода режимов\nзанятости. Если какой либо из режимов занятости не был\nзарегистрирован на карте водителя, то он обязан\nзарегистрировать его в памяти своей карты. В этом случае\nнеобходимо нажать стрелку Вверх-вниз джойстика и изменить\nответ экрана на \"ДА\", и нажать кнопку ОК на джойстике. Далее\nосуществить ручной ввод.\nЕсли водитель отказался от ручного ввода данных, то появится экран:\n\nРучной ввод! Для примера вводятся два режима занятости работа с 23:30 до 0:20\nследующего дня и готовность с 00:20 до 01:20 (на дату 23.10)\n\n\nОбратите внимание, необходимо обязательно выбирать режим отдыха в конце смены и в\nпериоды отдыха, иначе тахограф будет их регистрировать, как работу!!!\nВывод:\nв самом распространенном случае, когда водитель осуществляет движение по территории\nодной страны, и после изъятия карты у него наступает режим отдыха (не забывайте\nустановить режим отдыха перед изъятием карты!!!), последовательность его действий\nочень простая:\n\nустановить карту\nвыполнить ручной ввод режима „Конверт“, “Отдых“ , „Конверт“\nпосле индикации присутствия карты - „Молотки“ (После еженедельного отдыха не\nменьше 13 минут, каждое утро молотков нажимать не надо).\n\nДействия, описанные в примере выше, водителю необходимо выполнять в случае, если\nвыполнялась иная работа вне автомобиля, и она не была зарегистрирована на карте водителя.\n\n\nПечать суточного отчета.\nДля выполнения печати отчета необходимо выбрать в меню пункт печати отчета и выдать\nкоманду на печать отчета.\nПиктограмма суточного отчета на экране выглядит так:\nВ случае стандартного режима работы, водитель в конце смены изымает карту и на\nпредложение тахографа распечатать суточный отчет, подтверждает необходимость печати\nотчета, последовательность действий следующая:\nВодитель нажимает на кнопку изъятия карты (только во время стоянки), эта кнопка\nнаходится рядом с соответствующей кнопкой первого \"1\" или второго водителя \"2\". И\nпоявляется экран:\n\nТаким образом, последовательность нажатия кнопок следующая:\nКнопка –\n\nнажимается 1 раз, и кнопка: \"OK\" – 2 раза.\n\n\nЕсли необходимо самостоятельно вызвать меню печати отчета, то последовательность\nдействий водителя следующая:\nВ стандартном варианте экран тахографа выглядит следующим образом:\nЕсли нажимать последовательно кнопки\n, то можно перемещаться по меню\nтахографа до появления надписи: \"Вызвать\nглавное меню?\", далее чтобы перейти в\nглавное меню необходимо нажать кнопку\n\"ОК\" на джойстике.\nНа экране появится сообщение:\n\nПодтвердите выбор данной опции нажатием\nкнопки \"ОК\". Далее появится запрос вида\nотчета, нам необходим отчет за сутки, его\nпиктограмма выглядит так:\nЭта пиктограмма появится на экране первой,\nпоэтому нажмите кнопку \"ОК\" для выбора\nотчета.\nДалее необходимо выбрать сутки для\nраспечатки отчета – первыми идут текущие\nсутки, поэтому просто нажмите \"ОК\" для\nподтверждения. И дождитесь печати отчета. По\nзавершении печати отчета оторвите бумагу, просто\nпотянув ее вниз или вверх, как показано на рисунке.\n\nНажмите кнопку возврата\nотмены\nдействия)\nдля\nстандартный экран индикации:\n\n(или\nвозврата в\n\nТаким образом, последовательность нажатий\nкнопок будет следующая:\n- 1 раз, \"ОК\" – 4 раза, дождаться\nокончания печати и нажать:\n- 1 раз.\n\n\nЗамена бумаги в отсеке принтера.\nВодитель обязан печатать суточный отчет из памяти карты водителя, поэтому у него периодически\nзаканчивается бумага, и он обязан вовремя ее заменять. Если на оборотной стороне бумаги появилась\nсиняя или красная полоса, то пора менять рулон бумаги.\nНеобходимо выполнить следующие действия: нажать кнопку открытия отсека принтера, как показано\nна рисунке, установить рулон, таким же образом, как на рисунке, и закрыть отсек принтера, оставив\nкончик бумаги с внешней стороны принтера.\n\nЗамена карт при смене водителей.\nНе забывайте менять карты водителей местами при смене первого и второго водителей. Для этого\nнеобходимо изъять карту второго водителя из слота № 2, а карту первого водителя изслота № 1, после\nэтого установить карту второго водителя в слот № 1 – при этом он автоматически становится первым\nводителем, а карту водителя, который ранее был первым,установить в слот № 2 – и он станет вторым\nводителем. При этом водители должны закрыть и открыть смену.\n\n\nи 2 x 10\n\n\nВнимание во Франции. Обезные дороги\n\n-Toll ПЛАТНЫЕ\n\n-FREE БЕСПЛАТНЫЕ\n-NON-motorway-\n\n\nВнимание в Германии. Обезные дороги"}, {"title": "EXTRA ТЕЛЕФОНЫ", "content": "Ремонт полуприцепов:\n\n+370 667 39423\n\nРемонттягачей+370-656-01331\n\nЕсли сломался тягач или полуприцеп : +37063769400\nCMR, карточки, топливо, деньги, дороги, аппараты: +370-656-90811\nПланиро let LANG = 'ru', searchTimer = null;
const cache = {};

function setLang(l) {
  LANG = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  SECTIONS.forEach((s, i) => { if (document.getElementById('card-'+i)) refreshBody(i); });
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(text) {
  // Split into paragraphs by double newlines
  const paras = text.split(/\n\n+/);
  return paras
    .map(p => p.split('\n').map(l => l.trim()).filter(l => l).join(' '))
    .filter(p => p)
    .map(p => '<p>' + esc(p) + '</p>')
    .join('');
}

function refreshBody(i) {
  const body = document.getElementById('body-'+i);
  const btn = document.getElementById('tbtn-'+i);
  const note = document.getElementById('note-'+i);
  const s = SECTIONS[i];
  if (!body) return;
  if (LANG === 'ru') {
    body.innerHTML = fmt(s.content);
    if (btn) btn.style.display = 'none';
    if (note) note.style.display = 'none';
    return;
  }
  const ck = i+'_'+LANG;
  if (cache[ck]) {
    body.innerHTML = fmt(cache[ck]);
    if (btn) btn.style.display = 'none';
    if (note) { note.className='trans-note'; note.style.display='block'; note.textContent = LANG==='lt' ? '&#x2705; I&#353;versta &#x12F; lietuvi&#x173; kalb&#x105;' : '&#x2705; Translated to English'; }
    return;
  }
  body.innerHTML = fmt(s.content);
  if (btn) btn.style.display = 'inline-block';
  if (note) note.style.display = 'none';
}

async function translateSection(i) {
  const body = document.getElementById('body-'+i);
  const btn = document.getElementById('tbtn-'+i);
  const note = document.getElementById('note-'+i);
  const s = SECTIONS[i];
  btn.disabled = true; btn.textContent = '&#x23F3; Verčiama...';
  body.innerHTML = '<div class="translating">Verčiama... Palaukite.</div>';
  try {
    const r = await fetch('/api/translate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:s.content, title:s.title, lang:LANG})});
    if (r.status===401) { location.href='/'; return; }
    const d = await r.json();
    if (d.translated) { cache[i+'_'+LANG]=d.translated; refreshBody(i); }
    else throw new Error(d.error||'Klaida');
  } catch(e) {
    body.innerHTML = fmt(s.content);
    btn.disabled=false; btn.textContent='&#x1F310; Versti / Translate';
    if (note) { note.className='trans-err'; note.style.display='block'; note.textContent='&#x274C; '+e.message; }
  }
}

function openImg(el) { document.getElementById('lb-img').src=el.src; document.getElementById('lightbox').classList.add('open'); document.body.style.overflow='hidden'; }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

function init() {
  const navList = document.getElementById('nav-list');
  const wrap = document.getElementById('sections-wrap');
  SECTIONS.forEach((s, i) => {
    const nav = document.createElement('div');
    nav.className = 'nav-item';
    nav.id = 'nav-'+i;
    nav.innerHTML = '<div class="nav-num">'+(i+1)+'</div><div class="nav-text">'+esc(s.title)+'</div>';
    nav.onclick = () => {
    // Update active nav immediately
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    nav.classList.add('active');
    nav.scrollIntoView({block:'nearest'});
    // Scroll content to card - calculate position by summing card heights
    const ct = document.getElementById('content');
    if (!ct) return;
    let top = 0;
    for (let j = 0; j < i; j++) {
      const c = document.getElementById('card-'+j);
      if (c && c.classList.contains('visible')) top += c.offsetHeight + 18;
    }
    window._navClicking = true;
    clearTimeout(window._navTimer);
    ct.scrollTop = top;
    window._navTimer = setTimeout(() => { window._navClicking = false; }, 600);
  };
    navList.appendChild(nav);

    const imgs = SECTION_IMAGES[i]||[];
    const imgsHtml = imgs.length ? '<div class="doc-images"><div class="doc-images-label">Dokumento pavyzd&#382;iai</div><div class="doc-imgs-grid">'+imgs.map(src=>'<img class="doc-img" src="'+src+'" loading="lazy" onclick="openImg(this)" alt="doc">').join('')+'</div></div>' : '';

    const card = document.createElement('div');
    card.className = 'section-card visible';
    card.id = 'card-'+i;
    card.innerHTML =
      '<div class="card-header"><div class="card-num">'+(i+1)+'</div><div class="card-title">'+esc(s.title)+'</div><button class="translate-btn" id="tbtn-'+i+'" style="display:none" onclick="translateSection('+i+')">&#x1F310; Versti</button></div>'+
      '<div class="card-body"><div id="note-'+i+'" style="display:none"></div>'+imgsHtml+'<div class="section-body" id="body-'+i+'">'+fmt(s.content)+'</div></div>';
    wrap.appendChild(card);
  });

  // Track active section on scroll using content div
  const contentDiv = document.getElementById('content');
  contentDiv.addEventListener('scroll', function() {
    if (window._navClicking) return;
    const st = contentDiv.scrollTop + 80;
    let cur = 0;
    for (let j = 0; j < SECTIONS.length; j++) {
      const c = document.getElementById('card-'+j);
      if (c && c.classList.contains('visible') && c.offsetTop <= st) cur = j;
    }
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const an = document.getElementById('nav-'+cur);
    if (an) { an.classList.add('active'); an.scrollIntoView({block:'nearest'}); }
  }, {passive:true});

  updateStats(SECTIONS.length);
}

function clearSearch() { document.getElementById('search').value=''; document.getElementById('search-clear').style.display='none'; doSearch(''); }

document.getElementById('search').addEventListener('input', function() {
  document.getElementById('search-clear').style.display = this.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>doSearch(this.value.trim()), 250);
});

function doSearch(q) {
  let found = 0;
  const lower = q.toLowerCase();
  SECTIONS.forEach((s,i) => {
    const card = document.getElementById('card-'+i);
    const nav = document.getElementById('nav-'+i);
    const body = document.getElementById('body-'+i);
    if (!q) {
      card.classList.add('visible');
      if(nav) nav.classList.remove('hidden');
      if(body) body.innerHTML = '<p>'+esc(fmt(LANG==='ru'?s.content:(cache[i+'_'+LANG]||s.content)))+'</p>';
      found++;
    } else {
      const searchIn = (s.title+' '+s.content+' '+(cache[i+'_'+LANG]||'')).toLowerCase();
      if (searchIn.includes(lower)) {
        card.classList.add('visible');
        if(nav) nav.classList.remove('hidden');
        const disp = LANG==='ru'?s.content:(cache[i+'_'+LANG]||s.content);
        const safe = q.replace(/[.*+?^${}()|\[\]\\]/g,'\\$&');
        const highlighted = fmt(disp).replace(
          new RegExp('('+esc(q)+')','gi'),
          '<mark style="background:#fff3a3;padding:1px 3px;border-radius:3px;font-weight:700">$1</mark>'
        );
        if(body) body.innerHTML = highlighted;
        // Scroll to first result
        if(found === 0) setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'start'}),100);
        found++;
      } else {
        card.classList.remove('visible');
        if(nav) nav.classList.add('hidden');
      }
    }
  });
  document.getElementById('no-results').style.display = found===0?'block':'none';
  updateStats(found, q);
}

function updateStats(n,q) { document.getElementById('search-stats').textContent = q ? n+' rasta' : n+' skyriai'; }

init();
</script>
