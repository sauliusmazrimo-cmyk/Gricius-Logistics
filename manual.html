тимая запись.\n\n50 Карта повреждена.\n\n51 Неподходящая карта.\n\n52 Карта заблокирована.\n\n53 Внутренняя авария.\n\n56 Перерыв! 1.04h15 ||00h15 (необходимо сделать паузу)\n\n57 Перерыв! 1.04h30 ||00h30 (необходимо сделать паузу)\n\n[Paveikslėlis, kuriame yra tekstas, ekrano kopija, Šriftas, linija Automatiškai sugeneruotas aprašymas]  Инструкция для дальнобойщиков по транспортировке лекарств: Содержание\n\n1.  Термин – Надлежащая дистрибьюторская практика (GDP)\n\n2.  История GDP\n\n3.  Значение GDP для перевозчиков фармацевтической продукции\n\n4.  Требования GDP к сотрудникам\n\n5.  Документация (процессы и записи)\n\n6.  Доставки\n\n7.  Транспортные средства\n\n8.  Отзывы продукции\n\n9.  Внутренние аудиты качества\n\n10. Деятельность субподрядчиков\n\n11. Приложение A\n\n1. Термин – Надлежащая дистрибьюторская практика (GDP)\n\nНадлежащая дистрибьюторская практика (GDP) включает в себя руководящие принципы правильного распределения фармацевтической продукции, предназначенной для использования человеком. GDP представляет собой систему обеспечения качества, которая определяет требования к транспортировке и хранению фармацевтической продукции. GDP регулирует распределение и транспортировку фармацевтических продуктов от склада производителя к другому складу, конечному потребителю, временным или оптовым дилерам с использованием различных видов транспорта.\n\n2. История GDP\n\nВысокий уровень фармацевтической промышленности в области обеспечения качества гарантирует соблюдение требований GDP при производстве фармацевтической продукции, которая затем может быть допущена к рынку. Эти руководства также обеспечивают, чтобы продукция, соответствующая необходимому качеству, была допущена к продаже.\nВажно поддерживать высокий уровень качества на всех этапах транспортной цепи, чтобы одобренные препараты могли быть доставлены в розничные сети или аптеки без изменения их свойств.\n\n3. Значение GDP для перевозчиков фармацевтической продукции\n\nThermotraffic и их субподрядчики играют ключевую роль в обеспечении сохранности фармацевтической продукции в пределах зоны их ответственности. Это достигается за счет соблюдения принципов и руководящих указаний GDP, изданных Европейской Комиссией.\nЭто реализуется следующим образом:\n\n-  Наличие документированной системы обеспечения качества.\n\n-  Постоянный мониторинг условий окружающей среды, включая транспортировку.\n\n-  Предотвращение загрязнения другими продуктами.\n\n-  Использование технического оборудования и определение подходящих процессов для выявления дефектной продукции в случае отзыва.\n\n4. Требования GDP к сотрудникам\n\n-  В компании должен быть назначен заместитель руководства, который отвечает за внедрение и управление системой обеспечения качества.\n\n-  Ответственное лицо должно обладать соответствующим опытом и регулярно проходить обучение.\n\n-  Сотрудники, занимающиеся транспортировкой фармацевтической продукции, должны быть обучены надлежащим образом для безопасной и правильной работы с продуктами.\n\n-  Мониторинг и контроль должны проходить без сбоев.\n\n5. Документация (процессы и записи)\n\n-  По запросу вся документация должна быть предоставлена ответственным органам.\n\n-  Процессы должны регулировать все действия в ходе транспортировки, которые могут повлиять на качество продукции, и быть утверждены ответственным за качество с датой и подписью.\n\n-  Документы должны содержать важные действия или отклонения в понятной форме, чтобы их можно было понять позже.\n\n-  Документы должны быть легко доступны и понятны для всех вовлеченных сторон.\n\n-  Документация должна храниться в течение 10 лет.\n\n6. Доставки\n\nФармацевтическая продукция должна транспортироваться таким образом, чтобы:\na) этикетки не терялись;\nb) предотвращалось загрязнение другими продуктами или материалами;\nc) продукция не подвергалась повреждению или краже;\nd) она была защищена от жары, холода, света, влаги, других повреждающих факторов, а также микроорганизмов и вредителей.\n\n-  Продукция, требующая хранения в температурно-контролируемой среде, должна также транспортироваться в соответствии с требованиями.\n\n-  Все устройства для контроля температуры (например, датчики) проверяются и калибруются ежегодно.\n\n-  Для фармацевтической продукции должны быть созданы документы, содержащие информацию о:  -  датах (приемка и т. д.),  -  названии продукта,  -  объемах поставки,  -  артикуле продукта,  -  именах и адресах поставщика и получателя.\n\n-  Поставка должна быть подтверждена (POD, CMR).\n\n7. Транспортные средства\n\n-  Транспортные средства должны быть подходящими, чтобы избежать воздействия условий, которые могут повредить упаковку. Любое загрязнение должно быть предотвращено.\n\n-  Транспортные средства и оборудование должны регулярно чиститься и обслуживаться.\n\n-  При возможности должны использоваться квалифицированные транспортные средства.\n\n-  Если привлекается субподрядчик, необходимо обеспечить сохранность качества продукции.\n\n-  Регулярная очистка должна быть запланирована, проведена и задокументирована.\n\n8. Отзывы продукции\n\n-  Процессы отзыва продукции должны быть описаны и задокументированы.\n\n-  Отзыв должен проводиться только после детального уведомления клиента и согласования с ним.\n\n-  Для обеспечения контакта со всеми участниками отзыва документация по каждому перевозке должна быть подготовлена должным образом.\n\n9. Внутренние аудиты качества\n\n-  Внутренние аудиты проводятся для контроля соответствия и реализации этих руководств.\n\n10. Деятельность субподрядчиков\n\n-  Деятельность, связанная с привлечением субподрядчиков, должна быть закреплена в письменном контракте или соглашении об обеспечении качества.\n\n-  Контракт и соглашение регулируют ответственность и обязанности всех вовлеченных сторон, включая соблюдение требований GDP.\n\n-  Все субподрядчики должны быть проверены и подвергаться регулярному аудиту.\n\n[Paveikslėlis, kuriame yra tekstas, ekrano kopija, Šriftas, linija Automatiškai sugeneruotas aprašymas]\nРуководство для водителей по парковке транспортных средств\n\nКражи транспортных средств и/или их загруженных товаров оказывают огромное влияние на водителей, автономных перевозчиков и малые и средние компании. Ежегодный ущерб от кражи грузов и транспортных средств в Европе составляет около 8 миллиардов евро. В среднем, каждая кража приносит ущерб на сумму около 80 000 евро. Украденное транспортное средство может быть разгружено и разобрано за считанные минуты.\n\nОрганизованные преступники и их сообщники нацелены на транспортные средства и/или их загруженные товары, но есть меры, которые можно принять для предотвращения кражи или минимизации шансов стать жертвой преступления. Следующие рекомендации касаются каждого водителя Thermotraffic и водителей контрактных партнеров Thermotraffic, которые занимаются транспортировкой товаров с высокой стоимостью.\n\nВсегда сразу же запирайте кабину водителя и грузовой отсек, когда уходите от них.\n\nВсегда держите грузовой отсек запертым, а также запирайте кабину водителя, когда спите или отдыхаете в кабине.\n\nВсегда оставайтесь в транспортном средстве. Исключения составляют короткие перерывы на прием пищи, поход в туалет и периоды отдыха в выходные дни. По возвращении к транспортному средству проверяйте его со всех сторон, а также проверяйте замки, пломбы, таможенные веревки и т. д.\n\nВсегда паркуйте транспортное средство только в хорошо освещенных, оживленных местах, таких как зоны обслуживания на автомагистралях или автозаправочные станции.\n\nВсегда паркуйте транспортное средство в пределах видимости других водителей или транспортных средств.\n\nКаждый раз, когда вы останавливаетесь, запланированно или незапланированно, останавливайтесь на достаточно защищенных парковках, а не в уединенных местах.\n\nИзбегайте парковки в местах с высоким риском (центр криминальной активности).\n\nИзбегайте парковки на месте разгрузки, если у вас есть груз с высокой стоимостью. К товарам с высокой стоимостью относятся, среди прочего: высокоценные фармацевтические препараты; предметы роскоши, компьютеры и комплектующие (например, микрочипы, процессоры), телевизоры, мобильные телефоны, цифровая техника, такая как аудио, видео, фотоаппараты, DVD аппараты, алкоголь, табачные изделия и другие товары."}, {"title": "ВАЖНО !!!", "content": "Инструкция для дальнобойщиков по транспортировке лекарств:\n\n[Paveikslėlis, kuriame yra tekstas, Sausumos transporto priemonė, transporto priemonė, ekrano kopija Automatiškai sugeneruotas aprašymas]Транспортировка фармацевтических товаров требует строгого соблюдения определенных правил, чтобы обеспечить сохранность и безопасность продукции. Водитель, перевозящий лекарства, обязан придерживаться следующих рекомендаций:\n\n1.  Подготовка транспортного средства  -  Убедитесь, что транспортное средство в хорошем техническом состоянии и соответствует требованиям для перевозки фармацевтических продуктов.  -  Все грузовые отсеки должны быть чистыми, сухими и не иметь запахов, которые могут повлиять на продукцию.  -  Проверьте наличие необходимого оборудования для контроля температуры, если лекарства требуют таких условий (например, термоконтролируемые прицепы).\n\n2.  Условия перевозки  -  При перевозке медикаментов, которые требуют хранения в определенной температуре (например, вакцины, биологические препараты), убедитесь, что транспортное средство оснащено температурным контролем и все датчики правильно настроены.  -  Регулярно проверяйте температуру в грузовом отсеке и фиксируйте результаты.  -  Защищайте продукты от воздействия прямого солнечного света, влаги и других факторов, которые могут повлиять на их качество.\n\n3.  Документация и маркировка  -  Убедитесь, что у вас есть все необходимые документы, включая накладные, сертификаты качества, разрешения на транспортировку и другие документы, требуемые для перевозки фармацевтических товаров.  -  Все товары должны быть правильно промаркированы с указанием на упаковке, что это лекарственные средства, и с информацией о температурных требованиях.\n\n4.  Парковка и безопасность  -  Всегда паркуйте транспортное средство в хорошо освещенных и защищенных местах, таких как парковки на автозаправочных станциях, специально оборудованные стоянки для грузовиков.  -  Никогда не оставляйте транспортное средство с лекарствами без присмотра на долгое время, особенно в уединенных местах.  -  Всегда запирайте кабину и грузовой отсек, даже если отходите на короткое время.\n\n5.  Проверка товара  -  При загрузке и разгрузке медикаментов обязательно проверяйте упаковку на повреждения, убедитесь, что все товарные единицы находятся на месте и нет повреждений или утечек.  -  Если в процессе перевозки вы обнаружите повреждения упаковки или несоответствие товара, немедленно уведомите руководство компании и следуйте инструкциям для дальнейших действий.\n\n6.  Инструкции по возврату и отзыву  -  Ознакомьтесь с процедурами возврата и отзыва продукции. В случае отзыва медикаментов из-за нарушения условий хранения или других проблем необходимо действовать по заранее подготовленному плану.  -  Убедитесь, что все документы, связанные с перевозкой, правильно оформлены и могут быть предоставлены по запросу.\n\n7.  Обучение и соблюдение стандартов  -  Водитель должен пройти обучение по транспортировке фармацевтических препаратов и регулярно обновлять свои знания о новых требованиях в этой области.  -  Следуйте всем стандартам и процедурам, установленным для транспортировки медикаментов, чтобы обеспечить безопасность и качество продукции.\n\nЗаключение:\nПеревозка фармацевтической продукции требует особого внимания и тщательной подготовки. Водитель должен быть хорошо информирован о всех требованиях, а также следовать инструкциям компании и государственным стандартам для обеспечения безопасности и сохранности товаров в процессе транспортировки.\n\n[]Коды ошибок Thermo King:\n\n[]\n\n[][]\n[]\n\n[]\n\nМинимальный словарь водителя"}, {"title": "НАЧАЛО РАБОЧЕГО ДНЯ - КОНЕЦ РАБОТЫ С ЧИПОМ", "content": "В окне тахографа введите: ОК\n\n-ввод водитель 1- ok\n\n-начало страны -ok\n\n-код страны - ok\n\nПредусмотрите возможную максимальную продолжительность рабочего дня (общее время)\n\nКонец рабочего дня:\n\nВ тахографе вводим: ОК\n\n-ввод водитель 1- ok\n\n-конец страны -ok\n\n-выбираете код страны - ok\n\n(если работу оканчиваете в Испании, введя конец страны или начало, вводится регион страны)\nводители должны регистрировать каждое пересечение каждой границы-- вводить запись вручную на границе или на первой возможной остановке сразу за границей. Отсутствие записи наказывается штрафом как для водителя, так и для перевозчика. Оно является очень серьезным нарушением, зарегистрированном в системе ERRU. Kод страны должен вводиться при пересечении границы как в случае аналоговых, так и цифровых или умных тахографов.\n\nРучной ввод\n\n1.  поменять значёк кровати на конветр, поменять дату на дату изятие чипа, добавить время от изятия чипа - OK\n\n2.  значёк кровати (ничево делать ненадо), дата (ничево делать ненадо), отниать время от реальново – OK\n\n3.  поменять значёк кровати на конветр, дата (ничево делать ненадо), время (ничево делать ненадо) – OK  открываем страну, ставим на молотки (не меньше 13 мин). Перед началом работы молотки не ставятся - молотки надо ставить только после еженедельного отдыха.\n\nЗа отсутствие ручного ввода (Или неправильный Ручной ввод) - ответственность несёт водитель\n\nЕсли сломалься тахограф и надо работатЬ\n\nУ Bас есть право работать 7 дней строго на распечатке указывая деиствия:\n\n1. Имя Фамиля\n2. Номер водительской карты\n3. Номер тягача\n\n4. Страна окончания смены\n\n5. Cтрана начала смены\n\n[][][][][][][][][][]6. Дата и роспись\n\n7. Километраж закрытя смены\n\n8. Километраж начала смены\n\n9. Пробег за смену.\nВ жёлтом квадрате время от 00:00 до 12:00, В синем квадрате время от 12:00 до 24:00\n\nВ квадратах надо указивать пересечение границы (Страну)\n\nКраткая инструкция по работе с тахографом DTCO 1381 версии 1.3u.\n\nНачало смены: - важно – необходим ручной ввод данных.  Тахограф 1381 управляется джойстиком и кнопками 1 и 2, рядом с которыми  []  расположены кнопки извлечения карт. В нижней части тахографа находятся слоты для установки карт. Рядом с джойстиком расположена кнопка открывания отсека принтера для установки бумаги. На джойстике есть кнопка подтверждения выбора – ОК, кнопки вверх – вниз для перемещения по меню и кнопка отмены – стрелка влево с точкой.  Водитель вставляет свою карту в слот 1 до упора и легко подталкивает ее внутрь, карта затягивается автоматически (а н а л о г и ч н ы м о б р а з о м у с т а н а в л и в а е т с я ка р т а вт о р о г о во ди т е ля во в т о р о й с л о т ). Карта устанавливается чипом вверх и вперед.\n\n[]  Во время установки карты водителя последовательность экранов будет выглядеть следующим образом:\n\n[]  Далее появится запрос на ручной ввод данных по режимам занятости водителя (это запись тех режимов, которые водитель выполнял после последнего изъятия карты из тахографа и до момента ее текущей установки в тахограф).  []Если водителю не требуется осуществлять ручной ввод данных, то нужно нажать ОК и отказаться от ручного ввода режимов занятости. Если какой либо из режимов занятости не был  []зарегистрирован на карте водителя, то он обязан зарегистрировать его в памяти своей карты. В этом случае необходимо нажать стрелку Вверх-вниз джойстика и изменить ответ экрана на \"ДА\", и нажать кнопку ОК на джойстике. Далее осуществить ручной ввод.  Если водитель отказался от ручного ввода данных, то появится экран:\n\n[]  []  []Ручной ввод! Для примера вводятся два режима занятости работа с 23:30 до 0:20 следующего дня и готовность с 00:20 до 01:20 (на дату 23.10)  []  Обратите внимание, необходимо обязательно выбирать режим отдыха в конце смены и в периоды отдыха, иначе тахограф будет их регистрировать, как работу!!!  Вывод:  в самом распространенном случае, когда водитель осуществляет движение по территории одной страны, и после изъятия карты у него наступает режим отдыха (не забывайте установить режим отдыха перед изъятием карты!!!), последовательность его действий очень простая:\n\nустановить карту\n\nвыполнить ручной ввод режима „Конверт“, “Отдых“ , „Конверт“\n\nпосле индикации присутствия карты - „Молотки“ (После еженедельного отдыха не меньше 13 минут, каждое утро молотков нажимать не надо).\n\nДействия, описанные в примере выше, водителю необходимо выполнять в случае, если выполнялась иная работа вне автомобиля, и она не была зарегистрирована на карте водителя.\n\nПечать суточного отчета.  Для выполнения печати отчета необходимо выбрать в меню пункт печати отчета и выдать команду на печать отчета.  []Пиктограмма суточного отчета на экране выглядит так:  В случае стандартного режима работы, водитель в конце смены изымает карту и на предложение тахографа распечатать суточный отчет, подтверждает необходимость печати отчета, последовательность действий следующая:  Водитель нажимает на кнопку изъятия карты (только во время стоянки), эта кнопка находится рядом с соответствующей кнопкой первого \"1\" или второго водителя \"2\". И появляется экран:\n\n[]  Таким образом, последовательность нажатия кнопок следующая:\n\nКнопка – [] нажимается 1 раз, и кнопка: \"OK\" – 2 раза.  Если необходимо самостоятельно вызвать меню печати отчета, то последовательность действий водителя следующая:  В стандартном варианте экран тахографа выглядит следующим образом:  []Если нажимать последовательно кнопки  [], то можно перемещаться по меню тахографа до появления надписи: \"Вызвать главное меню?\", далее чтобы перейти в  []главное меню необходимо нажать кнопку \"ОК\" на джойстике.  []На экране появится сообщение:  Подтвердите выбор данной опции нажатием кнопки \"ОК\". Далее появится запрос вида отчета, нам необходим отчет за сутки, его пиктограмма выглядит так:\n\n[]  Эта пиктограмма появится на экране первой, поэтому нажмите кнопку \"ОК\" для выбора отчета.  Далее необходимо выбрать сутки для распечатки отчета – первыми идут текущие сутки, поэтому просто нажмите \"ОК\" для  [][]подтверждения. И дождитесь печати отчета. По завершении печати отчета оторвите бумагу, просто потянув ее вниз или вверх, как показано на рисунке.  Нажмите кнопку возврата [] (или отмены действия) для возврата в стандартный экран индикации:  Таким образом, последовательность нажатий кнопок будет следующая:  [] - 1 раз, \"ОК\" – 4 раза, дождаться окончания печати и нажать: [] - 1 раз.\n\nЗамена бумаги в отсеке принтера.  Водитель обязан печатать суточный отчет из памяти карты водителя, поэтому у него периодически заканчивается бумага, и он обязан вовремя ее заменять. Если на оборотной стороне бумаги появилась синяя или красная полоса, то пора менять рулон бумаги.  Необходимо выполнить следующие действия: нажать кнопку открытия отсека принтера, как показано на рисунке, установить рулон, таким же образом, как на рисунке, и закрыть отсек принтера, оставив кончик бумаги с внешней стороны принтера.\n\n[][]\n\nЗамена карт при смене водителей.  Не забывайте менять карты водителей местами при смене первого и второго водителей. Для этого необходимо изъять карту второго водителя из слота № 2, а карту первого водителя из слота № 1, после этого установить карту второго водителя в слот № 1 – при этом он автоматически становится первым водителем, а карту водителя, который ранее был первым, установить в слот № 2 – и он станет вторым водителем. При этом водители должны закрыть и открыть смену.\n\n[]\n\n[]\n\n[]  Внимание во Франции. Обезные дороги\n\n[]\n\n-Toll ПЛАТНЫЕ"}, {"title": "EXTRA ТЕЛЕФОНЫ", "content": "Ремонт полуприцепов : +370 667 39423\n\nРемонттягачей+370-656-01331\nЕсли сломался тягач или полуприцеп : +37063769400\n\nCMR, карточки, топливо, деньги, дороги, аппараты: +370-656-90811\nПланирование рейсов: +370-656-66206\n\nИнструкторы: +37065905616; +37065026258; +370-652-39045;"}]

let LANG = 'ru', searchTimer = null;
const cache = {};

function setLang(l) {
  LANG = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  SECTIONS.forEach((s, i) => { if (document.getElementById('card-'+i)) refreshBody(i); });
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(text) {
  // Step 1: Pre-process - split inline numbered lists into separate lines
  // e.g. "text. 1. Point one; 2. Point two" -> split at each number
  let processed = text;

  // Split at patterns like ": 1." or "; 2." or just "1." at start of run
  processed = processed.replace(/([;:]?)\s*(\d{1,2}[\.\)])\s/g, (m, sep, num) => {
    return '\n' + num + ' ';
  });

  // Split bullet points
  processed = processed.replace(/\s*[•]\s*/g, '\n• ');

  const lines = processed.split('\n');
  const result = [];
  let para = [];

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) {
      if (para.length) { result.push(para.join(' ')); para = []; }
    } else if (/^\d{1,2}[\.\)]/.test(line) || /^\d{1,2}\.\d/.test(line) || /^[•\-]/.test(line)) {
      if (para.length) { result.push(para.join(' ')); para = []; }
      result.push(line);
    } else {
      para.push(line);
    }
  }
  if (para.length) result.push(para.join(' '));

  return result
    .filter(p => p.trim())
    .map(p => {
      // Style numbered points differently
      if (/^\d{1,2}[\.\)]/.test(p) || /^\d{1,2}\.\d/.test(p)) {
        return '<p style="margin-left:12px;border-left:2px solid var(--border);padding-left:10px;margin-bottom:6px">' + esc(p) + '</p>';
      }
      if (/^[•\-]/.test(p)) {
        return '<p style="margin-left:18px;margin-bottom:4px">' + esc(p) + '</p>';
      }
      return '<p>' + esc(p) + '</p>';
    })
    .join('');
}

function refreshBody(i) {
  const body = document.getElementById('body-'+i);
  const btn = document.getElementById('tbtn-'+i);
  const note = document.getElementById('note-'+i);
  const s = SECTIONS[i];
  if (!body) return;
  if (LANG === 'ru') {
    body.innerHTML = fmt(s.content);
    if (btn) btn.style.display = 'none';
    if (note) note.style.display = 'none';
    return;
  }
  const ck = i+'_'+LANG;
  if (cache[ck]) {
    body.innerHTML = fmt(cache[ck]);
    if (btn) btn.style.display = 'none';
    if (note) { note.className='trans-note'; note.style.display='block'; note.textContent = LANG==='lt' ? '&#x2705; I&#353;versta &#x12F; lietuvi&#x173; kalb&#x105;' : '&#x2705; Translated to English'; }
    return;
  }
  body.innerHTML = fmt(s.content);
  if (btn) btn.style.display = 'inline-block';
  if (note) note.style.display = 'none';
}

async function translateSection(i) {
  const body = document.getElementById('body-'+i);
  const btn = document.getElementById('tbtn-'+i);
  const note = document.getElementById('note-'+i);
  const s = SECTIONS[i];
  btn.disabled = true; btn.textContent = '&#x23F3; Verčiama...';
  body.innerHTML = '<div class="translating">Verčiama... Palaukite.</div>';
  try {
    const r = await fetch('/api/translate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:s.content, title:s.title, lang:LANG})});
    if (r.status===401) { location.href='/'; return; }
    const d = await r.json();
    if (d.translated) { cache[i+'_'+LANG]=d.translated; refreshBody(i); }
    else throw new Error(d.error||'Klaida');
  } catch(e) {
    body.innerHTML = fmt(s.content);
    btn.disabled=false; btn.textContent='&#x1F310; Versti / Translate';
    if (note) { note.className='trans-err'; note.style.display='block'; note.textContent='&#x274C; '+e.message; }
  }
}

function openImg(el) { document.getElementById('lb-img').src=el.src; document.getElementById('lightbox').classList.add('open'); document.body.style.overflow='hidden'; }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

function init() {
  const navList = document.getElementById('nav-list');
  const wrap = document.getElementById('sections-wrap');
  SECTIONS.forEach((s, i) => {
    const nav = document.createElement('div');
    nav.className = 'nav-item';
    nav.id = 'nav-'+i;
    nav.innerHTML = '<div class="nav-num">'+(i+1)+'</div><div class="nav-text">'+esc(s.title)+'</div>';
    nav.onclick = () => {
    // Update active nav immediately
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    nav.classList.add('active');
    nav.scrollIntoView({block:'nearest'});
    // Scroll content to card - calculate position by summing card heights
    const ct = document.getElementById('content');
    if (!ct) return;
    let top = 0;
    for (let j = 0; j < i; j++) {
      const c = document.getElementById('card-'+j);
      if (c && c.classList.contains('visible')) top += c.offsetHeight + 18;
    }
    window._navClicking = true;
    clearTimeout(window._navTimer);
    ct.scrollTop = top;
    window._navTimer = setTimeout(() => { window._navClicking = false; }, 600);
  };
    navList.appendChild(nav);

    const imgs = SECTION_IMAGES[i]||[];
    const imgsHtml = imgs.length ? '<div class="doc-images"><div class="doc-images-label">Dokumento pavyzd&#382;iai</div><div class="doc-imgs-grid">'+imgs.map(src=>'<img class="doc-img" src="'+src+'" loading="lazy" onclick="openImg(this)" alt="doc">').join('')+'</div></div>' : '';

    const card = document.createElement('div');
    card.className = 'section-card visible';
    card.id = 'card-'+i;
    card.innerHTML =
      '<div class="card-header"><div class="card-num">'+(i+1)+'</div><div class="card-title">'+esc(s.title)+'</div><button class="translate-btn" id="tbtn-'+i+'" style="display:none" onclick="translateSection('+i+')">&#x1F310; Versti</button></div>'+
      '<div class="card-body"><div id="note-'+i+'" style="display:none"></div>'+imgsHtml+'<div class="section-body" id="body-'+i+'">'+fmt(s.content)+'</div></div>';
    wrap.appendChild(card);
  });

  // Track active section on scroll using content div
  const contentDiv = document.getElementById('content');
  contentDiv.addEventListener('scroll', function() {
    if (window._navClicking) return;
    const st = contentDiv.scrollTop + 80;
    let cur = 0;
    for (let j = 0; j < SECTIONS.length; j++) {
      const c = document.getElementById('card-'+j);
      if (c && c.classList.contains('visible') && c.offsetTop <= st) cur = j;
    }
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const an = document.getElementById('nav-'+cur);
    if (an) { an.classList.add('active'); an.scrollIntoView({block:'nearest'}); }
  }, {passive:true});

  updateStats(SECTIONS.length);
}

function clearSearch() { document.getElementById('search').value=''; document.getElementById('search-clear').style.display='none'; doSearch(''); }

document.getElementById('search').addEventListener('input', function() {
  document.getElementById('search-clear').style.display = this.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>doSearch(this.value.trim()), 250);
});

function doSearch(q) {
  let found = 0;
  const lower = q.toLowerCase();
  SECTIONS.forEach((s,i) => {
    const card = document.getElementById('card-'+i);
    const nav = document.getElementById('nav-'+i);
    const body = document.getElementById('body-'+i);
    if (!q) {
      card.classList.add('visible');
      if(nav) nav.classList.remove('hidden');
      const dispText = LANG==='ru' ? s.content : (cache[i+'_'+LANG] || s.content);
      if(body) body.innerHTML = fmt(dispText);
      found++;
    } else {
      const searchIn = (s.title + ' ' + s.content + ' ' + (cache[i+'_'+LANG]||'')).toLowerCase();
      if (searchIn.includes(lower)) {
        card.classList.add('visible');
        if(nav) nav.classList.remove('hidden');
        const dispText = LANG==='ru' ? s.content : (cache[i+'_'+LANG] || s.content);
        // Highlight: replace in formatted HTML
        const safe = lower.replace(/[.*+?^${}()|\[\]\\]/g,'\\$&');
        const fmted = fmt(dispText);
        const highlighted = fmted.replace(
          new RegExp('('+safe+')','gi'),
          '<mark style="background:#fff3a3;padding:1px 3px;border-radius:3px;font-weight:700">$1</mark>'
        );
        if(body) body.innerHTML = highlighted;
        // Scroll content to first found card
        if(found === 0) {
          const ct = document.getElementById('content');
          if(ct && card) {
            let top = 0;
            for(let j=0;j<i;j++){const c=document.getElementById('card-'+j);if(c&&c.classList.contains('visible'))top+=c.offsetHeight+18;}
            ct.scrollTop = top;
          }
        }
        found++;
      } else {
        card.classList.remove('visible');
        if(nav) nav.classList.add('hidden');
      }
    }
  });
  document.getElementById('no-results').style.display = found===0?'block':'none';
  updateStats(found, q);
}

function updateStats(n,q) { document.getElementById('search-stats').textContent = q ? n+' rasta' : n+' skyriai'; }

init();
