водитель обязан проверить агрегат полуприцепа, завести его и поставить на\nавтоматический режим. Если агрегат не работает или работает только на постоянном режиме,\nнемедленно об этом сообщить менеджеру.\n13.3. На погрузку приезжать только с чистым полуприцепом, если полуприцеп нужно подмести, это\nводитель делает своими силами, а если внутри есть запах, тогда сообщить менеджеру и следовать\nдальнейшим его инструкциям;\n\n\n13.4. На месте погрузки водитель должен зарегистрироватся, выяснить когда начнется погрузка и\nсообщить менеджеру; Если в указанное время не грузят нужно опять сообщить менеджеру , сообщять\nкаждый час до того как начнут грузить;\n13.5. Если на погрузке/разгрузке работники склада указывают водителю самому загрузить/разгрузить\nгруз, об этом немедленно сообщить менеджеру и дальше следовать указаниям менеджера.\n13.6. Если на погрузке водителю присутсвовать не разрешается, водитель об этом обязан Известить\nменеджера, написать в 18-ой графе на всех листах CMR накладной и расписаться.\n13.7. В странах ЕС всегда, а в странах СНГ иногда на погрузке/разгрузке необходимо иметь спец.одежду\n(спец. Обувь, желет, каску , очки, руковицы). Если на погрузке/разгрузке есть дополнительные\nусловия для безопасности водителя, их обязательно надо исполнять.\n13.8. На погрузке водитель обязан присутствовать, пересчитывать паллеты, ящики с грузом, если\nтемпературный груз проверить температуру груза, проверять тару чтобы она была качественная, не\nпомятая, сухая и другими способами не повреждена. Если видим какие то несоответствие с\nдокументами, сразу сообщаем менеджеру.\n13.9. Водитель лично несет\n\nответственность за правильное расположение и крепление груза в\n\nполуприцепе. Водитель обязан на погрузке так распределить груз в полуприцепе, чтобы не было\nперегруза на осях тягача и полуприцепа. Если грузоотправитель не слушается водителя, водитель\nдолжен прекратить погрузку и о ситуации сообщить менеджеру;\n13.10. После погрузки груза водитель обязан проверить документы на груз (должно совпадать в\nдокументах количество и вес груза, отправитель и получатель груза), закрепить груз, закрыть двери\nполуприцепа, повесить пломбу и сообщить менеджеру. Ехать можно только с разрешением менеджера;\n13.11. В пути после погрузки, водитель регулярно проверяет груз: не освободились ли ремни для\nкрепления груза, не наклонился ли груз, при необходимости дополнительно закрепить груз;\n\nОсобенности при погрузки фруктов, овощей, свежого мяса и рыбы:\n13.12.Получив заказ на перевозку температурного груза, водитель обязан проверить работает ли агрегат\nполуприцепа на автоматном и постоянном режиме. После зацепки полуприцепа или во время\nтранспортировки груза заметив неисправность, немедленно информировать ответственного\nменеджера и начальника технического отдела и дальше руководствоваться по указаниям этих лиц.\n13.13.При перевозке температурного груза строго запрещается выключать агрегат или менять\nтемпературу без разрешения менеджера до того как будет разгружен транспортируемый груз.\n13.14. Перед перевозкой фруктов водитель обязан обратить внимание на упаковку паллеты с грузом выше\n\n150 см ( ящики достаточно твердые, паллета достаточно обмотана пленкой, ящики на паллетах\nправильно закреплены специальными уголками и т.д.). Заметив, что груз не стабильно упакован,\nводитель обязан немедленно информировать менеджера и дальше следовать его инструкциям.\n20. Разгрузка груза\n\n\n20.1. После регистрации на разгрузке груза, водитель обязан спросить у сотрудника склада,когда начнут\nразгрузку и можно присутствовать на погрузке и ее контролировать. Обязательно сообщить менеджеру о\nначале разгрузки, а так же если не разрешают присутствовать на разгрузке. Начинать разгрузку без\nучастия водителя можно только с разрешением менеджера.\n20.2. Если разгрузка производилась без участия водителя, во всех случаях водитель обязан об этом\nвписать в 18-ой графе CMR накладной. Удостоверьтесь, что запись “На погрузке присутствовать не\nразрешили” присутствует на всех листах CMR накладной, а особенно на той накладной которая осталась\nу получателя груза.\n20.3. На разгрузке водитель обязан пересчитавать груз (паллеты, ящики или другую тару), следить за\nкачеством груза и упаковки (упаковка порвана, промокшая, негодная для груза, негодная температура\nили другие заметные повреждения). Если разгружаем температурный груз водитель должен попросить\nчтобы проверили температуру груза, если это не сделает сотрудник получателя, водитель температуру\nдолжен проверить сам. Заметив, что есть какие либо повреждения водитель немедленно сообщает\nменеджеру и дальше действует по его указаниям.\n20.4. Если получатель груза, что либо отметил в CMR накладной или водитель заметил недостачу груза,\nнемедленно об этом сообщить менеджеру и CMR накладную прислать по электронной почте.\n20.5. После разгрузки водитель обязан предьявить менеджеру полную информацию: время разгрузки,\nсостояние груза, соответсвует ли количество груза с тем, что написанно в документах.\n\n\n21. Схемы погрузки полуприцепа:\n* Погрузка"}, {"title": "КРЕПЛЕНИЕ ГРУЗА", "content": "Общие требования:\n\nГлавная цель крепления груза – в не зависимости от ситуации груз выдержать в стабильном положении;\nПеред погрузкой, водитель обязан удостоверится что все преднадлежнсти для крепления груза в\nхорошом состояние; во время погрузки – обеспечить правильное расположение груза в транспортном\nсредстве, обращая внимание на нагрузку груза на каждую ось транспортного средства.\nВодитель обязан исползовать дополнительную оборудование для крепление груза: резиновые коврики,\nштанги крепления, ремни, разные блокировки груза и другие обязательные приспособления;"}, {"title": "ОСНОВА БЕЗОПАСНОГО ВОЖДЕНИЯ УСТОЙЧИВОСТЬ АВТОМОБИЛЯ", "content": "1. Устойчивость автомобиля тем больше, чем ниже его центр тяжести\n2. Автомобиль, не загруженный грузом, менее быстро поворачивает.\n3. Полностью заполненная автоцистерна более устойчива, чем наполовину заполненная.\n4. Ехать по склону нужно медленно, не делая резких движений рулем и тормозами.\n5. Сила инерции действует на автомобиль при резком начале движения, резком торможении, повороте.\n6. Центробежная сила тем больше, чем выше скорость движения и чем меньше дорога\nлуч.\n7. Причина скольжения автомобиля боком на скользкой дороге может быть такой внезапноe\nторможение, а также резкое ускорение.\n8. Если сила тяги колес автомобиля больше силы сцепления колес с дорожным покрытием, ведущие\nколеса будут прогибаться.\n9. При движении по скользкой дороге опасно резко увеличивать обороты двигателя (нажать педаль\nакселератора), так как автомобиль может соскользнуть в сторону.\n10. При износе протектора шины уменьшается сила сцепления колес с дорожным покрытием.\n11. При резком торможении автомобиля задние колеса блокируются (буксуют) быстрее, чем боковой\nзадний мост,необходимо немного отпустить педаль акселератора, повернуть руль в сторону скольжения\nбоковая задняя ось, нужно чуть сильнее нажать на педаль акселератора и отрегулировать направление\nдвижения автомобиля рулем\n14. Если заторможенный автомобиль начинает скользить в сторону, необходимо прекратить\nторможение.\n15. В повороте машина более устойчива, если ее вести с включенной передачей.\n16. Если правые колеса автомобиля, на котором вы едете, задели неукрепленный бордюр,\nрекомендуется направить автомобиль на проезжую часть, не останавливаясь.\n\n\n17. Сильный боковой ветер опасен на скользкой дороге при выезде с закрытого участка дороги\n18. После пересечения водоема (при залитых тормозах автомобиля) водителю рекомендуется двигаться\nс малой скоростью, несколько раз нажимая на педаль тормоза для просушки тормозных колодок.\n19. Величина аквапланирования (водяной клин между протектором шины и поверхностью дороги)\nзависит от скорости движения, состояния протектора шины, интенсивности дождя, поверхности и\nгеометрии.\n20. Если во время движения прямо вы неожиданно выехали на небольшой обледенелый участок дороги\nжелательно не менять скорость и направление движения, а слегка отпустить педаль акселератора.\n21. При движении по глубокому снегу, по разбитой грунтовой дороге необходимо заранее выбирать\nпониженную передачу, не делать резких поворотов, не переключать передачи, стараться не\nостанавливаться.\n22. При перевозке более тяжелых грузов сверху на кузов легкового автомобиля (багажник на крыша),\nрезкие повороты руля и торможение опасны\n23. Самым скользким является дорожное покрытие из тесаных камней.\n24. Слишком низкое давление в шинах увеличивает расход топлива и снижает устойчивость\nавтомобиля.\n25. Только когда начинается дождь, дорожное покрытие становится очень скользким."}, {"title": "ВОЖДЕНИЕ В УГОЛ", "content": "26. Центробежная сила будет уменьшаться при снижении скорости движения в повороте.\n27. В повороте прицеп установки движется в сторону от центра поворота (чем длиннее буксир, тем\nболее).\n28. При повороте водитель должен следить за тем, чтобы задние колеса движущегося автомобиля\n(прицепа), катящиеся с меньшим радиусом, чем передние, чтобы они не задевали препятствие, а\nтранспортное средство не выезжало на полосу встречного движения.\n29. Если поворот дороги окажется круче ожидаемого, необходимо снизить скорость.\n\nОСТАНОВКА\n30. Тормозной путь - расстояние, которое проходит автомобиль с момента обнаружения водителем\nпрепятствия до его полной остановки.\n31. Остановочный путь - расстояние, пройденное автомобилем с момента остановки водителя нажимает\nна педаль тормоза до полной остановки.\n\n\n32. Время реакции – расстояние, пройденное автомобилем с момента, когда водитель заметил\nпрепятствие, до момента, когда он начал торможение.\n33. Тормозной путь прямо пропорционален квадрату увеличения скорости: т.е. Трехкратное увеличение\nскорости увеличит тормозной путь в девять раз.\n34. Конструкция рулевого механизма не влияет на тормозной путь. Максимальный тормозной путь\nзависит от скорости движения, конструкции тормозного привода, количества тормозных колес и силы\nнажатия на педаль тормоза.\n35. Расстояние – это расстояние между автомобилями, следующими друг за другом.\n36. При движении за большой машиной нужно держаться от нее как можно дальше\nрасстояние быть впереди виден более длинный участок дороги.\n37. При резком торможении (при хороших условиях движения) нужно нажать на тормоз\nпедаль не знаяпедали сцепления\n38. Если при торможении заторможенные колеса блокируются и скользят по поверхности\nдороги,тормозной путь ведра\n39. При движении по скользкой дороге тормозной путь автомобиля уменьшится, если сделать\nторможение прерывистый торможением без выключения сцепления и передачи (при отсутствии АБС)\n40. При движении по скользкой дороге торможение двигателем без блокировки колес улучшает\nуправляемость автомобиля стабильность.\n41. При резком торможении пассажиры и незакрепленный груз движутся вперед.\n42. Если вы резко затормозите в пробке, вас могут ударить удары ехавших сзади\n43. В случае внезапного отказа рабочих тормозов необходимо включить пониженную передачу и\nзатормозить стояночный (ручной) тормоз. По возможности используйте любое препятствие.\n44. Если автомобиль долго стоит на крутом склоне с выключенной передачей, он может перегретьсяи\nтормоза отказывают.\n45. Автомобиль с неравномерным износом шин на левом и правом колесах резко тормозить опасно, так\nкак он может соскользнуть с дороги и перевернуться.\n46. При торможении автомобиля с двигателем чем круче уклон, тем ниже нужно выбирать механизм."}, {"title": "РЕАКЦИЯ ВОДИТЕЛЯ, ЧУВСТВА, РЕКОМЕНДУЕМЫЕ ДЕЙСТВИЯ", "content": "47. Время реакции водителя - интервал времени с момента, когда водитель заметил препятствие для\nсовершения конкретных действий.\n48. Время реакции пьяного водителя увеличивается.\n49. У уставшего и больного водителя ослабевает внимание, увеличивается время реакции.\n50. По мере увеличения скорости движущегося автомобиля угол обзора водителя уменьшается.\n\n\n51. Эмоциональное возбуждение водителя отрицательно сказывается на безопасности движения.\n52. Если водитель устал и хочет спать, он должен остановиться и отдохнуть.\n53. Встречные автомобили окрашены в темные цвета (серый, темный синий), создает иллюзию того, что\nони движутся медленнее, чем на самом деле.\n54. Встречный большой автомобиль создает иллюзию того, что он движется\nдвижется быстрее, чем на самом деле.\n55. На педали сцепления и тормоза рекомендуется нажимать средней частью педали. 56. Подъезжая к\nперекрестку параллельных дорог, рекомендуется смотреть на него слева направо.\n57. В жилых районах необходимо присутствовать при проезде мимо остановки маршрутного\nавтобуса.мы осторожны, потому что мы пешеходы может выбежать перед стоящим автобусом или\nтроллейбусом, а также маршрутным транспортом имеет приоритет при выезде с остановки, участок\n58. После обгона транспортного средства рекомендуется вернуться в правую полосу при зеркало\nзаднего вида, видит обгоняемую машину.\n59. Остановившись на склоне и дождавшись сигнала светофора или регламентированного сигнала,\nавтомобиль желательно сохранить стояночный тормоз на месте.\n60. При начале движения в гору стояночный тормоз необходимо отпускать синхронно с автомобилем\nпри трогании с места (отпусканием сцепления и нажатием педали акселератора).\n61. Опасно оставлять автомобиль с дизельным двигателем на стоянке на склоне с включенной\nпередачей,потому что может сам запустить двигатель\n62. Если вас ослепили солнечные лучи, снизьте скорость, продолжайте движение только в том случае,\nесли вы уверены, что будет в безопасности\n63. При движении по дороге расстояние до встречных транспортных средств выглядит обманчиво выглядит больше, чем есть на самом деле.\n64. Длительное и частое ускорение автомобилей на первой передаче увеличивает расход топлива.\n65. Расход топлива будет самым низким при движении на высшей передаче.\n66. Плавный разгон и плавное торможение обеспечивают минимальный расход топлива.\n67. На эффективность вождения влияет плавность хода автомобиля, включенная передача (скорость\nдвижения), дорога условия, состояние систем зажигания и питания, стиль вождения.\n68. При повороте водитель должен стараться как можно меньше двигаться задним ходом.\n69. При минусовой температуре машину мыли перед стоянкой под открытым небом\nсайт, обязательно просушить тормозные колодки (во время движения на малой скорости, часто нажимая\nна педаль тормоза)."}, {"title": "ВОЖДЕНИЕ В ТЕМНОТЕ", "content": "70. Дальний свет всегда рекомендуется при приближении к вершине холма в темноте.\nфонари переключиться на ближний\nЕхать на автомобиле со скоростью 90 км/ч в темное время суток вне населенных пунктов небезопасно,\nтак как тормозной путь больше длины освещенного участка дороги.\n72. Дорога будет лучше в темное время суток, во время сильного снегопада, дождя, града, тумана видно,\nкогда туман включен фары вместе с ближним светом.\n73. Чрезмерная нагрузка на заднюю ось легкового автомобиля приведет к плохой управляемости, на\nближний свет может ослепить встречных водителей.\n\nБочки\nКраткое содержание\nПеревозка жидких грузов по суше, что очень часто бывает опасным, т.е. химических или нефтепродуктов,\nна практике используются автоцистерны. Хотя этот метод популярен и широко используется в мире,\nоднако танкеры создают серьезные проблемы с безопасностью движения, что может привести к травмам,\nгибели людей, потере имущества или понесению экономических потерь. Также утечка жидкого груза во\nвремя аварии может привести к загрязнению окружающей среды. Поэтому необходимо уделять большое\nвнимание обеспечению безопасной перевозки наливных грузов в автоцистернах.\nЦелью данной работы является исследование особенностей протекания жидкости в автосистеме и\nреакцию конструкции на это явление. Рассмотрены конструкции танкеров - их виды и назначение. Это\nобъясняет, почему существующие цистерны имеют такую форму. Проанализированы литературные\nисточники, объясняющие влияние этих грузов, перевозимых цистернами, на динамику конструкции,\nприменяемые ограничения. В нем описываются особенности и использование FSI (взаимодействия\nжидкости и конструкции) для взаимодействия жидкости и конструкции при динамическом испытании\nконструкция-жидкость.\nРасчетное расположение центра масс тягача и автоцистерны при различных условиях загрузки груза.\nТеоретически рассчитанный тормозной путь системы составляет 16,2 м (50 км/ч)/53,09 м (90 км/ч), а\nвремя 2,3 с (50 км/ч) и 4,2 с (90 км/ч). Моделирование движения жидкости в резервуаре под действием\nускорения проводилось с различными конструкциями резервуаров. Проведены гидростатические и\n\n\nдинамические испытания жидкости в системе телос. Предел текучести дуплексной стали составляет -450\nМПа. Максимальное напряжение, полученное в результате исследований, составляет -433 МПа.\nПоскольку динамические испытания проводились при посадочном ускорении 1g, то в реальных условиях\nускорение тормозной цистерны в сборе с использованием АБС может достигать 0,6g. можно сказать, что\nконструкция достаточно прочная, но для дальнейшей оптимизации конструкции необходимы\nдополнительные исследования.\n\n1.4.1. Для жидких грузов\nКогда дело доходит до безопасной, надежной и экономичной перевозки грузов из одного места в другое,\nавтомобильный транспорт трудно превзойти. Настолько сложно, что автоперевозки по-прежнему\nявляются наиболее широко используемым видом транспорта в Европе. Использование железной дороги\nявляется популярным выбором для перевозки очень больших грузов на большие расстояния, но трудно\nпревзойти грузовик, когда речь идет о большинстве товаров, которые необходимо перевозить по стране.\nЭтот вид автомобильного транспорта занимает лидирующие позиции на европейском транспортном\nрынке. Прицепы для грузовых автомобилей идеально подходят для обслуживания «от двери до двери» и\nизвестны своей надежностью, гибкостью, скоростью, меньшей вероятностью повреждения и\nотносительно низкой стоимостью. Учитывая это, около 75% объема грузов (Ukm) в ЕС перевозится этим\nвидом транспорта. Другими благоприятными чертами автомобильного транспорта являются возможность\nперевозки небольших посылок на относительно короткие расстояния и надежная перевозка\nдорогостоящих товаров. Характер автомобильных перевозок, помимо степени развития местной\nинфраструктуры, зависит от расстояния, на которое товары перевозятся автомобильным транспортом, от\nвеса и объема отдельной партии грузов, а также от вида перевозимых товаров. На фургоне или пикапе\nможно ездить на короткие расстояния и с небольшими грузами. Для больших грузов больше подходит\nгрузовик, даже если загрузка неполная.\nАвтоцистерны, предназначенные для перевозки одного груза, имеют один отсек, а те, которые перевозят\nнесколько грузов, имеют внутренние перегородки в своих цистернах. Отличительными факторами\nприцепов-цистерн являются форма цистерны, тип груза, который перевозит прицеп, и размер. Другими\nотличительными факторами являются холодопроизводительность, устойчивость к давлению и\nкислотостойкость. Некоторые модели специально разработаны в соответствии с национальными\nправилами перевозки сжиженных грузов. Таким образом, структура трейлеров будет варьироваться от\nстраны к стране. Однако функциональность прицепов одинакова вне зависимости от производителя,\n\n\nОсновным преимуществом грузоперевозок является то, что грузовик может добраться из пункта А в\nпункт Б быстрее, чем любой другой тип транспортного средства. Это связано с тем, что грузовик может\nдвигаться по самому прямому маршруту, не требуя расписания. Грузовики прочны и надежны и могут\nлегко передвигаться по любым дорогам, независимо от погодных условий, в том числе от снега, что очень\nважно, учитывая, что климат в пункте А может совершенно отличаться от конечного пункта Б. Несмотря\nна расстояние, перевозка небольших грузов по Грузовик очень экономичный, опытные водители могут\nбыстро загрузить и разгрузить. GPS-отслеживание и отсеки с регулируемой температурой делают\nгрузовики универсальными и могут перевозить самые разные товары.\n\nРисунок 1.19 Движение жидкости в баке за счет ускорений [11]\n\n1. Стоянка грузовика;\n2. Происходит ускорение. Грузовик движется. Жидкость скапливается в конце бака;\n3. Ускорение увеличивается. Грузовик разгоняется. Жидкость скапливается в конце системы;\n4. Ускорение стабилизируется. Грузовик уверенно разгоняется. Жидкость равномерно оседает в конце\nбака; 5. Ускорение стабилизируется. Грузовик уверенно разгоняется. Жидкость равномерно оседает в\nконце бака:\n\n\n6.\n\nУскорение\n\nстановится\n\nравным\n\n0.\n\nГрузовик\n\nдвижется\n\nустойчиво.\n\nЖидкость\n\nначинает\n\nстабилизироваться, накапливается с переди;\n7. Ускорение равно 0. Тележка движется равномерно. Жидкость начинает стабилизироваться,\nскапливается спереди; 8. Ускорение равно 0. Тележка движется равномерно. Жидкость стабилизируется,\n9. Начинается торможение. Ускорение становится отрицательным;\n10. Полное торможение. Ускорение отрицательное. Жидкость скапливается впереди кисты;\n11. Полное торможение. Ускорение отрицательное. Жидкость полностью сконцентрирована в передней\nчасти кисты;\n12. Грузовик остановился. Ускорение равно 0. Жидкость стабилизируется до исходного состояния (рис.\n1).\nНиже показано движение жидкости в резервуаре без перегородок, когда резервуар подвергается\nкратковременному ускорению в осевом направлении:\nРисунок 2.6 Хранение жидкости в баке без перегородок\n\n\nСилы действующие на груз\nОчень важно закрепляя груз оценить какие физические силы могут действовать во время\nтранспортировки.\nУскорение – движение с\n\nТорможение – груз намерен На\n\nместа. Груз намерен склонятся\n\nдвигатся в сторону кабины склоняется в бок.\n\nназад.\n\nводителя.\n\n1.\n\nповороте\n\n–\n\nГруз\n\nВодитель на погрузке обязан закрепить груз так, чтобы силы действиющие на груз (рис. 1) при\n\nтранспортировке груза, не могли повлиять на завал груза. В схеме указано, какая сила влияет на груз при\nтранспортировке груза, которая измеряется Kn (килоньютоны), 1 Kn – 1 кг;\n\nКрепление груза\n\n2.\n\nКрепление груза в тентовом полуприцепе:\n\n2.1. Ремни. Они используются для крепления груза в тентовых полуприцепах. На ремнях есть этикетки,\nв которых написано: длина, вес который выдержит ремень, процент растяжение ремня. Водитель\nобязан надежно ремнями закрепить загруженный груз в тентовом полуприцепе. Чтобы не повредить\nуглы груза, всегда используйте пластмассовые уголки для крепления груза.\n\n\n2.2. Резиновые коврики. Они повышают силу трения, если пол полуприцепа чистый, на коэффициент\n0,6. Если контакт коврика с поверхностью покрытый льдом, измазан маслом – сила трения\nзначительно уменьшается. Их надо подложить так, чтобы через них передавался весь вес груза.\n\nКрепление груза в контейнере:\n2.3. На погрузке водитель должен следить,чтобы хорошо был закреплен груз отправителем груза;\n2.4. Если есть подозрения что груз закрепили не правильно, водитель обязан немедленно об этом\nсообщить менеджеру.\n3. Крепление груза в полуприцепе-рефрижераторе:\n3.1. С зади паллеты с грузом крепятся по две штанги на каждую паллету (150kg);\n\n\nЕсли в последнем ряду стоит одна паллета с грузом, ее надо ставить к борту, сзади закрепить одной\nштангой, а сбоку двумя штангами, паллету на предпоследнем ряду так же одной штангой; Совет: не\nоставлять одну паллету в конце полуприцепа.\n3.2. Для дополнительного крепления груза в двухэтажном полуприцепе надо использовать\nперекладины второго этажа, легко прижав груз сверху;\n3.3. При перевозке груза с температурным режимом, водитель должен проследит, чтобы не были\n\nзажаты вентиляционные рукавицы перекладинами второго этажа;\n\nСпецифические грузы:\n\n4.\n\nПеревозка грузов на паллетах.\n4.1. Используются стандартные (EURO) паллеты для перевозки груза (которые соответствуют\nстандартам ISO 445-1984). Основной изготовительный материал паллет – дерево, а стандартные\nразмеры – 800x1200x150 mm. Паллеты должны быть с соответствующей маркировкой которая\nгарантирует,что паллета после фумигации. Ниже видны образцы маркировки плохого качества:\n\n\n5.\n\nЕсли груз упакован не правильно и об этом знает отправитель груза, перевозчик не несет\n\nответственности за сделанный ущерб при транспортировке груза. По этому водитель обязан оценить\nхорошо ли упакован груз для его перевозки, а заметив недостатки – потребовать чтобы перепаковали или\nдополнительно укреплен, а если сотрудники склада отказываются это сделать, немедленно об этом\nсообщить своему менеджеру и дальше следовать указаниям менеджера;"}, {"title": "ВРЕМЯ ВОЖДЕНИЯ И ОТДЫХА ВОДИТЕЛЯ", "content": "•\n\nЕжедневный отдых\n«период\n\nрегулярного\n\nежедневного\n\nотдыха» означает\n\nпериод\n\nотдыха не\n\nменее\nчасов. Попеременно этот период регулярного ежедневного отдыха может быть использован за два\nпериода, первым из которых должен быть непрерывный период не менее трёх часов, а вторым –\nнепрерывный период продолжительностью не менее девяти часов.\n«период сокращенного ежедневного отдыха» означает период отдыха по крайней мере 9 час,\nно менее 11 часов;\n•\n\nЕженедельный отдых\n«период регулярного еженедельного отдыха» означает период отдыха длительностью по\nкрайней мере 45 часов.\n«период сокращенного еженедельного отдыха» означает период отдыха менее 45 час.,\nкоторый, в соответствии с условиями Статьи 8(6) может быть сокращен минимум до 24\nпоследовательных часов;\n\n\nПосле 1 рабочей недели – 24 ч отдыха, после 2-ой – 45 ч., после 3-ей недели – 24 ч., после 4-ой\nнедели – 45 ч. И т.д\n•\n\nПериоды вождения транспортного средства\n\nМаксимальное кол-во рабочих дней за неделю: 6 дней, после чего должхен быть выходной 24 часов или\n45 часов; Пример: Если рабочая неделя начнается в субботу в 15:40 значит на ежинедельный отдых\nостанавливаемся в следуюшую пятницу в 15:40 часов; За эти 6 дней рабочих периодов может быть 6 и 7\nи 8, это не является нарушением графика вождения и отдыха водителя.\nЕжедневное время вождения не должно превышать 9 час. Однако ежедневное время вождения может\nбыть продлено не более, чем до 10 часов не более двух раз в Календарную неделю.\nЕженедельное время вождения не должно превышать 56 час. Общее накопленное время за две любые\nпоследующие недели вождения не должно превышать 90 часов.\nЕсли случтся так, что Вы превышаете время вождения или обшее время работы, Не забудьте сделать\nраспечатку На обратной стороне написать причину переработки. Причина должна быть написанa вам\nпонятным языком.\n•\n\nПауза\nПосле периода вождения в четыре с половиной часа водитель должен сделать непрерывный\nперерыв не менее 45 минут, если не начат период отдыха.\nЭтот перерыв может быть заменен перерывом продолжительностью не менее 15 мин. С\nпоследующим перерывом не менее 30 мин., каждый из этих периодов должен быть распределен в\nтечение периода таким образом, чтобы соблюсти положения первого параграфа.\n\n•\n\nДекларация об отпуске\n\nВернувшись после отпуска / отдыха дома, водитель обязан взять отпускную декларацию у планерах, о\nтом, что не работали с того дня как начался отпуск до того дня как опять начинаете работать.\nВодитель, это Ваша обязанось убедиться в том, что даты и личние данныe в декларации об отпуске были\nверны. Вы несете полную ответсвенность за его точность."}, {"title": "ПОРЯДОК ИСПОЛЬЗОВАНИЯ ДОРОЖНЫХ АППАРАТ", "content": "ПРАВИЛА ИСПОЛЬЗОВАНИЯ АППАРАТОВ ДОРОЖНЫХ ПЛАТЕЖЕЙ\nОтветсвеный Дарюс +370 656 90811\nПлатежи за платные дороги в Европейских странах – Польше, Австрии, Германии, Чехии,\nСловакии, Франции, Испании, Португалии, Италии, Норвегии, Дании- выполняются с помощью\nаппаратов дорожных платежей.\nЛитва - Суточные виньетки покупаются на заправке CIRCLE K (При выезде из базы), Передвижение По городу\nбесплатно, открывать дороги надо тогда когда выезжаете на магистральные дороги. Возвращаясь из Польши в\nЛитву дороги открывать надо С помощью сообщения (SMS), можно покупать Литовские (LT), Латышские (LV),\nЭстонские (EE) винетки на день (D). Сообщение формируется следующим образом-код страны, срок действия\nвинетки и регистрационный номер автомобиля. Текст сообщения должен быть написан латинскими буквами!\nНапример:\nВинетка на один день в Литве: LTD AAA111 (номер тягача на которым Bы работаете а не ааа111)\nВинетка на один день в Латвии: LVD AAA111 (номер тягача на которым Bы работаете а не ааа111)\nВинетка на один день в Эстонии: EED AAA111 (номер тягача на которым Bы работаете а не ааа111)\nСообщение (SMS) отправлять на номер : +37066000120\nЗаглавные буквы или маленькие неважно. Можно писать как LTD AAA 111, так и LTD AAA111 так и ltd aaa111.\nУспешно заказав услугу приходит сообщение (SMS).\nЕсли винетка по какой либо причине не была куплена, так же приходит сообщение об ошибке Тогда Виньетку\nнадо покупать на границе в MEDICINOS BANKAS.\n\nВ Польше – DKV\nЕсли аппарат не сработал: Вам надо Закачать приложение с Play Маркета\ne-TOLL PL. И работать по приложению\n\nВ Чехии – Myto\nЕсли аппарат не сработал (негарит значёк € в\nзелёном) его поменять на первой заправки АЗС с\nкарточкой AS24 Eurotrafic\nОдин звуковой сигнал\n\n\nГермания – Toll Collect\n\nАвстрия – GoBox\n\nЕсли аппарат не сработал, нужно заехать\n\nЕсли аппарат не сработал его поменять на первой\n\nна первую АЗС с карточкой Tll Collect\n\nзаправки АЗС с карточкой AS24 Eurotrafic\n\nкупить дороги до сервиса ремонта апарата.\n\nОдин звуковой сигнал\n\n\nВо Франции, Испании,\n\nИталии – Telepass\n\nПортугалии – Passango Если аппарат не\n\nЕсли аппарат не сработал за дороги заплатить карточкой\n\nсработал DKV\n\nViaCard\n\nв Португалии ехать где нету шлагбаума.\n\nВ Дании за мосты КОКДА\n\nБельгия (только аппарат)\n\nНЕТУ РЕФ НОМЕРА платoм DKV\n\nТакже у некоторых машын есть новый апарат DKV. Он работает- Германия,Белгия,Франция,\nИспания, Португалия, Италии, Польша, Швейцария, Венгрия\n\n\nНастройки аппарата DKVA в странах:\n\nОткуда взять аппарат?\nКак правило, аппараты для дорожных платежей находятся в кабине тягача, на котором Вы поедите в\nрейс.\nАппараты Telepass,если их нет в кабине тягача, выдает главный учет техник.\nЧто касается других аппаратов, которых нет в кабине тягача или Вам их не выдали, выдают на В пунктах\nпри въезде в страну.\nДля получения аппарата оплат дорог вам надо предоставить три документа: Техпаспорт\nтранспортного средства, лицензию о перевозе груза, документ emission класса.\n\nКак узнать правильно ли работает аппарат для дорожных платежей?\nАппараты, которые встроены в тягаче – работают автоматически. Как правило,\nдополнительно их регулировать не надо. Обязательно убедиться что настройки настроены правильно\nв каждой стране настройки разные.\nОднако! При въезде в Австрию, не забудьте заехать на бензоколонку на австрийской границе, чтобы\nВаш аппарат GO BOX оператором бензоколонки был бы настроен и адаптирован к ряду платежей в\nАвстрии.\nОбратите внимание, что во время езды по платным дорогам\n\nАвстрии, Польше, Чехии и Словакии,\n\nнеобходимо внимательно следить за работой аппарата. Проезжая через платежные пункты, должна\nзагореться зеленая лампочка и слышаться звуковой сигнал, поэтому выключите радио, постарайтесь,\nчтобы Вас не беспокоили посторонние звуки.\n\n\nУ хорошо функционирующего аппарата зеленый свет или звуковой сигнал, должен сработать один раз.\nВ вышеупомянутых странах нет никаких барьеров (шлагбаумов) на дорогах, которые не открываются,\nесли вдруг аппарат не сработал, поэтому надо обязательно следить за звуковым и световым сигналом у\nаппарата. В результате чего, при въезде на платную дорогу и, не заплатив (не сработал аппарат), вы\nполучите штраф.\nКакие сигналы показывает аппарат, если он не сработал\nЕсли не сработал аппарат для дорожных платежей ДАЛЬШЕ ЕХАТЬ ВЫ НЕ МОЖЕТЕ\nВ Германии, если во время проезда через платежные пункты не сработал аппарат Toll Collect, то на экране\nпоявляются следующие знаки:\n-Зеленая лампочка проморгала 2 или более раз;\n-Послышался звуковой сигнал ошибки;\n-Обычный звуковой сигнал сработал 2 и более раз подряд;\n-Лампочка не замигала и звуковой сигнал не сработал;\n-На экране отобразилось сообщение об ошибке: „OBU DEFECTIVE SERVICE“, „GSM"}, {"title": "FAULT SERVICE“, „DSRCS DEFECTIVE SERVICE“, „CHECK CREDIT LINE“, „ UNIT BLOCKED“,", "content": "В Чехии, если во время проезда через платежные пункты не сработал аппарат Myto,\n-жёлтый или краснаый значёк €\nВ Словакии, если во время проезда через платежные пункты не сработал аппарат, то на экране\nпоявляются следующие знаки:\n-\n\nВсе время горит красный знак предупреждения (кнопка, на которой отображен треугольник и\nвосклицательный знак);\n\n-Не горит кнопка с осью чисел;\n-Повторяющейся звуковой сигнал;\n-Мигающий красный знак предупреждения (кнопка, на которой отображен треугольник и\nвосклицательный знак);\n-Отсутствие звукового сигнала;\n-Периодично мигающий\n\nзнак предупреждения (кнопка, на которой отображен треугольник и\n\nвосклицательный знак) со звуковым сигналом (повторяющимся или одноразовым).\nВышеупомянутых случаях, указывающих, что дорожный аппарат не работает, звоните\nначальнику. Транспорт учета тел. +37065690811. Вы будите, направлены на ближайшую бензоколонку,\nчтобы ваш аппарат заменили и проверили, а также заплатить дорожный налог.\n1. Как установить число осей?\nНеобходимое число осей восстанавливается перед въездом на платную дорогу.\n\n\nGoBox- необходимое число осей выбирается коротким нажатием кнопок аппарата. Выбрав\nправильное число осей (загорится на дорожном аппарате число 4), кнопку аппарата подержав более 2\nсекунд, число осей зафиксируются.\nЧтобы проверить правильно ли установлено число осей – надо коротко нажать на кнопку\nаппарата и должно загореться установленное число осей.\nToll Collect- число осей обычно установлено. На экране должно показывать число осей не\nменьше чем 5 и гореть более 18т.\nSkytoll – нажмите и удержите до 5 секунд кнопку со знаком предупреждения (кнопка, на\nкоторой отображен треугольник и восклицательный знак). Нажатие кнопки повторите до того момента\nпока загорится нужное вам число осей т.е. пока загорится 4.\nЕсли у Вас возникнут какие либо вопросы по эксплуатации аппаратов, немедленно\nобращайтесь начальнику Транспорт учета тел. +37065690811.\nЗа правильную работу и настройки дорожных аппаратов несёт ответственность\nводитель\n\nОплата дорог в Белоруссии и России осуществляется с дорожными аппаратами.\nАппарат оплаты белорусских дорог. При въезде\n\nв Белоруссию на аппарате установите\n\nколичество осей 4+ и посмотрите,чтобы светился зеленым светом знак Х. Если аппарат не сработал,\nобязательно заезжаете на первую заправку и с карточкой Е100 поменяете на другой аппарат. Об этом\nобязательно нужно сообщить менеджеру ответственному за топливные карточки +37065690811.\n\nАппарат оплаты Беларусских дорог\nАпарат оплаты российских дорог. При вьезде на территорию России посмотрите, чтобы зеленым\nсветом горели два нижних знака: связь и спутник. Если не работает российский аппарат для оплаты дорог,\nнеобходимо звонить на <Платон> с телефона с российской СИМ карточкой по номеру 8 800 5500202.\nНадо будет сообщить ПИН код Дагриса – 6208, затем им рассказать по какому маршруту вы планируете\nехать. Когда по телефону Вы закажите российские дороги, об этом обязательно нужно сообщить\nменеджеру ответственному за топливные карточки +37065690811.\n\n\n25. Пульт управления THERMO KING\n\n1.\n\nПостоянный режим (Continuous mode).\n\n2.\n\nТемпература в камере (1 зона).\n\n3.\n\nУстановлена температура (1 зона).\n\n4.\n\nОхлаждение (1 zona).\n\n5.\n\n1 зона мягкая кнопка\n\n6.\n\n2 зона мягкая кнопка.\n\n7.\n\nМягкая кнопка меню.\n\n8.\n\nЭкран 2-ой зоны.\n\nКнопки управления\nКнопка-включить агрегат.\nВыключать агрегат.\nКнопка размораживания.\nКнопка автоматного или постоянного режима. ( CYCLE-SENTRY).\n4 мягкие кнопки для включения выбранной программы.\n\nИНСТРУКЦИЯ ПО БЕЗОПАСНОСТИ ТРУДА И ЗДОРОВЯ ДЛЯ ВОДИТЕЛЕЙ\nA.Griciaus autotransporto įmonė\n(įmonės pavadinimas)\n4\n1\n8\n2\n( įmonės kodas)"}, {"title": "PATVIRTINTA", "content": "A.Griciaus autotransporto įmonės\nSavininko Antano Griciaus\n2013 m. balandžio mėn. 03 d. įsakymu Nr. B-10\n\nИНСТРУКЦИЯ № 4\nПО БЕЗОПАСНОСТИ ТРУДА И ЗДОРОВЯ ДЛЯ ВОДИТЕЛЕЙ МЕЖДУНАРОДНЫХ РЕЙСОВ (перевод с\nлитовского языка)"}, {"title": "ОБЩАЯ ЧАСТЬ", "content": "1.1. Водителю, перевозящему грузы по международным маршрутам (далее – водитель), нарушившему\nтребования этой инструкции, применяется установленные законом Литовской Республики санкции,\nморальная, административная и уголовная ответственность, в зависимости от характера и\nпоследствий нарушения.\n1.2. Водитель, перевозящий грузы, должен иметь не меньше трёхлетний стаж вождения автомобиля (из\nних – один год вождения по международным перевозкам) для определённых дорожных транспортных\nсредств перевозки грузов и пассажиров, водитель должен иметь документ, доказывающий\nприобретения начальной профессиональной квалификации.\n1.3. Водитель должен быть проинструктирован (оформлен в журнале регистрации инструкций) согласно:\n1.3.1. вводной инструкции по охране труда и здоровья;\n1.3.2. инструкции по оказанию первой медицинской помощи;\n1.3.3. инструкции по охране здоровья и безопасности труда (в зависимости от места работы);\n1.3.4. инструкция по охране труда и здоровья для не электротехнического персонала;\n1.3.5. общая инструкция о мерах пожарной безопасности;\n1.3.6 план действия работников при пожаре;\n1.3.7. инструкция по безопасности труда и здоровья при погрузке, разгрузке и транспортировке грузов;\n1.4. Водитель должен быть проинструктирован периодически – не реже одного раза в 12 месяцев.\n1.5. Водитель дополнительно должен быть проинструктирован:\n\n\n1.5.1. если рабочий инструмент, материал, техника заменена или модернизирована, или поменялись\nрабочие условия, факторы риска рабочей среды, создающие угрозу безопасности труда и здоровья\nрабочего;\n1.5.2. если утверждены новые или введены поправки в нормативные документы предприятия (по охране\nтруда и здоровья рабочих предприятия, правила по безопасности выполнения работы и др.)\n1.5.3. водителю нарушив требования охраны труда и здоровья, из-за которого произошёл или мог\nпроизойти несчастный случай, авария, взрыв, пожар;\n1.5.4. по просьбе инспектора труда, или когда определено, что у рабочего недостаточно знаний для\nвыполнения порученной работы;\n1.5.5. водителям отсутствующих на работе более чем 60 календарных дней.\n1.6. Водитель обязан:\n1.6.1. знать, и придерживается Правилам дорожного движения, а также требовать, чтобы их\nпридерживались лица находящиеся в автомобиле;\n1.6.2. самовольно не выключать, не менять и не исправлять неисправности оборудования и механизмов,\nберечь рабочий инструмент, оборудование, соблюдать требования установленные по безопасности труда\nи здоровья, их надлежащим образом использовать, и о неисправностях сообщать представителю\nработников, техническому отделу, руководителю предприятия;\n1.6.3 должным образом использовать коллективные и индивидуальные средства защиты;\n1.6.4 инструменты строго использовать по его документальному (паспорту) назначению, или по\nтребованиям указанным в этой инструкции;\n1.6.5. немедленно сообщить руководителю предприятия, задания давшему менеджеру, техническому\nотделу, представителю работников, инженеру по технике безопасности, комитету по охране труда и\nздоровья, о положении на рабочем месте, в помещении, в котором, по его убеждению, могут быть угрозы\nбезопасности здоровья работников, а также, о нарушениях требований охраны здоровья работников и\nбезопасности труда, которые не может удалить сам или не обязан;\n1.6.6. сотрудничать с представителями работников, с инженером по технике безопасности,\nруководителям предприятия, с руководителем технического отдела в реализации требований и средств\nпо охране здоровья работников и безопасности труда;\n1.6.7. насколько это возможно и позволяют знания принять меры при остром отравлении, при травмах,\nпри удалении причины аварии, и об этом немедленно сообщить руководителю технического отдела и\nруководителю предприятия;\n1.6.8. проходить проверку здоровья в соответствие установленному порядку. Проходить проверку\nздоровья по графику составленным работодателем и центром здравоохранения. Водители ознакомлены с\nданным графиком под расписку.\n\n\n1.6.9. сообщать работодателю или его представителю, о полученных травмах во время работы или других\nзаболеваниях, связанных с работой;\n1.6.10. придерживается правилам внутреннего распорядка компании, на работе не употреблять\nалкогольных напитков и наркотических средств, курить в специально отведенных местах;\n1.6.11. придерживаться правил личной гигиены, следите за тем, чтобы одежда и обувь были чистыми,\nруки мыть только предназначенным для этого средством;\n1.7. Водитель имеет право:\n1.7.1. требовать, чтобы работодатель создал безопасные условия работы, установил коллективные\nсредства защиты, обеспечил средствами индивидуальной защиты;\n1.7.2. узнать у руководителя технического отдела, руководителя предприятия, о вредных и (или) опасных\nдля здоровья производственных факторов рабочей среды;\n1.7.3. ознакомится с результатами медицинского контроля. Если с ними не согласен, проверится\nдополнительно;\n1.7.4. советоваться об улучшении рабочих условий с руководителем предприятия, руководителем\nтехнического отдела;\n1.7.5. отказаться от выполнения работ из-за возникновения опасности для жизни и здоровья;\n1.7.6. требовать по установленному законом порядку возмещения компенсации за нанесённый вред\nздоровью из-за опасных рабочих условий;\n1.7.7. возникнув вопросам о безопасности и здоровье, обратиться к представителю работников,\nруководителю технического отдела, руководителю предприятия, по охране труда и здоровья комитету,\nГосударственную инспекцию труда, или в другую инстанцию;\n1.8. водитель обязан знать и соблюдать правила пожарной безопасности. Знать где в предприятии\nнаходятся первичные средства пожаротушения, уметь ими пользоваться, избегать пожара – вызывающих\nдействий;\n1.9. водитель обнаружив пожар должен:\n1.9.1. незамедлительно сообщить в пожарную службу, вызвать на место пожара дежурного механика,\nинженера-механика (если пожар возник в рабочее время), сообщить руководителю технического отдела,\nруководителю предприятия, тушить очаг возгорания предназначеными средствами для тушения пожаров;\n1.9.2. при нахождении в пути, обратится помощи по телефону 911 или 112, тушить очаг пожара\nимеющимся средствами пожаротушения.\n1.10. Режим вождения и отдыха установлен регламентом (ЕB) №561/2006 или AETR и определяется\nследующем:\n1.10.1. Перерывы и отдых. После непрерывного периода вождения в 4,5 часа водитель должен сделать\nперерыв не менее 45 минут.\n\n\n1.10.2. Распределённые перерывы.\n\nРазделить перерыв, т.е., Время руля можно разбить на две\n\nчасти отдыха: первая из них должна быть не меньше 15 минут вторая часть должна быть не меньше 30\nминут.\n1.10.3. Ежедневный отдых. Ежедневное время вождения водителя обычно не должно превышать 9 часов,\nт.е. два периода вождения продолжительности по 4,5 часа каждый с перерывом между ними 45 мин.\nОднако может быть увеличено максимум до 10 часов и не более 2-х раз в Календарную неделю. Это\nзначит что Придётся делать ещё одну 45 минутную паузу. Во время отдыха водитель не должен\nзаниматься другой трудовой деятельностью. Ежедневный отдых это отдых который длится не меньше\n11 часов, но ежедневный отдых можно сократить до 9 часового отдыха не более 3 разa в рабочую неделю.\nПосле каждого 9 часового или 11 часового отдыха начинается новая-рабочая смена (или новый рабочий\nдень).\n1.10.4. Лимит времени недельного вождения. Установленный фиксированный лимит времени\nнедельного вождения – 56 часов. Максимальное время вождения за две последовательные недели 90\nчасов. Водитель отработавший за 2 недели 70 часов обязан известить об этом своего менеджера.\n1.10.5. Недельный отдых. Регулярный недельный период отдыха – не менее 45 часов. Недельный отдых\nможет быть сокращен до 24 часов. Hеделный отдых преревать нелзя. После каждого 45 часового или\nсокращённого 24-часового отдыха начинается новая Рабочая неделя.\n1.10.6. Переправление паромом. Переправляясь с паромом Водитель имеет право прервать свой суточный\nотдых 2 раза Но не более 1 часа. Еженедельный отдых прерывать запрещено."}, {"title": "РИСКИ ПРОФЕССИОНАЛЬНЫХ ФАКТОРОВ, СРЕДСТВА БЕЗОПАСНОСТИ", "content": "ОТ ИХ ВОЗДЕЙСТВИЯ\n2.1. Основные факторы профессиональных рисков водителя на рабочем месте это:\n\n2.1.1. выхлопные газы;\n2.1.2. психологические травмы;\n2.1.3. химические вещества;\n2.1.4. перевозки грузов;\n2.1.5. падающие предметы;\n2.1.6. транспорт передвижения;\n2.1.7. насилие;\n2.1.8. помехи;\n2.1.9. физическая усталость;\n2.1.10. установка узлов и блок движущихся частей\n2.1.11. в зоне погрузки/разгрузки поднятый груз;\n2.1.12. электрическое напряжение превышающее 50 V;\n2.1.13. легковоспламеняющиеся жидкости;\n2.1.14. электролиты;\n2.1.15. антифризы.\n2.2. Вредные факторы и их допустимые нормы:\n2.2.1. выхлопные газы двигателя CO = 20 mg/m3;\n2.2.2. антифриз 1000 mg/m3;\n2.3. Краткая характеристика опасных факторов:\n2.3.1. установка узлов и блок движущихся частей могут затянуть рукав или руку и ее ранить;\n2.3.2. в зоне погрузки/разгрузки поднятый груз может упасть и причинить тяжелые или смертельные\nтравмы;\n2.3.3. неосторожное использование устройств, через которое проходит электрическое напряжение, можно\nполучить смертельную травму;\n2.3.4. ЛВЖ и его пары в жидком виде через кожу, а в газообразном виде через дыхательные пути\nпопадают в организм и отравляют его;\n2.3.5. электролиты аккумулятора опасны тем, что попав брызгам на незащищенную часть тела может\nобжечь его, глаза;\n2.4. Краткая характеристика вредных факторов:\n2.4.1. этилированный бензин, нитро красители и их разбавители в жидком виде через кожу, а в\nгазообразном виде через дыхательные пути попадают в организм и отравляют его;\n\n\n2.4.2. выхлопные газы автомобиля содержат окись углерода С, которая очень опасна для человека,\nдлительное воздействие окиси углерода на организм человека может привести к смертельному исходу;\n2.4.3. всегда надо следить, чтобы не было утечки антифриза, т.к. в жидком виде через кожу, а в\n\nгазообразном виде через дыхательные пути он попадает в организм и отравляет его;\n2.5. Обязательные меры защиты:\n2.5.1. индивидуальные меры защиты;\n2.5.2. Спецодежда, рабочий костюм из хлопка;\n2.5.3. для защиты от механических повреждений (порезы, проколы) рабочие перчатки;\n2.5.4. сигнальная жилетка;\n2.5.5. куртка или теплый костюм;\n2.6. Средства защиты выдаются работодателем (доверенным лицом), под роспись.\n2.7. Признаки негодности средств защиты:\n2.7.1. порванная спецодежда из хлопка, или промокший костюм в смазочных материалах или другой\nгрязи;\n2.7.2. измазанные или грязные перчатки;\n2.7.3. рваные перчатки, которые полностью не прикрывают кисть руки;\n2.7.4. использовать средства защиты запрещено обнаружив хоть один признак из перечисленных выше;\n2.8. Негодными средствами индивидуальной защиты пользоваться запрещается, они должны быть\nпоменяны на подходящие;\n2.9. Индивидуальные меры защиты считаются собственностью работодателя, поэтому водитель должен\nвсе вернуть уходя с работы, или поменяв место работы в том же предприятии где эти средства не\nпредусмотрены на данном рабочем месте.\n2.10. Водитель обязан:\n2.10.1. работать с индивидуальными средствами защиты;\n2.10.2. бережно присматривать за индивидуальными средствами защиты и использовать по назначению,\nвовремя сообщить прямому начальнику о их износе, загрязнении, о непригодности в использовании, и о\nокончании срока их использования;\n2.10.3. если средства индивидуальной защиты по вине работника пропали или были испорчены, по\nустановленному законом порядку, работник должен будет возместить ущерб.\n2.11. руководитель предприятия или его доверенное лицо должны обеспечить рабочих всесторонней\nинформацией, о безопасности и гигиены труда организации предприятия, о находящемся или возможном\nриске при разгрузке/погрузке груза ручную, подготовить средства для удаления или избежание этих\nрисков.\n\n\n2.12. общий уровень шума на рабочем месте водителя не должен превышать 85 Db (A), загрязнение\nвоздуха вредными парами, газами и т.п. – не должны превышать установленные гигиенические\nнормативы.\n2.13. индивидуальные средства защиты выдаются с учетом вредных факторов в рабочей среде;"}, {"title": "ДЕЙСТВИЯ РАБОТНИКА ПЕРЕД НАЧАЛОМ РАБОТЫ", "content": "3.1. Собираясь в рейс водитель собой должен иметь:\n3.1.1. документы подтверждающие его личность (паспорт, рабочее удостоверение и т.д.);\n3.1.2. государственный талон технического осмотра транспортного средства;\n3.1.3 карта лицензии, если такая нужна;\n3.1.4. паспорт с визами тех стран которые будет пересекать водитель при перевозке груза (если виза\nнужна);\n3.1.5. водительское удостоверение подтверждающее право управления автотранспортным средством\nсоответствующей категории;\n3.1.6. с учреждения подготовки водителя, выданное свидетельство предоставляющее право на перевозку\nгрузов по международным маршрутам, при перевозке опасных грузов – этого учреждения выданное\nсвидетельство, предоставляющее право на перевозку таких грузов;\n3.1.7. фиксировать период времени труда и отдыха, по примеру личной книги карты или Тахо граммы,\nесли автотранспортное средство по соблюдённым требованиям оснащено записывающим устройством\nТахо графом;\n3.1.8. свидетельство о допущении автотранспортного средства к международной перевозке грузов;\n3.1.9. документы, предоставляющие право пользоваться автотранспортным средством;\n3.1.10. если в межгосударственных соглашений подругому не решено, должен иметь разрешения\nвъезжать в другие территории государств;\n3.1.11. разрешений на перевозку негабаритных и опасных грузов (если такие будут перевозится);\n3.1.12. товарно-транспортная накладная (накладная CMR) в соответствии с требованиями Конвенции\n(1956 г. Мая 19 Женева) о договоре международной дорожной перевозки грузов;\n3.1.13. водитель перевозящий груз за свой счет должен иметь документы, свидетельствующие о\nпринадлежности груза,\n3.1.14. страховые документы;\n3.1.15. МДП книжка, когда груз перевозится опираясь на конвенцию МДП «Таможенная конвенция о\nмеждународной перевозке грузов с применением книжки МДП. Женева 14 ноября 1975»\n3.2. водитель должен проверить техническое состояние автомобиля:\n\n\n3.2.1. осмотреть автомобиль снаружи и площадку под автомобилем и убедиться, нет ли повреждений\nкузова, следов подтеканий масла, топлива, охлаждающей, тормозной и амортизаторной жидкостей, и при\nобнаружении устранить или обратится к технической службе;\n3.2.2. тщательно протереть номерные знаки, стекла автомобиля, приборы освещения и сигнализации;\n3.2.3. Проверить:\n\n3.2.3.1. исправность замков дверей, капота, багажника;\n3.2.3.2. исправность приборов освещения и сигнализации;\n3.2.3.3. проверить наличие (при необходимости дозаправить до нормального уровня):\nмасла в картере двигателя, (обратив внимание на качество масла); охлаждающей жидкости в радиаторе;\nтормозной жидкости в питательных бачках гидравлических приводов тормозов и выключения сцепления;\nэлектролита в аккумуляторной батарее; топлива в баке;\n3.2.3.4. соответствует ли автомобильной инструкции по использованию величина свободного хода\nпедалей сцепления, рабочего тормоза;\n3.2.3.5. работает ли стояночный тормоз (ручной тормоз, ручник);\n3.2.3.6. люфт рулевого колеса, надежность крепления тяг рулевого управления;\n3.2.3.7. давление воздуха в шинах;\n3.2.3.8. крепление колес;\n3.2.3.9. исправность водительских инструментов и принадлежностей;\n3.2.3.10. проверить есть ли аптечка, огнетушитель с действительной проверки, буксирный трос, ремни\nбезопасности, аварийный знак и светоотражающая жилетке;\n3.2.3.11. обогрев кабины;\n3.2.3.12. как работают контрольные измерительные приборы;\n3.3. ознакомится с заданием, маршрутом, особенностями перевоза груза и режимом труда и отдыха."}, {"title": "ДЕЙСТВИЯ РАБОТНИКА ВО ВРЕМЯ РАБОТЫ", "content": "4.1. В рабочее время водитель обязан:\n\n4.1.1. постоянно проверять исправность контрольно-измерительных приборов и работу механизма\nавтомобиля;\n4.1.2. водитель должен соблюдать такую дистанцию от движущегося впереди транспортного средства,\nкоторая позволила бы принимая во внимание природные условия, состояния дороги и скорость\nпередвижения, избежать столкновения, а также необходимый боковой интервал, обеспечивающий\nбезопасность движения.\n4.1.3. незамедлительно остановить транспортное средство, если оно сломалось, и возникла угроза\nпрохожим или самому водителю. Остановка и стоянка транспортных средств разрешаются на правой\nстороне дороги на обочине (как можно правее), а при ее отсутствии – на проезжей части у ее края.\n4.2. Стартер автомобиля служит для запуска двигателя. Запрещено заводить двигатель автомобиля если в\n\nэто время он на буксире.\n4.3. запрещается отдыхать или спать в кабине автомобиля с работающим двигателем;\n4.4. Водитель должен уметь пользоваться приборами контроля рабочего и времени отдыха если такие\nимеются).\n4.5. Перевоз грузов:\n4.5.1. погрузку (выгрузку) груза осуществляют отправитель (получатель) либо специализированный\nперсонал организации при непосредственном участие водителя если с отправителем (получателем) не\nдоговорено иначе;\n4.5.2. водитель обязан проверить погрузку и закрепление груза в автотранспортном средстве в\nсоответствии с требованиями безопасности движения и эксплуатации автотранспортного средства;\n4.5.3. груз необходимо размещать равномерно по всему полуприцепу;\n4.5.4. при проведении погрузки и разгрузки вблизи здания расстояние между зданием и транспортным\nсредством с грузом должно быть не менее 1 м;\n4.5.5. при погрузке (разгрузке) грузов с эстакады, платформы, рампы, высота которых равна высоте пола\nкузова, автомобиль может подъехать вплотную к ним;\n4.5.6. погрузочно-разгрузочные работы производятся при выключенном двигателе транспортного\nсредства, так же должен быть заторможен ручным тормозом, с включением даже при незначительном\nуклоне первой передачи.\n4.5.7. если погрузочно-разгрузочные работы производятся механическим способом, водитель должен\nвыйти из кабины и находиться вне зоны возможного падения груза;\n4.5.8. Соблюдать меры безопасности посадке/высадке б/из кабины автомобиля, полуприцепа или другого\nтранспортного средства. Запрещается выпрыгивать из кабины автомобиля, с рамы тягача, из полуприцепа\n– для этой цели пользоваться трапами и лестницами.\n\n\n4.6. Технический осмотр автомобиля:\n4.6.1. перед проверкой автомобиль надо вымыть;\n4.6.2. заезжая или выезжая с эстакады или с ямы осмотра, рядом не должно быть людей и других вещей\nкоторые мешали бы автомобилю. Этими работами руководит инженер-механик;\n4.6.3. заехав на эстакаду или на яму для осмотра, нужно затянуть ручник и под колеса поставить\nинвентарные опоры. В кабине на руле оставить табличку с надписью «Работают люди – двигатель не\nзапускать».\n4.6.4. для поднятия автомобиля подъемник устанавливать следует на максимально ровной и твердой\nповерхности;\n4.6.5. под поднятый автомобиль ставятся опоры, которые были испробованы и которые соответствуют\nвесу автомобиля;\n4.6.6. перемонтировка шин автомобиля (после того как с них спустили воздух) производится в мастерской\nна специальном стенде;\n4.6.7. смонтированные шина надуваются на специальном стенде или используя другие меры\nбезопасности, чтобы колесо не выскочило из фиксирующего шина кольца.\n4.7. Во время ремонта автомобиля запрещается:\n\n4.7.1. запускать двигатель, когда регулируется источник питания и система зажигания автомобиля;\n4.7.2. запрещено использование переносных ламп с напряжением свыше 50 В;\n4.7.3. категорически запрещается проверять работоспособность автомобильных аккумуляторов коротким\nзамыканием;\n4.7.4. запрещено пользоваться инструментом, приспособлениями, оборудованием, обращению с\nкоторыми не обучен;\n4.8. если в пути автомобиль сломался, то на расстоянии 25-30 м позади автомобиля надо поставить знак\nаварийной остановки. Если нет опасности находящимся внутри людям или перевозящему грузу, водитель\nможет сам устранить незначительные неисправности автомобиля. Нельзя работать с наклонной стороны\nавтомобиля, когда он поднят подъемным устройством;\n4.9. Влезать под автомобиль и вылезать из-под него только со стороны, противоположной проезду. При\nработе под автомобилем следует размещаться между колесами вдоль машины. Лежа под автомобилем\nиспользовать лежаки, коврики или решетчатые тележки.\n4.10. Водителю запрещается:\n4.10.1. управлять транспортным средством в состоянии опьянения (алкогольного, наркотического или\nиного), в болезненном или утомленном состоянии, под воздействием лекарственных препаратов,\nухудшающих реакцию;\n\n\n4.10.2. передавать управление транспортным средством лицам не имеющим при себе водительского\nудостоверения на право управления транспортным средством данной категории, а также если его\nфамилия не внесена в путевой лист;\n4.10.3. сбиваться с маршрута указанного в путевом листе;\n4.10.4. перевозить жидкий или мелкий груз в таре с дефектами;\n4.10.5. трогаться с места если на подножке автомобиля находится человек;\n4.12.6. запрещается курить рядом с устройствами и топливным баком автомобиля;\n4.10.7. прогревать кабину автомобиля открытым пламенем;\n4.10.8. подогревать двигатель открытым пламенем или пользоваться открытым огнем при определении\nуровня электролитов или ремонтируя аккумулятор;\n4.10.9. держать внутри автомобиля и возить бензин, керосин и другие легковоспламеняющиеся вещества\nв кабине автомобиля;\n4.10.10. пользоваться автомобилем если на двигателе или картере есть отложения грязи и масла;\n4.10.11. откручивать крышку радиатора без рабочих перчаток если не остыла охлаждающая жидкость и\n\nстоя на ветру;\n4.10.12. вылизать из кабины автомобиля, не убедившись в отсутствии приближающихся транспортных\nсредств."}, {"title": "ДЕЙСТВИЯ РАБОТНИКА В АВАРИЙНЫХ (ЧЕРЕЗВЫЧАЙНЫХ) СИТУАЦИЯХ", "content": "5.1. При дорожно-транспортном происшествии, водитель обязан:\n\n5.1.1. немедленно остановить (не трогать с места) транспортное средство, включить аварийную световую\nсигнализацию и выставить знак аварийной остановки;\n5.1.2. не перемещать предметы, имеющие отношение к происшествию;\n5.1.3. в случае необходимости вызвать «Скорую медицинскую помощь», а в экстренных случаях\nотправить пострадавших на попутном, а если это невозможно, доставить на своем транспортном средстве\nв ближайшее лечебное учреждение после чего – возвратиться к месту происшествия;\n5.1.4. сообщить о случившемся по телефону 112 в полицию, и дождаться их прибытия;\n5.1.5. при затруднении проезда других транспортных средств, составить схему расположения\nтранспортных средств в присутствии свидетелей и освободить проезжую часть;\n5.2. Если нет возможности вызвать скорую помощь, отправить пострадавшего на попутном транспорте в\nбольницу, тогда первую медицинскую помощь должен оказать водитель.\n5.2.1. При ранении:\nнайти возможность вымыть руки или обработать их дезинфицирующими средствами. Кожу вокруг раны\n2—3 раза протрите марлей или ватой, смоченной дезинфицирующим раствором, причем делайте это от\nкраев раны к периферии. Затем перевяжите рану, используя перевязочный пакет, бинт или закрепив\n\n\nстерильный материал на ней с помощью косынки или носового платка. Если нет дезинфицирующего\nраствора, то можно прикрыть рану чистой марлей и, наложив поверх слой ваты, перевязать бинтом.\nНельзя мыть рану водой.\n5.2.2. Остановка кровотечение:\nразличают три вида кровотечений: артериальное, венозное и капиллярное. От внезапной потери на одну\nтреть или четверть крови человек может умереть. Поэтому как только началось кровотечение, особенно\nартериальное, его надо как можно быстрей остановить.\nПри артериальном кровотечении кровь алого цвета, из раны бьет фонтанчик. При венозном кровотечении\nкровь темного цвета, из раны вытекает маленькой ровной струёй. Капиллярное кровотечение\nхарактеризуется тем, что кровь просачивается мелкими каплями из поврежденных тканей.\nКровотечение можно остановить несколькими способами. При артериальном кровотечении кровеносные\nсосуды пережимаются пальцами выше раны, после этого на место их зажимается резиновый жгут.\nКровотечение из вены, жгут ложится ниже раны. При капиллярном кровотечении, достаточно давящей\nповязки: наложив на кровоточащий участок чистую марлю, предварительно обработав его перекисью\nводорода, поверх марли кладут слой ваты и рану сильно перевязывают.\nЗажав конечность жгутом, аккуратно положить на мягкую ткань. Вместо жгута можно использовать\nремень. Под жгут оставляют записку, в которой отмечена дата и время наложения жгута. Жгут нельзя\nдержать дольше чем два часа. Если до этого времени не прибыла скорая помощь, тогда надо на 2-5 минуты\nснять жгут, и в это время кровеносные сосуды пережать пальцами.\n5.2.3. При переломах костей:\nместо перелома может быть сильно опухшее и иметь необычную форму и цвет. Передвигая конечность\nчеловек испытывает боль, он не может поднять сломанную руку или опираться на сломанную ногу.\nЕсли на переломанном месте повреждена кожа, значит перелом называется открытый.\nВажный момент при оказании первой помощи при переломе это фиксация сломанной конечности.\nВыполняется для снижения риска ранения жизненно важных сосудов и нервов организма человека и для\nуменьшения последствий болевого шока. При помощи наложения шины из любого подручного материала\nможно соорудить шину. Помочь в этом могут палки, лыжи, крепкий картон. При наложении шины\nнеобходимо соблюдать особую осторожность, чтобы не причинить боль пострадавшему и не сместить\nкости. Не в коем случае нельзя вправлять кости самостоятельно и вправлять обломки костей в рану.\nОткрытый перелом требует наложения стерильной повязки на рану в месте перелома костей. Кожу,\nприлегающую к ране, тщательно смазывают любым подручным антисептиком. Если рана в месте\nперелома кровоточит, то необходимо остановить , наложив жгут, зажав артерию пальцем или применив\nдавящую повязку. Если нет возможности наложить шину, то травмированную часть тела плотно\nприбинтовывают к здоровой конечности.\n5.2.4. При ожогах:\n\n\nПо тяжести и глубине поражения тканей ожоги подразделяются на четыре степени. Для ожога первой\nстепени характерны покраснение, отечность и болезненность пораженного участка. При ожогах второй\nстепени на покрасневшей и отечной коже появляются пузыри, наполненные жидкостью (плазмой). Ожоги\nтретьей степени возникают в результате интенсивного воздействия высокой температуры и\nхарактеризуются глубоким омертвением тканей, чаще всего толщи кожи, причем окружающие ткани\nчасто покрыты пузырями серого цвета, которые в дальнейшем могут подвергнуться отмиранию. При\nожоге четвертой степени наступает омертвение кожи, подлежащих тканей и даже костей.\nПри оказании первой помощи при ожогах в первую очередь освободите пострадавшего от горящей и\nтлеющей одежды. Если одежда прилипла к телу ее срывать нельзя. Ее осторожно обрезают вокруг\nодежды. Не следует производить промывание какой-либо области ожога, прикасаться к обожженному\nместу руками, производить прокалывание пузырей, отрывать прилипшие к месту ожога части одежды, а\nтакже смазывать ожоговую поверхность жиром (вазелин, животное или растительное масло и др. ) и\nприсыпать порошком. На рану налаживается сухая, стерильная марля или повязка из ткани.\nПострадавшему надо дать выпить горячего чая, лекарства от боли и транспортировать в больницу.\n5.2.5. При травматическом шоке:\nТравмаческий шок может развиться не сразу после травмы, а после 8-10 часов. Во время травматического\nшока особенно страдает центральная нервная система. Если шок возник из-за кровотечения, то сначала\nнадо остановить кровотечение. Если у пострадавшего не повреждены органы брюшной полости и он в\nсознании, то ему можно дать выпить крепкого чаю, кофе или Сухово вина. Больного с шоком следует\nтранспортировать в ближайший стационар как можно быстрее, но при этом голову держат как можно\nниже для улучшения питания мозга. Если пострадавший без сознания – обеспечьте проходимость\nдыхательных путей, если нарушилось дыхание требуется сделать искусственное дыхание рот в рот.\nМассаж сердца производится при внезапной остановке сердечной деятельности. Не рекомендуется\nперевозить пострадавшего первым попавшимся транспортом, только оказать первую помощь.\n5.3. Если в результате аварии нет пострадавших, материальный ущерб незначительный, то его участники\nимеют право самостоятельно, не дожидаясь приезда полиции, явиться в отделение с составленной и\nподписной схемой происшествия и зарегистрировать произошедшее в установленном порядке.\n5.4. Случившись несчастному случаю, незамедлительно сообщить менеджеру давшего задания, инженеру\nпо безопасности работ, обратится в медицинское учреждение, если это необходимо вызвать скорую\nпомощь и до начала расследования сохранить места происшествия таким, каким оно было на момент\nпроисшествия несчастного случая."}, {"title": "ДЕЙСТВИЯ РАБОТНИКА ПОСЛЕ ЗАВЕРШЕНИЕ РАБОТ", "content": "Вернувшись из рейса водитель обязан:\n1. вымыть тягач и полуприцеп на мойке предприятия;\n2. припарковать тягач и полуприцеп на автостоянке место указанным сменным механиком;\n3. Сфотографировать транспортное средство снаружи и изнутри;\n4. сдать тегач механикам;\n5. обнаруженные во время рейса недостатки и неисправности описать в установленном порядке в акте по\nдефектам, который потом передать обслуживающему техническому персоналу;\n6. вымыть руки и лицо теплой водой с мылом , если есть возможность, помыться под душем.\n\n\nОбучение гигиеническим навыкам\nОсновные нормативные законодательные акты по безопасности здоровья при работе, производстве и\nпереработке пищевых продуктов :\n•\n\nГигиеническая норма Литвы HN 15: 2005 «Пищевая гигиена», согласованная версия от 2017-0501\n\n•\n\nЗакон Литовской Республики о продуктах питания\n\n•\n\nГигиеническая норма Литвы HN 119:2002 \"МАРКИРОВКА ПИЩЕВЫХ ПРОДУКТОВ\"\nсогласованная версия от 2016-11-01\n\n•\n\nГигиеническая норма Литвы HN 90:2011 „Общие требования безопасности при дезинфекции,\nдезинсекции и дератизации“. согласованная версия от 2016-01-01\n\nТРАНСПОРТ\n•\n\nПищевые продукты необходимо транспортировать таким образом, чтобы они были правильно\nзагружены и надежно защищены от механических повреждений, пыли, автомобильных выбросов,\nмикробных и других загрязнений, насекомых и грызунов.\n\n•\n\nТранспортные средства для перевозки пищевых продуктов должны быть сконсруированы так,\nчтобы их было легко чистить и дезинфицировать.\nПродукты в жидком, гранулированном или порошкообразном виде должны перевозиться в емкостях\nили контейнерах, предназначенных исключительно для этих пищевых продуктов.\n\n•\n\nНа таких контейнерах должна быть четко видна надпись, указывающая, что перевозятся продукты.\n\n•\n\nКонтейнеры и другие емкости, перевозимые автотранспортом, не должны использоваться для\nперевозки непродовольственных товаров."}, {"title": "МАРКИРОВКА ПИЩЕВЫХ ПРОДУКТОВ", "content": "•\n\n«Маркировка пищевых продуктов» - слова, связанные с продуктами питания данные, товарные знаки,\nзарегистрированное торговое наименование, изображение или символ, относящиеся к продукту питания,\nкоторые указаны на упаковке, в документе, в листовке, на этикетке, в кольце или в надписи, сопровождающей\nили\n\nотносящейся\n\nк\n\nминимальный термин о безопасном использовании\n\nданному\n\nпродукту.\n\nи, с точки зрения микробиологии для\n\nскоропортящиеся продуктов - использовать до… (дата срока годности);\n•\n\nлюбые особые условия хранения или условия использования;\n\n•\n\nназвание или фирменное наименование и адрес производителя, упаковщика или продавца,\nзарегистрированного в Европейском Союзе.\n\n•\n\nинформация о месте производства - в случае если такая информация не предоставляется покупатель\nбудет введен в заблуждение относительно истинного происхождения продукта;\n\n\nЛичная гигиена\n•\n\nПерсонал может начать работу только после проверки состояния здоровья;\n\n•\n\nПерсонал должен регулярно прослушать курсы по гигиене и оказанию первой помощи;\n\n•\n\nИметь персональную карту здоровья (F. No. 048 / а) и медицинские сертификаты, подтверждающие знание,\nкоторые хранятся в офисе согласно установленному порядку;\n\n•\n\nРуки - наш основной инструмент, которым мы прикасаемся ко всем поверхностям;\n\n•\n\nПоверхности, к которым чаще всего прикасаются: стол, дверные ручки, края стула, упаковочные материалы,\nоборудование или отдельные детали оборудования (компьютерная мышь, клавиатура, телефон, ключи, деньги)\n\n•\n\nЧерез загрязненные руки, соприкасающиеся с ними поверхности передаются микроорганизмы.\n\n•\n\nОсобое внимание следует уделять гигиене рук и правильной гигиене рук персонала при проведении\nэкологического контроля.\n\n\nПАМЯТКА"}, {"title": "СРЕДСТВА ИНДИВИДУАЛЬНОЙ ЗАЩИТЫ:", "content": "-защитная обувь с металлическими вставками/\n-светоотражающий жилет/\n-шлем/\n-защитные очки/\nПомните, что на фабриках с повышенным уровнем безопасности, если у вас не будет одного из выше\nперечисленных средств защиты, вас не будут грузить!!!\n\nДОКУМЕНТЫ\na)личные\n- карточка водителя;\n-паспорт или ID карточка;\n-водительские права;\n-лицензия на работу в евро странах\n-отпускные (за прошедший месяц);\n-действительная европейская карточка медицинского страхования;\n-кредитная карточка банка\n-Macron\n-A1\n- Отказ возвращаться каждые 4 недели домой (Если вы собираетесь работать больше чем 4 недели)\nb)документы грузового автомобиля\n1. лицензия\n2. свидетельство о проверке тахографа;\n3. техпаспорт\n4. свидетельство о прохождении техосмотра;\n5. страховка;\n6. Еврокласс;\n7. сертификат шумности\n-проверить срок действия следующих документов:\n1. Карточки оплат (их коды) компании;\n2. иметь с собой пустые CMR компании; PAL лист, акт по передачи прицепа, довериность PL, Отчёты\n\n\nc)документы полуприцепа\n1. техпаспорт\n2. свидетельство о прохождении техосмотра;\n3.страховка;\n4. сертификат пригодности;\n5.FRC сертификат;\n6. Сертификат/ разрешения о перевозке пищевых продуктов;\n7. Сертификат Изготовителя полуприцепа;\n8. Еврокласс;\n9. Сертификат подтверждения emission класса.\n-грузовые документы."}, {"title": "ГРУЗОВАЯ ДОКУМЕНТАЦИЯ", "content": "Перевозка груза без CMR запрещена! Вместе с ним дополнительно могут быть документы\nспецификации (packing list), inIvoice, Сертификаты, Экспортная декларация, Товара Транспортная\nНакладная (eсли получили товара транспортную накладную обязательно обязаны выписать смр).\nCMR компании предоставляется по прибытию на место погрузки, если его не заполняет грузоотправитель, то CMR\nдолжен заполнить сам водитель.\nЕсли CMR выдает сам грузоотправитель и 16 графа бывает пустой или в ней вписан другой перевозчик, то водитель\nобязан поставить штамп или вручную вписать Реквизиты компании.\nПолучив грузовые документы, водитель должен убедиться, что указанный адрес разгрузки соответствует\nуказанному менеджером месту разгрузки, проверить количество мест, указанных в документах с фактом!\nОставленная пустая графа в CMR при контроле, даёт повод предявить претензии.\nПосле выгрузки, у водителя должно остаться не меньше двух CMR.\n\n\nКредитные карточки и их использование\n\n-белая карточка компании, используется только в базе, для заправки топливо и AD-BLUE на колонке компании\n\n-CIRCLE карточка. Используется для оплаты венеты за дороги по Литве, И заправки топлива в Литве\n-топливная карта AS 24 (топливо заправляется только в колонках этой сети, строго по Указаниям менеджера) для\nоплаты туннелей, платных отрезков дороги, для покупки виньеток карточку неисползовать!\n- Eurotrafic AS24 оплачиваем за дороги и за BOX-ы\n- карточка SHELL, действительна на территории всей Европы, но используется только в тех случаях, когда\nпоблизости нету заправки AS 24. Данную карточку можно использовать для заправки топливом только в крайних\nслучаях предварительно согласовав это со своим менеджером!!! Карточкой можно расплатится за дороги и боксы,\nи за мосты в Дании\n-ID CARD идентификационная карточка, используется для открытия швейцарских дорог\n- DKV оплата за дороги Франции если наработает аппарат, Заправка топливом, Оплата дорог и мостов"}, {"title": "ОПЛАТА И ОСОБЕННОСТИ ЗАРУБЕЖНЫХДОРОГ", "content": "Автомагистрали во всех странах для тяжелого транспорта являются платными,\nпоэтому перед тем, как пересечь новую государственную границу, водитель должен убедиться в том, есть ли у него\nдорожный аппарат для оплаты дорог данного государства или виньетка. Правильно ли настроен аппарат оплат\nдорог: оси, вес, еврокласс\n\nЛИТВА (LT)\nЛитва - Передвижение По городу бесплатно, открывать дороги надо тогда когда выезжаете на магистральные\nдороги. дороги открывать надо С помощью сообщения (SMS), можно покупать Литовские (LT), Латышские (LV),\nЭстонские (EE) винетки на день (D). Сообщение формируется следующим образом-код страны, срок действия\nвинетки и регистрационный номер автомобиля. Текст сообщения должен быть написан латинскими буквами!\nНапример:\nВинетка на один день в Литве: LTD AAA111\nВинетка на один день в Латвии: LVD AAA111\nВинетка на один день в Эстонии: EED AAA111\nСообщение (SMS) отправлять на номер : +37066000120\nЗаглавные буквы или маленькие неважно. Можно писать как LTD AAA 111, так и LTD AAA111 так и ltd aaa111.\nУспешно заказав услугу приходит сообщение (SMS).\n\n\nЕсли винетка по какой либо причине не была куплена, так же приходит сообщение об ошибке Тогда Виньетку\nнадо покупать на границе в MEDICINOS BANKAS."}, {"title": "ПОЛЬША (PL)", "content": "Для оплаты польских дорог используется автоматическая система оплаты дорог e-TOLL PL, Компания использует\nаппарат системы DKV с автоматическим пополнением. Если из Базы едем по суше то обязанны держаться\nмаршрута - Клайпеда - Каунас - Сувалки - Варшава. Проезжая через Варшаву, круглый год действует запрет на\nтранзитный транспорт С 7.00 до 10.00, / С 16-20.00. Oбъежать Варшаву без pазрешения менеджера -\n\nзапрешчено.\nУровни дорог: автомагистрали (А 2), дороги с двузначным индексом (61,14) ПДД особенности: фары включены\nкруглый год\nРекомендуетмя не превышать 90км/ч"}, {"title": "ОБРАТИТЬ ВНИМАНИЕ НА РАБОТУ ДОРОЖНОГО АППАРАТА! НА ВЪЕЗДЕ ПРОВЕРИТЬ АПАРАТ", "content": "ГЕРМАНИЯ (D)\nОплата за немецкие дороги производится при помощи аппарата Toll Collect/DKV. При въезде в страну, убедитесь,\nчто он работает (ДОЛЖНА ГОРЕТ ЗЕЛЁНАЯ ЛАМПОЧКА НА АПАРАТЕ) 5-осей, > 18т. В противном случае, перегрузить\nаппарат отключая массу тягача.\nУровни дорог: автомагистрали (А9, А4), национальной важности (В 10, В65).\nAUTOHOF – специализированная платная стоянка для тягачей"}, {"title": "РЕКОМЕНДУЕТСЯ", "content": "- особенно большое внимание уделить креплению груза\n\n- максимальная скорость на национальных дорогах 60км/ч – строго придерживаться ограничений скорости в\nнаселенных пунктах и на ремонтируемых отрезках дороги\n-движение запрещено с субботы 22.00 до воскресенья 22.00.\nD5 - обeзжаем по франции A35!!!"}, {"title": "ПО А1 ЧЕРЕЗ КИОЛН НЕ EХАТЬ", "content": "АВСТРИЯ (А)\nОплата за австрийские дороги производится при помощи автоматического аппарата GO/DKV.\nEсли аппарата нет его надо приобрести. После въезда на австрийскую территорию, проезжая через ворота,\nпредназначенные для оплаты, слышен звуковой сигнал.!\nОсобенности ПДД: движение запрещено круглый год с 22:00 до 5:00, по субботам с 15:l00 до\nпонедельника 5:00 (в зимний период с 1-ого ноября до 31ого апреля по магистральный дорогам А-12, А-13, по\nтрассе через Инсбрук (Insbruk),\n\n1-ого ноября до 31-ого апреля в тягаче должен находиться комплект цепей противоскольжения; Если нет\nцепи известитe своего менеджера и pуководитеcь его указаниями\n-круглый год должны быть включены фары;\n-проверьте ест ли на тягаче австрийская наклейка эконалога (с правой стороны стекла)\nБез этой наклейки грозит штраф до 1200 Eur.\n-макс нагрузка на ведущую ось, до 11,5т\n-запрещаеться транзит дорогами националного значения !"}, {"title": "НА ВЪЕЗДЕ ПРОВЕРИТЬ АПАРАТ", "content": "Движение по Австрии без наклейки IG-LUFT не разрешается\n\n\nИТАЛИЯ (I)\nАвтоматический аппарат для оплаты дорог DKV или Telepass, в местах оплаты выбирать ворота\nпомеченные знаком Tellepass или дорожные полосы, помеченные желтой пунктирной линией.\nУровни дорог: автомагистрали (А4,А1), национальной важности (SS49,SS12)\nОсобенности ПДД: с 1-ого ноября до 31-ого марта обязательное использование цепей противоскольжения.\n-максимальная скорость 85км/ч;\n-за нарушение знака „обгон запрещен“ конфискуются права и назначается штраф;\n-двигаясь по дороге А5 по направлению ко Франции, если вы хотите пересечь границу через\nMont Blanc туннель, рядом с городом Аоста (Aosta) (100-ый км) не проедьте мимо специализированной\nплощадки, возьмите чек на пересечение туннеля, в противном случае, из туннеля вас вернут обратно;\n-перед пересечением туннелей Frejus (A-32) и Mont Blanc (A-5) уточнить оплату за его проезд карточкой;\n-на итальянских автомагистралях большое количество небольших СТОЯНОК вмещающих ОДИН автосостав, стоянки\nпомечены знаком SOS, если рядом сними стоит „стоянка запрещена“, то ни в коем случае не останавливаться\n(штраф от 40 до 400 Eur), такие стоянки предназначены только для аварийной остановки;\nAUTOPORTO – специализированная стоянка для тягачей. СЕМТ – разрешение на транспортировку груза из Италии\nв Росси"}, {"title": "ИСПАНИЯ (Е)", "content": "Магистрали оплачиваются тем же самым аппаратом как и во Франции DKV/Passango.\n-главная особенность страны заключается в том, что начиная и заканчивая работу на территории этой страны,\nвводится не только код страны, но и регион страны в котором останавливаетесь, например: Comunidad Valencia-CV\nили Каталония-САТ, поэтому рекомендуется иметь при себе карту Испании или внимательно следить за знаками\nобозначающими границы регион"}, {"title": "ПОРТУГАЛИЯ (Р)", "content": "В этой стране существуют две системы оплаты за дороги: автоматическая оплата с французским аппаратом или\nкарточкой EUROTRAFIC. Надо ехать где нету шлагбаума - через зелёную полосу."}, {"title": "ШВЕЙЦАРИЯ (СН)", "content": "Дороги этой страны – самые дорогие, поэтому когда ваш маршрут пролегает через швейцарскую территорию,\n\nследует согласовать с менеджером проезжать через эту страну или лучше её объехать. Cтрана не\nявляется членом Европейского союза, поэтому для её пересечения требуются дополнительные документы для\nэкспорта, импорта и транзита! Информацию о том, где их можно получить должен предоставить менеджер.\nПосле прибытия на границу, сначала открываете швейцарские дороги, для этого используйте ID CARD. Для того,\nчтобы узнать как все это проделать рекомендуется проконсультироваться с водителем, уже проезжавшим эту\nстрану или по прибытию на таможню обратиться за советом к водителям.\nВнимание: открывая дороги, вводить общий вес 40 т и больше.\n-круглый год движение запрещено с 22.00 до 5.00, в субботу с 22.00 до понедельника 5.00.\n-макс нагрузка на ведущую ос, до 11,5т\n-запрещаеться транзит дорогами националного значения !"}, {"title": "СЛОВАКИ Я (SK)", "content": "Магистрали этой страны оплачивается системой SKYTOLL. Аппарат надо приобрести на границе страны, а\nвозвращаясь назад здать. Забирая аппарат оставляется залог 50 eur (только\nналичка или банковская карта кредита), и вносится кредитная кредита возвращается при задачи аппарата.\n-ближний свет обязательный круглосуточно\n-запрет езды по воскресениям от 00:00 до 22:00"}, {"title": "ЧЕШСКАЯ РЕСПУБЛИКА (CZ)", "content": "Магистрали оплачиваются дорожным аппаратом MYTO перед вездом в страну, должны проверит апарат не стоит\nли он на ручном режиме (эсли он поставлен в ручном режиме обязательно помeнять на автоматический) на\nмагистральных автозаправках.\n-максимальная скорость: 85км/ч; -движение запрещено по воскресеньям с 13.00 до 22.00."}, {"title": "АНГЛИЯ (GB)", "content": "Контрольный список транспортных средств должен быть заполнен при поездке в Англию :\n\nС 1-ого января 2014 г. Введен дорожный налог для грузовых автомобилей. Перед тем, как переправиться на пароме\nследует уведомить менеджера, чтобы он (она) заренее выкупил (-а) дороги этой страны. Стоянки на\nавтомагистрали – платные (неоплачиваетса)\nОсобенности ПДД: - левостороннее движение -расстояния измеряются не в км, а в милях;\n-13,6 футо
