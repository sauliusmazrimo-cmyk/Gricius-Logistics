<style>
:root{--navy:#0d1b35;--navy2:#142040;--red:#c0392b;--gold:#e8932a;--gray:#f2f4f8;--gray2:#e8eaee;--text:#1a2030;--muted:#6b7280;--border:#dde2ec;--sidebar-w:290px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:#e8ecf2;color:var(--text);min-height:100vh;display:flex;flex-direction:column}

.header{background:linear-gradient(90deg,var(--navy),var(--navy2));color:#fff;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:300;box-shadow:0 2px 20px rgba(0,0,0,.4);flex-shrink:0}
.h-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--red),#a93226);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.h-title{flex:1}
.h-title h1{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.h-title p{font-size:10px;opacity:.45;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow',sans-serif;margin-top:1px}
.h-actions{display:flex;gap:6px;align-items:center}
.lang-btn{padding:5px 12px;border:1px solid rgba(255,255,255,.2);border-radius:6px;font-size:11px;font-weight:800;cursor:pointer;background:transparent;color:rgba(255,255,255,.5);font-family:'Barlow',sans-serif;transition:.15s;letter-spacing:.5px}
.lang-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.lang-btn:hover:not(.active){color:#fff;border-color:rgba(255,255,255,.5)}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;font-family:'Barlow',sans-serif;transition:.15s;white-space:nowrap}
.back-btn:hover{background:rgba(255,255,255,.2)}

.search-bar{background:#fff;border-bottom:2px solid var(--border);padding:10px 20px;display:flex;gap:10px;align-items:center;position:sticky;top:60px;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.06);flex-shrink:0}
.search-wrap{flex:1;position:relative;max-width:600px}
.search-input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--border);border-radius:24px;font-size:14px;font-family:'Barlow',sans-serif;outline:none;background:#f8f9fc;transition:.2s}
.search-input:focus{border-color:var(--navy);background:#fff}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;display:none;padding:0}
.search-stats{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:600}

.app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 114px)}

.sidebar{width:var(--sidebar-w);flex-shrink:0;background:linear-gradient(180deg,#1a2f52 0%,#0d1b35 100%);overflow-y:auto;height:100%;box-shadow:4px 0 16px rgba(0,0,0,.15)}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sidebar-header{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10;background:rgba(0,0,0,.2)}
.sidebar-header h3{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:2.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:flex-start;gap:10px;padding:10px 18px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid rgba(255,255,255,.05);transition:.15s}
.nav-item:hover{background:rgba(255,255,255,.07);border-left-color:var(--gold)}
.nav-item.active{background:rgba(192,57,43,.25);border-left-color:var(--red)}
.nav-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-family:'Barlow Condensed',sans-serif;transition:.15s}
.nav-item:hover .nav-num{background:rgba(255,255,255,.2);color:#fff}
.nav-item.active .nav-num{background:var(--red);color:#fff}
.nav-text{font-size:12px;font-weight:600;color:rgba(255,255,255,.55);line-height:1.4;transition:.15s}
.nav-item:hover .nav-text{color:rgba(255,255,255,.85)}
.nav-item.active .nav-text{color:#fff;font-weight:700}
.nav-item.hidden{display:none}

.content{flex:1;overflow-y:auto;padding:20px 24px;height:100%}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.section-card{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:18px;overflow:hidden;box-shadow:0 3px 16px rgba(0,0,0,.07);display:none;animation:cIn .3s ease}
.section-card.visible{display:block}
@keyframes cIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card-header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:14px 20px;display:flex;align-items:center;gap:12px;border-left:5px solid var(--red)}
.card-num{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:.5px;flex:1;text-transform:uppercase}
.translate-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;transition:.15s;white-space:nowrap;flex-shrink:0}
.translate-btn:hover{background:rgba(255,255,255,.25)}
.translate-btn:disabled{opacity:.5;cursor:not-allowed}

.card-body{padding:20px;width:100%}
.trans-note{background:#eafaf2;border-left:3px solid #27ae60;border-radius:0 8px 8px 0;padding:8px 14px;font-size:12px;color:#1a5c38;margin-bottom:14px;display:none}
.trans-err{background:#ffe8e8;border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:8px 14px;font-size:12px;color:#a93226;margin-bottom:14px;display:none}

.doc-images{margin:0 0 18px;background:var(--gray);border-radius:12px;border:1px solid var(--border);padding:14px}
.doc-images-label{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.doc-images-label::after{content:'';flex:1;height:1px;background:var(--border)}
.doc-imgs-grid{display:flex;flex-wrap:wrap;gap:10px}
.doc-img{max-width:100%;border-radius:8px;border:1px solid var(--border);cursor:zoom-in;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:.2s;display:block}
.doc-img:hover{transform:scale(1.01);box-shadow:0 4px 16px rgba(0,0,0,.15)}

.section-body{font-size:15.5px;line-height:2;color:var(--text);word-break:break-word;white-space:normal;text-align:justify;hyphens:auto;width:100%;display:block}
.section-body p{margin-bottom:12px;width:100%;display:block}
.section-body p:last-child{margin-bottom:0}
.translating{color:var(--muted);font-style:italic;font-size:13px;padding:20px;text-align:center}

.no-results{text-align:center;padding:80px 20px;color:var(--muted);background:#fff;border-radius:16px;border:1px solid var(--border)}
.no-results-icon{font-size:56px;margin-bottom:14px}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lb-img{max-width:95vw;max-height:92vh;border-radius:8px;object-fit:contain}
.lb-close{position:fixed;top:16px;right:20px;color:#fff;font-size:24px;cursor:pointer;background:rgba(255,255,255,.15);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none}
.lb-close:hover{background:rgba(255,255,255,.3)}

@media(max-width:700px){.sidebar{display:none}.content{padding:12px}}
</style>
</head>

<script>
const SECTIONS = [{"title": "Įvadas / Введение", "content": "ИНСТРУКЦИЯ ВОДИТЕЛЯ\n()\nПРАВИЛА ПОВЕДЕНИЯ ВОДИТЕЛЕЙ НА ТЕРИТОРИИ “A.Griciaus\nautotransporto įmonė“ /„ UAB Gricius logistics“\n1. На територию “A.Griciaus autotransporto įmonė“/ „ UAB Gricius logistics“ допускаются только\nводители и сопровождающие лица, работающие в A. Griciaus autotransporto įmonė/ „UAB Gricius\nlogistics“\n\n2. Водитель должен зарегистрироватся у диспечера о прибытии грузового автотранспорта и\nзафиксировать показания спидометра, мото-часов, остаток топлива в баках;\n3. Скорость движения автотранспортного средства на всей территории комплекса установлена до\n10 км/ч.;\n4. В течении одного часа, здать все документыв диспечерскую за выполненный рейс;\n5. Если автотранспорт исправен, о факте прибытия поставить в известность дежурного механика и\nполучив от него разрешение поставить машину на парковку и ожидать оформления документов;\n6. Если автотранспорт неисправен в течении часа подать механикам заявку на ремонт перечнем\nнеисправностей;\n7. После получении оформленных документов грузовой автотранспорт обязан покинуть\nтерриторию комплекса в течение двух часов;\n8. Водитель, на территории комплекса должен быть вежлив. Грубое поведение или нецензурное\nвыражение в общении сработниками нашей компании будет наказуемое;\n9. Во время стоянки автотранспорта на территории комплекса водителям и сопровошдающим\nлицам запрещаетса:\n•\n\nКурить в неустановленных местах\n\n•\n\nНаходиться на территории комплекса в нетрезвом виде, употреблять спиртные напитки (а том\nчисле и в кабине);\n\n•\n\nЗагараживать проезды;\n\n•\n\nВ ожидании груза покидать территорию комплекса с 08:00 до 18:00 ч. Без разрешения\nменеджера более чем на 2 часа;\n\n•\n\nВносить или переносить крепкие спиртные напитки на/по территории комплекса;\n\n•\n\nВыходить за территорию комплекса по личным деламв период с 22:00 до 08:00;\n\n10. При не исполнении настоящих правил водитель может быть отстранен от запланированного\nрейса до выяснения обстаятельств.\n11. Водитель, замечен в нетрезвом состоянии или при подозрении состояния будет праходить тест на\nалкотестере;\n\n\nЕсли показания алкотестера покажут результат более чем 0,2 промили, водитель понесет\nследующий комплекс наказаний:\n•\n\nШтраф в размере 500 евро;\n\n•\n\nИзвещение о таком факте его близких родствеников;\n\n•\n\nСнятие с запланированого рейса;\n\n•\n\nВыщита из зарплаты неустойки за удержаный рейс;\n\n12. Повторное нарушение пункта Но.11 повлечет за собой более жестокое наказание, в плоть до\nуволнения."}, {"title": "ИНСТРУКЦИЯ ПО ЭКСПЛУАТАЦИИ ТРАНСПОРТНОГО СРЕДСТВА", "content": "Прием-передача транспортного средства перед командировкой\n1.1. Водитель должен прибыть на предприятие и принять ему предназначеное транспортное средство\nво время, по договоренности с начальником транспортного отдела (в понедельник-пятницу 8:00-17:00 ч.,\nв субботу 9:00-15:00 ч.).\n1.2. Всю информацию о транспортном средстве, получаете в 104 кабинете, возле окошка. Документы и\nинформацию о маршруте водителю сообщает начальник транспортного отдела или его замещающий\nменеджер;\n1.3. Топливные карточки выдают в 102 кабинете, возле окошка;\n1.4. Ключи от тягача выдают на складе, техник-инженер;\n1.5. Водитель должен предназначеный тягач загнать в бокс гаража и вместе с техником-механиком\nосмотреть и заполнить акт приема-передачи транспортного средства.\n1.6. Подписывая акт приема-передачи транспортного средства, водитель подтверждает, что\nтранспортное средство соответствует описанию и он принимает\n\nего со всей присущей ему\n\nкомплектацией.\n1.7. С момента подписания акта вся ответсвенность за транспортное средство, и всю сохранность\nкомплектации переходит на водителя.\n1.8. Если возникают сомнения из за поломок транспортного средства, обязательно о них информировать\nтехника-инженера. Если поломка серьезная, начальник транспортного отдела должен решить, будет ли\nводителю предназначен другой тягач или командировка перенесётся на другое время, когда будет\nзакончен ремонт данного тягача.\n1.9. Принимая предназначенный полуприцеп водитель должен проверить, есть ли все крепления для\nгруза: не меньше чем 4 штанги крепления груза и замок, (+22 штанги на двухэтажных) на\nполуприцепе – рефрижераторе, 16 ремней крепления груза, 32 уголков из пластика для ремней, 32\nрезиновых коврика в тентовом полуприцепе, все восемь фитинга для крепления контейнера на\nконтейнерном полуприцепе. Дополнительно у любого прицепа должно быть запасное колесо и\n\n\nдве опоры для колес, не мение 6 петлей для крепления полуприцепа на пороме. Заметив\nотсутствие любого элемента на полуприцепе, немедленно об этом информировать своего\nменеджера и механика-инженера и потребовать, чтобы полуприцеп был скомплектован\nполностью.\n1.10.Отправляясь в страны СНГ, заправление и количество топливо соглосоваем с менеджером.\n\nПрием-передача транспортного средства после рейса\n2.1. После рейса, водитель\n\nобязан предоставить транспортное средство механику. Механик при\n\nприсутствии водителя, проверяет показания спидометра, остаток топлива в баках, внешний вид и\nповреждения транспортного средства и показания агрегата рефрижератора на полуприцепе, все эти\nданные механик записывает в книгу ремонта транспортных средств. Водитель обязан сказать какие\nтехнические проблемы он заметил до приезда на базу.\n2.2. После парковки транспортного средства на место, которое указывает механик, водитель не позднее\nчем за 1 час , обязан сдать документы на груз, на транспортное средство, телефон и ключи от тягача.\n2.3.Если водитель больше не поедет на этом тягаче, он обязан помыть кабину как снаружи так и изнутри\nи загнать в бокс гаража для сдачи механику-инженеру по акту приема-передачи тягача. Если при\nосмотре тягача выявилось, что внутри кабина не полностью почищена, мы в свою очередь оставляем\nза собой право за счет водителя нанять компанию, которая почистит внутри кабины вместо Вас.\nВодитель вместе с инженером-механиком заполняют акт приема-передачи тягача и акт комплектации\nтягача, подтверждают написанное подписью. С момента подписания акта приема передачи вся\nответственность за все повреждения переходят к фирме.\n\nПрием-передача транспортного средства во время командировки\n2.4.Передавая или принимая полуприцеп другому водителю в командировке, вы обязаны заполнить\nтрейлерный лист (18.9.2. пункт ). В трейлерном листе заполнить каждую строчку, отметить каждое\nповреждение и написать код повреждения, количество топлива, запасных колес, наличие четырех\nштанг крепления груза, мотoчасы, наличие\n\nодного замка. Трейлерный лист обязан подписать\n\nводитель, который принимает прицеп и который его сдает, в другом случае ответственность за\nповреждения полуприцепа ложится ровными частями на обоих водителей.\n2.5.Если возникли разногласия по какому либо повреждению на полуприцепе, в замечание напишите\nспорное повреждение и пришлите менеджеру фотографию этого повреждения.\n2.6.Когда принимаете или передаете полуприцеп другому водителю, водитель обязан немедленно об этом\nсообщить менеджеру СМС сообщением. Напр.: Привет, прицеп ЕС256 принял, количество\nтоплива 129 L, моточасы 6859, трейлерный лист заполнен и подписан.\n\n\n2.7.Обязательно проверте агрегат полуприцепа-рефрижератора: настроить +5 градусов, а потом -10\nградусом на автоматном режиме. Если агрегат не работает немедленно сообщите своему менеджеру.\nПрием-передача полуприцепа на заводе “Mars Minden”. У этого клиента нужно сдать пустой\nполуприцеп, а на место его зацепить гружонный полуприцеп по указаниям менеджера. Перед\nваротами завода, заполните трейлерный лист полуприцепа и один из экземпляров положите к\nдокументам полуприцепа, и их сдават охраникам. Пустой полуприцеп ставить там где укажут\nответсвенный сотрудник завода, и об этом сообшите своему менеджеру СМС сообщением. Когда от\nменеджера получаете указание с завода забрать конкретный гружонный полуприцеп, заходите к\nохране и выписываете пропуск в територию, после чего нaходите полуприцеп, осматриваете его все\nповреждения и сравниваете с теми что помечаные в трейлерном листе. Все несоотвествия отметить в\nтрейлерном листе и фотографировать, а фотографии немедленно прислать менеджеру, а если нету\nвозможности - написать ему о всех повреждениях полуприцепа. Не в коем случае не открывать\nгружонный oпломбированный полуприцеп.\nПрием-передача полуприцепа в порту Kiel. На площадке ожидания водитель забирает документы\nот полуприцепа и груза, несёт их агентам DFDS, которые выписывают пропуск на територию порта.\nПри въезде на територию порта на воротах ее фотографируют со всех сторон и там видны все\nповреждения полуприцепа. Полуприцеп поставить на место которое укажет сотрудник порта.\nЗабирая гружонный полуприцеп с порта, обратите внимание на повреждения и их сверте с\nтрейлерным актом DFDS, если наxодите несовпадения, сразу сообщить менеджеру. Обезательно\nпроверить агрегат полуприцепа, если он не работает или нету замка от дверей полуприцепа, сообщите\nменеджеру.\n\n\nКонтроль за тягачом и полуприцепом\n2.8.Перед началом поездки водитель обязан проверить:\n2.8.1. Уровень масла в двигателе;\n2.8.2. Уровень топлива в баках тягача и полуприцепa-рефрижератора;\n2.8.3. Уровень AdBlue;\n2.8.4. Уровень антифриза;\n2.8.5. Жидкость для омывания окон тягача;\n2.8.6. Количество гидравличесткой житкости (тормозов, усилителя руля, системы сцыпления);\n2.8.7. Световые приборы на тягаче и на прицепе. Если перегорает какая нибудь лампочка, водитель обязан\nее поменять своими силами;\n2.8.8. Колеса и покрышки:\nА) если поменяли колесо в гараже или в дороге, то надо проверить натяжение болтов каждые 250\nкм;\nВ) При проверке колес необходимо посмотреть на: достаточную глубину протектора и есть ли\nкакие то повреждения покрышек;\nС) Давление в колесах тягача / полуприцепа обязательно надо проверить выезжая в рейс из гаража\nи один раз в неделю когда вы в рейсе или меняете полуприцеп. Давление в колёсах указывает\nмаркировка ( PSI ) шин каждого производителя.\n2.8.9. В тентовом полуприцепе должно быть 32 боковые доски, 16 шт. pемней, 32 уголка для крепления\nгруза. TIR кабель должен быть целый без малейшего повреждения, а так же обратите внимание на\nсостояние самого тента, чтобы не был он перерезан, через крышу во внутрь полуприцепа не\nпросачивалась бы вода. Обязательно обратите внимания на пол полуприцепа.\n2.8.10. В полуприцепе-рефрижератора проверьте внешние И внутренние повреждения, работу агрегата,\nколичество топлива, моточасы, замок, пломбу, запасное колесо, опорные ноги и 4 штанги для\nкрепления груза, повреждения дверей с наружи и с внутри.\n2.8.11. На полуприцепе для перевозки контейнеров, обратить внимание чтобы были все фитинги, для\nкрепления контейнера, запасное колесо, опорные ноги.\n2.9.\n\nВодитель обязан следить за хорошим состоянием транспортного средства, как снаружи так и\n\nизнутри. Кабину тягача, а так же и пустые полуприцепы нужно мыть снаружи и cнутри. Водитель несет\nответственность за эксплуатацию транспортного средства."}, {"title": "КАК ПОЛЬЗОВАТСЯ ПАРКИНГАМИ", "content": "1.На территории Литвы строго запрещено останавливаться на отрезке Клайпеда – Виевис (возле\n\nВильнюса) без разрешения менеджера на какой либо площадке, чтобы избежать кражу топлива или\nгруза. Водитель обязан без остановки с базы одним разом доехать до Виевиса или до ул. Жирню 2,\nВильнюс “Бунаста”.\n\n\n2. Bодителей которые стоят на парковке 3AO \"дурга\" в Медининкай взять счёт фактуру с реквизитами\nфирмы (чек неподходит).\n3. В странах СНГ водитель может останавливатся только на платных автостоянках на суточный отстой.\n45 минутный перерыв водитель может делать на АЗС, или безопасных площадках. Рекомендуем\nтопливные баки закрыть дополнительными замками.\n4. После жедневного отдыха („отстоя“), водитель обязан обойти и проверить транспортное средство:\nколеса, световые приборы, замок седла и другие необходимые узлы для безопасной езды.\n4. В странах ЕС стоять в не платных площадках. Платные площакди необходимо согласовать с\nменеджером. После окончания отдыха („oтстоя“) водитель обязан проверить пломбы и замок на дверях\nполуприцепа, посмотреть не отключен ли полуприцеп от седла тягача за время отдыха, проверить не\nзалезли ли нелегалы в паллетник, во внутрь полуприцепа и толко убедивших что все в порядке, можно\nначинать ехать. Заметив, что возможно внутри полуприцепа есть нелегалы, об этом сообщить менеджерy\nи вызвать полицию."}, {"title": "НЕПРЕДВИДЕННЫЕ СИТУАЦИИ И ДТП", "content": "Страховые случи, ущербы тел. но.: +370 656 69809\n6.1. Если попал в ДТП или какую нибудь непридвиденную ситуацию, водитель обязан немедленно\n\nсвязаться с менеджером и как можно детальнее информировать о сложившейся ситуации. При\nвозможности сфотографировать место происшествия и сделанный ущерб транспортному средству или\nдругим объектам. На фотографиях должно быть четко видно номера транспортных средств и общий вид\nДТП.\n6.2. Всегда нужно заполнять декларацию (Европротокол ) о ДТП. Уезжая в рейс обязательно в офисе\nвзять пустой бланк декларации о ДТП.\n6.3.Запрещается подписывать декларацию ДТП на вам неизвестном языке. В таком случае заполняете\nсвою декларацию ДТП. Если не согласна другая сторона, тогда дальше руководствоваться указаниями\nменеджера.\nВНИМАНИЕ: Если вы не виноваты в ДТП, на декларации вам необходимо подписаться только под\nсхемой ДТП в 15-ой графе, а в 14-ой графе, ниже дахнных водителя и транспортного средства\nрасписывается только виновник в ДТП.\n6.4.Водитель обязан информировать полицию:\n6.4.1. Когда оба водителя не признают вину;\n6.4.2. Когда потерпели третье лица;\n6.4.3. Когда есть потерпевшие;\n6.5. После ДТП водитель после приезда на базу обязан написать объяснительную у начальника техотдел\n(если водитель не виноват) или у менеджера ответственного за страховки (если водитель признан\nвиновным).\n\n\n6.6. После ДТП водитель как можно быстрее обязан передать все фотографии , декларацию о ДТП и\nобъяснительную начальнику техотдела или менеджеру ответственному за страховки;"}, {"title": "ДОКУМЕНТЫ ИСПОЛЬЗУЕМЫЕ В КОМАНДИРОВКЕ: ИСПОЛЬЗЫВАНИЕ,", "content": "ЗАПОЛНЕНИЕ, ПЕРЕДАЧА\n7. Общая часть\n7.1.Требованиями этой инструкции обязаны руководствоваться все водители компании.\n7.2.Правильное заполнение документов является одним из основных должностей водителя. Заполняя\nдокументы водитель в них обязан заполнять каждую графу и указать всю необходимую информацию.\n7.3.Документы на груз и транспортное средство являются собственностью компании. Водитель обязуется\nвсю информацию предоставленную в документах не разглашать и держать в тайне, кроме тех случаях,\nкогда водитель обязан это сделать в связи ему порученной задачей.\n7.4.Водитель всегда обязан проверять все документы и все данные в них, которые он получает от клиента\nили менеджера.\n7.5.Водителю запрещено подписывать документы, в которых непонятная суть текста, непонятные\nсокращения и т.п.\n7.6.Все документы надо заполнить правильно и разборчиво. Любые исправления в документах без\nсоглосования с менеджером СТРОГО ЗАПРЕЩЕННО !!!\n7.7. Водитель который нарушит наши правила будет привлекаться к материальной, административной и\nуголовной ответственности по законам Литовской Республики, в зависимости от вида нарушения и\nпоследствий."}, {"title": "ДОКУМЕНТЫ КОТОРЫЕ ОБЯЗАН ИМЕТ ВОДИТЕЛЬ", "content": "Личные документы водителя:\n1. Права с категорией CE, Удостовeрение водителя и действующим 95 кодом;\n2. Водительскую карточку, которая действительна до конца командировки;\n3. Паспорт со всеми необходимыми действующими визами;\n4. Мед., cправка; cправка о прохождении курсов первой мед. Помощи,\n5. Декларация МАКРОН;\n6. Форма А1;\n7. Доверенности на тягач и полуприцеп (Польша);\n8. Cертификаты медицинских знаний ( по програмам HB и H10);\n9. Удостоверения на ручную укладку груза. (Или Электрическим погрузчиком)\nДокументы на транспортные средства:\nНа тягач:\n1. Свидетельство о регистрации транспортного средства;\n2. Диагностическая карта подтверждающая технический осмотр транспортного средства;\n3. Kопия лицензии Европейского сообщества на комерческие грузоперевозки;\n4. Полис страхования, Зеленая карта международной системы Green Card;\n\n5. Сертификат проверки тахографа;\n\n\n6. Справка ограничителя скорости;\n7. ECMT сертификат (выдают при прохождении Т. О.);\n8. ETMK сертификат (указывают класс евроэмисии);\n9. Сертификат шумности (тишины) (Larmarmes);\n10. Топливные карточки и карточки на оплату за проезд по автомагистралями;\n11. Два бланка декларации о ДТП;\n12. Акт приёма-сдачи тягача в рейсе;\n13. Запасная бумага для принтера тахографа (мин. 3 рулона);\n14. Ключ для замка рефрижератора.\nПри выезде из базы водитель обязан забрать в рейс нужное количество бланков: Документ\nоб обмене паллетами, накладные CMR, Акт приёма-передачи трейлера, STI документ приёмки\nтовара, лист загрузки груза на RUS/BY, бланк отчёта.\nНа полуприцеп:\n1. Свидетельство о регистрации транспортного средства;\n2. Диагностическая карта подтверждающая технический осмотр транспортного средства;\n3. Полис страхования, Зеленая карта международной системы Green Card;\n4. ECMT сертификат (выдают при прохождении Т. О.);\n5. ECMT сертификат (о соответствии теxнических требованиях по безопасности);\n6. Два бланка декларации о ДТП;\n7. Сертификат грузового отсека кода XL (если полуприцеп соответствует стандарту EN 12642 Code XL);\n8. Сертификат о соответствии для перевозки с таможенной пломбой (и дополнительные документы (4\nфотоснимка));\n9. Сертификат ATP (для рефрижератора);\n10. Замок дверей рефрижератора."}, {"title": "ГРУЗ СОПРОВОЖДАЮЧИЕ ДОКУМЕНТЫ", "content": "CMR накладная на груз\nТоварно-транспортная накладная заполняется не меннее чем в 3 (трех) эгземплярах: для\nотправителя, для перевозчика и для получателя. Может потребоваться и больше копий – напр., для\nветеринарной службы, таможни, экспедиции и проч.\nПустую CMR накладную водитель предоставляет для заполнения на месте погрузки груза.\nОтравитель груза может заполнить свою накладную, которую водитель обязан забрать и подписать после\nпогрузки\n\nгруза.\n\nЕсли\n\nв\n\n16-ой\n\nграфе\n\nотправитель\n\nне\n\nнаписал\n\nAUTOTRANSPORTO ĮMONĖ, водитель обязан их вписать своей рукой.\nреквизиты\n\nA.\n\nGRICIAUS\n\n\n\nПолучив CMR накладную на месте погрузки, водитель обязан проверить все данные накладной,\nсовпадают ли они с данными в других документах (Invois, Packing List, Сертификат).\nВ CMR накладной всегда должны быть заполнены графы Nr. 1-11, 16, 21, 23, 25. А после разгрузки\nобезательно получатель груза должен заполнить 24 графу (время доставки груза, Ф.И. ответственного\nсотрудника получателя, подпись, печать получателя).\nКакие данные вписываем в CMR накладную:\n1. Графы Но. 1 ir 2 (Отправитель и получатель (наименование, адрес, почтовый индекс, страна));\n2. Графы Но. 3 ir 4 (Место разгрузки и погрузки);\n3. Графа Но. 5 –Груз сопровождающие документы (фактура груза – INVOICE; Catnet TIR – TIR)\nсокращеные названия, дата и номер;\n4. Графа Но. 6-11 – Название, количество мест или упаковок и вес (бруто) груза, номер пломбы;\n5. Графа Но. 16 – Реквизиты перевозчика;\n6. Графа Но. 17 - Последующуй перевозчик;\n7. Графа Но. 18 – Oговорки и замечания перевозчика;\n8. Графа Но. 21 – место где составлена накладная и дата;\n9. Графа Но. 22 – После погрузки груза отправитель обязан расписатся и поставить печать компании\nотправителя;\n10. Графа Но. 23 – Фамилия и подпись водителя, печать перевозчика;\n11. Графа Но. 24 – заполняет грозополучатель: дата и время доставки груза, печать получателя ,\nподпись и фамилия представителя получателя; Если получатель груза не заполнит эту графу,\nнемедленно об этом сообщить менеджеру и ждать далнейших указаний;\n12. Графа Но. 25 – Гос. Номера транспортных средств;\nВНИМАНИЕ: CMR накладная может быть на любом языке Европы, но по CMR конвенции,\nнумерация и значение граф остается одинаковой.\n\n\nTrip/Tour 5624789\n\nесли нету или несовпадает в 16 графе перевозчик\n\nзамечание о грузе, имиа фамилия, подпис\n\nLieferschein"}, {"title": "НОМЕР ПЛОМБЫ (SEAL)", "content": "Имя, Фамилия, Подпись\n\nМарка тегача и полуприцепа\n\n\n8.1.Сопровождающие груз документы\nПеред рейсом водитель должен у своего менеджера забрать все документы на груз и проверить\nправильность всех данных в них; Если не хватает какого то документа или обнаружили, что какие то\nданные неправильные, немедленно надо информировать своего менеджера;\n8.2. Отправляясь в рейс, водитель должен взять следующие документы:\n8.2.1. Пустые CMR накладные для обратной загрузки;\n8.2.2. Пустые бланки для обмена паллет;\n8.2.3. Лист простоя один при доставки груза, второй при погрузки обратного груза;\n8.2.4. Трейлерный лист для обмена полуприцепа в командировке;\n8.2.5. Разрeшения на транспортировку груза по свойствам маршрута и груза;\n•\n\nТранспортируя Опасный АДР груз – менеджер заказывает АДР разрешение по странам через какие\nтериторрии проходит маршрут перевозки;\n\n•\n\nДля перевозки негабаритного груза – нужно разрешение на перевозку такого груза по территории\nопределеной страны;\n\n•\n\nТранспортируя особо дорогой груз принимать все меры безопастности, остановки делать только в\nбезопастных, хорошо освешаемым и охраняемых паркингах. Водитель обязан исполнять все\nинструкции которые получает от менеджера, а если возникают дополнительные вопросы по\nдокументам или маршруту, то нужно консултироваться с менедвером.\n\n8.2.6. В страны СНГ груз везем по гарантии или с книжкой МДП (международных дорожных\nперевозок).\n9. Погрузка груза\n9.1.На погрузке заполняем / получаем следующие документы:\n9.1.1. CMR накладная груза;\nЕсли у этого клиента меняем паллеты, надо заполнить паллетный лист и предьявить его отправителю\nгруза, чтобы он потвердил своей печатью и подписью; (один экземпляр остается у орправителя, а три\nзабираете Вы;\n9.1.2. Погрузочный лист („Packing List“ /“loading List“/“Liefershein“).\n9.1.3. Оригинальный счет-фактура\n\nна груз (“Invoice”/”Rehnung”). Обязательный документ, когда\n\nгрузитесь в страны СНГ, иногда исползуится в странах ЕС.\n9.1.4. Оригинальный сертификат на груз. Обратите внимание чтобыбыли оригинальнэ печати и подписи,\nа так же проверьти все данные которые должны совпадать с данными в других документах на\nперевозку груза. Если нету сертификата, обезательно об этом информировать менеджера.\n9.1.5. Экспортная декларация с перевозкой по гарантии или ТИР книжкой.\n\n\n9.1.6. Транзитная декларация необходима, если груз едет транзитом. С транзитной декларацией водитель\nедет от границы ЕС до места растаможи по указанию менеджера.\n10. Разгрузка груза\nНа месте разгрузки, водитель должен ответственному сотруднику получателя груза предоставить все\nдокументы на транспортировку груза, которые получил на погрузке.\nВо время погрузки/выгрузки груза водитель обязан присутствовать при погрузки, пересчитавать\nколичество груза, следить за качеством упаковки, померить температуру груза ,в тех местах, в\nкоторых она была проверена на месте погрузки. Если нету возможности проверить температуру груза,\nне хватает груза или повреждена упаковка, об этом водитель немедленно должен сообщить\nменеджеру.\nПосле разгрузки водитель обязан забрать у получателя груза:\nCMR накладную в трех экземлярах, в которых в 24-ой графе должно быть время доставки\nгруза, печать и подпись получателя груза.\nВНИМАНИЕ: Если при разгрузке или загрузке негрузят более 15 минут об этом водитель должен\nуведомить менеджера. Если у получателя груза нету печати, водитель об этом немедленно должен\nсообщить менеджеру. Без разрешения менеджера покинуть территорию получателя груза строго\nзапрещено.\nЛист простоя (только в странах СНГ) с отметками клиента о том когда прибыли на разгрузку, и время\nокончания разгрузки.\nЕсли меняем паллеты, не забудьте заполнить паллетный лист и у получателя забрать это подтверждаюшее\nпечать и подпись;\nДругие документы на груз ( Invois, Packing List, сертификаты) остаются у получателя груза.\nЕсли у клиента есть дополнительные требования (нейтральная CMR накладная, спецпометки и т.д.)\nменеджер об этом информирует дополнительно. Водитель обязан точно выполнять требования\nменеджера.\nВодитель получив документы после разгрузки груза должен их досканально проверить.\nНа планшет отсканировать все полученные документы и отослать менеджеру. Сканированные документы должны\nбыть высокого качества. Информировать менеджера, если найдены какие либо записи от получателя груза\n\nи без разрешения менеджера не покидать места разгрузки."}, {"title": "ОБЯЗАНОСТИ ВОДИТЕЛЯ В РЕЙСЕ", "content": "1. Постоянно информировать своего менеджера через приложение FLEET MASTER, если менеджер\nчерез FLEET MASTER не отвечает- связываться с менеджером надо сообщением либо звонком на\nЛичный номер менеджера. Выполннять указания менеджера.\n2.Во время каждой остановки , а так же при начале движения после остановки проверять состояние\nпломбы;\n3. Водитель во время каждой остановки с гружонным прицепом неможет оставить тягач без присмотра\nболее чем 30 мин.\n4.От начала транспортировки и до места доставки груза двери рефрижератора должны быть закрыты на\nзамок; Пустой полуприцеп на замок закрывать запрещено.\n5.Запрещено предоставлять посторонним лицам информацию о транспортируемом грузе;\n6.В целях безопасности, передвигаясь по территории Литвы с грузом останавливается строго\nзапрещено!!!\n7.Во время транспортировки груза в страны СНГ разрешается сделать остановку для отдыха на месте\nвашего проживания с условием, если это место находится по пути главного маршрута и транспортное\nсредство будет в безопасности. Разрешается максимально 9-ччасовой непрерывный отдых. По\nвозвращению с рейса, без груза разрешается суточный отстой(по необходимости);\n8.Транспортировка посторонних лиц строго запрещается;\n9.Во время транспортировки груза строго следить за температурным режимом! Выключать агрегат\nрефрижератора строго запрещено! О технических неисправностях немедленно сообщать механикам. Вы\nлично несете ответственность за нарушение температурного режима;\n10.Если Вас останавливают подозрительные лица, в подозрительных местах – не остонавливайтесь!\nОстановитесь на первом посту полиции и сообщите им все подробности;\n11.Место прибытия на таможню строго по CMR 13 графе;\n12.Если в очереди возле СВХ терминала подходит человек себя выдающий за представителя компании\nполучателя и предлагает вам срочную растаможу в другом месте – немедленно сообщить своему\nменеджеру;\n13.После растаможки направляться на выгрузку строго по адресу , указанному в CMR 3-ей графе или в\nтранзитном ветеринарном сертификате;\n14.Если после растаможки вы получаете дополнительную инструкцию ехать на выгрузку не по адресу,\nнемедленно об этом сообщить своему менеджеру и в дальнейшем следовайте его указаниям;\n15.Выгружаться разрешается, когда вы прибыли по адресу в CMR 3-ей графе или когда был согласован\nновый адрес и только после подтверждения менеджера СМС сообщением;\n16.Водитель обязан присутствовать на выгрузке и считать выгружаемый груз! Необходимо письменно\nфиксировать количество выгружаемых паллет и ящиков – с обратной стороны листа простоя. Если\nколичество груза не совпадает с данными в CMR накладных, немедленно сообщить своему менеджеру.\n\n\nПодписывать какие-либо акты о недостачи или браке груза СТРОГО ЗАПРЕЩЕННО !!! Если при\nвыгрузке обнаружен брак, помяты коробки, завалены паллеты, тогда немедленно останавливать\nвыгрузку, информировать менеджера и следовать дальнейшим указаниям менеджера.\nВАЖНО: Если водитель не присутствовал на выгрузке и подписывает акт о недостаче или браке груза, то\nпредъявленное клиентом финансовые претензии будут взысканы с вашей зарплаты;\n17.После растаможки и выгрузки груза в странах СНГ водитель обязан привезти следующие документы:\n18. листа CMR накладной с оригинальными печатями таможни стран СНГ и получателя груза;\n19.МДП книжку с печатью, подписью и доставленным количеством мест таможни назначения на\nкорешке;ы\n20.Российскую декларацию ГТД (копию), электронное подтверждение о прибытии на таможню;\n21.Лист простоя с печатями СВХ и получателя груза, не котором должно быть отметки когда машина\nприбыла и уехала в СВХ и в место разгрузки;\n22.Необходимо в таможенных зонах, складах, местах выгрузки у клиента вести себя корректно – не\nсоздавая конфликтных ситуаций. Если вы заметили, что возникает угроза конфликта, старайтесь отойти\nот этого лица (таможенник, ветврач, работник склада) сообщите менеджеру о создавшейся ситуации. В\nдальнейшем ждите указаний не вступайте в контакт с объектом конфликта;\n23.За употребление алкогольных напитков в таможенных зонах, складах, местах погрузки или разгрузки\nгруза или за рулем транспортного средства – водитель увольняется;"}, {"title": "РУКОВОДСТВО ВОДИТЕЛЯ STI (ГЕРМАНИЯ) GMBH", "content": "1. Необходимые транспортные сопроводительные документы/водительские права/удостоверение\nличности\nПри себе необходимо иметь следующие ДОКУМЕНТЫ:\nдействующие водительские права\nдействительное удостоверение личности и/или паспорт\nдействительный сертификат ATP для используемого прицепа\nнеобходимые\n\nводительские\n\nправа\n\nдля\n\nиндивидуального\n\nтранспорта\n\n(ЕС/CEMT/двусторонние\n\nразрешения)\nподтверждение занятости и соблюдения закона о минимальной заработной плате\n\n\n2. Охрана труда и общая гигиена для водителей\nВо время погрузки и разгрузки вы обязаны носить средства индивидуальной защиты (защитную обувь,\nперчатки и светоотражающие жилеты). Помимо общих средств индивидуальной защиты вы также\nдолжны соблюдать индивидуальные требования к поведению/безопасности соответствующих пунктов\nпогрузки/разгрузки.\nСоблюдение общеприменимых стандартов в области пищевых продуктов и гигиены является\nобязательным. В частности, любые дополнительные требования, предъявляемые нашими клиентами в\nэтом отношении, полностью признаются и соблюдаются нами.\nПеревозка лиц, не назначенных водителями данного транспортного средства, и/или домашних животных\nзапрещена.\nВы представляете STI (Germany) GmbH для наших клиентов. Поэтому к вашей гигиене и внешнему виду\nприменяются следующие минимальные требования:\nчистый и аккуратный:\n•\n\nФутболка/рубашка с рукавами не менее половины длины, брюки и носки длиной не менее колена;\nверхняя часть тела не должна быть открытой.\n\n•\n\nсоблюдение элементарных правил гигиены, например, тщательное мытье рук с мылом после\nпользования санитарными помещениями,\n\n•\n\nобязательные раны всегда должны быть закрыты пластырями или бинтами\n\n•\n\nчистые руки и ногти\n\n•\n\nнет неприятных запахов\n\nИнфекционные заболевания (простуда, грипп, желудочно-кишечные инфекции и т. д.), а также\nкожные заболевания или аллергии не являются помехой и должны быть сообщены нам\nзаблаговременно до начала перевозки.\n3. Необходимое оборудование для прицепа\nПрицеп должен быть оборудован как минимум:\n•\n\nфункциональный регистратор температуры, перегородка и второй испаритель с 2 регистраторами\nтемпературы.\n\n•\n\nкалиброванный (с сертификатом калибровки) зонд или инфракрасный термометр для проверки\nприемки температура терморегулируемых товаров\n\n\n•\n\nне менее 4 запорных планок\n\n•\n\nподдон-ящик по назначению\n\n•\n\n33 сменных поддона\n\n4. Предоставление грузовика и погрузка\nТранспорт с контролируемой температурой:\n•\n\nПрицепы, как правило, необходимо предварительно охладить до указанной температуры\nтранспортировки не менее чем за час до погрузки или раньше, если того требуют внешние условия.\n\n•\n\nПроцесс предварительного охлаждения должен быть задокументирован с помощью регистратора\nтемпературы и предоставлен на месте по запросу.\n\n•\n\nЕго также могут запросить впоследствии, поэтому вы должны иметь возможность предоставить\nэто доказательство немедленно.\n\n•\n\nТемпературы транспортировки и/или настройки холодильного агрегата (старт-стоп/непрерывная\nработа), указанные STI, ни в коем случае не должны изменяться вами самостоятельно. Если\nвозникнут проблемы с температурой или функциональностью холодильного агрегата, STI следует\nнемедленно уведомить об этом. Вам следует дождаться указаний от STI. Любые самостоятельные\nдействия, даже предпринятые с благими намерениями, категорически запрещены.\n\nГигиена прицепа:\n•\n\nПринимаются только сухие, чистые, без запаха и гигиенически безупречные прицепы. Вы должны\nпроверить и, при необходимости, исправить это перед каждой загрузкой.\n\n•\n\nПрицеп должен быть в состоянии, которое однозначно исключает любое так называемое\n«перекрестное загрязнение» и/или «негативное воздействие» на перевозимый товар. Это имеет\nпринципиальное значение.\n\nМы оставляем за собой право не загружать транспортные средства, не соответствующие этим\nтребованиям, или требовать от вас их очистки перед погрузкой. Все возникающие расходы несет\nподрядчик (транспортный оператор). Если на предыдущем месте разгрузки вы обнаружите, что ваш\nприцеп не соответствует этим критериям, немедленно сообщите нам об этом. Только в этом случае мы\nсможем своевременно принять соответствующие меры и проинформировать наших клиентов о\nвозможных задержках.\n\n\nВ общем, у вас должен быть план очистки для конкретного прицепа. Это означает, что доказательства\nпоследней внутренней и, если применимо, внешней очистки прицепа должны быть доступны как\nминимум за последние 6 месяцев. Документация должна включать: тип очистки, дату, место и подпись.\nПо запросу STI (Germany) GmbH эти доказательства должны быть предоставлены нам НЕМЕДЛЕННО.\n5. Контроль температуры на месте погрузки\nВ принципе, для всех грузов с контролируемой температурой на месте погрузки, где процесс погрузки\nможет контролироваться, вы обязаны проводить выборочные проверки температуры с использованием\nкалиброванного зонда или инфракрасного термометра. Если погрузка не может контролироваться, это\nдолжно быть задокументировано в сопроводительных документах.\nПеред каждой проверкой температуры зонд-термометр необходимо дезинфицировать соответствующими\nсредствами (например, гигиеническими салфетками).\nИзмерения температуры должны проводиться для каждого поддона, который будет проверен между 2\nкоробками. Если вы не уверены, спросите у диспетчера STI, как и какой метод использовать.\nПроверенные коробки следует слегка пометить (ручкой/наклейкой), чтобы их можно было использовать\nв качестве ориентира на месте разгрузки.\nИзмерения температуры должны проводиться как минимум на трех разных поддонах: первый — около\nхолодильного агрегата, второй — в середине погрузочной зоны и третий — около дверей.\nИзмеренные температуры для каждой проверки должны быть отмечены в накладной, в товарнотранспортной накладной (CMR) или в специальном протоколе приемки температуры. При отсутствии\nнакладной измерение температуры считается не выполненным.\nТочная документация по контролю температуры является частью компенсации за транспортировку,\nсогласованной с вашим работодателем. Пожалуйста, будьте столь же щепетильны в отношении\nдокументации и сохранности документов.\nПоддоны, температура которых отличается от предписанной, не должны транспортироваться; новые\nподдоны должны быть запрошены у персонала, осуществляющего погрузку. Немедленно сообщите об\nэтом в STI и ждите дальнейших указаний от STI. Без явного одобрения от STI дальнейшая погрузка не\n\n\nдопускается. Новые поддоны должны быть запрошены персоналом, осуществляющим погрузку, и также\nдолжна быть проведена соответствующая проверка температуры. Немедленно сообщите об этом в STI и\nждите дальнейших указаний от STI. Без явного одобрения от STI дальнейшая погрузка не допускается.\nНеобходимо обеспечить достаточную циркуляцию воздуха в грузовом отсеке, т. е. грузы должны быть\nзагружены таким образом, чтобы функция холодильного агрегата не нарушалась во время\nтранспортировки. Необходимо оставить зазор не менее 20 см от задних дверей.\nЕсли в прицепе есть двухъярусные балки, их необходимо убрать спереди и сзади всех холодильных\nустановок перед погрузкой. Входы и выходы охладителей не должны быть заблокированы в любое время,\nа любые другие двухъярусные балки должны быть расположены на расстоянии не менее 20 см от потолка,\nчтобы обеспечить беспрепятственную циркуляцию воздуха в прицепе.\nДанные измерения температуры должны проводиться для всех грузов, требующих контролируемой\nтемпературы, и документироваться в товаросопроводительных документах.\nФрукты и овощи очень чувствительны к температуре. Поэтому для таких транспортных заказов,\nпожалуйста, заранее согласуйте с STi подходящий для конкретной перевозки метод предварительного\nохлаждения и поддержания температуры транспортировки на основе измерения температуры приема.\nЕсли возможно, и если необходимо, с поддержкой STI, запросите картонные коробки или поддоны на\nместе погрузки, чтобы обеспечить защиту верхних слоев от повреждения морозом.\nВ целом, вы получите от диспетчера STI инструкции, касающиеся температуры перевозки, относящиеся\nк конкретному виду транспорта. Если в исключительных ситуациях вы не получите соответствующих\nинструкций от диспетчера STI, пожалуйста, уточните их заранее.\nЕсли вы не уверены или получили противоречивые инструкции на месте погрузки, остановите процесс\nпогрузки, немедленно свяжитесь с диспетчерской STI и получите инструкции. Ни при каких\nобстоятельствах не принимайте инструкции с места погрузки.\nРегистратор температуры холодильного агрегата должен быть активирован для всех транспортов с\nконтролируемой температурой. Для каждого транспорта температурный профиль должен быть доступен\nдля просмотра на протяжении всего пути по прибытии на место разгрузки.\n\n\n6.Количество груза\nПриемка товара (количество и вес брутто): Перед подписанием любых документов на месте погрузки\nнеобходимо провести следующие проверки и принять следующие меры:\nПроверьте количество коробок (если они присутствовали при загрузке) или количество поддонов для\nзагрузки. Если это не соответствует количеству, указанному в заказе на транспортировку STI, немедленно\nсообщите об этом STI.\nДля продуктов, которые, как известно, полностью используют (или даже превышают) полезную нагрузку\nприцепа (например, фрукты и овощи/мясо и т. д.), общий вес груза (см. документы с места\nпогрузки/накладные/транспортную накладную и т. д.) необходимо сравнить с общим весом, указанным в\nзаказе на перевозку компанией STI. Если обнаружено превышение общего веса, указанного диспетчером\nSTI, необходимо немедленно уведомить об этом STI, и вам следует дождаться дальнейших инструкций.\nНе подписывайте никаких документов на месте, пока не получите инструкции от STI.\nВ принципе запрещено самостоятельно укладывать товары/поддоны друг на друга.\nИсключение: если это прямо указано вашим диспетчером STI.\n7. Правила на погрузочно-разгрузочных площадках\nИндивидуальные правила/правила поведения для всех «гостей» на погрузочно-разгрузочных площадках,\nкоторые обычно вывешиваются в зоне входа и/или в зоне приема/отправки товара, а также общие правила\nработы и безопасности (например, передача ключей от грузовика) должны строго соблюдаться.\nВ принципе, вы должны полностью соблюдать все индивидуальные правила поведения на объекте, такие\nкак:\nСамостоятельное приготовление пищи только в кабине водителя\nКурение вне кабины водителя запрещено.\nПользование местными санитарными удобствами\nВам запрещено обсуждать вопросы, связанные с транспортировкой, с персоналом склада на территории.\n\n\nЕсли вы чувствуете, что с вами обошлись несправедливо или вас неправильно поняли, немедленно\nсообщите нам об этом. Не позволяйте ситуации обостряться; мы решим этот вопрос.\n8. Герметизация\nДля заказов, в которых требуется опломбирование в соответствии с отдельным уведомлением в заказе на\nтранспортировку:\n•\n\nМесто погрузки несет ответственность за физическое опломбирование прицепа, т. е. водителю не\nразрешается опломбировать прицеп. Это не влияет на обязанность водителя закрепить прицеп.\n\n•\n\nМесто\n\nпогрузки\n\nнесет\n\nответственность\n\nза\n\nдокументирование\n\nномера\n\nпломбы\n\nв\n\nтоваросопроводительных документах; водитель должен сравнить номер пломбы с номером,\nуказанным в товаросопроводительных документх.\n•\n\nЕсли на месте погрузки отказываются пломбировать прицеп или номер пломбы не соответствует\nномеру в товаросопроводительных документах, товаросопроводительные документы не следует\nподписывать, а STI следует немедленно уведомить об этом и ждать указаний.\n\nВо время транспортировки:\nЦелостность пломбы необходимо проверять до и после каждого вскрытия.\n•\n\nВ случае повреждения/отсутствия пломбы поездка должна быть остановлена, STI должен быть\nнемедленно уведомлен. и ожидать дальнейших инструкций. Место, дата и время должны быть\nуказаны в товаросопроводительных документах. Кроме того, если это возможно, водитель должен\nприкрепить новую пломбу и записать новый номер пломбы в товаросопроводительных\nдокументах.\n\n•\n\nЕсли органам власти, таким как полиция, таможня или ветеринарная служба, требуется доступ к\nгрузу, необходимо обеспечить замену пломбы на официальную пломбу органа власти и сделать\nотметку об этом в товаросопроводительных документах. Если этого не сделано, в\nтоваросопроводительных документах необходимо указать регистрацию транспортного средства\nоргана власти, местонахождение, дату и время, а также немедленно уведомить об этом STI и\nожидать дальнейших инструкций.\n\n\nРазгрузка груза:\n•\n\nПри прибытии прицеп необходимо предъявить службе безопасности или приемщику товара на\nместе разгрузки для подтверждения целостности пломбы.\n\n•\n\nМесто разгрузки несет ответственность за снятие пломбы. Необходимо убедиться, что в\nтранспортных документах указано «Пломба цела/не повреждена»; в противном случае\nнеобходимо немедленно уведомить STI и ждать указаний. Водителю не разрешается\nсамостоятельно открывать пломбу.\n\n•\n\nПримечание: в случае утраты или поломки печати правила получателя на месте могут включать,\nнапример, назначение аварийного комиссара.\n\n9. Надзор за процедурами погрузки/разгрузки\nВы должны контролировать процедуры погрузки и разгрузки, также в ваших интересах.\n•\n\nЕсли вас отстранили от наблюдения за погрузочно-разгрузочными работами, необходимо\nнемедленно уведомить об этом STI.\n\n•\n\nПринимая во внимание количество поддонов и общий вес груза, который необходимо загрузить в\nсоответствии с заказом STI, вы несете ответственность за безопасную погрузку (например, осевые\nнагрузки и т. д.). Если во время погрузки или разгрузки обнаружены какие-либо из следующих\nдефектов качества, процесс необходимо немедленно остановить, немедленно уведомить STI и\nожидать дальнейших инструкций.\n\n•\n\nЗагрязнение товара\n\n•\n\nОткрытая упаковка\n\n•\n\nПлохая упаковка и/или крепление поддонов (например, минимальная/плохая/ненадлежащая\nупаковка)\n\n•\n\nТип поддона\n\n•\n\nКачество поддонов, особенно европоддонов (дефектные/отсутствующие блоки/доски, грязные,\nмокрые, заплесневелые и т. д.)\n\nЕсли вы не можете устранить вышеуказанные дефекты на месте самостоятельно, сохраняйте\nспокойствие, свяжитесь с STI и ждите инструкций. Ничего не подписывайте.\n\n\n•\n\nКрепление груза: После того, как вышеупомянутые дефекты будут исключены, вы несете\nответственность за закрепление груза во избежание смещения или опрокидывания.\n\n•\n\nПосле завершения загрузки прицеп должен быть защищен от доступа третьих лиц как минимум\nвстроенным и/или навесным замком, желательно также с помощью стального замка с когтями.\n\nЕсли при разгрузке заявлено или предполагается повреждение из-за температуры, необходимо\nнемедленно закрыть двери прицепа. Холодильная установка должна продолжать работать при\nтемпературе транспортировки, указанной STI. При необходимости получатель или STI направит\nинспектора для оценки. Ждите указаний от STI.\n10.Общая информация\nПомните, что ваша подпись после погрузки или разгрузки подтверждает определенное состояние\nперевозимого вами груза. Даже если вы не видели весь груз, ваша подпись всегда подтверждает то, что\nбыло задокументировано отправителем или получателем. Подпись - Ответственность — будьте\nбдительны!\n11.Разное\nИнструкции от сторонних экспедиторов должны быть подтверждены STI перед выполнением. Никогда\nне следуйте инструкциям от третьих лиц без получения подтверждения их точности от STI. Это касается,\nсреди прочего, инструкций от:\n•\n\nПоставщики/погрузочные площадки\n\n•\n\nМеста приема/разгрузки.\n\n•\n\nОбеспечение сохранности товаров, находящихся под вашим контролем\n\n•\n\nГруз должен быть по возможности надежно закреплен и транспортирован между погрузкой и\nразгрузкой.\n\n•\n\nСредства безопасности на прицепе должны использоваться всегда, и их функциональность не\nдолжна быть нарушена.\n\n•\n\nВсегда используйте охраняемые парковочные зоны для перевозки дорогостоящих грузов и\nфармацевтических препаратов.\n\nВ противном случае необходимо принять все возможные меры для предотвращения\nнесанкционированного доступа к грузу третьих лиц.\nЭто также включает в себя упреждающее планирование периодов вождения и отдыха, а также\nкоординацию соответствующего времени погрузки и разгрузки по согласованию с STI.\n\n\nЦель состоит в том, чтобы минимизировать ненужные остановки. Это особенно важно в районах,\nизвестных высоким риском преступности, или в регионах, где третьи лица пытаются незаконно\nпроникнуть в страну в качестве «безбилетников в вашем грузовике».\nОтклонения от Транспортного Порядка\nSTI необходимо немедленно уведомлять о любых отклонениях от выданного заказа на перевозку,\nнапример, о предполагаемых задержках, технических проблемах, особенно связанных с перевозками с\nконтролируемой температурой\n12. Обработка персональных данных\nС 01.02.2025 г. в рамках наших Систем управления транспортом (TMS) мы будем хранить следующие\nперсональные данные водителей:\nИмя (имя и фамилия)\nНомер телефона\nЭти данные обрабатываются для:\nРегистрация водителей для доставки/забора грузов на определенных погрузочных площадках,\nОбеспечить бесперебойную обработку транспортных заказов.\nУметь быстро связываться с водителями в экстренных ситуациях.\nОбработка основана на законном интересе (ст. 6(1)(f) GDPR) для эффективной обработки транспортных\nпроцессов, а также обеспечения безопасности.\nИмена водителей также обрабатываются в других процессах для создания списков посещаемости для\nобучения водителей, для отслеживания перемещения поддонов (накладные поддонов) и, при\nнеобходимости, для документирования нарушений пломб.\nЭти данные будут предоставлены третьим лицам следующим образом:\nВ некоторых случаях для регистрации на погрузочных площадках необходимо предоставить имя\nводителя и номерной знак грузовика.\nДля перевозок в портовых зонах номер телефона водителя также будет предоставлен соответствующим\nорганам или операторам порта.\nДля создания онлайн-обучения данные водителя будут введены в инструмент онлайн-обучения.\nДля учета поддонов имена водителей можно импортировать в программу управления документами.\nВ случае повреждения пломб грузовых автомобилей данные могут быть предоставлены для выяснения\nнарушений безопасности перевозок.\nДанные будут храниться в течение периода трудоустройства. Как только водитель перестает быть нашим\nсотрудником, его данные будут удалены в течение 14 дней.\n\n\nВы имеете право:\nДоступ к сохраненным данным,\nИсправление неверных данных,\nУдаление или ограничение обработки при условии соблюдения требований законодательства,\nВозражать против обработки по определенным причинам."}, {"title": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ", "content": "1.Документы для таможеных процедур:\n2.Доверенности на тягач и полуприцеп;\n3.Одноразовые дозволы на вьезд в страну в которую нужно доставить груз или транзитный дозвол\nстраны по территории которой едим транзитом. Перед командировкой дозволы выдает менеджер по\nнеобходимости, а водитель обязан проверить правильные ли дозволы ему выдал менеджер.\n4.Экспортная декларация с гарантией или книжкой Carnet TIR.\n5.Водитель приезжая в СВХ таможни сообщает менеджеру и предоставляет все документы на груз\nсотруднику таможни. После растаможки груза водитель обязан из таможни забрать все документы\nгруза с отметками сотрудников таможни и отправиться на место разгрузки.\nПростой: Если на растаможку и разгрузку в странах СНГ уходит более чем 48 часов водитель обязан об\nэтом сообщить менеджеру и заполнить лист простоя."}, {"title": "ОТЧЕТ ДОКУМЕНТОВ ГРУЗА", "content": "1.Водитель обязан после рейса предоставить отчет-путевой лист за каждый рейс технику в отдел учета.\nK отчету прилагаются все на груз сопровождающие документы и расходные чеки за этот рейс.\n2.После командировки в тот же день, водитель обязан по акту приема-сдачи тягача сдать транспортное\nсредство и ключи от тягача инженеру-механику, все документы от транспортного средства и от груза\nсдать в отдел учета. Не выполнение этих обязанностей является грубым нарушением должностей\nводителя.\n11. Основные документы\nCMR накладная выписывается в 6-и экземплярах, из которых одину забирает отправитель груза, две\nнакладные на границе забирают таможенники, одна на растаможке груза, одну забирает получатель груза\nи последнюю получатель груза, расписывается и ставит печать в 24-ой графе и отдает водителю.\nПереадресование груза, “неутральная“ CMR накладная. Возможно за то время пока водитель едет\nк получателю груза, груз будет перепродан и в пути надо будет поменять место растаможки и разгрузки\nгруза, а так же сопровождающие документы. Такая практика легальная, но водителю обязательно нужно\nследовать строгим указаниям менеджера.\n\n\n11.1.Доверенность на тягач и полуприцеп\n11.1.1. Перед рейсом каждый водитель обязан взять доверинность на эксплуатацию полуприцепа компании\nА.Груцюса.\n\n2 обр.: Доверенность на полуприцеп\n\n11.1.2. Доверенность выписывает и выдает менеджер, ответсвенный за выдачу документов в рейс. Этот\nдокумент нужен водителю если он едет в страны СНГ или транзитом едут через Польшу , что он\nимеет право на перевозку груза с полуприцепом компании А.Грицюса.\n11.2.Разрешение-доверенность\n11.2.1.1.Этот документ выдают в 301 каб., со всеми документами на груз чтобы забрать нужный контейнер\nс терминалов\n\n„Smeltė“ ул. Nemuno . 24, или „Klaipėdos konteinerio terminalаs“ toliau „KKT“ ул.\n\nPerkėlos 8. O том с какого терминала нужно забирать контейнер сообшает менеджер.\n11.2.2. Документ предявляем охране при въезде на нужный терминал. Не имея разрешения-доверенность\nна контейнер, водитель на территорию портового терминала не впускается.\n11.2.3. Документ выдается в двух экземплярах. Первый чтобы забрать (гружёный или пустой) контейнер\n\nиз порта, а второй, чтобы его сдать в порт.\n\n\n3 обр.: Разрешение-доверенность\n\n11.3.Упаковочный лист (angl. Packing list)\n11.3.1.На погрузке груза отправитель выдает погрузочный лист, в котором указаны все данные сколько\nзагружено паллет, ящиков, вес и расположение груза. Данные в упаковочном листе („loading list“/“packing\nlist” – žr. 2 pvz.). должны совпадать с данными в CMR накладной и в счете-фактуре (Invois).\n\n\n4 обр. Упаковочный лист\n(„packing list”)\n\n11.3.2.Во время погрузки груза, водитель обязан присутствовать, считать количество груза, проверить\nтемпературу, следить на качеством груза и упаковки, расположение груза в полуприцепе чтобы небыло\nперегруза на ведущую ось тягача.\n\n11.3.3.Дополнительно имеется два погрузочных листа, которые заполняются водителем на погрузке в\nстранах ЕС:\na) Загружая груз в странах ЕС на територию СНГ: водитель самостоятельно заполняет\nПогрузочный лист (обр.: ). Ответсвенно заполняет все графы на бланке и прилагает его к грузу\nсопровошдающим документам.\n\n\nb) Загружая груз в STI GmbH (Германия), водитель заполняет Погрузочный лист STI (žr. 4 pvz.)\nи прилагает его к грузу сопровошдающим документам.\n\n5 обр. Погрузочный лист\n\n6 обр. STI Погрузочный лист\n\nКнижка Carnet TIR / Книжка МДП\n11.3.4. Carnet TIR книжка – документ для таможенного транзита, который действителен во всех\nстранах СНГ и заменяет таможенную декларацию или гарантию. Документ бывает двух видов,\n6-ти листов или 4-ех листов, в зависимости от количества границ, которые надо проехать. Один\nлист отрывается на таможни отправления груза, другой на месте растаможке груза, в пути на\n\n\nкаждом томоженном переходе органы таможни отрывают по два листа. В Белоруссии и Россию\nиспользуем 4-ех листов книжку, а на Казахстан заполняем 6-ти листов книжку.\nКак запонять обложку книжки Carnet TIR\n\n7 обр. Книжка МДП\n\nОбложка Carnet TIR:\n1. Срок годности книжки Carnet TIR. Документ можно открыть до даты указаной на обложке книжки\nCarnet TIR .\n2. Национальная асоциация международных перевозок в Литве „Linava“;\n3. Название и реквизиты пользователя книжки;\n4. Печать асоциации „Linava“;\n5. Подпись руководителя асоциации „Linava“;\n6. Страна отправления груза;\n7. Страна получателя груза;\n8. Гос. Номера транспортного средства;\n9. Номер сертификата полуприцепа;\n10. Номер контейнера;\n11. Подпись отведственого лица перевозщика;\n11.3.5. Внутринние листы Carnet TIR :\n1. Номер Carnet TIR;\n2. Место отправки;\n3. Организация IRU;\n4. Пустой;\n\n\n5. Страна открытия книжки;\n6. Страна доставки груза;\n7. Гос. Номера транспортного средства;\n8. Груз сопровождаюшие документы (Но. Invoice и дата, Но. CMR и дата)\n9. Номер контейнера;\n10. Информация про груз;\n11. Вес груза;\n12. Таможня доставки груза и количество мест груза;\n13. 14. 15. Место где открывается книжка , дата, печать и подпись перевозчика;\n11.3.6. Перевозя груз с книжкой Carnet TIR в документах водитель обязан:\n11.3.6.1. Проверить срок действия Carnet TIR, его можно открывать на таможне до числа указанного на\nобложке документа. Проверить все ли указанные данные о грузе, транспортном средстве\nправильные. Если вы обнаружали ошибку в документе, тогда одним движением вычеркиваем\nнеправильные данные и рядом вписываем правильную информацию, рядом расписывается\nводитель и ставится печать перевозчика.\n11.3.6.2.После оформления обезательно проверить корочку Carnet TIR. Таможник обязан на корьне Carnet\n\nTIR\n\nпоставить личную печать и расписатся, а так же написать код таможеного поста где\n\nоформлен Carnet TIR, номер пломбы на полуприцепе и код следуюшей таможни.\n\n8 обр. Корачка книжки МДП\n\n11.4.Транспортировка груза по Гаранту\n11.4.1. Алтернатива документу Carnet TIR является “Национальная гарантия”. Наша компания работает\nс “Дургой” и с “Бунастой” которые имеют лицензию делать национальную гарантию для\nлитовских грузоперевозчиков.\n11.4.2. Если в таможенный союз (Белоруссия, Россия, Казахстан) отправляемся без Carnet TIR, на границе\nоформляемся по национальной гарантии. Обратите внимание где получить национальную\nгарантию в каждом отдельном случае по табличке ниже:\n\n\nБЕЛОРУСИЯ\nГребнево / Увылинка\n\nРОССИЯ\n\nУКРАИНА\n\nНо. Гаранта\nприсылается водителю\nна телефон\n\nТерехово / Бурачки\n\nНо. Гаранта\nприсылается водителю\nна телефон\n\nСилене / Урбаны\n\nУ декларантов\n„ПАРЕХ“ на границе.\nЗаказ в „БУНАСТЕ“\n\nЛоворишкес/\n\n“Дурга” по адресу\n\nГарант забирать в\n\n“Дурга” по адресу\n\nКотловка\n\nPerkėlos str. 1C,\n\n„БУНАСТЕ“ по адресу\n\nPerkėlos str. 1C,\n\nKlaipėda, или “Дурга”\n\nŽirnių str. 12, Vilnius\n\nKlaipėda, или “Дурга”\n\nна погран переходе\n\nна погран переходе\n\nМядининкай/\n\n“Дурга” по адресу\n\nГарант забирать в\n\n“Дурга” по адресу\n\nКаменый Лог\n\nPerkėlos str. 1C,\n\n„БУНАСТЕ“ по адресу\n\nPerkėlos str. 1C,\n\nKlaipėda, или “Дурга”\n\nŽirnių str. 12, Vilnius\n\nKlaipėda, или “Дурга”\n\nна погран переходе\n\nна погран переходе\n\nШалчининкай/\n\n“Дурга” по адресу\n\nГарант забирать в\n\n“Дурга” по адресу\n\nБенякони\n\nPerkėlos str. 1C,\n\n„БУНАСТЕ“ по адресу\n\nPerkėlos str. 1C,\n\nKlaipėda, или “Дурга”\n\nŽirnių str. 12, Vilnius\n\nKlaipėda, или “Дурга”\n\nРайгардас / Привалка\n\nна погран переходе\n\nна погран переходе\n\n“Дурга” по адресу\n\n“Дурга” по адресу\n\nPerkėlos str. 1C,\n\nPerkėlos str. 1C,\n\nKlaipėda, или “Дурга”\n\nKlaipėda, или “Дурга”\n\nна погран переходе\n\nна погран переходе\n\nОбр: Места получения национальной гарантии\n\n11.4.3. Если нужно оформлятся в “Дурге”, тогда водитель сам заезжает к декларантам на фирму, сдает им\nвсе документы на груз и ждет пока будет сделана национальная гарантия. А если национальный\nгарант делаем через компанию “Бунаста”, тогда все груз сопровождавшие документы менеджер\nотсылает декларантам Бунасты, а водитель сам документ национального гаранта забирает по адресу\nŽirnių str. 12, Vilnius. Если едем через границу “Силене/Урбаны” тогда в “Бунасту” заезжать не надо,\nнациональную гарантию забираете на погранпереходе в компании “ПАРЕХ”.\n11.5. Счет-фактура на груз\n\n\n11.5.1.Счет-фактура (“Invoice“/“Rehnung”) один из главных документов при перевозке груза в страны\nСНГ. Водитель обязан удостоверится, что документ оригинальный, если получили копию, немедленно\nсообщить менеджеру.\n11.5.2.На месте погрузки забирая счет-фактуру, водитель обязан проверить все данные о грузе (\nколичество, вес, название груза, отправитель, получатель груза...). Если информация в счете-фактуре не\nсовпадает с информацией в других груз сопровождающих документах, без отдельного разрешения\nменеджера ехать строго запрещаетса.\nТрейлерный лист\n11.5.3.Водитель, принимая в рейсе полуприцеп у другого водителя, обязан заполнить трейлерный лист и\nв нем отметить все внешние повреждения и внутриние повреждения, остаток количества топлива, мото\nчасы агрегата и комплектацию полуприцепа и о состоянии полуприцепа СМС сообщением сообщить\nменеджеру;\n11.5.4.Трейлерный лист обязаны подписать водитель который принимает полуприцеп и водитель который\nсдает его. Если на трейлерном листе нету подписи хоть одного из водителей, этот трейлерный лист не\nдействителен и оба водителя несут ответственность за новые повреждения.\nКаждый раз при замене полуприцепа водитель обязан сделать 4 фото полуприцепа и вместе с\nтрейлерном листом отправить на планшет\n\n\nЛист простоя (заполняется в странах СНГ)\n11.5.5.Водитель обязан в странах СНГ на месте погрузки, разгрузки и на территории таможни дать лист\nпростоя ответственным лицам, чтобы они отметили время прибытия у отбытия вашего транспортного\nсредтства с их территории.\n11.5.6.Необходимо правильно заполнить все графы листа простоя, и удостовериться ,что в каждой графе\nза простой ответсвенное лицо в местах погрузки / разгрузки груза или в тамошне.\n11.5.7.Если возникают какие либо недаразумения по заполнению листа простоя с ответсвеными лицами\n(отказывается подписать или не совпадает даннэ,...), водитель обезан связатся с менеджером и сним\nвыеснить все нюансы сложившейся ситуации и следовать дальнейшими его указаниями. Без разрешения\nменеджера или без листа простоя не в коем случае не уежать из территории.\nЕсли во время водитель не представит лист простоя, лицам ответсвенным за простой (на местах погрузки,\nразгрузки и таможни), наша компания теряет возможность потребовать компенсации за простой. Поэтому\nнаша компания имеет право потеренную сумму потребовать от водителя ответсвеного за правилное\nзаполнение ему доверенных документов;\n\n\n9 обр. Заполненый лист простоя"}, {"title": "ОБМЕН ПАЛЛЕТ", "content": "1.Получив заказ от менеджера об обмене евро паллет, обязательно их надо поменять на погрузке и\nвернуть на выгрузке. Перед обменом паллет количество паллет те которые будете менять должны\nнаходиться в полуприцепе. на территориях предприятия паллеты переносить с палетников в полуприцеп\nстрого запрещено. паллеты переносить можете на парковкe. Максимально по времени перегрузка\nпаллет не должно занять более 30 минут. Обмен происходит между евро паллетами, поэтому вернуть\nВы должны такие же евро паллеты, какие и отдавали, обратите внимание на качество паллет (НЕ\nМЕНЯТЬ КРАШЕННЫЕ). Необходимо, как доказательство получить документ об обмене паллет.\nДействующие документы об обмене паллетами – фирменные А. Грицаус листы об обмене паллетами со\nштампом или оригинальные выдаются на складе. На нашем фирменном листе в графе поменяны/ changed\nи вернули/ pallets back должно быть указанно точное количество паллет, сколько меняли и сколько\nвернули, а так же возле отправителя и получателя роспись и штамп, которые доказывают, что обмен\nпаллетами был совершен. Исправлять пaлeтный лист запрещено. Каждый раз после обмена паллет\nинформировать своего менеджера письменно сколько паллет поменяли, сколько паллет вернули, сколько\nпаллет загрузили.\nЕсли Вы не получили оригинал документов или не ставят штамп на фирменном бланке, мы получаем\nот клиента долг, т.к. не можем доказать, что обмен был (цена одной паллеты от 13 до 15 евро, в\nзависимости от линии на которой работаете). В таком случаи, будучи на погрузке или выгрузке об этом\nВы должны информировать менеджера, сказать причину, по которой Вы не будите менять или\nвозвращать паллеты. Запомните, что запись на CMR lieferschein- не подходит, может быть исключением\nтолько в том случае если возвращаете столько паллет, сколько и выгрузили, например: выгружено 33\nпаллеты, вернули 33 паллеты. Если выгрузили одно количество паллет, а вернули другое количество\nили совсем не вернули, тогда информируете менеджеров и обязательно получить документ о паллетах.\n2. Во время выгрузки, получив большое количество паллет, чем может поместится в ящик для паллет (\nкомплект 33 паллеты , в ящик для паллет помещается 36), вы должны проинформировать менеджера\nили человека ответственного за паллеты, что у вас избыток паллет, в том случаи падаем запрос клиенту\n,который говорит куда надо отдать\n\nизбыток\n\nпаллет. Когда будите отдавать лишние паллеты,\n\nзаполненный документ-лист также необходим, получив его Вы скрепляете с другими документами на\nтот рейс, после которого осталось больше паллет.\n3.Водители, которые работают на DHL линии должны не забыть на документе о паллетах в графе\nкомментарии или, зайдя на склад, перед тем как выпишут оригинальный лист указать Konto, или\nпроизводя обычный\n\nобмен и указать Konto: DHL FOODSERVICES FRANKFRUT, при передачи\n\nменеджер или ответственный за паллеты человек пришлет вам другой Konto, в зависимости от того в\nкакую фирму будит, осуществляется передача. Во время передачи паллет , просим Вас, получить\nоригинальные листы ,т.к. некоторые клиенты не признают наши фирменные бланки. Не получив\nоригинального документа, так же надо информировать. Информацию надо передавать точно человеку,\n\n\nотвечающему за паллеты. Предоставление информации должно быть точным и понятным, например:\nTrip 295827 место погрузки Вайле загружено 33 паллеты / обменено 33 паллеты - на выгрузке в\nПадборге выгружено 33/ вернули 33 , получил оригинальный паллетный лист, также поставили штамп\nна нашем фирменном листе.\n\n10 обр. Как заполнять лист для обмена паллет\n\n11.6.Сертификаты\n11.6.1.Водитель получив один из сертификатов обязан досконально проверить все данные в нем – тому\nли клиенту он выписан, соответствуют ли все данные о грузе (название, вес, количество) в других груз\nсопровождающих документах. Во всех сертификатах должна быть поставлена оригинальная печать и\nподпись отправителя груза.\n\n\n11.6.2.О том какой сертификат нужен для перевозки определенного груза надо узнать у своего менеджера.\n\n\n10 обр. Сертификты\n\n\n11.7.Экспортная декларация\n11.7.1.После погрузки груза, который нужно перевозить через границу Евро Союза, открывается ЕХ\nдекларация. На затаможке груза водитель получает ЕХ декларацию, которую нужно предъявить в\nтаможне на границе СНГ/ЕС. Одну копию ЕХ декларации водитель обязан привезти\nпредоставить вместе с отчетом.\n11 обр. Экспортная\nдекларация"}, {"title": "ДЕКЛАРАЦИЯ ОБ ЭКСПОРТЕ", "content": "на базу и\n\n\n\nОТЧЁТ-ПУТЕВОЙ ЛИСТ\n1.Отчет-путевой лист заполняется отдельно на каждый зацепленный новый полуприцеп, kогда он\n\nполный, когда меняется номер рейса.\nВодитель обязан заполнить все необходимые графы отчета, расписатся и приложить к нему все груз\nсопрождающие докуметы (lieferschein) и расходные чеки в дороге.\n2.Заполняя маршрут движения на Отчете-путевом листе обязательно нужно написать промежуточные\nточки (переходы границы) транзита. (Обр.: Клайпеда – Москва поделить на отдельные отрывки – 1.\nКлайпеда – Мядининкай; 2. Каменный Лог – Красная Горка; 3. Красная Горка –Москва; 4. Москва –\nКрасная Горка; 5. Красная Горка – Каменный Лог; Мядининкай- Клайпеда.)\n3.Заполненный Отчет-путевой лист со всеми прилагаемыми документами сдать в отдел учета, сразу\nпосле командировки.\n\n\n12.образец\n\nзаполнения отчета путевого листа\n\n\nПодтверждение о прибытии транспортного средства.\n1.Это документ в котором отмечается, когда транспортное средство с грузом приехало на СВХ\nуказанной таможни, фиксируются какие документы были сданы сотруднику таможни и\nрезультаты первоначального осмотра транспортного средства и груза. Этот документ является\nдоказательством что груз от границы РФ доставлен на указанную таможню для растаможки.\n2.Подтверждение о прибытиии транспортного средства после рейса обезательно сдавать\nвместе с Carnet TIR. Мы в свою оочередь эти оба документа обязаны сдавать в ассоциацию\nмеждународных автомобильных перевозчиков РФ (АСМАП).\nДозвол на транзит или вьезд в страну\n1.Если перевозчик начал поездку (рейс) за пределами России, то дозвол должен быть заполнен\nдо въезда на территорию РФ. В случае, если этот рейс в Россию проходит через страны\nЕвразийского экономического союза (ЕАЭС), граничащие с РФ (например, Беларусь,\nКазахстан), то дозвол заполняется до въезда в эти страны. В противном случае, должностные\nлица данных стран будут вправе выдать перевозчику соответствующее уведомление для\nустранения причин нарушения правил перевозки грузов РФ.\n2.Если перевозчик начал поездку (рейс) в России, то дозвол должен быть заполнен до загрузки\nтранспортного средства на территории РФ. Но следует обратить внимание на следующее.\nНапример, если перевозчик завершил рейс по маршруту Литва – Россия в г. Москве, а\nследующий рейс в обратном направлении начинается в г. Ярославле, то во второй столбец\nдозвола необходимо внести соответствующую информацию сразу после разгрузки груза в г.\nМоскве. При порожнем рейсе в обратном направлении правило то же, второй столбец\nзаполняется сразу после разгрузки груза в г. Москве.\nПри проезде транспортного средства с грузом по территории России заполняются\nследующие пункты бланка дозвола:\n• наименование иностранного перевозчика и адрес (п. 4) – в законе отсутствуют\nограничения по способу указания реквизитов перевозчика. Их можно написать от руки\nили проставить в этом пункте штамп перевозчика с реквизитами компании\n•\n\nрегистрационный номер транспортного средства (п. 5) — регистрационный номер\nтранспортного средства вписывается без ошибок, как в свидетельстве транспортного\nсредства.\n\n•\n\nместо, дата выдачи и печать уполномоченного иностранного органа, выдавшего\nдозвол\n\n(п. 8) – при получении дозвола проверяется наличие соответствующих\n\nреквизитов органа.\n•\n\nдата и место въезда на территорию РФ (п. 9) – указывается первое место въезда в РФ\nпо данному дозволу и дата этого въезда (например, Бурачки 01.01.2017).\n\n•\n\nнаименование перевозимых грузов (п. 10) – наименование вписывается без ошибок и\nуказывается как в CMR.\n\n\n•\n\nвес перевозимых грузов (п. 11) — вес вписывается без ошибок и указывается как в\nCMR.\n\n•\n\nпункт погрузки (п.12) — указываются город (деревня, село) и страна погрузки груза\n(например, Вильнюс Литва).\n\n•\n\nпункт разгрузки (п. 13) — указываются город (деревня, село) и страна разгрузки груза\n(например, Москва Россия).\n\n11.7.2. При проезде порожнего (пустого) транспортного средства по территории\nРоссии заполняются следующие пункты:\n•\n\nнаименование иностранного перевозчика и адрес (п. 4) – в законе отсутствуют\nограничения по способу указания реквизитов перевозчика. Их можно написать от руки\nили проставить в этом пункте штамп перевозчика с реквизитами компании.\n\n•\n\nрегистрационный номер транспортного средства (п.5) — регистрационный номер\nтранспортного средства вписывается без ошибок, как в свидетельстве транспортного\nсредства.\n\n•\n\nместо, дата выдачи и печать уполномоченного иностранного органа, выдавшего\nдозвол\n\n(п. 8) — при получении дозвола проверяется наличие соответствующих\n\nреквизитов органа.\n•\n\nдата и место въезда на территорию РФ (п. 9) – указывается первое место въезда в\nРоссию по данному дозволу и дата этого въезда (например, Бурачки 01.01.2017).\n\n•\n\nнаименование государства начала поездки (п. 12) — в этом пункте указывается страна\nначала поездки (например, Литва).\n\n•\n\nнаименование государства завершения поездки (п.13) — указывается страна начала\nпоездки (например, Россия).\n\n3.По мнению должностных лиц транспортной инспекции, внесение изменений (исправлений)\nв дозвол не допускается. Однако данный запрет ни одним нормативно-правовым актом не\nустановлен.\n4.В случае, если заказчик перевозки (отправитель или получатель груза) в ходе перевозки\nгруза по какой-либо причине воспользовался правом переадресации места конечной доставки\nтовара, то в п. 13 дозвола необходимо указать новый населенный пункт России через запятую\n(например, Москва, Россия, Тула). При этом населенный пункт «Москва» в дозволе не\nзачеркивать.\n5.В случае, если перевозчик, например, в обратном направлении на территории России\nполучил заказ на перевозку груза, при этом он на этот момент уже заполнил второй столбец\nдозвола (по правилам порожней перевозки грузов), то в месте погрузки водителю необходимо\n\n\nбудет заполнить полностью п.п. 10 и 11 бланка дозвола и дополнить наименование\nнаселенных пунктов в п.п. 12 и 13."}, {"title": "ДОКУМЕНТЫ ПОДТВЕРЖДАЮЩИЕ РАСХОДЫ В ПУТИ", "content": "Когда водитель в пути расчитывается карточкой или наличными именем компании, обязан взять счетфактуру или другие документы подтверждающие покупку услуги или товара ( топливо, АдБлю,\nпарковка, винета, за дороги, ремонт и т.д.).\n\n13 обр. Документы подтверждвющие расходы , чеки"}, {"title": "КАРТОЧКИ ДЛЯ ОПЛАТЫ ДОРОГ И ТОПЛЕВНЫЕ КАРТОЧКИ.", "content": "ВОДИТЕЛЬ В РЕЙСЕ ОБЯЗАН ИМЕТЬ НИЖЕ ПЕРЕЧИСЛЕНЫE\nКАРТОЧКИ\nОтветсвенный +370 656 90811 Дарюс\nВажно!!!\nВсе пин-коды от карточек находятся на планшете, сохранять пин-коды строго запрещено\nТопливо заправляем всегда по указанию ме
