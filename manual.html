сир, тем более).\n\n28. При повороте водитель должен следить за тем, чтобы задние колеса движущегося автомобиля (прицепа), катящиеся с меньшим радиусом, чем передние, чтобы они не задевали препятствие, а транспортное средство не выезжало на полосу встречного движения.\n\n29. Если поворот дороги окажется круче ожидаемого, необходимо снизить скорость."}, {"title": "ОСТАНОВКА", "content": "30. Тормозной путь - расстояние, которое проходит автомобиль с момента обнаружения водителем препятствия до его полной остановки.\n\n31. Остановочный путь - расстояние, пройденное автомобилем с момента остановки водителя нажимает на педаль тормоза до полной остановки.\n32. Время реакции – расстояние, пройденное автомобилем с момента, когда водитель заметил препятствие, до момента, когда он начал торможение.\n\n33. Тормозной путь прямо пропорционален квадрату увеличения скорости: т.е. Трехкратное увеличение скорости увеличит тормозной путь в девять раз.\n\n34. Конструкция рулевого механизма не влияет на тормозной путь. Максимальный тормозной путь зависит от скорости движения, конструкции тормозного привода, количества тормозных колес и силы нажатия на педаль тормоза.\n\n35. Расстояние – это расстояние между автомобилями, следующими друг за другом.\n\n36. При движении за большой машиной нужно держаться от нее как можно дальше\n\nрасстояние быть впереди виден более длинный участок дороги.\n\n37. При резком торможении (при хороших условиях движения) нужно нажать на тормоз\n\nпедаль не знаяпедали сцепления\n\n38. Если при торможении заторможенные колеса блокируются и скользят по поверхности дороги,тормозной путь ведра\n\n39. При движении по скользкой дороге тормозной путь автомобиля уменьшится, если сделать торможение прерывистый торможением без выключения сцепления и передачи (при отсутствии АБС)\n40. При движении по скользкой дороге торможение двигателем без блокировки колес улучшает управляемость автомобиля стабильность.\n\n41. При резком торможении пассажиры и незакрепленный груз движутся вперед.\n42. Если вы резко затормозите в пробке, вас могут ударить удары ехавших сзади\n\n43. В случае внезапного отказа рабочих тормозов необходимо включить пониженную передачу и затормозить стояночный (ручной) тормоз. По возможности используйте любое препятствие.\n44. Если автомобиль долго стоит на крутом склоне с выключенной передачей, он может перегретьсяи тормоза отказывают.\n\n45. Автомобиль с неравномерным износом шин на левом и правом колесах резко тормозить опасно, так как он может соскользнуть с дороги и перевернуться.\n\n46. ​​При торможении автомобиля с двигателем чем круче уклон, тем ниже нужно выбирать механизм."}, {"title": "РЕАКЦИЯ ВОДИТЕЛЯ, ЧУВСТВА, РЕКОМЕНДУЕМЫЕ ДЕЙСТВИЯ", "content": "47. Время реакции водителя - интервал времени с момента, когда водитель заметил препятствие для совершения конкретных действий.\n48. Время реакции пьяного водителя увеличивается.\n\n49. У уставшего и больного водителя ослабевает внимание, увеличивается время реакции.\n50. По мере увеличения скорости движущегося автомобиля угол обзора водителя уменьшается.\n\n51. Эмоциональное возбуждение водителя отрицательно сказывается на безопасности движения.\n\n52. Если водитель устал и хочет спать, он должен остановиться и отдохнуть.\n\n53. Встречные автомобили окрашены в темные цвета (серый, темный синий), создает иллюзию того, что они движутся медленнее, чем на самом деле.\n\n54. Встречный большой автомобиль создает иллюзию того, что он движется\n\nдвижется быстрее, чем на самом деле.\n\n55. На педали сцепления и тормоза рекомендуется нажимать средней частью педали. 56. Подъезжая к перекрестку параллельных дорог, рекомендуется смотреть на него слева направо.\n\n57. В жилых районах необходимо присутствовать при проезде мимо остановки маршрутного автобуса.мы осторожны, потому что мы пешеходы может выбежать перед стоящим автобусом или троллейбусом, а также маршрутным транспортом имеет приоритет при выезде с остановки, участок\n\n58. После обгона транспортного средства рекомендуется вернуться в правую полосу при зеркало заднего вида, видит обгоняемую машину.\n\n59. Остановившись на склоне и дождавшись сигнала светофора или регламентированного сигнала, автомобиль желательно сохранить стояночный тормоз на месте.\n\n60. При начале движения в гору стояночный тормоз необходимо отпускать синхронно с автомобилем при трогании с места (отпусканием сцепления и нажатием педали акселератора).\n\n61. Опасно оставлять автомобиль с дизельным двигателем на стоянке на склоне с включенной передачей,потому что может сам запустить двигатель\n\n62. Если вас ослепили солнечные лучи, снизьте скорость, продолжайте движение только в том случае, если вы уверены, что будет в безопасности\n\n63. При движении по дороге расстояние до встречных транспортных средств выглядит обманчиво - выглядит больше, чем есть на самом деле.\n\n64. Длительное и частое ускорение автомобилей на первой передаче увеличивает расход топлива.\n\n65. Расход топлива будет самым низким при движении на высшей передаче.\n\n66. Плавный разгон и плавное торможение обеспечивают минимальный расход топлива.\n67. На эффективность вождения влияет плавность хода автомобиля, включенная передача (скорость движения), дорога условия, состояние систем зажигания и питания, стиль вождения.\n\n68. При повороте водитель должен стараться как можно меньше двигаться задним ходом.\n\n69. При минусовой температуре машину мыли перед стоянкой под открытым небом\n\nсайт, обязательно просушить тормозные колодки (во время движения на малой скорости, часто нажимая на педаль тормоза)."}, {"title": "ВОЖДЕНИЕ В ТЕМНОТЕ", "content": "70. Дальний свет всегда рекомендуется при приближении к вершине холма в темноте.\n\nфонари переключиться на ближний\n\nЕхать на автомобиле со скоростью 90 км/ч в темное время суток вне населенных пунктов небезопасно, так как тормозной путь больше длины освещенного участка дороги.\n\n72. Дорога будет лучше в темное время суток, во время сильного снегопада, дождя, града, тумана видно, когда туман включен фары вместе с ближним светом.\n\n73. Чрезмерная нагрузка на заднюю ось легкового автомобиля приведет к плохой управляемости, на ближний свет может ослепить встречных водителей.  Бочки\n\nКраткое содержание\n\nПеревозка жидких грузов по суше, что очень часто бывает опасным, т.е. химических или нефтепродуктов, на практике используются автоцистерны. Хотя этот метод популярен и широко используется в мире, однако танкеры создают серьезные проблемы с безопасностью движения, что может привести к травмам, гибели людей, потере имущества или понесению экономических потерь. Также утечка жидкого груза во время аварии может привести к загрязнению окружающей среды. Поэтому необходимо уделять большое внимание обеспечению безопасной перевозки наливных грузов в автоцистернах.\n\nЦелью данной работы является исследование особенностей протекания жидкости в автосистеме и реакцию конструкции на это явление. Рассмотрены конструкции танкеров - их виды и назначение. Это объясняет, почему существующие цистерны имеют такую ​​форму. Проанализированы литературные источники, объясняющие влияние этих грузов, перевозимых цистернами, на динамику конструкции, применяемые ограничения. В нем описываются особенности и использование FSI (взаимодействия жидкости и конструкции) для взаимодействия жидкости и конструкции при динамическом испытании конструкция-жидкость.\n\nРасчетное расположение центра масс тягача и автоцистерны при различных условиях загрузки груза. Теоретически рассчитанный тормозной путь системы составляет 16,2 м (50 км/ч)/53,09 м (90 км/ч), а время 2,3 с (50 км/ч) и 4,2 с (90 км/ч). Моделирование движения жидкости в резервуаре под действием ускорения проводилось с различными конструкциями резервуаров. Проведены гидростатические и динамические испытания жидкости в системе телос. Предел текучести дуплексной стали составляет -450 МПа. Максимальное напряжение, полученное в результате исследований, составляет -433 МПа.\n\nПоскольку динамические испытания проводились при посадочном ускорении 1g, то в реальных условиях ускорение тормозной цистерны в сборе с использованием АБС может достигать 0,6g. можно сказать, что конструкция достаточно прочная, но для дальнейшей оптимизации конструкции необходимы дополнительные исследования.\n\n1.4.1. Для жидких грузов\n\nКогда дело доходит до безопасной, надежной и экономичной перевозки грузов из одного места в другое, автомобильный транспорт трудно превзойти. Настолько сложно, что автоперевозки по-прежнему являются наиболее широко используемым видом транспорта в Европе. Использование железной дороги является популярным выбором для перевозки очень больших грузов на большие расстояния, но трудно превзойти грузовик, когда речь идет о большинстве товаров, которые необходимо перевозить по стране.\n\nЭтот вид автомобильного транспорта занимает лидирующие позиции на европейском транспортном рынке. Прицепы для грузовых автомобилей идеально подходят для обслуживания «от двери до двери» и известны своей надежностью, гибкостью, скоростью, меньшей вероятностью повреждения и относительно низкой стоимостью. Учитывая это, около 75% объема грузов (Ukm) в ЕС перевозится этим видом транспорта. Другими благоприятными чертами автомобильного транспорта являются возможность перевозки небольших посылок на относительно короткие расстояния и надежная перевозка дорогостоящих товаров. Характер автомобильных перевозок, помимо степени развития местной инфраструктуры, зависит от расстояния, на которое товары перевозятся автомобильным транспортом, от веса и объема отдельной партии грузов, а также от вида перевозимых товаров. На фургоне или пикапе можно ездить на короткие расстояния и с небольшими грузами. Для больших грузов больше подходит грузовик, даже если загрузка неполная.\n\nАвтоцистерны, предназначенные для перевозки одного груза, имеют один отсек, а те, которые перевозят несколько грузов, имеют внутренние перегородки в своих цистернах. Отличительными факторами прицепов-цистерн являются форма цистерны, тип груза, который перевозит прицеп, и размер. Другими отличительными факторами являются холодопроизводительность, устойчивость к давлению и кислотостойкость. Некоторые модели специально разработаны в соответствии с национальными правилами перевозки сжиженных грузов. Таким образом, структура трейлеров будет варьироваться от страны к стране. Однако функциональность прицепов одинакова вне зависимости от производителя,\n\nОсновным преимуществом грузоперевозок является то, что грузовик может добраться из пункта А в пункт Б быстрее, чем любой другой тип транспортного средства. Это связано с тем, что грузовик может двигаться по самому прямому маршруту, не требуя расписания. Грузовики прочны и надежны и могут легко передвигаться по любым дорогам, независимо от погодных условий, в том числе от снега, что очень важно, учитывая, что климат в пункте А может совершенно отличаться от конечного пункта Б. Несмотря на расстояние, перевозка небольших грузов по Грузовик очень экономичный, опытные водители могут быстро загрузить и разгрузить. GPS-отслеживание и отсеки с регулируемой температурой делают грузовики универсальными и могут перевозить самые разные товары.\n\n[]\nРисунок 1.19 Движение жидкости в баке за счет ускорений [11]\n\n1. Стоянка грузовика;\n\n2. Происходит ускорение. Грузовик движется. Жидкость скапливается в конце бака;\n\n3. Ускорение увеличивается. Грузовик разгоняется. Жидкость скапливается в конце системы;\n\n4. Ускорение стабилизируется. Грузовик уверенно разгоняется. Жидкость равномерно оседает в конце бака; 5. Ускорение стабилизируется. Грузовик уверенно разгоняется. Жидкость равномерно оседает в конце бака:\n\n6. Ускорение становится равным 0. Грузовик движется устойчиво. Жидкость начинает стабилизироваться, накапливается с переди;\n\n7. Ускорение равно 0. Тележка движется равномерно. Жидкость начинает стабилизироваться, скапливается спереди; 8. Ускорение равно 0. Тележка движется равномерно. Жидкость стабилизируется,\n\n9. Начинается торможение. Ускорение становится отрицательным;\n\n10. Полное торможение. Ускорение отрицательное. Жидкость скапливается впереди кисты;\n\n11. Полное торможение. Ускорение отрицательное. Жидкость полностью сконцентрирована в передней части кисты;  12. Грузовик остановился. Ускорение равно 0. Жидкость стабилизируется до исходного состояния (рис. 1).\n\nНиже показано движение жидкости в резервуаре без перегородок, когда резервуар подвергается кратковременному ускорению в осевом направлении:\nРисунок 2.6 Хранение жидкости в баке без перегородок[]\n\nСилы действующие на груз\n\nОчень важно закрепляя груз оценить какие физические силы могут действовать во время транспортировки.  Ускорение – движение с места. Груз намерен склонятся назад.  Торможение – груз намерен двигатся в сторону кабины водителя.  На повороте – Груз склоняется в бок.  []  []  []  1.  Водитель на погрузке обязан закрепить груз так, чтобы силы действиющие на груз (рис. 1) при транспортировке груза, не могли повлиять на завал груза. В схеме указано, какая сила влияет на груз при транспортировке груза, которая измеряется Kn (килоньютоны), 1 Kn – 1 кг;\n\n[]\n\nКрепление груза\n\n2.  Крепление груза в тентовом полуприцепе:  1.  Ремни. Они используются для крепления груза в тентовых полуприцепах. На ремнях есть этикетки, в которых написано: длина, вес который выдержит ремень, процент растяжение ремня. Водитель обязан надежно ремнями закрепить загруженный груз в тентовом полуприцепе. Чтобы не повредить углы груза, всегда используйте пластмассовые уголки для крепления груза.  [] [][Vaizdo rezultatas pagal užklausą „krovinio tvirtinimo strypas“]  [] []\n\n2.  Резиновые коврики. Они повышают силу трения, если пол полуприцепа чистый, на коэффициент 0,6. Если контакт коврика с поверхностью покрытый льдом, измазан маслом – сила трения значительно уменьшается. Их надо подложить так, чтобы через них передавался весь вес груза.  [http://www.cgp-coating.com/images/ajoute/fiche/13-image_fiche_0x0.jpg] [Fig.: ELTECPUR® pads and strips for cargo securing]  Крепление груза в контейнере:\n\n3.  На погрузке водитель должен следить,чтобы хорошо был закреплен груз отправителем груза;\n\n4.  Если есть подозрения что груз закрепили не правильно, водитель обязан немедленно об этом сообщить менеджеру.\n\n3.  Крепление груза в полуприцепе-рефрижераторе:  1.  С зади паллеты с грузом крепятся по две штанги на каждую паллету (150kg);\n\nЕсли в последнем ряду стоит одна паллета с грузом, ее надо ставить к борту, сзади закрепить одной штангой, а сбоку двумя штангами, паллету на предпоследнем ряду так же одной штангой; Совет: не оставлять одну паллету в конце полуприцепа.\n\n2.  Для дополнительного крепления груза в двухэтажном полуприцепе надо использовать перекладины второго этажа, легко прижав груз сверху;\n\n3.  При перевозке груза с температурным режимом, водитель должен проследит, чтобы не были зажаты вентиляционные рукавицы перекладинами второго этажа;  [Fixation] [C:\\Users\\Vartotojas\\Desktop\\Documents\\FOTO\\DSCN1195.JPG]  [22222] [11111]\n\nСпецифические грузы:\n\n4.  Перевозка грузов на паллетах.  1.  Используются стандартные (EURO) паллеты для перевозки груза (которые соответствуют стандартам ISO 445-1984). Основной изготовительный материал паллет – дерево, а стандартные размеры – 800x1200x150 mm. Паллеты должны быть с соответствующей маркировкой которая гарантирует,что паллета после фумигации. Ниже видны образцы маркировки плохого качества:  [media-share-0-02-05-62bf04f47a153cd09cee9b624b4b3c2000d97cc9423b48b59508] [media-share-0-02-05-2104a9755f2d7364e9b32fc2f3cfb37215b6179c6c48b553c5c6]\n\n[] [&kcy;&acy;&kcy; &kcy; &pcy;&acy;&lcy;&lcy;&iecy;&tcy;&iecy; &kcy;&rcy;&iecy;&pcy;&icy;&tcy;&scy;&yacy; &gcy;&rcy;&ucy;&zcy;]\n\n5.  Если груз упакован не правильно и об этом знает отправитель груза, перевозчик не несет ответственности за сделанный ущерб при транспортировке груза. По этому водитель обязан оценить хорошо ли упакован груз для его перевозки, а заметив недостатки – потребовать чтобы перепаковали или дополнительно укреплен, а если сотрудники склада отказываются это сделать, немедленно об этом сообщить своему менеджеру и дальше следовать указаниям менеджера;"}, {"title": "ВРЕМЯ ВОЖДЕНИЯ И ОТДЫХА ВОДИТЕЛЯ", "content": "-  Ежедневный отдых  «период регулярного ежедневного отдыха» означает период отдыха не менее 11 часов. Попеременно этот период  регулярного ежедневного отдыха может быть использован за два периода, первым из которых должен быть непрерывный период не менее трёх часов, а вторым – непрерывный период продолжительностью не менее девяти часов.  «период сокращенного ежедневного отдыха» означает период отдыха по крайней мере 9 час, но  менее 11 часов;\n\n-  Еженедельный отдых  «период регулярного еженедельного отдыха» означает период отдыха длительностью по крайней мере 45 часов.  «период сокращенного еженедельного отдыха» означает период отдыха менее 45 час., который, в соответствии с условиями Статьи 8(6) может быть сокращен минимум до 24 последовательных часов;  После 1 рабочей недели – 24 ч отдыха, после 2-ой – 45 ч., после 3-ей недели – 24 ч., после 4-ой недели – 45 ч. И т.д.....\n\n-  Периоды вождения транспортного средства\n\nМаксимальное кол-во рабочих дней за неделю: 6 дней, после чего должхен быть выходной 24 часов или 45 часов; Пример: Если рабочая неделя начнается в субботу в 15:40 значит на ежинедельный отдых останавливаемся в следуюшую пятницу в 15:40 часов; За эти 6 дней рабочих периодов может быть 6 и 7 и 8...., это не является нарушением графика вождения и отдыха водителя.\n\nЕжедневное время вождения не должно превышать 9 час. Однако ежедневное время вождения может быть продлено не более, чем до 10 часов не более двух раз в Календарную неделю.\n\nЕженедельное время вождения не должно превышать 56 час. Общее накопленное время за две любые последующие недели вождения не должно превышать 90 часов.\n\nЕсли случтся так, что Вы превышаете время вождения или обшее время работы, Не забудьте сделать распечатку На обратной стороне написать причину переработки. Причина должна быть написанa вам понятным языком.\n\n-  Пауза  После периода вождения в четыре с половиной часа водитель должен сделать непрерывный перерыв не менее 45 минут, если не начат период отдыха.  Этот перерыв может быть заменен перерывом продолжительностью не менее 15 мин. С последующим перерывом  не менее 30 мин., каждый из этих периодов должен быть распределен в течение периода таким образом, чтобы соблюсти положения первого параграфа.\n\n-  Декларация об отпуске\n\nВернувшись после отпуска / отдыха дома, водитель обязан взять отпускную декларацию у планерах, о том, что не работали с того дня как начался отпуск до того дня как опять начинаете работать.\n\nВодитель, это Ваша обязанось убедиться в том, что даты и личние данныe в декларации об отпуске были верны. Вы несете полную ответсвенность за его точность."}, {"title": "ПОРЯДОК ИСПОЛЬЗОВАНИЯ ДОРОЖНЫХ АППАРАТ", "content": "ПРАВИЛА ИСПОЛЬЗОВАНИЯ АППАРАТОВ ДОРОЖНЫХ ПЛАТЕЖЕЙ\n\nОтветсвеный Дарюс +370 656 90811\n\nПлатежи за платные дороги в Европейских странах – Польше, Австрии, Германии, Чехии, Словакии, Франции, Испании, Португалии, Италии, Норвегии, Дании- выполняются с помощью аппаратов дорожных платежей.\n\nЛитва - Суточные виньетки покупаются на заправке CIRCLE K (При выезде из базы), Передвижение По городу бесплатно, открывать дороги надо тогда когда выезжаете на  магистральные дороги. Возвращаясь из Польши в Литву дороги открывать надо С помощью сообщения (SMS), можно покупать Литовские (LT), Латышские (LV), Эстонские (EE) винетки на день (D). Сообщение формируется следующим образом-код страны, срок действия винетки и регистрационный номер автомобиля. Текст сообщения должен быть написан латинскими буквами!\n\nНапример:\n\nВинетка на один день в Литве: LTD AAA111 (номер тягача на которым Bы работаете а не ааа111)\n\nВинетка на один день в Латвии: LVD AAA111 (номер тягача на которым Bы работаете а не ааа111)\n\nВинетка на один день в Эстонии: EED AAA111 (номер тягача на которым Bы работаете а не ааа111)\n\nСообщение (SMS) отправлять на номер : +37066000120\n\nЗаглавные буквы или маленькие неважно. Можно писать как LTD AAA 111, так и LTD AAA111 так и ltd aaa111.\n\nУспешно заказав услугу приходит сообщение (SMS).\n\nЕсли винетка по какой либо причине не была куплена, так же приходит сообщение об ошибке Тогда Виньетку надо покупать на границе в MEDICINOS BANKAS.\n\n[]\n\n| В Польше – DKV  | В Чехии – Myto  |\n| Если аппарат не сработал: Вам надо -Закачать приложение с Play Маркета e-TOLL PL. И работать по приложению | Если аппарат не сработал (негарит значёк € в зелёном) его поменять на первой заправки АЗС с карточкой AS24 Eurotrafic |\n|  | Один звуковой сигнал  |\n| [][Już działa nowy system poboru opłat drogowych e-TOLL - YouTube]  |  |\n|  | [][]  |\n+============================================================================================================+=======================================================================================================================+\n\n| Германия – Toll Collect  | Австрия – GoBox  |\n| Если аппарат не сработал, нужно заехать на первую АЗС с карточкой Tll Collect купить дороги до сервиса ремонта апарата. | Если аппарат не сработал его поменять на первой заправки АЗС с карточкой AS24 Eurotrafic |\n|  | Один звуковой сигнал  |\n|  | [][][][]  |\n+=========================================================================================================================+==========================================================================================+\n\n[][][][][]\n\n[][][][]\n\n| Во Франции, Испании, Португалии – Passango Если аппарат не сработал DKV | Италии – Telepass  |\n| в Португалии ехать где нету шлагбаума.  | Если аппарат не сработал за дороги заплатить карточкой ViaCard |\n|  | [][Telepass-large]  |\n+=========================================================================+================================================================+\n| []В Дании за мосты КОКДА НЕТУ РЕФ НОМЕРА платoм DKV[]  | []Бельгия (только аппарат)  |\n|  | [][]  |\n\nТакже у некоторых машын есть новый апарат DKV. Он работает- Германия,Белгия,Франция, Испания, Португалия, Италии, Польша, Швейцария, Венгрия\n\n[]\n\nНастройки аппарата DKVA в странах:\n\n[]\nОткуда взять аппарат?\n\nКак правило, аппараты для дорожных платежей находятся в кабине тягача, на котором Вы поедите в рейс.\n\nАппараты Telepass,если их нет в кабине тягача, выдает главный учет техник.\n\nЧто касается других аппаратов, которых нет в кабине тягача или Вам их не выдали, выдают на В пунктах при въезде в страну.\n\nДля получения аппарата оплат дорог вам надо предоставить три документа: Техпаспорт транспортного средства, лицензию о перевозе груза, документ emission класса.\n\nКак узнать правильно ли работает аппарат для дорожных платежей?\n\nАппараты, которые встроены в тягаче – работают автоматически. Как правило, дополнительно их регулировать не надо. Обязательно убедиться что настройки настроены правильно в каждой стране настройки разные.\n\nОднако! При въезде в Австрию, не забудьте заехать на бензоколонку на австрийской границе, чтобы Ваш аппарат GO BOX оператором бензоколонки был бы настроен и адаптирован к ряду платежей в Австрии.\n\nОбратите внимание, что во время езды по платным дорогам Австрии, Польше, Чехии и Словакии, необходимо внимательно следить за работой аппарата. Проезжая через платежные пункты, должна загореться зеленая лампочка и слышаться звуковой сигнал, поэтому выключите радио, постарайтесь, чтобы Вас не беспокоили посторонние звуки.\n\nУ хорошо функционирующего аппарата зеленый свет или звуковой сигнал, должен сработать один раз.\nВ вышеупомянутых странах нет никаких барьеров (шлагбаумов) на дорогах, которые не открываются, если вдруг аппарат не сработал, поэтому надо обязательно следить за звуковым и световым сигналом у аппарата. В результате чего, при въезде на платную дорогу и, не заплатив (не сработал аппарат), вы получите штраф.\n\nКакие сигналы показывает аппарат, если он не сработал\n\nЕсли не сработал аппарат для дорожных платежей ДАЛЬШЕ ЕХАТЬ ВЫ НЕ МОЖЕТЕ\n\nВ Германии, если во время проезда через платежные пункты не сработал аппарат Toll Collect, то на экране появляются следующие знаки:\n\n-  Зеленая лампочка проморгала 2 или более раз;\n\n-  Послышался звуковой сигнал ошибки;\n\n-  Обычный звуковой сигнал сработал 2 и более раз подряд;\n\n-  Лампочка не замигала и звуковой сигнал не сработал;\n\n-  На экране отобразилось сообщение об ошибке: „OBU DEFECTIVE SERVICE“, „GSM FAULT SERVICE“, „DSRCS DEFECTIVE SERVICE“, „CHECK CREDIT LINE“, „ UNIT BLOCKED“,\n\nВ Чехии, если во время проезда через платежные пункты не сработал аппарат Myto,\n\n-  жёлтый или краснаый значёк €\n\nВ Словакии, если во время проезда через платежные пункты не сработал аппарат, то на экране появляются следующие знаки:\n\n-  Все время горит красный знак предупреждения (кнопка, на которой отображен треугольник и восклицательный знак);\n\n-Не горит кнопка с осью чисел;\n\n-Повторяющейся звуковой сигнал;\n\n-Мигающий красный знак предупреждения (кнопка, на которой отображен треугольник и восклицательный знак);\n\n-Отсутствие звукового сигнала;\n\n-Периодично мигающий знак предупреждения (кнопка, на которой отображен треугольник и восклицательный знак) со звуковым сигналом (повторяющимся или одноразовым).\n\nВышеупомянутых случаях, указывающих, что дорожный аппарат не работает, звоните начальнику. Транспорт учета тел. +37065690811. Вы будите, направлены на ближайшую бензоколонку, чтобы ваш аппарат заменили и проверили, а также заплатить дорожный налог.\n\n1.  Как установить число осей?\n\nНеобходимое число осей восстанавливается перед въездом на платную дорогу.\n\nGoBox- необходимое число осей выбирается коротким нажатием кнопок аппарата. Выбрав правильное число осей (загорится на дорожном аппарате число 4), кнопку аппарата подержав более 2 секунд, число осей зафиксируются.\n\nЧтобы проверить правильно ли установлено число осей – надо коротко нажать на кнопку аппарата и должно загореться установленное число осей.\n\nToll Collect- число осей обычно установлено. На экране должно показывать число осей не меньше чем 5 и гореть более 18т.\n\nSkytoll – нажмите и удержите до 5 секунд кнопку со знаком предупреждения (кнопка, на которой отображен треугольник и восклицательный знак). Нажатие кнопки повторите до того момента пока загорится нужное вам число осей т.е. пока загорится 4.\n\nЕсли у Вас возникнут какие либо вопросы по эксплуатации аппаратов, немедленно обращайтесь начальнику Транспорт учета тел. +37065690811.\n\nЗа правильную работу  и настройки дорожных аппаратов несёт ответственность водитель\n\nОплата дорог в Белоруссии и России осуществляется с дорожными аппаратами.\n\nАппарат оплаты белорусских дорог. При въезде в Белоруссию на аппарате установите количество осей 4+ и посмотрите,чтобы светился зеленым светом знак Х. Если аппарат не сработал, обязательно заезжаете на первую заправку и с карточкой Е100 поменяете на другой аппарат. Об этом обязательно нужно сообщить менеджеру ответственному за топливные карточки +37065690811.\n\n[BY keliu aparatas][RUS keliu aparatas]\n\nАппарат оплаты Беларусских дорог\n\nАпарат оплаты российских дорог. При вьезде на территорию России посмотрите, чтобы зеленым светом горели два нижних знака: связь и спутник. Если не работает российский аппарат для оплаты дорог, необходимо звонить на <Платон> с телефона с российской СИМ карточкой по номеру 8 800 5500202. Надо будет сообщить ПИН код Дагриса – 6208, затем им рассказать по какому маршруту вы планируете ехать. Когда по телефону Вы закажите российские дороги, об этом обязательно нужно сообщить менеджеру ответственному за топливные карточки +37065690811.\n\n25. Пульт управления THERMO KING  []  1.  Постоянный режим (Continuous mode).  2.  Температура в камере (1 зона).  3.  Установлена температура (1 зона).  4.  Охлаждение (1 zona).  5.  1 зона мягкая кнопка  6.  2 зона мягкая кнопка.  7.  Мягкая кнопка меню.  8.  Экран 2-ой зоны.\n\nКнопки управления\n\n[]Кнопка-включить агрегат.\n\n[]Выключать агрегат.\n\n[]Кнопка размораживания.\n\n[]Кнопка автоматного или постоянного режима. ( CYCLE-SENTRY).\n\n[]4 мягкие кнопки для включения выбранной программы."}, {"title": "ИНСТРУКЦИЯ ПО БЕЗОПАСНОСТИ ТРУДА И ЗДОРОВЯ ДЛЯ ВОДИТЕЛЕЙ", "content": "A.Griciaus autotransporto įmonė\n\n(įmonės pavadinimas)  1  4  0  1  6  8  8  2  9  ( įmonės kodas)"}, {"title": "ИНСТРУКЦИЯ №", "content": "ПО БЕЗОПАСНОСТИ ТРУДА И ЗДОРОВЯ ДЛЯ ВОДИТЕЛЕЙ МЕЖДУНАРОДНЫХ РЕЙСОВ (перевод с литовского языка)"}, {"title": "ОБЩАЯ ЧАСТЬ", "content": "1.  Водителю, перевозящему грузы по международным маршрутам (далее – водитель), нарушившему требования этой инструкции, применяется установленные законом Литовской Республики санкции, моральная, административная и уголовная ответственность, в зависимости от характера и последствий нарушения.\n\n2.  Водитель, перевозящий грузы, должен иметь не меньше трёхлетний стаж вождения автомобиля (из них – один год вождения по международным перевозкам) для определённых дорожных транспортных средств перевозки грузов и пассажиров, водитель должен иметь документ, доказывающий приобретения начальной профессиональной квалификации.\n\n3.  Водитель должен быть проинструктирован (оформлен в журнале регистрации инструкций) согласно:\n\n1.3.1. вводной инструкции по охране труда и здоровья;\n\n1.3.2. инструкции по оказанию первой медицинской помощи;\n\n1.3.3. инструкции по охране здоровья и безопасности труда (в зависимости от места работы);\n\n1.3.4. инструкция по охране труда и здоровья для не электротехнического персонала;\n\n1.3.5. общая инструкция о мерах пожарной безопасности;\n\n1.3.6 план действия работников при пожаре;\n\n1.3.7. инструкция по безопасности труда и здоровья при погрузке, разгрузке и транспортировке грузов;\n\n1.4. Водитель должен быть проинструктирован периодически – не реже одного раза в 12 месяцев.\n\n1.5. Водитель дополнительно должен быть проинструктирован:\n\n1.5.1. если рабочий инструмент, материал, техника заменена или модернизирована, или поменялись рабочие условия, факторы риска рабочей среды, создающие угрозу безопасности труда и здоровья рабочего;\n\n1.5.2. если утверждены новые или введены поправки в нормативные документы предприятия (по охране труда и здоровья рабочих предприятия, правила по безопасности выполнения работы и др.)\n\n1.5.3. водителю нарушив требования охраны труда и здоровья, из-за которого произошёл или мог произойти несчастный случай, авария, взрыв, пожар;\n\n1.5.4. по просьбе инспектора труда, или когда определено, что у рабочего недостаточно знаний для выполнения порученной работы;\n\n1.5.5. водителям отсутствующих на работе более чем 60 календарных дней.\n\n1.6. Водитель обязан:\n\n1.6.1. знать, и придерживается Правилам дорожного движения, а также требовать, чтобы их придерживались лица находящиеся в автомобиле;\n\n1.6.2. самовольно не выключать, не менять и не исправлять неисправности оборудования и механизмов, беречь рабочий инструмент, оборудование, соблюдать требования установленные по безопасности труда и здоровья, их надлежащим образом использовать, и о неисправностях сообщать представителю работников, техническому отделу, руководителю предприятия;\n\n1.6.3 должным образом использовать коллективные и индивидуальные средства защиты;\n\n1.6.4 инструменты строго использовать по его документальному (паспорту) назначению, или по требованиям указанным в этой инструкции;\n\n1.6.5. немедленно сообщить руководителю предприятия, задания давшему менеджеру, техническому отделу, представителю работников, инженеру по технике безопасности, комитету по охране труда и здоровья, о положении на рабочем месте, в помещении, в котором, по его убеждению, могут быть угрозы безопасности здоровья работников, а также, о нарушениях требований охраны здоровья работников и безопасности труда, которые не может удалить сам или не обязан;\n\n1.6.6. сотрудничать с представителями работников, с инженером по технике безопасности, руководителям предприятия, с руководителем технического отдела в реализации требований и средств по охране здоровья работников и безопасности труда;\n\n1.6.7. насколько это возможно и позволяют знания принять меры при остром отравлении, при травмах, при удалении причины аварии, и об этом немедленно сообщить руководителю технического отдела и руководителю предприятия;\n\n1.6.8. проходить проверку здоровья в соответствие установленному порядку. Проходить проверку здоровья по графику составленным работодателем и центром здравоохранения. Водители ознакомлены с данным графиком под расписку.\n\n1.6.9. сообщать работодателю или его представителю, о полученных травмах во время работы или других заболеваниях, связанных с работой;\n\n1.6.10. придерживается правилам внутреннего распорядка компании, на работе не употреблять алкогольных напитков и наркотических средств, курить в специально отведенных местах;\n\n1.6.11. придерживаться правил личной гигиены, следите за тем, чтобы одежда и обувь были чистыми, руки мыть только предназначенным для этого средством;\n\n1.7. Водитель имеет право:\n\n1.7.1. требовать, чтобы работодатель создал безопасные условия работы, установил коллективные средства защиты, обеспечил средствами индивидуальной защиты;\n\n1.7.2. узнать у руководителя технического отдела, руководителя предприятия, о вредных и (или) опасных для здоровья производственных факторов рабочей среды;\n\n1.7.3. ознакомится с результатами медицинского контроля. Если с ними не согласен, проверится дополнительно;\n\n1.7.4. советоваться об улучшении рабочих условий с руководителем предприятия, руководителем технического отдела;\n\n1.7.5. отказаться от выполнения работ из-за возникновения опасности для жизни и здоровья;\n\n1.7.6. требовать по установленному законом порядку возмещения компенсации за нанесённый вред здоровью из-за опасных рабочих условий;\n\n1.7.7. возникнув вопросам о безопасности и здоровье, обратиться к представителю работников, руководителю технического отдела, руководителю предприятия, по охране труда и здоровья комитету, Государственную инспекцию труда, или в другую инстанцию;\n\n1.8. водитель обязан знать и соблюдать правила пожарной безопасности. Знать где в предприятии находятся первичные средства пожаротушения, уметь ими пользоваться, избегать пожара – вызывающих действий;\n\n1.9. водитель обнаружив пожар должен:\n\n1.9.1. незамедлительно сообщить в пожарную службу, вызвать на место пожара дежурного механика, инженера-механика (если пожар возник в рабочее время), сообщить руководителю технического отдела, руководителю предприятия, тушить очаг возгорания предназначеными средствами для тушения пожаров;\n\n1.9.2. при нахождении в пути, обратится помощи по телефону 911 или 112, тушить очаг пожара имеющимся средствами пожаротушения.\n\n1.10. Режим вождения и отдыха установлен регламентом (ЕB) №561/2006 или AETR и определяется следующем:\n\n1.10.1. Перерывы и отдых. После непрерывного периода вождения в 4,5 часа водитель должен сделать перерыв не менее 45 минут.\n\n1.10.2. Распределённые перерывы. Разделить перерыв, т.е., Время руля можно разбить на две части  отдыха:  первая из них должна быть не меньше 15 минут вторая часть должна быть не меньше 30 минут.\n\n1.10.3. Ежедневный отдых. Ежедневное время вождения водителя обычно не должно превышать 9 часов, т.е. два периода вождения продолжительности по 4,5 часа каждый с перерывом между ними 45 мин. Однако может быть увеличено максимум до 10 часов и не более 2-х раз в Календарную неделю. Это значит что Придётся делать ещё одну 45 минутную паузу. Во время отдыха водитель не должен заниматься другой трудовой деятельностью. Ежедневный отдых это отдых который длится не меньше 11 часов, но ежедневный отдых можно сократить до 9 часового отдыха не более 3 разa в  рабочую неделю. После каждого 9 часового или 11 часового отдыха начинается новая-рабочая смена (или новый рабочий день).\n\n1.10.4. Лимит времени недельного вождения. Установленный фиксированный лимит времени недельного вождения – 56 часов. Максимальное время вождения за две последовательные недели 90 часов. Водитель отработавший за 2 недели 70 часов обязан известить об этом своего менеджера.\n\n1.10.5. Недельный отдых. Регулярный недельный период отдыха – не менее 45 часов. Недельный отдых может быть сокращен до 24 часов. Hеделный отдых преревать нелзя. После каждого 45 часового или сокращённого 24-часового отдыха начинается новая Рабочая неделя.\n\n1.10.6. Переправление паромом. Переправляясь с паромом Водитель имеет право прервать свой суточный отдых 2 раза Но не более 1 часа. Еженедельный отдых прерывать запрещено."}, {"title": "РИСКИ ПРОФЕССИОНАЛЬНЫХ ФАКТОРОВ, СРЕДСТВА БЕЗОПАСНОСТИ ОТ ИХ ВОЗДЕЙСТВИЯ", "content": "2.1. Основные факторы профессиональных рисков водителя на рабочем месте это:\n\n2.1.1. выхлопные газы;\n\n2.1.2. психологические травмы;\n\n2.1.3. химические вещества;\n\n2.1.4. перевозки грузов;\n\n2.1.5. падающие предметы;\n\n2.1.6. транспорт передвижения;\n\n2.1.7. насилие;\n\n2.1.8. помехи;\n\n2.1.9. физическая усталость;\n\n2.1.10. установка узлов и блок движущихся частей\n\n2.1.11. в зоне погрузки/разгрузки поднятый груз;\n\n2.1.12. электрическое напряжение превышающее 50 V;\n\n2.1.13. легковоспламеняющиеся жидкости;\n\n2.1.14. электролиты;\n\n2.1.15. антифризы.\n\n2.2. Вредные факторы и их допустимые нормы:\n\n2.2.1. выхлопные газы двигателя CO = 20 mg/m³;\n\n2.2.2. антифриз 1000 mg/m³;\n\n2.3. Краткая характеристика опасных факторов:\n\n2.3.1. установка узлов и блок движущихся частей могут затянуть рукав или руку и ее ранить;\n\n2.3.2. в зоне погрузки/разгрузки поднятый груз может упасть и причинить тяжелые или смертельные травмы;\n\n2.3.3. неосторожное использование устройств, через которое проходит электрическое напряжение, можно получить смертельную травму;\n\n2.3.4. ЛВЖ и его пары в жидком виде через кожу, а в газообразном виде через дыхательные пути попадают в организм и отравляют его;\n\n2.3.5. электролиты аккумулятора опасны тем, что попав брызгам на незащищенную часть тела может обжечь его, глаза;\n\n2.4. Краткая характеристика вредных факторов:\n\n2.4.1. этилированный бензин, нитро красители и их разбавители в жидком виде через кожу, а в газообразном виде через дыхательные пути попадают в организм и отравляют его;\n\n2.4.2. выхлопные газы автомобиля содержат окись углерода С, которая очень опасна для человека, длительное воздействие окиси углерода на организм человека может привести к смертельному исходу;\n\n2.4.3. всегда надо следить, чтобы не было утечки антифриза, т.к. в жидком виде через кожу, а в газообразном виде через дыхательные пути он попадает в организм и отравляет его;\n\n2.5. Обязательные меры защиты:\n\n2.5.1. индивидуальные меры защиты;\n\n2.5.2. Спецодежда, рабочий костюм из хлопка;\n\n2.5.3. для защиты от механических повреждений (порезы, проколы) рабочие перчатки;\n\n2.5.4. сигнальная жилетка;\n\n2.5.5. куртка или теплый костюм;\n\n2.6. Средства защиты выдаются работодателем (доверенным лицом), под роспись.\n\n2.7. Признаки негодности средств защиты:\n\n2.7.1. порванная спецодежда из хлопка, или промокший костюм в смазочных материалах или другой грязи;\n\n2.7.2. измазанные или грязные перчатки;\n\n2.7.3. рваные перчатки, которые полностью не прикрывают кисть руки;\n\n2.7.4. использовать средства защиты запрещено обнаружив хоть один признак из перечисленных выше;\n\n2.8. Негодными средствами индивидуальной защиты пользоваться запрещается, они должны быть поменяны на подходящие;\n\n2.9. Индивидуальные меры защиты считаются собственностью работодателя, поэтому водитель должен все вернуть уходя с работы, или поменяв место работы в том же предприятии где эти средства не предусмотрены на данном рабочем месте.\n\n2.10. Водитель обязан:\n\n2.10.1. работать с индивидуальными средствами защиты;\n\n2.10.2. бережно присматривать за индивидуальными средствами защиты и использовать по назначению, вовремя сообщить прямому начальнику о их износе, загрязнении, о непригодности в использовании, и о окончании срока их использования;\n\n2.10.3. если средства индивидуальной защиты по вине работника пропали или были испорчены, по установленному законом порядку, работник должен будет возместить ущерб.\n\n2.11. руководитель предприятия или его доверенное лицо должны обеспечить рабочих всесторонней информацией, о безопасности и гигиены труда организации предприятия, о находящемся или возможном риске при разгрузке/погрузке груза ручную, подготовить средства для удаления или избежание этих рисков.\n\n2.12. общий уровень шума на рабочем месте водителя не должен превышать 85 Db (A), загрязнение воздуха вредными парами, газами и т.п. – не должны превышать установленные гигиенические нормативы.\n\n2.13. индивидуальные средства защиты выдаются с учетом вредных факторов в рабочей среде;"}, {"title": "ДЕЙСТВИЯ РАБОТНИКА ПЕРЕД НАЧАЛОМ РАБОТЫ", "content": "3.1. Собираясь в рейс водитель собой должен иметь:\n\n3.1.1. документы подтверждающие его личность (паспорт, рабочее удостоверение и т.д.);\n\n3.1.2. государственный талон технического осмотра транспортного средства;\n\n3.1.3 карта лицензии, если такая нужна;\n\n3.1.4. паспорт с визами тех стран которые будет пересекать водитель при перевозке груза (если виза нужна);\n\n3.1.5. водительское удостоверение подтверждающее право управления автотранспортным средством соответствующей категории;\n\n3.1.6. с учреждения подготовки водителя, выданное свидетельство предоставляющее право на перевозку грузов по международным маршрутам, при перевозке опасных грузов – этого учреждения выданное свидетельство, предоставляющее право на перевозку таких грузов;\n\n3.1.7. фиксировать период времени труда и отдыха, по примеру личной книги карты или Тахо граммы, если автотранспортное средство по соблюдённым требованиям оснащено записывающим устройством Тахо графом;\n\n3.1.8. свидетельство о допущении автотранспортного средства к международной перевозке грузов;\n\n3.1.9. документы, предоставляющие право пользоваться автотранспортным средством;\n\n3.1.10. если в межгосударственных соглашений подругому не решено, должен иметь разрешения въезжать в другие территории государств;\n\n3.1.11. разрешений на перевозку негабаритных и опасных грузов (если такие будут перевозится);\n\n3.1.12. товарно-транспортная накладная (накладная CMR) в соответствии с требованиями Конвенции (1956 г. Мая 19 Женева) о договоре международной дорожной перевозки грузов;\n\n3.1.13. водитель перевозящий груз за свой счет должен иметь документы, свидетельствующие о принадлежности груза,\n\n3.1.14. страховые документы;\n\n3.1.15. МДП книжка, когда груз перевозится опираясь на конвенцию МДП «Таможенная конвенция о международной перевозке грузов с применением книжки МДП. Женева 14 ноября 1975»\n\n3.2. водитель должен проверить техническое состояние автомобиля:\n\n3.2.1. осмотреть автомобиль снаружи и площадку под автомобилем и убедиться, нет ли повреждений кузова, следов подтеканий масла, топлива, охлаждающей, тормозной и амортизаторной жидкостей, и при обнаружении устранить или обратится к технической службе;\n\n3.2.2. тщательно протереть номерные знаки, стекла автомобиля, приборы освещения и сигнализации;\n\n3.2.3. Проверить:\n\n3.2.3.1. исправность замков дверей, капота, багажника;\n\n3.2.3.2. исправность приборов освещения и сигнализации;\n\n3.2.3.3. проверить наличие (при необходимости дозаправить до нормального уровня):\n\nмасла в картере двигателя, (обратив внимание на качество масла); охлаждающей жидкости в радиаторе;\n\nтормозной жидкости в питательных бачках гидравлических приводов тормозов и выключения сцепления;\n\nэлектролита в аккумуляторной батарее; топлива в баке;\n\n3.2.3.4. соответствует ли автомобильной инструкции по использованию величина свободного хода педалей сцепления, рабочего тормоза;\n\n3.2.3.5. работает ли стояночный тормоз (ручной тормоз, ручник);\n\n3.2.3.6. люфт рулевого колеса, надежность крепления тяг рулевого управления;\n\n3.2.3.7. давление воздуха в шинах;\n\n3.2.3.8. крепление колес;\n\n3.2.3.9. исправность водительских инструментов и принадлежностей;\n\n3.2.3.10. проверить есть ли аптечка, огнетушитель с действительной проверки, буксирный трос, ремни безопасности, аварийный знак и светоотражающая жилетке;\n\n3.2.3.11. обогрев кабины;\n\n3.2.3.12. как работают контрольные измерительные приборы;\n\n3.3. ознакомится с заданием, маршрутом, особенностями перевоза груза и режимом труда и отдыха."}, {"title": "ДЕЙСТВИЯ РАБОТНИКА ВО ВРЕМЯ РАБОТЫ", "content": "4.1. В рабочее время водитель обязан:\n\n4.1.1. постоянно проверять исправность контрольно-измерительных приборов и работу механизма автомобиля;\n\n4.1.2. водитель должен соблюдать такую дистанцию от движущегося впереди транспортного средства, которая позволила бы принимая во внимание природные условия, состояния дороги и скорость передвижения, избежать столкновения, а также необходимый боковой интервал, обеспечивающий безопасность движения.\n\n4.1.3. незамедлительно остановить транспортное средство, если оно сломалось, и возникла угроза прохожим или самому водителю. Остановка и стоянка транспортных средств разрешаются на правой стороне дороги на обочине (как можно правее), а при ее отсутствии – на проезжей части у ее края.\n\n4.2. Стартер автомобиля служит для запуска двигателя. Запрещено заводить двигатель автомобиля если в это время он на буксире.\n\n4.3. запрещается отдыхать или спать в кабине автомобиля с работающим двигателем;\n\n4.4. Водитель должен уметь пользоваться приборами контроля рабочего и времени отдыха если такие имеются).\n\n4.5. Перевоз грузов:\n\n4.5.1. погрузку (выгрузку) груза осуществляют отправитель (получатель) либо специализированный персонал организации при непосредственном участие водителя если с отправителем (получателем) не договорено иначе;\n\n4.5.2. водитель обязан проверить погрузку и закрепление груза в автотранспортном средстве в соответствии с требованиями безопасности движения и эксплуатации автотранспортного средства;\n\n4.5.3. груз необходимо размещать равномерно по всему полуприцепу;\n\n4.5.4. при проведении погрузки и разгрузки вблизи здания расстояние между зданием и транспортным средством с грузом должно быть не менее 1 м;\n\n4.5.5. при погрузке (разгрузке) грузов с эстакады, платформы, рампы, высота которых равна высоте пола кузова, автомобиль может подъехать вплотную к ним;\n\n4.5.6. погрузочно-разгрузочные работы производятся при выключенном двигателе транспортного средства, так же должен быть заторможен ручным тормозом, с включением даже при незначительном уклоне первой передачи.\n\n4.5.7. если погрузочно-разгрузочные работы производятся механическим способом, водитель должен выйти из кабины и находиться вне зоны возможного падения груза;\n\n4.5.8. Соблюдать меры безопасности посадке/высадке б/из кабины автомобиля, полуприцепа или другого транспортного средства. Запрещается выпрыгивать из кабины автомобиля, с рамы тягача, из полуприцепа – для этой цели пользоваться трапами и лестницами.\n\n4.6. Технический осмотр автомобиля:\n\n4.6.1. перед проверкой автомобиль надо вымыть;\n\n4.6.2. заезжая или выезжая с эстакады или с ямы осмотра, рядом не должно быть людей и других вещей которые мешали бы автомобилю. Этими работами руководит инженер-механик;\n\n4.6.3. заехав на эстакаду или на яму для осмотра, нужно затянуть ручник и под колеса поставить инвентарные опоры. В кабине на руле оставить табличку с надписью «Работают люди – двигатель не запускать».\n\n4.6.4. для поднятия автомобиля подъемник устанавливать следует на максимально ровной и твердой поверхности;\n\n4.6.5. под поднятый автомобиль ставятся опоры, которые были испробованы и которые соответствуют весу автомобиля;\n\n4.6.6. перемонтировка шин автомобиля (после того как с них спустили воздух) производится в мастерской на специальном стенде;\n\n4.6.7. смонтированные шина надуваются на специальном стенде или используя другие меры безопасности, чтобы колесо не выскочило из фиксирующего шина кольца.\n\n4.7. Во время ремонта автомобиля запрещается:\n\n4.7.1. запускать двигатель, когда регулируется источник питания и система зажигания автомобиля;\n\n4.7.2. запрещено использование переносных ламп с напряжением свыше 50 В;\n\n4.7.3. категорически запрещается проверять работоспособность автомобильных аккумуляторов коротким замыканием;\n\n4.7.4. запрещено пользоваться инструментом, приспособлениями, оборудованием, обращению с которыми не обучен;\n\n4.8. если в пути автомобиль сломался, то на расстоянии 25-30 м позади автомобиля надо поставить знак аварийной остановки. Если нет опасности находящимся внутри людям или перевозящему грузу, водитель может сам устранить незначительные неисправности автомобиля. Нельзя работать с наклонной стороны автомобиля, когда он поднят подъемным устройством;\n\n4.9. Влезать под автомобиль и вылезать из-под него только со стороны, противоположной проезду. При работе под автомобилем следует размещаться между колесами вдоль машины. Лежа под автомобилем использовать лежаки, коврики или решетчатые тележки.\n\n4.10. Водителю запрещается:\n\n4.10.1. управлять транспортным средством в состоянии опьянения (алкогольного, наркотического или иного), в болезненном или утомленном состоянии, под воздействием лекарственных препаратов, ухудшающих реакцию;\n\n4.10.2. передавать управление транспортным средством лицам не имеющим при себе водительского удостоверения на право управления транспортным средством данной категории, а также если его фамилия не внесена в путевой лист;\n\n4.10.3. сбиваться с маршрута указанного в путевом листе;\n\n4.10.4. перевозить жидкий или мелкий груз в таре с дефектами;\n\n4.10.5. трогаться с места если на подножке автомобиля находится человек;\n\n4.12.6. запрещается курить рядом с устройствами и топливным баком автомобиля;\n\n4.10.7. прогревать кабину автомобиля открытым пламенем;\n\n4.10.8. подогревать двигатель открытым пламенем или пользоваться открытым огнем при определении уровня электролитов или ремонтируя аккумулятор;\n\n4.10.9. держать внутри автомобиля и возить бензин, керосин и другие легковоспламеняющиеся вещества в кабине автомобиля;\n\n4.10.10. пользоваться автомобилем если на двигателе или картере есть отложения грязи и масла;\n\n4.10.11. откручивать крышку радиатора без рабочих перчаток если не остыла охлаждающая жидкость и стоя на ветру;\n\n4.10.12. вылизать из кабины автомобиля, не убедившись в отсутствии приближающихся транспортных средств."}, {"title": "ДЕЙСТВИЯ РАБОТНИКА В АВАРИЙНЫХ (ЧЕРЕЗВЫЧАЙНЫХ) СИТУАЦИЯХ", "content": "5.1. При дорожно-транспортном происшествии, водитель обязан:\n\n5.1.1. немедленно остановить (не трогать с места) транспортное средство, включить аварийную световую сигнализацию и выставить знак аварийной остановки;\n\n5.1.2. не перемещать предметы, имеющие отношение к происшествию;\n\n5.1.3. в случае необходимости вызвать «Скорую медицинскую помощь», а в экстренных случаях отправить пострадавших на попутном, а если это невозможно, доставить на своем транспортном средстве в ближайшее лечебное учреждение после чего – возвратиться к месту происшествия;\n\n5.1.4. сообщить о случившемся по телефону 112 в полицию, и дождаться их прибытия;\n\n5.1.5. при затруднении проезда других транспортных средств, составить схему расположения транспортных средств в присутствии свидетелей и освободить проезжую часть;\n\n5.2. Если нет возможности вызвать скорую помощь, отправить пострадавшего на попутном транспорте в больницу, тогда первую медицинскую помощь должен оказать водитель.\n\n5.2.1. При ранении:\n\nнайти возможность вымыть руки или обработать их дезинфицирующими средствами. Кожу вокруг раны 2—3 раза протрите марлей или ватой, смоченной дезинфицирующим раствором, причем делайте это от краев раны к периферии. Затем перевяжите рану, используя перевязочный пакет, бинт или закрепив стерильный материал на ней с помощью косынки или носового платка. Если нет дезинфицирующего раствора, то можно прикрыть рану чистой марлей и, наложив поверх слой ваты, перевязать бинтом. Нельзя мыть рану водой.\n\n5.2.2. Остановка кровотечение:\n\nразличают три вида кровотечений: артериальное, венозное и капиллярное. От внезапной потери на одну треть или четверть крови человек может умереть. Поэтому как только началось кровотечение, особенно артериальное, его надо как можно быстрей остановить.\n\nПри артериальном кровотечении кровь алого цвета, из раны бьет фонтанчик. При венозном кровотечении кровь темного цвета, из раны вытекает маленькой ровной струёй. Капиллярное кровотечение характеризуется тем, что кровь просачивается мелкими каплями из поврежденных тканей.\n\nКровотечение можно остановить несколькими способами. При артериальном кровотечении кровеносные сосуды пережимаются пальцами выше раны, после этого на место их зажимается резиновый жгут. Кровотечение из вены, жгут ложится ниже раны. При капиллярном кровотечении, достаточно давящей повязки: наложив на кровоточащий участок чистую марлю, предварительно обработав его перекисью водорода, поверх марли кладут слой ваты и рану сильно перевязывают.\n\nЗажав конечность жгутом, аккуратно положить на мягкую ткань. Вместо жгута можно использовать ремень. Под жгут оставляют записку, в которой отмечена дата и время наложения жгута. Жгут нельзя держать дольше чем два часа. Если до этого времени не прибыла скорая помощь, тогда надо на 2-5 минуты снять жгут, и в это время кровеносные сосуды пережать пальцами.\n\n5.2.3. При переломах костей:\n\nместо перелома может быть сильно опухшее и иметь необычную форму и цвет. Передвигая конечность человек испытывает боль, он не может поднять сломанную руку или опираться на сломанную ногу.\n\nЕсли на переломанном месте повреждена кожа, значит перелом называется открытый.\n\nВажный момент при оказании первой помощи при переломе это фиксация сломанной конечности. Выполняется для снижения риска ранения жизненно важных сосудов и нервов организма человека и для уменьшения последствий болевого шока. При помощи наложения шины из любого подручного материала можно соорудить шину. Помочь в этом могут палки, лыжи, крепкий картон. При наложении шины необходимо соблюдать особую осторожность, чтобы не причинить боль пострадавшему и не сместить кости. Не в коем случае нельзя вправлять кости самостоятельно и вправлять обломки костей в рану.\n\nОткрытый перелом требует наложения стерильной повязки на рану в месте перелома костей. Кожу, прилегающую к ране, тщательно смазывают любым подручным антисептиком. Если рана в месте перелома кровоточит, то необходимо остановить , наложив жгут, зажав артерию пальцем или применив давящую повязку. Если нет возможности наложить шину, то травмированную часть тела плотно прибинтовывают к здоровой конечности.\n\n5.2.4. При ожогах:\n\nПо тяжести и глубине поражения тканей ожоги подразделяются на четыре степени. Для ожога первой степени характерны покраснение, отечность и болезненность пораженного участка. При ожогах второй степени на покрасневшей и отечной коже появляются пузыри, наполненные жидкостью (плазмой). Ожоги третьей степени возникают в результате интенсивного воздействия высокой температуры и характеризуются глубоким омертвением тканей, чаще всего толщи кожи, причем окружающие ткани часто покрыты пузырями серого цвета, которые в дальнейшем могут подвергнуться отмиранию. При ожоге четвертой степени наступает омертвение кожи, подлежащих тканей и даже костей.\n\nПри оказании первой помощи при ожогах в первую очередь освободите пострадавшего от горящей и тлеющей одежды. Если одежда прилипла к телу ее срывать нельзя. Ее осторожно обрезают вокруг одежды. Не следует производить промывание какой-либо области ожога, прикасаться к обожженному месту руками, производить прокалывание пузырей, отрывать прилипшие к месту ожога части одежды, а также смазывать ожоговую поверхность жиром (вазелин, животное или растительное масло и др. ) и присыпать порошком. На рану налаживается сухая, стерильная марля или повязка из ткани. Пострадавшему надо дать выпить горячего чая, лекарства от боли и транспортировать в больницу.\n\n5.2.5. При травматическом шоке:\n\nТравмаческий шок может развиться не сразу после травмы, а после 8-10 часов. Во время травматического шока особенно страдает центральная нервная система. Если шок возник из-за кровотечения, то сначала надо остановить кровотечение. Если у пострадавшего не повреждены органы брюшной полости и он в сознании, то ему можно дать выпить крепкого чаю, кофе или Сухово вина. Больного с шоком следует транспортировать в ближайший стационар как можно быстрее, но при этом голову держат как можно ниже для улучшения питания мозга. Если пострадавший без сознания – обеспечьте проходимость дыхательных путей, если нарушилось дыхание требуется сделать искусственное дыхание рот в рот. Массаж сердца производится при внезапной остановке сердечной деятельности. Не рекомендуется перевозить пострадавшего первым попавшимся транспортом, только оказать первую помощь.\n\n5.3. Если в результате аварии нет пострадавших, материальный ущерб незначительный, то его участники имеют право самостоятельно, не дожидаясь приезда полиции, явиться в отделение с составленной и подписной схемой происшествия и зарегистрировать произошедшее в установленном порядке.\n\n5.4. Случившись несчастному случаю, незамедлительно сообщить менеджеру давшего задания, инженеру по безопасности работ, обратится в медицинское учреждение, если это необходимо вызвать скорую помощь и до начала расследования сохранить места происшествия таким, каким оно было на момент происшествия несчастного случая."}, {"title": "ДЕЙСТВИЯ РАБОТНИКА ПОСЛЕ ЗАВЕРШЕНИЕ РАБОТ", "content": "Вернувшись из рейса водитель обязан:\n\n1. вымыть тягач и полуприцеп на мойке предприятия;\n\n2. припарковать тягач и полуприцеп на автостоянке место указанным сменным механиком;\n\n3. Сфотографировать транспортное средство снаружи и  изнутри;\n\n4. сдать тегач механикам;\n\n5. обнаруженные во время рейса недостатки и неисправности описать в установленном порядке в акте по дефектам, который потом передать обслуживающему техническому персоналу;\n\n6. вымыть руки и лицо теплой водой с мылом , если есть возможность, помыться под душем.\n\nОбучение гигиеническим навыкам\n\nОсновные нормативные законодательные акты по безопасности здоровья при работе, производстве и переработке пищевых продуктов :\n\n-  Гигиеническая норма Литвы HN 15: 2005 «Пищевая гигиена», согласованная версия от 2017-05-01\n\n-  Закон Литовской Республики о продуктах питания\n\n-  Гигиеническая норма Литвы HN 119:2002 \"МАРКИРОВКА ПИЩЕВЫХ ПРОДУКТОВ\" согласованная версия от 2016-11-01\n\n-  Гигиеническая норма Литвы HN 90:2011 „Общие требования безопасности при дезинфекции, дезинсекции и дератизации“. согласованная версия от 2016-01-01"}, {"title": "ТРАНСПОРТ", "content": "-  Пищевые продукты необходимо транспортировать таким образом, чтобы они были правильно загружены и надежно защищены от механических повреждений, пыли, автомобильных выбросов, микробных и других загрязнений, насекомых и грызунов.\n\n-  Транспортные средства для перевозки пищевых продуктов должны быть сконсруированы так, чтобы их было легко чистить и дезинфицировать.  Продукты в жидком, гранулированном или порошкообразном виде должны перевозиться в емкостях или контейнерах, предназначенных исключительно для этих пищевых продуктов.\n\n-  На таких контейнерах должна быть четко видна надпись, указывающая, что перевозятся продукты.\n\n-  Контейнеры и другие емкости, перевозимые автотранспортом, не должны использоваться для перевозки непродовольственных товаров."}, {"title": "МАРКИРОВКА ПИЩЕВЫХ ПРОДУКТОВ", "content": "-  «Маркировка пищевых продуктов» - слова, связанные с продуктами питания данные, товарные знаки, зарегистрированное торговое наименование, изображение или символ, относящиеся к продукту питания, которые указаны на упаковке, в документе, в листовке, на этикетке, в кольце или в надписи, сопровождающей или относящейся к данному продукту.  минимальный термин о безопасном использовании и, с точки зрения микробиологии для скоропортящиеся продуктов - использовать до… (дата срока годности);\n\n-  любые особые условия хранения или условия использования;\n\n-  название или фирменное наименование и адрес производителя, упаковщика или продавца, зарегистрированного в Европейском Союзе.\n\n-  информация о месте производства - в случае если такая информация не предоставляется покупатель будет введен в заблуждение относительно истинного происхождения продукта;\n\nЛичная гигиена\n\n-  Персонал может начать работу только после проверки состояния здоровья;\n\n-  Персонал должен регулярно прослушать курсы по гигиене и оказанию первой помощи;\n\n-  Иметь персональную карту здоровья (F. No. 048 / а) и медицинские сертификаты, подтверждающие знание, которые хранятся в офисе согласно установленному порядку;\n\n-  Руки - наш основной инструмент, которым мы прикасаемся ко всем поверхностям;\n\n-  Поверхности, к которым чаще всего прикасаются: стол, дверные ручки, края стула, упаковочные материалы, оборудование или отдельные детали оборудования (компьютерная мышь, клавиатура, телефон, ключи, деньги)\n\n-  Через загрязненные руки, соприкасающиеся с ними поверхности передаются микроорганизмы.\n\n-  Особое внимание следует уделять гигиене рук и правильной гигиене рук персонала при проведении экологического контроля.\n\nПАМЯТКА\n\nсредства индивидуальной защиты:\n\n-защитная обувь с металлическими вставками/\n\n-светоотражающий жилет/\n\n-шлем/\n\n-защитные очки/\n\nПомните, что на фабриках с повышенным уровнем безопасности, если у вас не будет одного из выше перечисленных средств защиты, вас не будут грузить!!!"}, {"title": "ДОКУМЕНТЫ", "content": "a) личные\n\n- карточка водителя;\n\n-паспорт или ID карточка;\n\n-водительские права;\n\n-лицензия на работу в евро странах\n\n-отпускные (за прошедший месяц);\n\n-действительная европейская карточка медицинского страхования;\n\n-кредитная карточка банка\n-Macron\n\n-A1\n\n- Отказ возвращаться каждые 4 недели домой (Если вы собираетесь работать больше чем 4 недели)\n\nb) документы грузового автомобиля\n\n1. лицензия\n\n2. свидетельство о проверке тахографа;\n\n3. техпаспорт\n\n4. свидетельство о прохождении техосмотра;\n\n5. страховка;\n\n6. Еврокласс;\n\n7. сертификат шумности\n\n-проверить срок действия следующих документов:\n\n1. Карточки оплат (их коды) компании;\n\n2. иметь с собой пустые CMR компании; PAL лист, акт по передачи прицепа, довериность PL, Отчёты\n\nc) документы полуприцепа\n\n1. техпаспорт\n\n2. свидетельство о прохождении техосмотра;\n\n3.страховка;\n\n4. сертификат пригодности;\n\n5.FRC сертификат;\n\n6. Сертификат/ разрешения о перевозке пищевых продуктов;\n\n7. Сертификат Изготовителя полуприцепа;\n\n8. Еврокласс;\n\n9. Сертификат подтверждения emission класса.\n\n-грузовые документы."}, {"title": "ГРУЗОВАЯ ДОКУМЕНТАЦИЯ", "content": "Перевозка груза без CMR запрещена! Вместе с ним дополнительно могут быть документы спецификации (packing list), inIvoice, Сертификаты, Экспортная декларация, Товара Транспортная Накладная (eсли получили товара транспортную накладную обязательно обязаны выписать смр).\n\nCMR компании предоставляется по прибытию на место погрузки, если его не заполняет грузоотправитель, то CMR должен заполнить сам водитель.\n\nЕсли CMR выдает сам грузоотправитель и 16 графа бывает пустой или в ней вписан другой перевозчик, то водитель обязан поставить штамп или вручную вписать Реквизиты компании.\n\nПолучив грузовые документы, водитель должен убедиться, что указанный адрес разгрузки соответствует указанному менеджером месту разгрузки, проверить количество мест, указанных в документах с фактом!\n\nОставленная пустая графа в CMR при контроле, даёт повод предявить претензии.\n\nПосле выгрузки, у водителя должно остаться не меньше двух CMR.\n\nКредитные карточки и их использование\n\n-белая карточка компании, используется только в базе, для заправки топливо и AD-BLUE на колонке компании\n\n-CIRCLE карточка. Используется для оплаты венеты за дороги по Литве, И заправки топлива в Литве\n\n-топливная карта AS 24 (топливо заправляется только в колонках этой сети, строго по Указаниям менеджера) для оплаты туннелей, платных отрезков дороги, для покупки виньеток карточку неисползовать!\n\n- Eurotrafic AS24 оплачиваем за дороги и за BOX-ы\n\n- карточка SHELL, действительна на территории всей Европы, но используется только в тех случаях, когда поблизости нету заправки AS 24. Данную карточку можно использовать для заправки топливом только в крайних случаях предварительно согласовав это со своим менеджером!!! Карточкой можно расплатится за дороги и боксы, и за мосты в Дании\n\n-ID CARD идентификационная карточка, используется для открытия швейцарских дорог\n\n- DKV оплата за дороги Франции если наработает аппарат, Заправка топливом, Оплата дорог и мостов"}, {"title": "ОПЛАТА И ОСОБЕННОСТИ ЗАРУБЕЖНЫХДОРОГ", "content": "Автомагистрали во всех странах для тяжелого транспорта являются платными,\n\nпоэтому перед тем, как пересечь новую государственную границу, водитель должен убедиться в том, есть ли у него дорожный аппарат для оплаты дорог данного государства или виньетка. Правильно ли настроен аппарат оплат дорог: оси, вес, еврокласс"}, {"title": "ЛИТВА (LT)", "content": "Литва - Передвижение По городу бесплатно, открывать дороги надо тогда когда выезжаете на  магистральные дороги. дороги открывать надо С помощью сообщения (SMS), можно покупать Литовские (LT), Латышские (LV), Эстонские (EE) винетки на день (D). Сообщение формируется следующим образом-код страны, срок действия винетки и регистрационный номер автомобиля. Текст сообщения должен быть написан латинскими буквами!\n\nНапример:\n\nВинетка на один день в Литве: LTD AAA111\n\nВинетка на один день в Латвии: LVD AAA111\n\nВинетка на один день в Эстонии: EED AAA111\n\nСообщение (SMS) отправлять на номер : +37066000120\n\nЗаглавные буквы или маленькие неважно. Можно писать как LTD AAA 111, так и LTD AAA111 так и ltd aaa111.\n\nУспешно заказав услугу приходит сообщение (SMS).\n\nЕсли винетка по какой либо причине не была куплена, так же приходит сообщение об ошибке Тогда Виньетку надо покупать на границе в MEDICINOS BANKAS."}, {"title": "ПОЛЬША (PL)", "content": "Для оплаты польских дорог используется автоматическая система оплаты дорог e-TOLL PL, Компания использует аппарат системы DKV с автоматическим пополнением. Если из Базы едем по суше то обязанны держаться маршрута - Клайпеда - Каунас - Сувалки - Варшава. Проезжая через Варшаву, круглый год действует запрет на транзитный транспорт С 7.00 до 10.00, / С 16-20.00. Oбъежать Варшаву без pазрешения менеджера -запрешчено.\n\nУровни дорог: автомагистрали (А 2), дороги с двузначным индексом (61,14) ПДД особенности: фары включены круглый год\n\nРекомендуетмя не превышать 90км/ч\n\nОбратить внимание на работу дорожного аппарата! На въезде проверить апарат"}, {"title": "ГЕРМАНИЯ (D)", "content": "Оплата за немецкие дороги производится при помощи аппарата Toll Collect/DKV. При въезде в страну, убедитесь, что он работает (ДОЛЖНА ГОРЕТ ЗЕЛЁНАЯ ЛАМПОЧКА НА АПАРАТЕ) 5-осей, > 18т. В противном случае, перегрузить аппарат отключая массу тягача.\n\nУровни дорог: автомагистрали (А9, А4), национальной важности (В 10, В65).\n\nAUTOHOF – специализированная платная стоянка для тягачей\n\nРЕКОМЕНДУЕТСЯ - особенно большое внимание уделить креплению груза\n\n- максимальная скорость на национальных дорогах 60км/ч – строго придерживаться ограничений скорости в населенных пунктах и на ремонтируемых отрезках дороги\n\n-движение запрещено с субботы 22.00 до воскресенья 22.00.\nD5 - обeзжаем по франции A35!!!"}, {"title": "ПО А1 ЧЕРЕЗ КИОЛН НЕ EХАТЬ", "content": "АВСТРИЯ (А)\n\nОплата за австрийские дороги производится при помощи автоматического аппарата GO/DKV.\n\nEсли аппарата нет его надо приобрести. После въезда на австрийскую территорию, проезжая через ворота, предназначенные для оплаты, слышен звуковой сигнал.!\n\nОсобенности ПДД: движение запрещено круглый год с 22:00 до 5:00, по субботам с 15:l00 до\n\nпонедельника 5:00 (в зимний период с 1-ого ноября до 31ого апреля по магистральный дорогам А-12, А-13, по трассе через Инсбрук (Insbruk),\n\n1-ого ноября до 31-ого апреля в тягаче должен находиться комплект цепей противоскольжения; Если нет цепи известитe своего менеджера и pуководитеcь его указаниями\n\n-круглый год должны быть включены фары;\n\n-проверьте ест ли на тягаче австрийская наклейка эконалога (с правой стороны стекла)\n\nБез этой наклейки грозит штраф до 1200 Eur.\n\n-макс нагрузка на ведущую ось, до 11,5т\n\n-запрещаеться транзит дорогами националного значения !\n\n[Image result for eco vinieta austria]На въезде проверить апарат\nДвижение по Австрии без наклейки IG-LUFT  не разрешается"}, {"title": "ИТАЛИЯ (I)", "content": "Автоматический аппарат для оплаты дорог DKV или Telepass, в местах оплаты выбирать ворота\n\nпомеченные знаком Tellepass или дорожные полосы, помеченные желтой пунктирной линией.\n\nУровни дорог: автомагистрали (А4,А1), национальной важности (SS49,SS12)\n\nОсобенности ПДД: с 1-ого ноября до 31-ого марта обязательное использование цепей противоскольжения.\n\n-максимальная скорость 85км/ч;\n\n-за нарушение знака „обгон запрещен“ конфискуются права и назначается штраф;\n\n-двигаясь по дороге А5 по направлению ко Франции, если вы хотите пересечь границу через\n\nMont Blanc туннель, рядом с городом Аоста (Aosta) (100-ый км) не проедьте мимо специализированной площадки, возьмите чек на пересечение туннеля, в противном случае, из туннеля вас вернут обратно;\n\n-перед пересечением туннелей Frejus (A-32) и Mont Blanc (A-5) уточнить оплату за его проезд карточкой;\n\n-на итальянских автомагистралях большое количество небольших СТОЯНОК вмещающих ОДИН автосостав, стоянки помечены знаком SOS, если рядом сними стоит „стоянка запрещена“, то ни в коем случае не останавливаться (штраф от 40 до 400 Eur), такие стоянки предназначены только для аварийной остановки;\n\nAUTOPORTO – специализированная стоянка для тягачей. СЕМТ – разрешение на транспортировку груза из Италии в Росси"}, {"title": "ИСПАНИЯ (Е)", "content": "Магистрали оплачиваются тем же самым аппаратом как и во Франции DKV/Passango.\n\n-главная особенность страны заключается в том, что начиная и заканчивая работу на территории этой страны, вводится не только код страны, но и регион страны в котором останавливаетесь, например: Comunidad Valencia-CV или Каталония-САТ, поэтому рекомендуется иметь при себе карту Испании или внимательно следить за знаками обозначающими границы регион"}, {"title": "ПОРТУГАЛИЯ (Р)", "content": "В этой стране существуют две системы оплаты за дороги: автоматическая оплата с французским аппаратом или карточкой EUROTRAFIC. Надо ехать где нету шлагбаума - через зелёную полосу."}, {"title": "ШВЕЙЦАРИЯ (СН)", "content": "Дороги этой страны – самые дорогие, поэтому когда ваш маршрут пролегает через швейцарскую территорию, следует согласовать с менеджером проезжать через эту страну или лучше её объехать. Cтрана не является членом Европейского союза, поэтому для её пересечения требуются дополнительные документы для экспорта, импорта и транзита! Информацию о том, где их можно получить должен предоставить менеджер.\n\nПосле прибытия на границу, сначала открываете швейцарские дороги, для этого используйте ID CARD. Для того, чтобы узнать как все это проделать рекомендуется проконсультироваться с водителем, уже проезжавшим эту страну или по прибытию на таможню обратиться за советом к водителям.\n\nВнимание: открывая дороги, вводить общий вес 40 т и больше.\n\n-круглый год движение запрещено с 22.00 до 5.00, в субботу с 22.00 до понедельника 5.00.\n\n-макс нагрузка на ведущую ос, до 11,5т\n\n-запрещаеться транзит дорогами националного значения !"}, {"title": "СЛОВАКИ я (SK)", "content": "Магистрали этой страны оплачивается системой SKYTOLL. Аппарат надо приобрести на границе страны, а возвращаясь назад здать. Забирая аппарат оставляется залог 50 eur (только\n\nналичка или банковская карта кредита), и вносится кредитная кредита возвращается при задачи аппарата.\n\n-ближний свет обязательный круглосуточно\n\n-запрет езды по воскресениям от 00:00 до 22:00"}, {"title": "ЧЕШСКАЯ РЕСПУБЛИКА (CZ)", "content": "Магистрали оплачиваются дорожным аппаратом MYTO перед вездом в страну, должны проверит апарат не стоит
