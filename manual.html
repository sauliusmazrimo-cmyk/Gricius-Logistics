<script>
const SECTIONS = [{"title": "ИНСТРУКЦИЯ ПО ЭКСПЛУАТАЦИИ ТРАНСПОРТНОГО СРЕДСТВА", "content": "Прием-передача транспортного средства перед командировкой\n\n1.  Водитель должен прибыть на предприятие и принять ему предназначеное транспортное средство во время, по договоренности с начальником транспортного отдела (в понедельник-пятницу 8:00-17:00 ч., в субботу 9:00-15:00 ч.).\n\n2.  Всю информацию о транспортном средстве, получаете в 104 кабинете, возле окошка. Документы и информацию о маршруте водителю сообщает начальник транспортного отдела или его замещающий менеджер;\n\n3.  Топливные карточки выдают в 102 кабинете, возле окошка;\n\n4.  Ключи от тягача выдают на складе, техник-инженер;\n\n5.  Водитель должен предназначеный тягач загнать в бокс гаража и вместе с техником-механиком осмотреть и заполнить акт приема-передачи транспортного средства.\n\n6.  Подписывая акт приема-передачи транспортного средства, водитель подтверждает, что транспортное средство соответствует описанию и он принимает его со всей присущей ему комплектацией.\n\n7.  С момента подписания акта вся ответсвенность за транспортное средство, и всю сохранность комплектации переходит на водителя.\n\n8.  Если возникают сомнения из за поломок транспортного средства, обязательно о них информировать техника-инженера. Если поломка серьезная, начальник транспортного отдела должен решить, будет ли водителю предназначен другой тягач или командировка перенесётся на другое время, когда будет закончен ремонт данного тягача.\n\n9.  Принимая предназначенный полуприцеп водитель должен проверить, есть ли все крепления для груза: не меньше чем 4 штанги крепления груза и замок, (+22 штанги на двухэтажных) на полуприцепе – рефрижераторе, 16 ремней крепления груза, 32 уголков из пластика для ремней, 32 резиновых коврика в тентовом полуприцепе, все восемь фитинга для крепления контейнера на контейнерном полуприцепе. Дополнительно у любого прицепа должно быть запасное колесо и две опоры для колес, не мение 6 петлей для крепления полуприцепа на пороме. Заметив отсутствие любого элемента на полуприцепе, немедленно об этом информировать своего менеджера и механика-инженера и потребовать, чтобы полуприцеп был скомплектован полностью.\n\n10. Отправляясь в страны СНГ, заправление и количество топливо соглосоваем с менеджером.\n\nПрием-передача транспортного средства после рейса\n\n1.  После рейса, водитель обязан предоставить транспортное средство механику. Механик при присутствии водителя, проверяет показания спидометра, остаток топлива в баках, внешний вид и повреждения транспортного средства и показания агрегата рефрижератора на полуприцепе, все эти данные механик записывает в книгу ремонта транспортных средств. Водитель обязан сказать какие технические проблемы он заметил до приезда на базу.\n\n2.  После парковки транспортного средства на место, которое указывает механик, водитель не позднее чем за 1 час , обязан сдать документы на груз, на транспортное средство, телефон и ключи от тягача.\n\n3.  Если водитель больше не поедет на этом тягаче, он обязан помыть кабину как снаружи так и изнутри и загнать в бокс гаража для сдачи механику-инженеру по акту приема-передачи тягача. Если при осмотре тягача выявилось, что внутри кабина не полностью почищена, мы в свою очередь оставляем за собой право за счет водителя нанять компанию, которая почистит внутри кабины вместо Вас. Водитель вместе с инженером-механиком заполняют акт приема-передачи тягача и акт комплектации тягача, подтверждают написанное подписью. С момента подписания акта приема передачи вся ответственность за все повреждения переходят к фирме.\n\nПрием-передача транспортного средства во время командировки\n\n4.  Передавая или принимая полуприцеп другому водителю в командировке, вы обязаны заполнить трейлерный лист (18.9.2. пункт ). В трейлерном листе заполнить каждую строчку, отметить каждое повреждение и написать код повреждения, количество топлива, запасных колес, наличие четырех штанг крепления груза, мотoчасы, наличие одного замка. Трейлерный лист обязан подписать водитель, который принимает прицеп и который его сдает, в другом случае ответственность за повреждения полуприцепа ложится ровными частями на обоих водителей.\n\n5.  Если возникли разногласия по какому либо повреждению на полуприцепе, в замечание напишите спорное повреждение и пришлите менеджеру фотографию этого повреждения.\n\n6.  Когда принимаете или передаете полуприцеп другому водителю, водитель обязан немедленно об этом сообщить менеджеру СМС сообщением. Напр.: Привет, прицеп ЕС256 принял, количество топлива 129 L, моточасы 6859, трейлерный лист заполнен и подписан.\n\n7.  Обязательно проверте агрегат полуприцепа-рефрижератора: настроить +5 градусов, а потом -10 градусом на автоматном режиме. Если агрегат не работает немедленно сообщите своему менеджеру.  Прием-передача полуприцепа на заводе “Mars Minden”. У этого клиента нужно сдать пустой полуприцеп, а на место его зацепить гружонный полуприцеп по указаниям менеджера. Перед варотами завода, заполните трейлерный лист полуприцепа и один из экземпляров положите к документам полуприцепа, и их сдават охраникам. Пустой полуприцеп ставить там где укажут ответсвенный сотрудник завода, и об этом сообшите своему менеджеру СМС сообщением. Когда от менеджера получаете указание с завода забрать конкретный гружонный полуприцеп, заходите к охране и выписываете пропуск в територию, после чего нaходите полуприцеп, осматриваете его все повреждения и сравниваете с теми что помечаные в трейлерном листе. Все несоотвествия отметить в трейлерном листе и фотографировать, а фотографии немедленно прислать менеджеру, а если нету возможности - написать ему о всех повреждениях полуприцепа. Не в коем случае не открывать гружонный oпломбированный полуприцеп.  Прием-передача полуприцепа в порту Kiel. На площадке ожидания водитель забирает документы от полуприцепа и груза, несёт их агентам DFDS, которые выписывают пропуск на територию порта. При въезде на територию порта на воротах ее фотографируют со всех сторон и там видны все повреждения полуприцепа. Полуприцеп поставить на место которое укажет сотрудник порта. Забирая гружонный полуприцеп с порта, обратите внимание на повреждения и их сверте с трейлерным актом DFDS, если наxодите несовпадения, сразу сообщить менеджеру. Обезательно проверить агрегат полуприцепа, если он не работает или нету замка от дверей полуприцепа, сообщите менеджеру.\n\nКонтроль за тягачом и полуприцепом\n\n8.  Перед началом поездки водитель обязан проверить:  1.  Уровень масла в двигателе;  2.  Уровень топлива в баках тягача и полуприцепa-рефрижератора;  3.  Уровень AdBlue;  4.  Уровень антифриза;  5.  Жидкость для омывания окон тягача;  6.  Количество гидравличесткой житкости (тормозов, усилителя руля, системы сцыпления);  7.  Световые приборы на тягаче и на прицепе. Если перегорает какая нибудь лампочка, водитель обязан ее поменять своими силами;  8.  Колеса и покрышки:\n\nА) если поменяли колесо в гараже или в дороге, то надо проверить натяжение болтов каждые 250 км;\n\nВ) При проверке колес необходимо посмотреть на: достаточную глубину протектора и есть ли какие то повреждения покрышек;\n\nС) Давление в колесах тягача / полуприцепа обязательно надо проверить выезжая в рейс из гаража и один раз в неделю когда вы в рейсе или меняете полуприцеп. Давление в колёсах указывает маркировка ( PSI ) шин каждого производителя.\n\n9.  В тентовом полуприцепе должно быть 32 боковые доски, 16 шт. pемней, 32 уголка для крепления груза. TIR кабель должен быть целый без малейшего повреждения, а так же обратите внимание на состояние самого тента, чтобы не был он перерезан, через крышу во внутрь полуприцепа не просачивалась бы вода. Обязательно обратите внимания на пол полуприцепа.\n\n10. В полуприцепе-рефрижератора проверьте внешние И внутренние повреждения, работу агрегата, количество топлива, моточасы, замок, пломбу, запасное колесо, опорные ноги и 4 штанги для крепления груза, повреждения дверей с наружи и с внутри.\n\n11. На полуприцепе для перевозки контейнеров, обратить внимание чтобы были все фитинги, для крепления контейнера, запасное колесо, опорные ноги.\n\n9.  Водитель обязан следить за хорошим состоянием транспортного средства, как снаружи так и изнутри. Кабину тягача, а так же и пустые полуприцепы нужно мыть снаружи и cнутри. Водитель несет ответственность за эксплуатацию транспортного средства."}, {"title": "КАК ПОЛЬЗОВАТСЯ ПАРКИНГАМИ", "content": "1.На территории Литвы строго запрещено останавливаться на отрезке Клайпеда – Виевис (возле Вильнюса) без разрешения менеджера на какой либо площадке, чтобы избежать кражу топлива или груза. Водитель обязан без остановки с базы одним разом доехать до Виевиса или до ул. Жирню 2, Вильнюс “Бунаста”.\n2. Bодителей которые стоят на парковке 3AO \"дурга\" в Медининкай взять счёт фактуру с реквизитами фирмы (чек неподходит).\n\n3. В странах СНГ водитель может останавливатся только на платных автостоянках на суточный отстой. 45 минутный перерыв водитель может делать на АЗС, или безопасных площадках. Рекомендуем топливные баки закрыть дополнительными замками.\n\n4. После жедневного отдыха („отстоя“), водитель обязан обойти и проверить транспортное средство: колеса, световые приборы, замок седла и другие необходимые узлы для безопасной езды.\n\n4. В странах ЕС стоять в не платных площадках. Платные площакди необходимо согласовать с менеджером. После окончания отдыха („oтстоя“) водитель обязан проверить пломбы и замок на дверях полуприцепа, посмотреть не отключен ли полуприцеп от седла тягача за время отдыха, проверить не залезли ли нелегалы в паллетник, во внутрь полуприцепа и толко убедивших что все в порядке, можно начинать ехать. Заметив, что возможно внутри полуприцепа есть нелегалы, об этом сообщить менеджерy и вызвать полицию."}, {"title": "НЕПРЕДВИДЕННЫЕ СИТУАЦИИ И ДТП", "content": "Страховые случи, ущербы тел. но.: +370 656 69809\n6.1. Если попал в ДТП или какую нибудь непридвиденную ситуацию, водитель обязан немедленно связаться с менеджером и как можно детальнее информировать о сложившейся ситуации. При возможности сфотографировать место происшествия и сделанный ущерб транспортному средству или другим объектам. На фотографиях должно быть четко видно номера транспортных средств и общий вид ДТП.\n\n6.2. Всегда нужно заполнять декларацию (Европротокол ) о ДТП. Уезжая в рейс обязательно в офисе взять пустой бланк декларации о ДТП.\n\n3.  Запрещается подписывать декларацию ДТП на вам неизвестном языке. В таком случае заполняете свою декларацию ДТП. Если не согласна другая сторона, тогда дальше руководствоваться указаниями менеджера.\n\nВНИМАНИЕ: Если вы не виноваты в ДТП, на декларации вам необходимо подписаться только под схемой ДТП в 15-ой графе, а в 14-ой графе, ниже дахнных водителя и транспортного средства расписывается только виновник в ДТП.\n\n4.  Водитель обязан информировать полицию:  1.  Когда оба водителя не признают вину;  2.  Когда потерпели третье лица;  3.  Когда есть потерпевшие;\n\n6.5. После ДТП водитель после приезда на базу обязан написать объяснительную у начальника техотдел (если водитель не виноват) или у менеджера ответственного за страховки (если водитель признан виновным).\n\n6.6. После ДТП водитель как можно быстрее обязан передать все фотографии , декларацию о ДТП и объяснительную начальнику техотдела или менеджеру ответственному за страховки;\n\n[]"}, {"title": "ДОКУМЕНТЫ ИСПОЛЬЗУЕМЫЕ В КОМАНДИРОВКЕ: ИСПОЛЬЗЫВАНИЕ, ЗАПОЛНЕНИЕ, ПЕРЕДАЧА", "content": "6.  Общая часть  1.  Требованиями этой инструкции обязаны руководствоваться все водители компании.  2.  Правильное заполнение документов является одним из основных должностей водителя. Заполняя документы водитель в них обязан заполнять каждую графу и указать всю необходимую информацию.  3.  Документы на груз и транспортное средство являются собственностью компании. Водитель обязуется всю информацию предоставленную в документах не разглашать и держать в тайне, кроме тех случаях, когда водитель обязан это сделать в связи ему порученной задачей.  4.  Водитель всегда обязан проверять все документы и все данные в них, которые он получает от клиента или менеджера.  5.  Водителю запрещено подписывать документы, в которых непонятная суть текста, непонятные сокращения и т.п.  6.  Все документы надо заполнить правильно и разборчиво. Любые исправления в документах без соглосования с менеджером СТРОГО ЗАПРЕЩЕННО !!!  7.  Водитель который нарушит наши правила будет привлекаться к материальной, административной и уголовной ответственности по законам Литовской Республики, в зависимости от вида нарушения и последствий."}, {"title": "ДОКУМЕНТЫ КОТОРЫЕ ОБЯЗАН ИМЕТ ВОДИТЕЛЬ", "content": "Личные документы водителя:  1. Права с категорией CE, Удостовeрение водителя и действующим 95 кодом;  2. Водительскую карточку, которая действительна до конца командировки;  3. Паспорт со всеми необходимыми действующими визами;  4. Мед., cправка; cправка о прохождении курсов первой мед. Помощи,  5. Декларация МАКРОН;  6. Форма А1;  7. Доверенности на тягач и полуприцеп (Польша);  8. Cертификаты медицинских знаний ( по програмам HB и H10);\n\n9. Удостоверения на ручную укладку груза. (Или Электрическим погрузчиком)  Документы на транспортные средства:  На тягач:  1. Свидетельство о регистрации транспортного средства;  2. Диагностическая карта подтверждающая технический осмотр транспортного средства;\n\n3. Kопия лицензии Европейского сообщества на комерческие грузоперевозки;\n\n4. Полис страхования, Зеленая карта международной системы Green Card;\n\n5. Сертификат проверки тахографа;\n\n6. Справка ограничителя скорости;\n\n7. ECMT сертификат (выдают при прохождении Т. О.);\n\n8. ETMK сертификат (указывают класс евроэмисии);\n\n9. Сертификат шумности (тишины) (Larmarmes);\n\n10. Топливные карточки и карточки на оплату за проезд по автомагистралями;\n\n11. Два бланка декларации о ДТП;\n\n12. Акт приёма-сдачи тягача в рейсе;\n\n13. Запасная бумага для принтера тахографа (мин. 3 рулона);\n\n14. Ключ для замка рефрижератора.\n\nПри выезде из базы водитель обязан забрать в рейс нужное количество бланков: Документ об обмене паллетами, накладные CMR, Акт приёма-передачи трейлера, STI документ приёмки товара, лист загрузки груза на RUS/BY, бланк отчёта.\n\nНа полуприцеп:\n\n1. Свидетельство о регистрации транспортного средства;\n\n2. Диагностическая карта подтверждающая технический осмотр транспортного средства;\n\n3. Полис страхования, Зеленая карта международной системы Green Card;\n\n4. ECMT сертификат (выдают при прохождении Т. О.);\n\n5. ECMT сертификат (о соответствии теxнических требованиях по безопасности);\n\n6. Два бланка декларации о ДТП;\n\n7. Сертификат грузового отсека кода XL (если полуприцеп соответствует стандарту EN 12642 Code XL);\n\n8. Сертификат о соответствии для перевозки с таможенной пломбой (и дополнительные документы (4 фотоснимка));\n\n9. Сертификат ATP (для рефрижератора);\n\n10. Замок дверей рефрижератора."}, {"title": "ГРУЗ СОПРОВОЖДАЮЧИЕ ДОКУМЕНТЫ", "content": "CMR накладная на груз\n\nТоварно-транспортная накладная заполняется не меннее чем в 3 (трех) эгземплярах: для отправителя, для перевозчика и для получателя. Может потребоваться и больше копий – напр., для ветеринарной службы, таможни, экспедиции и проч.\n\nПустую CMR накладную водитель предоставляет для заполнения на месте погрузки груза. Отравитель груза может заполнить свою накладную, которую водитель обязан забрать и подписать после погрузки груза. Если в 16-ой графе отправитель не написал реквизиты A. GRICIAUS AUTOTRANSPORTO ĮMONĖ, водитель обязан их вписать своей рукой.\n\nПолучив CMR накладную на месте погрузки, водитель обязан проверить все данные накладной, совпадают ли они с данными в других документах (Invois, Packing List, Сертификат).\n\nВ CMR накладной всегда должны быть заполнены графы Nr. 1-11, 16, 21, 23, 25. А после разгрузки обезательно получатель груза должен заполнить 24 графу (время доставки груза, Ф.И. ответственного сотрудника получателя, подпись, печать получателя).\n\nКакие данные вписываем в CMR накладную:\n\n1.  Графы Но. 1 ir 2 (Отправитель и получатель (наименование, адрес, почтовый индекс, страна));\n\n2.  Графы Но. 3 ir 4 (Место разгрузки и погрузки);\n\n3.  Графа Но. 5 –Груз сопровождающие документы (фактура груза – INVOICE; Catnet TIR – TIR) сокращеные названия, дата и номер;\n\n4.  Графа Но. 6-11 – Название, количество мест или упаковок и вес (бруто) груза, номер пломбы;\n\n5.  Графа Но. 16 – Реквизиты перевозчика;\n\n6.  Графа Но. 17 - Последующуй перевозчик;\n\n7.  Графа Но. 18 – Oговорки и замечания перевозчика;\n\n8.  Графа Но. 21 – место где составлена накладная и дата;\n\n9.  Графа Но. 22 – После погрузки груза отправитель обязан расписатся и поставить печать компании отправителя;\n\n10. Графа Но. 23 – Фамилия и подпись водителя, печать перевозчика;\n\n11. Графа Но. 24 – заполняет грозополучатель: дата и время доставки груза, печать получателя , подпись и фамилия представителя получателя; Если получатель груза не заполнит эту графу, немедленно об этом сообщить менеджеру и ждать далнейших указаний;\n\n12. Графа Но. 25 – Гос. Номера транспортных средств;\n\nВНИМАНИЕ: CMR накладная может быть на любом языке Европы, но по CMR конвенции, нумерация и значение граф остается одинаковой.\n\n[]\n\n1.  Сопровождающие груз документы  Перед рейсом водитель должен у своего менеджера забрать все документы на груз и проверить правильность всех данных в них; Если не хватает какого то документа или обнаружили, что какие то данные неправильные, немедленно надо информировать своего менеджера;\n\n2.  Отправляясь в рейс, водитель должен взять следующие документы:  1.  Пустые CMR накладные для обратной загрузки;  2.  Пустые бланки для обмена паллет;  3.  Лист простоя один при доставки груза, второй при погрузки обратного груза;  4.  Трейлерный лист для обмена полуприцепа в командировке;  5.  Разрeшения на транспортировку груза по свойствам маршрута и груза;\n\n-  Транспортируя Опасный АДР груз – менеджер заказывает АДР разрешение по странам через какие територрии проходит маршрут перевозки;\n\n-  Для перевозки негабаритного груза – нужно разрешение на перевозку такого груза по территории определеной страны;\n\n-  Транспортируя особо дорогой груз принимать все меры безопастности, остановки делать только в безопастных, хорошо освешаемым и охраняемых паркингах. Водитель обязан исполнять все инструкции которые получает от менеджера, а если возникают дополнительные вопросы по документам или маршруту, то нужно консултироваться с менедвером.  1.  В страны СНГ груз везем по гарантии или с книжкой МДП (международных дорожных перевозок).\n\n8.  Погрузка груза  1.  На погрузке заполняем / получаем следующие документы:  1.  CMR накладная груза;\n\nЕсли у этого клиента меняем паллеты, надо заполнить паллетный лист и предьявить его отправителю груза, чтобы он потвердил своей печатью и подписью; (один экземпляр остается у орправителя, а три забираете Вы;\n\n2.  Погрузочный лист („Packing List“ /“loading List“/“Liefershein“).\n\n3.  Оригинальный счет-фактура на груз (“Invoice”/”Rehnung”). Обязательный документ, когда грузитесь в страны СНГ, иногда исползуится в странах ЕС.\n\n4.  Оригинальный сертификат на груз. Обратите внимание чтобыбыли оригинальнэ печати и подписи, а так же проверьти все данные которые должны совпадать с данными в других документах на перевозку груза. Если нету сертификата, обезательно об этом информировать менеджера.\n\n5.  Экспортная декларация с перевозкой по гарантии или ТИР книжкой.\n\n6.  Транзитная декларация необходима, если груз едет транзитом. С транзитной декларацией водитель едет от границы ЕС до места растаможи по указанию менеджера.\n\n9.  Разгрузка груза\n\nНа месте разгрузки, водитель должен ответственному сотруднику получателя груза предоставить все документы на транспортировку груза, которые получил на погрузке.\n\nВо время погрузки/выгрузки груза водитель обязан присутствовать при погрузки, пересчитавать количество груза, следить за качеством упаковки, померить температуру груза ,в тех местах, в которых она была проверена на месте погрузки. Если нету возможности проверить температуру груза, не хватает груза или повреждена упаковка, об этом водитель немедленно должен сообщить менеджеру.\n\nПосле разгрузки водитель обязан забрать у получателя груза:  CMR накладную в трех экземлярах, в которых в 24-ой графе должно быть время доставки груза, печать и подпись получателя груза.\n\nВНИМАНИЕ: Если при разгрузке или загрузке негрузят более 15 минут об этом водитель должен уведомить менеджера. Если у получателя груза нету печати, водитель об этом немедленно должен сообщить менеджеру. Без разрешения менеджера покинуть территорию получателя груза строго запрещено.\n\nЛист простоя (только в странах СНГ) с отметками клиента о том когда прибыли на разгрузку, и время окончания разгрузки.\n\nЕсли меняем паллеты, не забудьте заполнить паллетный лист и у получателя забрать это подтверждаюшее печать и подпись;\n\nДругие документы на груз ( Invois, Packing List, сертификаты) остаются у получателя груза.\n\nЕсли у клиента есть дополнительные требования (нейтральная CMR накладная, спецпометки и т.д.) менеджер об этом информирует дополнительно. Водитель обязан точно выполнять требования менеджера.\n\nВодитель получив документы после разгрузки груза должен их досканально проверить.\n\nНа планшет отсканировать все полученные документы и отослать менеджеру. Сканированные документы должны быть высокого качества. Информировать менеджера, если найдены какие либо записи от получателя груза и без разрешения менеджера не покидать места разгрузки."}, {"title": "ОБЯЗАНОСТИ ВОДИТЕЛЯ В РЕЙСЕ", "content": "1. Постоянно информировать своего менеджера через приложение FLEET MASTER, если менеджер через FLEET MASTER не отвечает- связываться с менеджером надо сообщением либо звонком на Личный номер менеджера. Выполннять указания менеджера.\n\n2.Во время каждой остановки , а так же при начале движения после остановки проверять состояние пломбы;\n\n3. Водитель во время каждой остановки с гружонным прицепом неможет оставить тягач без присмотра более чем 30 мин.\n\n4.От начала транспортировки и до места доставки груза двери рефрижератора должны быть закрыты на замок; Пустой полуприцеп на замок закрывать запрещено.\n\n5.Запрещено предоставлять посторонним лицам информацию о транспортируемом грузе;\n\n6.В целях безопасности, передвигаясь по территории Литвы с грузом останавливается строго запрещено!!!\n\n7.Во время транспортировки груза в страны СНГ разрешается сделать остановку для отдыха на месте вашего проживания с условием, если это место находится по пути главного маршрута и транспортное средство будет в безопасности. Разрешается максимально 9-ччасовой непрерывный отдых. По возвращению с рейса, без груза разрешается суточный отстой(по необходимости);\n\n8.Транспортировка посторонних лиц строго запрещается;\n\n9.Во время транспортировки груза строго следить за температурным режимом! Выключать агрегат рефрижератора строго запрещено! О технических неисправностях немедленно сообщать механикам. Вы лично несете ответственность за нарушение температурного режима;\n\n10.Если Вас останавливают подозрительные лица, в подозрительных местах – не остонавливайтесь! Остановитесь на первом посту полиции и сообщите им все подробности;\n\n11.Место прибытия на таможню строго по CMR 13 графе;\n\n12.Если в очереди возле СВХ терминала подходит человек себя выдающий за представителя компании получателя и предлагает вам срочную растаможу в другом месте – немедленно сообщить своему менеджеру;\n\n13.После растаможки направляться на выгрузку строго по адресу , указанному в CMR 3-ей графе или в транзитном ветеринарном сертификате;\n\n14.Если после растаможки вы получаете дополнительную инструкцию ехать на выгрузку не по адресу, немедленно об этом сообщить своему менеджеру и в дальнейшем следовайте его указаниям;\n\n15.Выгружаться разрешается, когда вы прибыли по адресу в CMR 3-ей графе или когда был согласован новый адрес и только после подтверждения менеджера СМС сообщением;\n\n16.Водитель обязан присутствовать на выгрузке и считать выгружаемый груз! Необходимо письменно фиксировать количество выгружаемых паллет и ящиков – с обратной стороны листа простоя. Если количество груза не совпадает с данными в CMR накладных, немедленно сообщить своему менеджеру. Подписывать какие-либо акты о недостачи или браке груза СТРОГО ЗАПРЕЩЕННО !!! Если при выгрузке обнаружен брак, помяты коробки, завалены паллеты, тогда немедленно останавливать выгрузку, информировать менеджера и следовать дальнейшим указаниям менеджера.\n\nВАЖНО: Если водитель не присутствовал на выгрузке и подписывает акт о недостаче или браке груза, то предъявленное клиентом финансовые претензии будут взысканы с вашей зарплаты;\n\n17.После растаможки и выгрузки груза в странах СНГ водитель обязан привезти следующие документы:\n\n18. листа CMR накладной с оригинальными печатями таможни стран СНГ и получателя груза;\n\n19.МДП книжку с печатью, подписью и доставленным количеством мест таможни назначения на корешке;ы\n\n20.Российскую декларацию ГТД (копию), электронное подтверждение о прибытии на таможню;\n\n21.Лист простоя с печатями СВХ и получателя груза, не котором должно быть отметки когда машина прибыла и уехала в СВХ и в место разгрузки;\n\n22.Необходимо в таможенных зонах, складах, местах выгрузки у клиента вести себя корректно – не создавая конфликтных ситуаций. Если вы заметили, что возникает угроза конфликта, старайтесь отойти от этого лица (таможенник, ветврач, работник склада) сообщите менеджеру о создавшейся ситуации. В дальнейшем ждите указаний не вступайте в контакт с объектом конфликта;\n\n23.За употребление алкогольных напитков в таможенных зонах, складах, местах погрузки или разгрузки груза или за рулем транспортного средства – водитель увольняется;\n\nРуководство водителя STI (Германия) GmbH\n\n1. Необходимые транспортные сопроводительные документы/водительские права/удостоверение личности\n\nПри себе необходимо иметь следующие ДОКУМЕНТЫ:\n\nдействующие водительские права\n\nдействительное удостоверение личности и/или паспорт\n\nдействительный сертификат ATP для используемого прицепа\n\nнеобходимые водительские права для индивидуального транспорта (ЕС/CEMT/двусторонние разрешения)\n\nподтверждение занятости и соблюдения закона о минимальной заработной плате\n\n2. Охрана труда и общая гигиена для водителей\n\nВо время погрузки и разгрузки вы обязаны носить средства индивидуальной защиты (защитную обувь, перчатки и светоотражающие жилеты). Помимо общих средств индивидуальной защиты вы также должны соблюдать индивидуальные требования к поведению/безопасности соответствующих пунктов погрузки/разгрузки.\n\nСоблюдение общеприменимых стандартов в области пищевых продуктов и гигиены является обязательным. В частности, любые дополнительные требования, предъявляемые нашими клиентами в этом отношении, полностью признаются и соблюдаются нами.\n\nПеревозка лиц, не назначенных водителями данного транспортного средства, и/или домашних животных запрещена.\n\nВы представляете STI (Germany) GmbH для наших клиентов. Поэтому к вашей гигиене и внешнему виду применяются следующие минимальные требования:\n\nчистый и аккуратный:\n\n-  Футболка/рубашка с рукавами не менее половины длины, брюки и носки длиной не менее колена; верхняя часть тела не должна быть открытой.\n\n-  соблюдение элементарных правил гигиены, например, тщательное мытье рук с мылом после пользования санитарными помещениями,\n\n-  обязательные раны всегда должны быть закрыты пластырями или бинтами\n\n-  чистые руки и ногти\n\n-  нет неприятных запахов\n\nИнфекционные заболевания (простуда, грипп, желудочно-кишечные инфекции и т. д.), а также кожные заболевания или аллергии не являются помехой и должны быть сообщены нам заблаговременно до начала перевозки.\n\n3. Необходимое оборудование для прицепа\n\nПрицеп должен быть оборудован как минимум:\n\n-  функциональный регистратор температуры, перегородка и второй испаритель с 2 регистраторами температуры.\n\n-  калиброванный (с сертификатом калибровки) зонд или инфракрасный термометр для проверки приемки температура терморегулируемых товаров\n\n-  не менее 4 запорных планок\n\n-  поддон-ящик по назначению\n\n-  33 сменных поддона\n\n4. Предоставление грузовика и погрузка\n\nТранспорт с контролируемой температурой:\n\n-  Прицепы, как правило, необходимо предварительно охладить до указанной температуры транспортировки не менее чем за час до погрузки или раньше, если того требуют внешние условия.\n\n-  Процесс предварительного охлаждения должен быть задокументирован с помощью регистратора температуры и предоставлен на месте по запросу.\n\n-  Его также могут запросить впоследствии, поэтому вы должны иметь возможность предоставить это доказательство немедленно.\n\n-  Температуры транспортировки и/или настройки холодильного агрегата (старт-стоп/непрерывная работа), указанные STI, ни в коем случае не должны изменяться вами самостоятельно. Если возникнут проблемы с температурой или функциональностью холодильного агрегата, STI следует немедленно уведомить об этом. Вам следует дождаться указаний от STI. Любые самостоятельные действия, даже предпринятые с благими намерениями, категорически запрещены.\n\nГигиена прицепа:\n\n-  Принимаются только сухие, чистые, без запаха и гигиенически безупречные прицепы. Вы должны проверить и, при необходимости, исправить это перед каждой загрузкой.\n\n-  Прицеп должен быть в состоянии, которое однозначно исключает любое так называемое «перекрестное загрязнение» и/или «негативное воздействие» на перевозимый товар. Это имеет принципиальное значение.\n\nМы оставляем за собой право не загружать транспортные средства, не соответствующие этим требованиям, или требовать от вас их очистки перед погрузкой. Все возникающие расходы несет подрядчик (транспортный оператор). Если на предыдущем месте разгрузки вы обнаружите, что ваш прицеп не соответствует этим критериям, немедленно сообщите нам об этом. Только в этом случае мы сможем своевременно принять соответствующие меры и проинформировать наших клиентов о возможных задержках.\n\nВ общем, у вас должен быть план очистки для конкретного прицепа. Это означает, что доказательства последней внутренней и, если применимо, внешней очистки прицепа должны быть доступны как минимум за последние 6 месяцев. Документация должна включать: тип очистки, дату, место и подпись. По запросу STI (Germany) GmbH эти доказательства должны быть предоставлены нам НЕМЕДЛЕННО.\n\n5. Контроль температуры на месте погрузки\n\nВ принципе, для всех грузов с контролируемой температурой на месте погрузки, где процесс погрузки может контролироваться, вы обязаны проводить выборочные проверки температуры с использованием калиброванного зонда или инфракрасного термометра. Если погрузка не может контролироваться, это должно быть задокументировано в сопроводительных документах.\n\nПеред каждой проверкой температуры зонд-термометр необходимо дезинфицировать соответствующими средствами (например, гигиеническими салфетками).\n\nИзмерения температуры должны проводиться для каждого поддона, который будет проверен между 2 коробками. Если вы не уверены, спросите у диспетчера STI, как и какой метод использовать.\n\nПроверенные коробки следует слегка пометить (ручкой/наклейкой), чтобы их можно было использовать в качестве ориентира на месте разгрузки.\n\nИзмерения температуры должны проводиться как минимум на трех разных поддонах: первый — около холодильного агрегата, второй — в середине погрузочной зоны и третий — около дверей.\n\nИзмеренные температуры для каждой проверки должны быть отмечены в накладной, в товарно-транспортной накладной (CMR) или в специальном протоколе приемки температуры. При отсутствии накладной измерение температуры считается не выполненным.\n\nТочная документация по контролю температуры является частью компенсации за транспортировку, согласованной с вашим работодателем. Пожалуйста, будьте столь же щепетильны в отношении документации и сохранности документов.\n\nПоддоны, температура которых отличается от предписанной, не должны транспортироваться; новые поддоны должны быть запрошены у персонала, осуществляющего погрузку. Немедленно сообщите об этом в STI и ждите дальнейших указаний от STI. Без явного одобрения от STI дальнейшая погрузка не допускается. Новые поддоны должны быть запрошены персоналом, осуществляющим погрузку, и также должна быть проведена соответствующая проверка температуры. Немедленно сообщите об этом в STI и ждите дальнейших указаний от STI. Без явного одобрения от STI дальнейшая погрузка не допускается.\n\nНеобходимо обеспечить достаточную циркуляцию воздуха в грузовом отсеке, т. е. грузы должны быть загружены таким образом, чтобы функция холодильного агрегата не нарушалась во время транспортировки. Необходимо оставить зазор не менее 20 см от задних дверей.\n\nЕсли в прицепе есть двухъярусные балки, их необходимо убрать спереди и сзади всех холодильных установок перед погрузкой. Входы и выходы охладителей не должны быть заблокированы в любое время, а любые другие двухъярусные балки должны быть расположены на расстоянии не менее 20 см от потолка, чтобы обеспечить беспрепятственную циркуляцию воздуха в прицепе.\n\nДанные измерения температуры должны проводиться для всех грузов, требующих контролируемой температуры, и документироваться в товаросопроводительных документах.\n\nФрукты и овощи очень чувствительны к температуре. Поэтому для таких транспортных заказов, пожалуйста, заранее согласуйте с STi подходящий для конкретной перевозки метод предварительного охлаждения и поддержания температуры транспортировки на основе измерения температуры приема. Если возможно, и если необходимо, с поддержкой STI, запросите картонные коробки или поддоны на месте погрузки, чтобы обеспечить защиту верхних слоев от повреждения морозом.\n\nВ целом, вы получите от диспетчера STI инструкции, касающиеся температуры перевозки, относящиеся к конкретному виду транспорта. Если в исключительных ситуациях вы не получите соответствующих инструкций от диспетчера STI, пожалуйста, уточните их заранее.\n\nЕсли вы не уверены или получили противоречивые инструкции на месте погрузки, остановите процесс погрузки, немедленно свяжитесь с диспетчерской STI и получите инструкции. Ни при каких обстоятельствах не принимайте инструкции с места погрузки.\n\nРегистратор температуры холодильного агрегата должен быть активирован для всех транспортов с контролируемой температурой. Для каждого транспорта температурный профиль должен быть доступен для просмотра на протяжении всего пути по прибытии на место разгрузки.\n\n6.Количество груза\nПриемка товара (количество и вес брутто): Перед подписанием любых документов на месте погрузки необходимо провести следующие проверки и принять следующие меры:\n\nПроверьте количество коробок (если они присутствовали при загрузке) или количество поддонов для загрузки. Если это не соответствует количеству, указанному в заказе на транспортировку STI, немедленно сообщите об этом STI.\n\nДля продуктов, которые, как известно, полностью используют (или даже превышают) полезную нагрузку прицепа (например, фрукты и овощи/мясо и т. д.), общий вес груза (см. документы с места погрузки/накладные/транспортную накладную и т. д.) необходимо сравнить с общим весом, указанным в заказе на перевозку компанией STI. Если обнаружено превышение общего веса, указанного диспетчером STI, необходимо немедленно уведомить об этом STI, и вам следует дождаться дальнейших инструкций. Не подписывайте никаких документов на месте, пока не получите инструкции от STI.\n\nВ принципе запрещено самостоятельно укладывать товары/поддоны друг на друга.\n\nИсключение: если это прямо указано вашим диспетчером STI.\n\n7. Правила на погрузочно-разгрузочных площадках\n\nИндивидуальные правила/правила поведения для всех «гостей» на погрузочно-разгрузочных площадках, которые обычно вывешиваются в зоне входа и/или в зоне приема/отправки товара, а также общие правила работы и безопасности (например, передача ключей от грузовика) должны строго соблюдаться.\n\nВ принципе, вы должны полностью соблюдать все индивидуальные правила поведения на объекте, такие как:\n\nСамостоятельное приготовление пищи только в кабине водителя\n\nКурение вне кабины водителя запрещено.\n\nПользование местными санитарными удобствами\n\nВам запрещено обсуждать вопросы, связанные с транспортировкой, с персоналом склада на территории.\n\nЕсли вы чувствуете, что с вами обошлись несправедливо или вас неправильно поняли, немедленно сообщите нам об этом. Не позволяйте ситуации обостряться; мы решим этот вопрос.\n\n8. Герметизация\n\nДля заказов, в которых требуется опломбирование в соответствии с отдельным уведомлением в заказе на транспортировку:\n\n-  Место погрузки несет ответственность за физическое опломбирование прицепа, т. е. водителю не разрешается опломбировать прицеп. Это не влияет на обязанность водителя закрепить прицеп.\n\n-  Место погрузки несет ответственность за документирование номера пломбы в товаросопроводительных документах; водитель должен сравнить номер пломбы с номером, указанным в товаросопроводительных документх.\n\n-  Если на месте погрузки отказываются пломбировать прицеп или номер пломбы не соответствует номеру в товаросопроводительных документах, товаросопроводительные документы не следует подписывать, а STI следует немедленно уведомить об этом и ждать указаний.\n\nВо время транспортировки:\n\nЦелостность пломбы необходимо проверять до и после каждого вскрытия.\n\n-  В случае повреждения/отсутствия пломбы поездка должна быть остановлена, STI должен быть немедленно уведомлен. и ожидать дальнейших инструкций. Место, дата и время должны быть указаны в товаросопроводительных документах. Кроме того, если это возможно, водитель должен прикрепить новую пломбу и записать новый номер пломбы в товаросопроводительных документах.\n\n-  Если органам власти, таким как полиция, таможня или ветеринарная служба, требуется доступ к грузу, необходимо обеспечить замену пломбы на официальную пломбу органа власти и сделать отметку об этом в товаросопроводительных документах. Если этого не сделано, в товаросопроводительных документах необходимо указать регистрацию транспортного средства органа власти, местонахождение, дату и время, а также немедленно уведомить об этом STI и ожидать дальнейших инструкций.\n\nРазгрузка груза:\n\n-  При прибытии прицеп необходимо предъявить службе безопасности или приемщику товара на месте разгрузки для подтверждения целостности пломбы.\n\n-  Место разгрузки несет ответственность за снятие пломбы. Необходимо убедиться, что в транспортных документах указано «Пломба цела/не повреждена»; в противном случае необходимо немедленно уведомить STI и ждать указаний. Водителю не разрешается самостоятельно открывать пломбу.\n\n-  Примечание: в случае утраты или поломки печати правила получателя на месте могут включать, например, назначение аварийного комиссара.\n\n9. Надзор за процедурами погрузки/разгрузки\n\nВы должны контролировать процедуры погрузки и разгрузки, также в ваших интересах.\n\n-  Если вас отстранили от наблюдения за погрузочно-разгрузочными работами, необходимо немедленно уведомить об этом STI.\n\n-  Принимая во внимание количество поддонов и общий вес груза, который необходимо загрузить в соответствии с заказом STI, вы несете ответственность за безопасную погрузку (например, осевые нагрузки и т. д.). Если во время погрузки или разгрузки обнаружены какие-либо из следующих дефектов качества, процесс необходимо немедленно остановить, немедленно уведомить STI и ожидать дальнейших инструкций.\n\n-  Загрязнение товара\n\n-  Открытая упаковка\n\n-  Плохая упаковка и/или крепление поддонов (например, минимальная/плохая/ненадлежащая упаковка)\n\n-  Тип поддона\n\n-  Качество поддонов, особенно европоддонов (дефектные/отсутствующие блоки/доски, грязные, мокрые, заплесневелые и т. д.)\n\nЕсли вы не можете устранить вышеуказанные дефекты на месте самостоятельно, сохраняйте спокойствие, свяжитесь с STI и ждите инструкций. Ничего не подписывайте.\n\n-  Крепление груза: После того, как вышеупомянутые дефекты будут исключены, вы несете ответственность за закрепление груза во избежание смещения или опрокидывания.\n\n-  После завершения загрузки прицеп должен быть защищен от доступа третьих лиц как минимум встроенным и/или навесным замком, желательно также с помощью стального замка с когтями.\n\nЕсли при разгрузке заявлено или предполагается повреждение из-за температуры, необходимо немедленно закрыть двери прицепа. Холодильная установка должна продолжать работать при температуре транспортировки, указанной STI. При необходимости получатель или STI направит инспектора для оценки. Ждите указаний от STI.\n\n10.Общая информация\n\nПомните, что ваша подпись после погрузки или разгрузки подтверждает определенное состояние перевозимого вами груза. Даже если вы не видели весь груз, ваша подпись всегда подтверждает то, что было задокументировано отправителем или получателем. Подпись - Ответственность — будьте бдительны!\n\n11.Разное\n\nИнструкции от сторонних экспедиторов должны быть подтверждены STI перед выполнением. Никогда не следуйте инструкциям от третьих лиц без получения подтверждения их точности от STI. Это касается, среди прочего, инструкций от:\n\n-  Поставщики/погрузочные площадки\n\n-  Места приема/разгрузки.\n\n-  Обеспечение сохранности товаров, находящихся под вашим контролем\n\n-  Груз должен быть по возможности надежно закреплен и транспортирован между погрузкой и разгрузкой.\n\n-  Средства безопасности на прицепе должны использоваться всегда, и их функциональность не должна быть нарушена.\n\n-  Всегда используйте охраняемые парковочные зоны для перевозки дорогостоящих грузов и фармацевтических препаратов.\n\nВ противном случае необходимо принять все возможные меры для предотвращения несанкционированного доступа к грузу третьих лиц.\n\nЭто также включает в себя упреждающее планирование периодов вождения и отдыха, а также координацию соответствующего времени погрузки и разгрузки по согласованию с STI.\n\nЦель состоит в том, чтобы минимизировать ненужные остановки. Это особенно важно в районах, известных высоким риском преступности, или в регионах, где третьи лица пытаются незаконно проникнуть в страну в качестве «безбилетников в вашем грузовике».\n\nОтклонения от Транспортного Порядка\n\nSTI необходимо немедленно уведомлять о любых отклонениях от выданного заказа на перевозку, например, о предполагаемых задержках, технических проблемах, особенно связанных с перевозками с контролируемой температурой\n\n12. Обработка персональных данных\n\nС 01.02.2025 г. в рамках наших Систем управления транспортом (TMS) мы будем хранить следующие персональные данные водителей:\n\nИмя (имя и фамилия)\n\nНомер телефона\n\nЭти данные обрабатываются для:\n\nРегистрация водителей для доставки/забора грузов на определенных погрузочных площадках,\n\nОбеспечить бесперебойную обработку транспортных заказов.\n\nУметь быстро связываться с водителями в экстренных ситуациях.\n\nОбработка основана на законном интересе (ст. 6(1)(f) GDPR) для эффективной обработки транспортных процессов, а также обеспечения безопасности.\n\nИмена водителей также обрабатываются в других процессах для создания списков посещаемости для обучения водителей, для отслеживания перемещения поддонов (накладные поддонов) и, при необходимости, для документирования нарушений пломб.\n\nЭти данные будут предоставлены третьим лицам следующим образом:\n\nВ некоторых случаях для регистрации на погрузочных площадках необходимо предоставить имя водителя и номерной знак грузовика.\n\nДля перевозок в портовых зонах номер телефона водителя также будет предоставлен соответствующим органам или операторам порта.\n\nДля создания онлайн-обучения данные водителя будут введены в инструмент онлайн-обучения.\n\nДля учета поддонов имена водителей можно импортировать в программу управления документами.\n\nВ случае повреждения пломб грузовых автомобилей данные могут быть предоставлены для выяснения нарушений безопасности перевозок.\n\nДанные будут храниться в течение периода трудоустройства. Как только водитель перестает быть нашим сотрудником, его данные будут удалены в течение 14 дней.\n\nВы имеете право:\n\nДоступ к сохраненным данным,\n\nИсправление неверных данных,\n\nУдаление или ограничение обработки при условии соблюдения требований законодательства,\n\nВозражать против обработки по определенным причинам."}, {"title": "ТАМОЖЕННЫЕ ПРОЦЕДУРЫ", "content": "1.Документы для таможеных процедур:\n\n2.Доверенности на тягач и полуприцеп;\n\n3.Одноразовые дозволы на вьезд в страну в которую нужно доставить груз или транзитный дозвол страны по территории которой едим транзитом. Перед командировкой дозволы выдает менеджер по необходимости, а водитель обязан проверить правильные ли дозволы ему выдал менеджер.\n\n4.Экспортная декларация с гарантией или книжкой Carnet TIR.\n\n5.Водитель приезжая в СВХ таможни сообщает менеджеру и предоставляет все документы на груз сотруднику таможни. После растаможки груза водитель обязан из таможни забрать все документы груза с отметками сотрудников таможни и отправиться на место разгрузки.\n\nПростой: Если на растаможку и разгрузку в странах СНГ уходит более чем 48 часов водитель обязан об этом сообщить менеджеру и заполнить лист простоя."}, {"title": "ОТЧЕТ ДОКУМЕНТОВ ГРУЗА", "content": "1.Водитель обязан после рейса предоставить отчет-путевой лист за каждый рейс технику в отдел учета. K отчету прилагаются все на груз сопровождающие документы и расходные чеки за этот рейс.\n\n2.После командировки в тот же день, водитель обязан по акту приема-сдачи тягача сдать транспортное средство и ключи от тягача инженеру-механику, все документы от транспортного средства и от груза сдать в отдел учета. Не выполнение этих обязанностей является грубым нарушением должностей водителя.\n\n10. Основные документы\n\nCMR накладная выписывается в 6-и экземплярах, из которых одину забирает отправитель груза, две накладные на границе забирают таможенники, одна на растаможке груза, одну забирает получатель груза и последнюю получатель груза, расписывается и ставит печать в 24-ой графе и отдает водителю.  Переадресование груза, “неутральная“ CMR накладная. Возможно за то время пока водитель едет к получателю груза, груз будет перепродан и в пути надо будет поменять место растаможки и разгрузки груза, а так же сопровождающие документы. Такая практика легальная, но водителю обязательно нужно следовать строгим указаниям менеджера.\n\n1.  Доверенность на тягач и полуприцеп  1.  Перед рейсом каждый водитель обязан взять доверинность на эксплуатацию полуприцепа компании А.Груцюса.\n\n[]\n\n2 обр.: Доверенность на полуприцеп\n\n2.  Доверенность выписывает и выдает менеджер, ответсвенный за выдачу документов в рейс. Этот документ нужен водителю если он едет в страны СНГ или транзитом едут через Польшу , что он имеет право на перевозку груза с полуприцепом компании А.Грицюса.\n\n2.  Разрешение-доверенность  1.  Этот документ выдают в 301 каб., со всеми документами на груз чтобы забрать нужный контейнер с терминалов „Smeltė“ ул. Nemuno . 24, или „Klaipėdos konteinerio terminalаs“ toliau „KKT“ ул. Perkėlos 8. O том с какого терминала нужно забирать контейнер сообшает менеджер.  1.  Документ предявляем охране при въезде на нужный терминал. Не имея разрешения-доверенность на контейнер, водитель на территорию портового терминала не впускается.  2.  Документ выдается в двух экземплярах. Первый чтобы забрать (гружёный или пустой) контейнер из порта, а второй, чтобы его сдать в порт. [ККТ Смелте]\n\n3 обр.: Разрешение-доверенность\n\n3.  Упаковочный лист (angl. Packing list)  1.  На погрузке груза отправитель выдает погрузочный лист, в котором указаны все данные сколько загружено паллет, ящиков, вес и расположение груза. Данные в упаковочном листе („loading list“/“packing list” – žr. 2 pvz.). должны совпадать с данными в CMR накладной и в счете-фактуре (Invois).\n\n| [C:\\Users\\Vartotojas\\Desktop\\Documents\\Dokumentų PAVYZDŽIAI\\Packing-list1.png] | 4 обр. Упаковочный лист |\n|  | („packing list”)  |\n+================================================================================+=========================+\n\n2.  Во время погрузки груза, водитель обязан присутствовать, считать количество груза, проверить температуру, следить на качеством груза и упаковки, расположение груза в полуприцепе чтобы небыло перегруза на ведущую ось тягача.\n\n3.  Дополнительно имеется два погрузочных листа, которые заполняются водителем на погрузке в странах ЕС:\n\na)  Загружая груз в странах ЕС на територию СНГ: водитель самостоятельно заполняет Погрузочный лист (обр.: ). Ответсвенно заполняет все графы на бланке и прилагает его к грузу сопровошдающим документам.\n\nb)  Загружая груз в STI GmbH (Германия), водитель заполняет Погрузочный лист STI (žr. 4 pvz.) и прилагает его к грузу сопровошдающим документам.\n\n| [C:\\Users\\Kristina\\AppData\\Local\\Microsoft\\Windows\\Temporary Internet Files\\Content.Word\\Pakrovimo lapas į RUS-1.jpg] | [C:\\Users\\Kristina\\AppData\\Local\\Microsoft\\Windows\\Temporary Internet Files\\Content.Word\\STI pakrovos lapas.jpg] |\n| 5 обр. Погрузочный лист  | 6 обр. STI Погрузочный лист  |\n+=======================================================================================================================+==================================================================================================================+\n\nКнижка Carnet TIR / Книжка МДП\n\n1.  Carnet TIR книжка – документ для таможенного транзита, который действителен во всех странах СНГ и заменяет таможенную декларацию или гарантию. Документ бывает двух видов, 6-ти листов или 4-ех листов, в зависимости от количества границ, которые надо проехать. Один лист отрывается на таможни отправления груза, другой на месте растаможке груза, в пути на каждом томоженном переходе органы таможни отрывают по два листа. В Белоруссии и Россию используем 4-ех листов книжку, а на Казахстан заполняем 6-ти листов книжку.\n\nКак запонять обложку книжки Carnet TIR\n\n[C:\\Users\\Vartotojas\\AppData\\Local\\Microsoft\\Windows\\INetCache\\Content.Word\\mciTIR.GIF] 7 обр. Книжка МДП\n\nОбложка Carnet TIR:\n\n1.  Срок годности книжки Carnet TIR. Документ можно открыть до даты указаной на обложке книжки Carnet TIR .\n\n2.  Национальная асоциация международных перевозок в Литве „Linava“;\n\n3.  Название и реквизиты пользователя книжки;\n\n4.  Печать асоциации „Linava“;\n\n5.  Подпись руководителя асоциации „Linava“;\n\n6.  Страна отправления груза;\n\n7.  Страна получателя груза;\n\n8.  Гос. Номера транспортного средства;\n\n9.  Номер сертификата полуприцепа;\n\n10. Номер контейнера;\n\n11. Подпись отведственого лица перевозщика;  1.  Внутринние листы Carnet TIR :\n\n1.  Номер Carnet TIR;\n\n2.  Место отправки;\n\n3.  Организация IRU;\n\n4.  Пустой;\n\n5.  Страна открытия книжки;\n\n6.  Страна доставки груза;\n\n7.  Гос. Номера транспортного средства;\n\n8.  Груз сопровождаюшие документы (Но. Invoice и дата, Но. CMR и дата)\n\n9.  Номер контейнера;\n\n10. Информация про груз;\n\n11. Вес груза;\n\n12. Таможня доставки груза и количество мест груза;\n\n13. 14. 15. Место где открывается книжка , дата, печать и подпись перевозчика;  1.  Перевозя груз с книжкой Carnet TIR в документах водитель обязан:  1.  Проверить срок действия Carnet TIR, его можно открывать на таможне до числа указанного на обложке документа. Проверить все ли указанные данные о грузе, транспортном средстве правильные. Если вы обнаружали ошибку в документе, тогда одним движением вычеркиваем неправильные данные и рядом вписываем правильную информацию, рядом расписывается водитель и ставится печать перевозчика.  2.  После оформления обезательно проверить корочку Carnet TIR. Таможник обязан на корьне Carnet TIR поставить личную печать и расписатся, а так же написать код таможеного поста где оформлен Carnet TIR, номер пломбы на полуприцепе и код следуюшей таможни.\n\n[TIR šaknelė 1]\n\n8 обр. Корачка книжки МДП\n\n1.  Транспортировка груза по Гаранту  1.  Алтернатива документу Carnet TIR является “Национальная гарантия”. Наша компания работает с “Дургой” и с “Бунастой” которые имеют лицензию делать национальную гарантию для литовских грузоперевозчиков.  2.  Если в таможенный союз (Белоруссия, Россия, Казахстан) отправляемся без Carnet TIR, на границе оформляемся по национальной гарантии. Обратите внимание где получить национальную гарантию в каждом отдельном случае по табличке ниже:  БЕЛОРУСИЯ  РОССИЯ  УКРАИНА  Гребнево / Увылинка  Но. Гаранта присылается водителю на телефон  Терехово / Бурачки  Но. Гаранта присылается водителю на телефон  Силене / Урбаны  У декларантов „ПАРЕХ“ на границе. Заказ в „БУНАСТЕ“  Ловоришкес/ Котловка  “Дурга” по адресу Perkėlos str. 1C, Klaipėda, или “Дурга” на погран переходе  Гарант забирать в „БУНАСТЕ“ по адресу Žirnių str. 12, Vilnius  “Дурга” по адресу Perkėlos str. 1C, Klaipėda, или “Дурга” на погран переходе  Мядининкай/ Каменый Лог  “Дурга” по адресу Perkėlos str. 1C, Klaipėda, или “Дурга” на погран переходе  Гарант забирать в „БУНАСТЕ“ по адресу Žirnių str. 12, Vilnius  “Дурга” по адресу Perkėlos str. 1C, Klaipėda, или “Дурга” на погран переходе  Шалчининкай/ Бенякони  “Дурга” по адресу Perkėlos str. 1C, Klaipėda, или “Дурга” на погран переходе  Гарант забирать в „БУНАСТЕ“ по адресу Žirnių str. 12, Vilnius  “Дурга” по адресу Perkėlos str. 1C, Klaipėda, или “Дурга” на погран переходе  Райгардас / Привалка  “Дурга” по адресу Perkėlos str. 1C, Klaipėda, или “Дурга” на погран переходе  “Дурга” по адресу Perkėlos str. 1C, Klaipėda, или “Дурга” на погран переходе\n\nОбр: Места получения национальной гарантии\n\n3.  Если нужно оформлятся в “Дурге”, тогда водитель сам заезжает к декларантам на фирму, сдает им все документы на груз и ждет пока будет сделана национальная гарантия. А если национальный гарант делаем через компанию “Бунаста”, тогда все груз сопровождавшие документы менеджер отсылает декларантам Бунасты, а водитель сам документ национального гаранта забирает по адресу Žirnių str. 12, Vilnius. Если едем через границу “Силене/Урбаны” тогда в “Бунасту” заезжать не надо, национальную гарантию забираете на погранпереходе в компании “ПАРЕХ”.\n\n2.  Счет-фактура на груз  1.  Счет-фактура (“Invoice“/“Rehnung”) один из главных документов при перевозке груза в страны СНГ. Водитель обязан удостоверится, что документ оригинальный, если получили копию, немедленно сообщить менеджеру.  2.  На месте погрузки забирая счет-фактуру, водитель обязан проверить все данные о грузе ( количество, вес, название груза, отправитель, получатель груза...). Если информация в счете-фактуре не совпадает с информацией в других груз сопровождающих документах, без отдельного разрешения менеджера ехать строго запрещаетса.\n\nТрейлерный лист\n\n3.  Водитель, принимая в рейсе полуприцеп у другого водителя, обязан заполнить трейлерный лист и в нем отметить все внешние повреждения и внутриние повреждения, остаток количества топлива, мото часы агрегата и комплектацию полуприцепа и о состоянии полуприцепа СМС сообщением сообщить менеджеру;\n\n4.  Трейлерный лист обязаны подписать водитель который принимает полуприцеп и водитель который сдает его. Если на трейлерном листе нету подписи хоть одного из водителей, этот трейлерный лист не действителен и оба водителя несут ответственность за новые повреждения.\n\nКаждый раз при замене полуприцепа водитель обязан сделать 4 фото полуприцепа и вместе с трейлерном листом отправить на планшет\n\n[C:\\Users\\Kristina\\AppData\\Local\\Microsoft\\Windows\\Temporary Internet Files\\Content.Word\\Treilrinis-page-001.jpg]\n\nЛист простоя (заполняется в странах СНГ)\n\n5.  Водитель обязан в странах СНГ на месте погрузки, разгрузки и на территории таможни дать лист простоя ответственным лицам, чтобы они отметили время прибытия у отбытия вашего транспортного средтства с их территории.\n\n6.  Необходимо правильно заполнить все графы листа простоя, и удостовериться ,что в каждой графе за простой ответсвенное лицо в местах погрузки / разгрузки груза или в тамошне.\n\n7.  Если возникают какие либо недаразумения по заполнению листа простоя с ответсвеными лицами (отказывается подписать или не совпадает даннэ,...), водитель обезан связатся с менеджером и сним выеснить все нюансы сложившейся ситуации и следовать дальнейшими его указаниями. Без разрешения менеджера или без листа простоя не в коем случае не уежать из территории.\n\nЕсли во время водитель не представит лист простоя, лицам ответсвенным за простой (на местах погрузки, разгрузки и таможни), наша компания теряет возможность потребовать компенсации за простой. Поэтому наша компания имеет право потеренную сумму потребовать от водителя ответсвеного за правилное заполнение ему доверенных документов;\n\n[Prastovos]\n\n9 обр. Заполненый лист простоя"}, {"title": "ОБМЕН ПАЛЛЕТ", "content": "1.Получив заказ от менеджера об обмене евро паллет, обязательно их надо поменять на погрузке и вернуть на выгрузке. Перед обменом паллет количество паллет те которые будете менять должны находиться в полуприцепе. на территориях предприятия паллеты переносить с палетников в полуприцеп строго запрещено. паллеты переносить можете на парковкe. Максимально по времени перегрузка паллет не должно занять более 30 минут. Обмен происходит между евро паллетами, поэтому вернуть Вы должны такие же евро паллеты, какие и отдавали, обратите внимание на качество паллет (НЕ МЕНЯТЬ КРАШЕННЫЕ). Необходимо, как доказательство получить документ об обмене паллет. Действующие документы об обмене паллетами – фирменные А. Грицаус листы об обмене паллетами со штампом или оригинальные выдаются на складе. На нашем фирменном листе в графе поменяны/ changed и вернули/ pallets back должно быть указанно точное количество паллет, сколько меняли и сколько вернули, а так же возле отправителя и получателя роспись и штамп, которые доказывают, что обмен паллетами был совершен. Исправлять пaлeтный лист запрещено. Каждый раз после обмена паллет информировать своего менеджера письменно сколько паллет поменяли, сколько паллет вернули, сколько паллет загрузили.  Если Вы не получили оригинал документов или не ставят штамп на фирменном бланке, мы получаем от клиента долг, т.к. не можем доказать, что обмен был (цена одной паллеты от 13 до 15 евро, в зависимости от линии на которой работаете). В таком случаи, будучи на погрузке или выгрузке об этом Вы должны информировать менеджера, сказать причину, по которой Вы не будите менять или возвращать паллеты. Запомните, что запись на CMR lieferschein- не подходит, может быть исключением только в том случае если возвращаете столько паллет, сколько и выгрузили, например: выгружено 33 паллеты, вернули 33 паллеты. Если выгрузили одно количество паллет, а вернули другое количество или совсем не вернули, тогда информируете менеджеров и обязательно получить документ о паллетах.  2. Во время выгрузки, получив большое количество паллет, чем может поместится в ящик для паллет ( комплект 33 паллеты , в ящик для паллет помещается 36), вы должны проинформировать менеджера или человека ответственного за паллеты, что у вас избыток паллет, в том случаи падаем запрос клиенту ,который говорит куда надо отдать избыток паллет. Когда будите отдавать лишние паллеты, заполненный документ-лист также необходим, получив его Вы скрепляете с другими документами на тот рейс, после которого осталось больше паллет.  3.Водители, которые работают на DHL линии должны не забыть на документе о паллетах в графе комментарии или, зайдя на склад, перед тем как выпишут оригинальный лист указать Konto, или производя обычный обмен и указать Konto: DHL FOODSERVICES FRANKFRUT, при передачи менеджер или ответственный за паллеты человек пришлет вам другой Konto, в зависимости от того в какую фирму будит, осуществляется передача. Во время передачи паллет , просим Вас, получить оригинальные листы ,т.к. некоторые клиенты не признают наши фирменные бланки. Не получив оригинального документа, так же надо информировать. Информацию надо передавать точно человеку, отвечающему за паллеты. Предоставление информации должно быть точным и понятным, например: Trip 295827 место погрузки Вайле загружено 33 паллеты / обменено 33 паллеты - на выгрузке в Падборге выгружено 33/ вернули 33 , получил оригинальный паллетный лист, также поставили штамп на нашем фирменном листе.\n\n[]\n\n10 обр. Как заполнять лист для обмена паллет\n\n3.  Сертификаты  1.  Водитель получив один из сертификатов обязан досконально проверить все данные в нем – тому ли клиенту он выписан, соответствуют ли все данные о грузе (название, вес, количество) в других груз сопровождающих документах. Во всех сертификатах должна быть поставлена оригинальная печать и подпись отправителя груза.  2.  [C:\\Users\\Vartotojas\\Desktop\\Documents\\Dokumentų PAVYZDŽIAI\\Sertif Origin-page-001.jpg]О том какой сертификат нужен для перевозки определенного груза надо узнать у своего менеджера.  [Cerficate Health]\n\n10 обр. Сертификты\n\n4.  Экспортная декларация  1.  После погрузки груза, который нужно перевозить через границу Евро Союза, открывается ЕХ декларация. На затаможке груза водитель получает ЕХ декларацию, которую нужно предъявить в таможне на границе СНГ/ЕС. Одну копию ЕХ декларации водитель обязан привезти на базу и предоставить вместе с отчетом.  [C:\\Users\\Kristina\\AppData\\Local\\Microsoft\\Windows\\Temporary Internet Files\\Content.Word\\hgk.jpg]  11 обр. Экспортная декларация"}, {"title": "ОТЧЁТ-ПУТЕВОЙ ЛИСТ", "content": "1.Отчет-путевой лист заполняется отдельно на каждый зацепленный новый полуприцеп, kогда он полный, когда меняется номер рейса.  Водитель обязан заполнить все необходимые графы отчета, расписатся и приложить к нему все груз сопрождающие докуметы (lieferschein) и расходные чеки в дороге.  2.Заполняя маршрут движения на Отчете-путевом листе обязательно нужно написать промежуточные точки (переходы границы) транзита. (Обр.: Клайпеда – Москва поделить на отдельные отрывки – 1. Клайпеда – Мядининкай; 2. Каменный Лог – Красная Горка; 3. Красная Горка –Москва; 4. Москва – Красная Горка; 5. Красная Горка – Каменный Лог; Мядининкай- Клайпеда.)\n\n3.Заполненный Отчет-путевой лист со всеми прилагаемыми документами сдать в отдел учета, сразу после командировки.\n\n[]12.образец заполнения отчета путевого листа\n\n[]\n\n|  Подтверждение о прибытии транспортного средства.  |\n|  1.Это документ в котором отмечается, когда транспортное средство с грузом приехало на СВХ указанной таможни, фиксируются какие документы были сданы сотруднику таможни и результаты первоначального осмотра транспортного средства и груза. Этот документ является доказательством что груз от границы РФ доставлен на указанную таможню для растаможки.  |\n|  2.Подтверждение о прибытиии транспортного средства после рейса обезательно сдавать вместе с Carnet TIR. Мы в свою оочередь эти оба документа обязаны сдавать в ассоциацию международных автомобильных перевозчиков РФ (АСМАП).  |\n|  Дозвол на транзит или вьезд в страну  |\n|  1.Если перевозчик начал поездку (рейс) за пределами России, то дозвол должен быть заполнен до въезда на территорию РФ. В случае, если этот рейс в Россию проходит через страны Евразийского экономического союза (ЕАЭС), граничащие с РФ (например, Беларусь, Казахстан), то дозвол заполняется до въезда в эти страны. В противном случае, должностные лица данных стран будут вправе выдать перевозчику соответствующее уведомление для устранения причин нарушения правил перевозки грузов РФ.  |\n|  2.Если перевозчик начал поездку (рейс) в России, то дозвол должен быть заполнен до загрузки транспортного средства на территории РФ. Но следует обратить внимание на следующее. Например, если перевозчик завершил рейс по маршруту Литва – Россия в г. Москве, а следующий рейс в обратном направлении начинается в г. Ярославле, то во второй столбец дозвола необходимо внести соответствующую информацию сразу после разгрузки груза в г. Москве. При порожнем рейсе в обратном направлении правило то же, второй столбец заполняется сразу после разгрузки груза в г. Москве. |\n| При проезде транспортного средства с грузом по территории России заполняются следующие пункты бланка дозвола:  |\n| -  наименование иностранного перевозчика и адрес (п. 4) – в законе отсутствуют ограничения по способу указания реквизитов перевозчика. Их можно написать от руки или проставить в этом пункте штамп перевозчика с реквизитами компании  |\n| -  регистрационный номер транспортного средства (п. 5) — регистрационный номер транспортного средства вписывается без ошибок, как в свидетельстве транспортного средства.  |\n| -  место, дата выдачи и печать уполномоченного иностранного органа, выдавшего дозвол  (п. 8) – при получении дозвола проверяется наличие соответствующих реквизитов органа.  |\n| -  дата и место въезда на территорию РФ (п. 9) – указывается первое место въезда в РФ по данному дозволу и дата этого въезда (например, Бурачки 01.01.2017).  |\n| -  наименование перевозимых грузов (п. 10) – наименование вписывается без ошибок и указывается как в CMR.  |\n| -  вес перевозимых грузов (п. 11) — вес вписывается без ошибок и указывается как в CMR.  |\n| -  пункт погрузки (п.12) — указываются город (деревня, село) и страна погрузки груза (например, Вильнюс Литва).  |\n| -  пункт разгрузки (п. 13) — указываются город (деревня, село) и страна разгрузки груза (например, Москва Россия).  |\n|  1.  При проезде порожнего (пустого) транспортного средства по территории России заполняются следующие пункты:  |\n| -  наименование иностранного перевозчика и адрес (п. 4) – в законе отсутствуют ограничения по способу указания реквизитов перевозчика. Их можно написать от руки или проставить в этом пункте штамп перевозчика с реквизитами компании.  |\n| -  регистрационный номер транспортного средства (п.5) — регистрационный номер транспортного средства вписывается без ошибок, как в свидетельстве транспортного средства.  |\n| -  место, дата выдачи и печать уполномоченного иностранного органа, выдавшего дозвол  (п. 8) — при получении дозвола проверяется наличие соответствующих реквизитов органа.  |\n| -  дата и место въезда на территорию РФ (п. 9) – указывается первое место въезда в Россию по данному дозволу и дата этого въезда (например, Бурачки 01.01.2017).  |\n| -  наименование государства начала поездки (п. 12) — в этом пункте указывается страна начала поездки (например, Литва).  |\n| -  наименование государства завершения поездки (п.13) — указывается страна начала поездки (например, Россия).  |\n|  3.По мнению должностных лиц транспортной инспекции, внесение изменений (исправлений) в дозвол не допускается. Однако данный запрет ни одним нормативно-правовым актом не установлен.  |\n|  4.В случае, если заказчик перевозки (отправитель или получатель груза) в ходе перевозки груза по какой-либо причине воспользовался правом переадресации места конечной доставки товара, то в п. 13 дозвола необходимо указать новый населенный пункт России через запятую (например, Москва, Россия, Тула). При этом населенный пункт «Москва» в дозволе не зачеркивать.  |\n|  5.В случае, если перевозчик, например, в обратном направлении на территории России получил заказ на перевозку груза, при этом он на этот момент уже заполнил второй столбец дозвола (по правилам порожней перевозки грузов), то в месте погрузки водителю необходимо будет заполнить полностью п.п. 10 и 11 бланка дозвола и дополнить наименование населенных пунктов в п.п. 12 и 13.  |\n+======================================================================================================================================================================================================================================================================================================================================================================================================================================================================================================================================================================================+"}, {"title": "ДОКУМЕНТЫ ПОДТВЕРЖДАЮЩИЕ РАСХОДЫ В ПУТИ", "content": "Когда водитель в пути расчитывается карточкой или наличными именем компании, обязан взять счет-фактуру или другие документы подтверждающие покупку услуги или то  Голандия, Италия спрашиваем у менеджера где дешевле\n\nAD BLUE\n\n1. Литва (на базе) полный бак, самое дешовое\n2. Франция, всегда полный бак если не едем на базу\n3. Германия, Польша если не попадаем в Францию\n\n4. В Белгии, Люксембурге и Дании не заправлять !!!!!!"}, {"title": "ИНСТРУКЦИЯ ПО ПОГРУЗКЕ И РАЗГРУЗКЕ ГРУЗА", "content": "11. Общая часть  1.  Требования этих инструкции обязаны выполнять все водители нашей компании.  2.  Значения:\n\n-  Ответсвенный менеджер, Менеджер – Сотрудник компании, курирующий перевозку конкретного груза.\n\n-  Фирма – Автотранспортная компания A.Griciaus;\n\n-  Склад – место где загружается или разгружается груз.\n\n-  Роботник склада – доверенное лицо отрпавителя или получателя груза, ответсвенный за прием груза от водителя или передачу водителю;\n\n12. Погрузка груза  1.  На погрузку водитель должен приехать указанное время в задании и по указанному адресу. Адрес получает в планшет или на телефон СМС сообщением от своего менеджера. Если по каким либо причинам водитель не успевает приехать в нужное время на погрузку или разгрузку, заранее об этом нужно информировать менеджера;  2.  Перед погрузкой водитель обязан проверить агрегат полуприцепа, завести его и поставить на автоматический режим. Если агрегат не работает или работает только на постоянном режиме, немедленно об этом сообщить менеджеру.  3.  На погрузку приезжать только с чистым полуприцепом, если полуприцеп нужно подмести, это водитель делает своими силами, а если внутри есть запах, тогда сообщить менеджеру и следовать дальнейшим его инструкциям;  4.  На месте погрузки водитель должен зарегистрироватся, выяснить когда начнется погрузка и сообщить менеджеру; Если в указанное время не грузят нужно опять сообщить менеджеру , сообщять каждый час до того как начнут грузить;  5.  Если на погрузке/разгрузке работники склада указывают водителю самому загрузить/разгрузить груз, об этом немедленно сообщить менеджеру и дальше следовать указаниям менеджера.  6.  Если на погрузке водителю присутсвовать не разрешается, водитель об этом обязан Известить менеджера, написать в 18-ой графе на всех листах CMR накладной и расписаться.  7.  В странах ЕС всегда, а в странах СНГ иногда на погрузке/разгрузке необходимо иметь спец.одежду (спец. Обувь, желет, каску , очки, руковицы). Если на погрузке/разгрузке есть дополнительные условия для безопасности водителя, их обязательно надо исполнять.  8.  На погрузке водитель обязан присутствовать, пересчитывать паллеты, ящики с грузом, если температурный груз проверить температуру груза, проверять тару чтобы она была качественная, не помятая, сухая и другими способами не повреждена. Если видим какие то несоответствие с документами, сразу сообщаем менеджеру.  9.  Водитель лично несет ответственность за правильное расположение и крепление груза в полуприцепе. Водитель обязан на погрузке так распределить груз в полуприцепе, чтобы не было перегруза на осях тягача и полуприцепа. Если грузоотправитель не слушается водителя, водитель должен прекратить погрузку и о ситуации сообщить менеджеру;  10. После погрузки груза водитель обязан проверить документы на груз (должно совпадать в документах количество и вес груза, отправитель и получатель груза), закрепить груз, закрыть двери полуприцепа, повесить пломбу и сообщить менеджеру. Ехать можно только с разрешением менеджера;  11. В пути после погрузки, водитель регулярно проверяет груз: не освободились ли ремни для крепления груза, не наклонился ли груз, при необходимости дополнительно закрепить груз;\n\nОсобенности при погрузки фруктов, овощей, свежого мяса и рыбы:\n\n12. Получив заказ на перевозку температурного груза, водитель обязан проверить работает ли агрегат полуприцепа на автоматном и постоянном режиме. После зацепки полуприцепа или во время транспортировки груза заметив неисправность, немедленно информировать ответственного менеджера и начальника технического отдела и дальше руководствоваться по указаниям этих лиц.\n\n13. При перевозке температурного груза строго запрещается выключать агрегат или менять температуру без разрешения менеджера до того как будет разгружен транспортируемый груз.\n\n14. Перед перевозкой фруктов водитель обязан обратить внимание на упаковку паллеты с грузом выше 150 см ( ящики достаточно твердые, паллета достаточно обмотана пленкой, ящики на паллетах правильно закреплены специальными уголками и т.д.). Заметив, что груз не стабильно упакован, водитель обязан немедленно информировать менеджера и дальше следовать его инструкциям.\n\n20. Разгрузка груза\n\n20.1. После регистрации на разгрузке груза, водитель обязан спросить у сотрудника склада,когда начнут разгрузку и можно присутствовать на погрузке и ее контролировать. Обязательно сообщить менеджеру о начале разгрузки, а так же если не разрешают присутствовать на разгрузке. Начинать разгрузку без участия водителя можно только с разрешением менеджера.\n\n20.2. Если разгрузка производилась без участия водителя, во всех случаях водитель обязан об этом вписать в 18-ой графе CMR накладной. Удостоверьтесь, что запись “На погрузке присутствовать не разрешили” присутствует на всех листах CMR накладной, а особенно на той накладной которая осталась у получателя груза.\n\n20.3. На разгрузке водитель обязан пересчитавать груз (паллеты, ящики или другую тару), следить за качеством груза и упаковки (упаковка порвана, промокшая, негодная для груза, негодная температура или другие заметные повреждения). Если разгружаем температурный груз водитель должен попросить чтобы проверили температуру груза, если это не сделает сотрудник получателя, водитель температуру должен проверить сам. Заметив, что есть какие либо повреждения водитель немедленно сообщает менеджеру и дальше действует по его указаниям.\n\n4.  Если получатель груза, что либо отметил в CMR накладной или водитель заметил недостачу груза, немедленно об этом сообщить менеджеру и CMR накладную прислать по электронной почте.\n\n5.  После разгрузки водитель обязан предьявить менеджеру полную информацию: время разгрузки, состояние груза, соответсвует ли количество груза с тем, что написанно в документах.\n\n20. Схемы погрузки полуприцепа:\n\n* Погрузка\n\n[]\n\n[]\n\n[]\n\n[]"}, {"title": "КРЕПЛЕНИЕ ГРУЗА", "content": "Общие требования:\n\nГлавная цель крепления груза – в не зависимости от ситуации груз выдержать в стабильном положении;\n\nПеред погрузкой, водитель обязан удостоверится что все преднадлежнсти для крепления груза в хорошом состояние; во время погрузки – обеспечить правильное расположение груза в транспортном средстве, обращая внимание на нагрузку груза на каждую ось транспортного средства.\n\nВодитель обязан исползовать дополнительную оборудование для крепление груза: резиновые коврики, штанги крепления, ремни, разные блокировки груза и другие обязательные приспособления;"}, {"title": "ОСНОВА БЕЗОПАСНОГО ВОЖДЕНИЯ УСТОЙЧИВОСТЬ АВТОМОБИЛЯ", "content": "1. Устойчивость автомобиля тем больше, чем ниже его центр тяжести\n\n2. Автомобиль, не загруженный грузом, менее быстро поворачивает.\n\n3. Полностью заполненная автоцистерна более устойчива, чем наполовину заполненная.\n\n4. Ехать по склону нужно медленно, не делая резких движений рулем и тормозами.\n\n5. Сила инерции действует на автомобиль при резком начале движения, резком торможении, повороте.\n\n6. Центробежная сила тем больше, чем выше скорость движения и чем меньше дорога\n\nлуч.\n\n7. Причина скольжения автомобиля боком на скользкой дороге может быть такой внезапноe торможение, а также резкое ускорение.\n\n8. Если сила тяги колес автомобиля больше силы сцепления колес с дорожным покрытием, ведущие колеса будут прогибаться.\n\n9. При движении по скользкой дороге опасно резко увеличивать обороты двигателя (нажать педаль акселератора), так как автомобиль может соскользнуть в сторону.\n\n10. При износе протектора шины уменьшается сила сцепления колес с дорожным покрытием.\n\n11. При резком торможении автомобиля задние колеса блокируются (буксуют) быстрее, чем боковой задний мост,необходимо немного отпустить педаль акселератора, повернуть руль в сторону скольжения боковая задняя ось, нужно чуть сильнее нажать на педаль акселератора и отрегулировать направление движения автомобиля рулем\n\n14. Если заторможенный автомобиль начинает скользить в сторону, необходимо прекратить торможение.\n15. В повороте машина более устойчива, если ее вести с включенной передачей.\n\n16. Если правые колеса автомобиля, на котором вы едете, задели неукрепленный бордюр, рекомендуется направить автомобиль на проезжую часть, не останавливаясь.\n\n17. Сильный боковой ветер опасен на скользкой дороге при выезде с закрытого участка дороги\n18. После пересечения водоема (при залитых тормозах автомобиля) водителю рекомендуется двигаться с малой скоростью, несколько раз нажимая на педаль тормоза для просушки тормозных колодок.\n\n19. Величина аквапланирования (водяной клин между протектором шины и поверхностью дороги) зависит от скорости движения, состояния протектора шины, интенсивности дождя, поверхности и геометрии.\n\n20. Если во время движения прямо вы неожиданно выехали на небольшой обледенелый участок дороги желательно не менять скорость и направление движения, а слегка отпустить педаль акселератора.\n\n21. При движении по глубокому снегу, по разбитой грунтовой дороге необходимо заранее выбирать пониженную передачу, не делать резких поворотов, не переключать передачи, стараться не останавливаться.\n22. При перевозке более тяжелых грузов сверху на кузов легкового автомобиля (багажник на крыша), резкие повороты руля и торможение опасны\n\n23. Самым скользким является дорожное покрытие из тесаных камней.\n\n24. Слишком низкое давление в шинах увеличивает расход топлива и снижает устойчивость автомобиля.\n\n25. Только когда начинается дождь, дорожное покрытие становится очень скользким."}, {"title": "ВОЖДЕНИЕ В УГОЛ", "content": "26. Центробежная сила будет уменьшаться при снижении скорости движения в повороте.\n27. В повороте прицеп установки движется в сторону от центра поворота (чем длиннее бук
