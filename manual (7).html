<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vairuotojo vadovas | Gricius Logistics</title>

<style>
:root{
  --navy:#0d1b35;--navy2:#142040;--red:#c0392b;--gold:#e8932a;
  --white:#fff;--gray:#f2f4f8;--gray2:#e8eaee;
  --text:#1a2030;--muted:#6b7280;--border:#dde2ec;
  --sidebar-w:300px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:#e8ecf2;color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(90deg,var(--navy) 0%,var(--navy2) 100%);
  color:#fff;padding:0 20px;height:60px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:300;
  box-shadow:0 2px 20px rgba(0,0,0,.4);
  flex-shrink:0;
}
.h-icon{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--red),#a93226);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;box-shadow:0 3px 10px rgba(192,57,43,.4);
}
.h-title{flex:1}
.h-title h1{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.h-title p{font-size:10px;opacity:.45;letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow',sans-serif;margin-top:1px}
.h-actions{display:flex;gap:6px;align-items:center}
.lang-btn{
  padding:5px 12px;border:1px solid rgba(255,255,255,.2);
  border-radius:6px;font-size:11px;font-weight:800;
  cursor:pointer;background:transparent;color:rgba(255,255,255,.5);
  font-family:'Barlow',sans-serif;transition:.15s;letter-spacing:.5px;
}
.lang-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.lang-btn:hover:not(.active){color:#fff;border-color:rgba(255,255,255,.5)}
.back-btn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:#fff;padding:6px 14px;border-radius:7px;
  font-size:12px;font-weight:600;cursor:pointer;
  text-decoration:none;font-family:'Barlow',sans-serif;transition:.15s;
  white-space:nowrap;
}
.back-btn:hover{background:rgba(255,255,255,.2)}

/* ===== SEARCH BAR ===== */
.search-bar{
  background:#fff;border-bottom:2px solid var(--border);
  padding:10px 20px;display:flex;gap:10px;align-items:center;
  position:sticky;top:60px;z-index:200;
  box-shadow:0 2px 10px rgba(0,0,0,.06);flex-shrink:0;
}
.search-wrap{flex:1;position:relative;max-width:600px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-input{
  width:100%;padding:9px 14px 9px 36px;
  border:1.5px solid var(--border);border-radius:24px;
  font-size:14px;font-family:'Barlow',sans-serif;
  outline:none;background:#f8f9fc;transition:.2s;
}
.search-input:focus{border-color:var(--navy);background:#fff;box-shadow:0 0 0 3px rgba(13,27,53,.07)}
.search-clear{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:15px;display:none;padding:0;
}
.search-stats{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:600}

/* ===== LAYOUT ===== */
.app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 114px)}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:linear-gradient(180deg,#1a2f52 0%,#0d1b35 100%);
  border-right:none;
  overflow-y:auto;height:100%;
  box-shadow:4px 0 16px rgba(0,0,0,.15);
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sidebar::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25)}

.sidebar-header{
  padding:16px 18px 12px;
  border-bottom:1px solid rgba(255,255,255,.08);
  position:sticky;top:0;z-index:10;
  background:rgba(0,0,0,.2);
}
.sidebar-header h3{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:800;color:rgba(255,255,255,.4);
  letter-spacing:2.5px;text-transform:uppercase;
}

.nav-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 18px;cursor:pointer;
  border-left:3px solid transparent;
  border-bottom:1px solid rgba(255,255,255,.05);
  transition:.15s;
}
.nav-item:hover{
  background:rgba(255,255,255,.07);
  border-left-color:var(--gold);
}
.nav-item.active{
  background:rgba(192,57,43,.25);
  border-left-color:var(--red);
}
.nav-num{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;font-family:'Barlow Condensed',sans-serif;
  transition:.15s;
}
.nav-item:hover .nav-num{background:rgba(255,255,255,.2);color:#fff}
.nav-item.active .nav-num{background:var(--red);color:#fff}
.nav-text{font-size:12px;font-weight:600;color:rgba(255,255,255,.55);line-height:1.4;transition:.15s}
.nav-item:hover .nav-text{color:rgba(255,255,255,.85)}
.nav-item.active .nav-text{color:#fff;font-weight:700}
.nav-item.hidden{display:none}

/* ===== CONTENT ===== */
.content{flex:1;overflow-y:auto;padding:20px 24px;height:100%}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:#f5f5f5}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

#sections-wrap{width:100%}

/* ===== SECTION CARD ===== */
.section-card{
  background:#fff;border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:18px;overflow:hidden;
  box-shadow:0 3px 16px rgba(0,0,0,.07);
  display:none;animation:cardIn .3s ease;
}
.section-card.visible{display:block}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card-header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  padding:14px 20px;
  display:flex;align-items:center;gap:12px;
  border-left:5px solid var(--red);
}
.card-num{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.15);color:#fff;
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;font-weight:800;color:#fff;
  letter-spacing:.3px;flex:1;
}
.translate-btn{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  color:#fff;padding:5px 14px;border-radius:20px;
  font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Barlow',sans-serif;transition:.15s;
  white-space:nowrap;flex-shrink:0;
}
.translate-btn:hover{background:rgba(255,255,255,.25)}
.translate-btn:disabled{opacity:.5;cursor:not-allowed}

.card-body{padding:20px}

/* Translation note */
.trans-note{
  background:#eafaf2;border-left:3px solid #27ae60;
  border-radius:0 8px 8px 0;padding:8px 14px;
  font-size:12px;color:#1a5c38;margin-bottom:14px;display:none;
}
.trans-err{
  background:#ffe8e8;border-left:3px solid var(--red);
  border-radius:0 8px 8px 0;padding:8px 14px;
  font-size:12px;color:#a93226;margin-bottom:14px;display:none;
}

/* Document images */
.doc-images{
  margin:0 0 18px;
  background:var(--gray);border-radius:12px;
  border:1px solid var(--border);padding:14px;
}
.doc-images-label{
  font-size:10px;font-weight:800;color:var(--muted);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.doc-images-label::after{content:'';flex:1;height:1px;background:var(--border)}
.doc-imgs-grid{display:flex;flex-wrap:wrap;gap:10px}
.doc-img{
  max-width:100%;border-radius:8px;border:1px solid var(--border);
  cursor:zoom-in;box-shadow:0 2px 8px rgba(0,0,0,.08);
  transition:.2s;display:block;
}
.doc-img:hover{transform:scale(1.01);box-shadow:0 4px 16px rgba(0,0,0,.15)}

/* Section text */
.section-body{
  font-size:14px;line-height:1.9;color:var(--text);
  word-break:break-word;
  text-align:justify;
  hyphens:auto;
}
.section-body p{margin-bottom:10px}

.section-body .line{
  padding:3px 0;border-bottom:1px solid transparent;
}
.section-body .line:hover{background:rgba(13,27,53,.02)}

/* Translating state */
.translating{
  color:var(--muted);font-style:italic;font-size:13px;
  padding:20px;text-align:center;
}
.translating::before{content:'ā¸³ '}

/* No results */
.no-results{
  text-align:center;padding:80px 20px;color:var(--muted);
  background:#fff;border-radius:16px;border:1px solid var(--border);
}
.no-results-icon{font-size:56px;margin-bottom:14px}
.no-results p{font-size:15px}

/* ===== LIGHTBOX ===== */
.lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.92);z-index:9999;
  align-items:center;justify-content:center;cursor:zoom-out;
}
.lightbox.open{display:flex}
.lb-img{max-width:95vw;max-height:92vh;border-radius:8px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.lb-close{
  position:fixed;top:16px;right:20px;
  color:#fff;font-size:24px;cursor:pointer;
  background:rgba(255,255,255,.15);
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:none;transition:.15s;
}
.lb-close:hover{background:rgba(255,255,255,.3)}

/* ===== MOBILE ===== */
@media(max-width:700px){
  .sidebar{display:none}
  .app-body{height:calc(100vh - 114px)}
  .content{padding:12px 14px}
  .card-title{font-size:14px}
  .h-title p{display:none}
}
</style>

let LANG = 'ru';
let searchTimer = null;
const cache = {}; // translated content cache

function setLang(l) {
  LANG = l;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === l.toUpperCase())
  );
  SECTIONS.forEach((s, i) => {
    const card = document.getElementById('card-' + i);
    if (!card || !card.classList.contains('visible')) return;
    refreshBody(i);
  });
}

function formatText(text) {
  // Format text nicely - preserve structure but clean up excessive newlines
  const lines = text.split('\n');
  const result = [];
  let prevEmpty = false;

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) {
      if (!prevEmpty) result.push('');
      prevEmpty = true;
    } else {
      result.push(trimmed);
      prevEmpty = false;
    }
  }

  // Join with proper spacing
  return result.join('\n');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, q) {
  const escaped = esc(formatText(text));
  if (!q) return escaped;
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp('(' + safe + ')', 'gi'), '<mark style="background:#fff3a3;padding:1px 3px;border-radius:3px;font-weight:600">$1</mark>');
}

function refreshBody(i) {
  const bodyEl = document.getElementById('body-' + i);
  const btnEl = document.getElementById('tbtn-' + i);
  const noteEl = document.getElementById('note-' + i);
  const s = SECTIONS[i];
  if (!bodyEl) return;

  if (LANG === 'ru') {
    bodyEl.style.whiteSpace = 'pre-line';
    bodyEl.innerHTML = esc(formatText(s.content));
    if (btnEl) btnEl.style.display = 'none';
    if (noteEl) noteEl.style.display = 'none';
    return;
  }

  const ck = i + '_' + LANG;
  if (cache[ck]) {
    bodyEl.style.whiteSpace = 'pre-line';
    bodyEl.innerHTML = esc(formatText(cache[ck]));
    if (btnEl) btnEl.style.display = 'none';
    if (noteEl) {
      noteEl.className = 'trans-note';
      noteEl.style.display = 'block';
      noteEl.textContent = LANG === 'lt' ? 'ā… IÅversta ÄÆ lietuviÅ³ kalbÄ…' : 'ā… Translated to English';
    }
    return;
  }

  // Show original + translate button
  bodyEl.style.whiteSpace = 'pre-line';
  bodyEl.innerHTML = esc(formatText(s.content));
  if (btnEl) btnEl.style.display = 'inline-block';
  if (noteEl) noteEl.style.display = 'none';
}

async function translateSection(i) {
  const bodyEl = document.getElementById('body-' + i);
  const btnEl = document.getElementById('tbtn-' + i);
  const noteEl = document.getElementById('note-' + i);
  const s = SECTIONS[i];

  btnEl.disabled = true;
  btnEl.textContent = 'ā¸³ VerÄ¨iama...';
  bodyEl.innerHTML = '<div class="translating">VerÄ¨iama... Palaukite kelias sekundes.</div>';

  try {
    const r = await fetch('/api/translate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: s.content, title: s.title, lang: LANG})
    });
    if (r.status === 401) { location.href = '/'; return; }
    const d = await r.json();
    if (d.translated) {
      cache[i + '_' + LANG] = d.translated;
      refreshBody(i);
    } else throw new Error(d.error || 'Klaida');
  } catch(e) {
    bodyEl.innerHTML = esc(formatText(s.content));
    btnEl.disabled = false;
    btnEl.textContent = 'š Versti / Translate';
    if (noteEl) {
      noteEl.className = 'trans-err';
      noteEl.style.display = 'block';
      noteEl.textContent = 'ā¯ ' + e.message;
    }
  }
}

    nav.innerHTML =
      '<div class="nav-num">' + (i + 1) + '</div>' +
      '<div class="nav-text">' + esc(s.title) + '</div>';
    nav.onclick = () => scrollToCard(i);
    navList.appendChild(nav);

    // Images
    const imgs = SECTION_IMAGES[i] || [];
    const imgsHtml = imgs.length ?
      '<div class="doc-images">' +
        '<div class="doc-images-label">Dokumento pavyzdÅ¾iai</div>' +
        '<div class="doc-imgs-grid">' +
          imgs.map(src =>
            '<img class="doc-img" src="' + src + '" alt="Dokumento pavyzdys" loading="lazy" onclick="openImg(this)">'
          ).join('') +
        '</div>' +
      '</div>' : '';

    // Section card
    const card = document.createElement('div');
    card.className = 'section-card' + (i === 0 ? ' visible' : ' visible');
    card.id = 'card-' + i;
    card.innerHTML =
      '<div class="card-header">' +
        '<div class="card-num">' + (i + 1) + '</div>' +
        '<div class="card-title">' + esc(s.title) + '</div>' +
        '<button class="translate-btn" id="tbtn-' + i + '" style="display:none" onclick="translateSection(' + i + ')">š Versti / Translate</button>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="trans-note" id="note-' + i + '" style="display:none"></div>' +
        imgsHtml +
        '<div class="section-body" id="body-' + i + '" style="white-space:pre-line">' +
          esc(formatText(s.content)) +
        '</div>' +
      '</div>';

    wrap.appendChild(card);
  });

  updateStats(SECTIONS.length);

  // Intersection observer for active nav
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('card-', '');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const navEl = document.getElementById('nav-' + id);
        if (navEl) {
          navEl.classList.add('active');
          navEl.scrollIntoView({block:'nearest'});
        }
      }
    });
  }, {threshold: 0.1, rootMargin: '-10% 0px -80% 0px'});

  document.querySelectorAll('.section-card').forEach(card => observer.observe(card));
}

function scrollToCard(i) {
  const card = document.getElementById('card-' + i);
  if (card) {
    card.scrollIntoView({behavior: 'smooth', block: 'start'});
    // Briefly highlight
    card.style.boxShadow = '0 0 0 3px rgba(192,57,43,.3)';
    setTimeout(() => card.style.boxShadow = '', 1200);
  }
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('search-clear').style.display = 'none';
  doSearch('');
}

document.getElementById('search').addEventListener('input', function() {
  document.getElementById('search-clear').style.display = this.value ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(this.value.trim()), 250);
});

function doSearch(q) {
  let found = 0;
  const lower = q.toLowerCase();

  SECTIONS.forEach((s, i) => {
    const card = document.getElementById('card-' + i);
    const navEl = document.getElementById('nav-' + i);
    const bodyEl = document.getElementById('body-' + i);
    if (!card) return;

    if (!q) {
      card.classList.add('visible');
      if (navEl) navEl.classList.remove('hidden');
      if (bodyEl) bodyEl.innerHTML = esc(formatText(LANG === 'ru' ? s.content : (cache[i+'_'+LANG] || s.content)));
      found++;
    } else {
      const searchIn = s.title + ' ' + s.content + ' ' + (cache[i+'_'+LANG] || '');
      if (searchIn.toLowerCase().includes(lower)) {
        card.classList.add('visible');
        if (navEl) navEl.classList.remove('hidden');
        const displayText = LANG === 'ru' ? s.content : (cache[i+'_'+LANG] || s.content);
        if (bodyEl) bodyEl.innerHTML = highlight(displayText, q);
        found++;
      } else {
        card.classList.remove('visible');
        if (navEl) navEl.classList.add('hidden');
      }
    }
  });

  document.getElementById('no-results').style.display = found === 0 ? 'block' : 'none';
  updateStats(found, q);
}

function updateStats(count, q) {
  const el = document.getElementById('search-stats');
  if (!q) el.textContent = count + ' skyriai';
  else el.textContent = count + ' rasta';
}

init();
</script>
